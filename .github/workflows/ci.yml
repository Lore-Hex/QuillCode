name: CI

on:
  workflow_dispatch:
  pull_request:
  merge_group:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  swift:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Test
        run: swift test
      - name: Enforce no app-level Linux conditionals
        run: |
          if grep -R "#if os(Linux)\\|#if linux" Sources/QuillCodeApp; then
            echo "Platform conditionals belong in adapter libraries, not QuillCodeApp."
            exit 1
          fi

  linux-swift:
    runs-on: ubuntu-latest
    container: swift:6.2-noble
    steps:
      - uses: actions/checkout@v4
      - name: Build CLI
        run: swift build --product quill-code
      - name: Smoke Linux Computer Use helpers
        run: swift run quillcode-linux-computer-use-smoke

  smoke:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Smoke
        env:
          QUILLCODE_SMOKE_ARTIFACT_DIR: ${{ github.workspace }}/.quillcode-smoke-artifacts
        run: ./scripts/smoke.sh
      - name: Upload smoke UI artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quillcode-smoke-ui-${{ runner.os }}
          path: .quillcode-smoke-artifacts
          if-no-files-found: ignore
          retention-days: 14
