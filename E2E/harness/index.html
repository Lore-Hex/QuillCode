<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>QuillCode Harness</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #071014;
      --panel: #121d23;
      --panel-2: #192930;
      --line: #2a414a;
      --text: #eef7fa;
      --muted: #9fb0b8;
      --blue: #41b8e8;
      --green: #52d273;
      --red: #ff5d52;
      --yellow: #f8b84e;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top left, rgba(65,184,232,.14), transparent 35%), var(--bg);
      color: var(--text);
    }
    .quillcode-workspace { min-height: 100vh; display: grid; grid-template-rows: auto 1fr; }
    .topbar {
      margin: 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      padding: 16px 18px;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 18px;
      background: color-mix(in srgb, var(--panel-2) 86%, transparent);
      box-shadow: 0 18px 60px rgba(0,0,0,.28);
    }
    .topbar strong { font-size: 20px; }
    .topbar p { margin: 3px 0 0; color: var(--muted); }
    .topbar-pills { display: flex; flex-wrap: wrap; justify-content: flex-end; gap: 8px; }
    .topbar-pills span,
    .topbar-pills select,
    .topbar-pills button {
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(65,184,232,.14);
      color: #b6eaff;
      border: 1px solid rgba(65,184,232,.22);
      font-size: 13px;
    }
    .topbar-pills select { max-width: 230px; }
    .topbar-pills button { font-weight: 600; }
    .topbar-pills [data-testid="runtime-issue-pill"] {
      color: #ffe2a3;
      background: rgba(248,184,78,.14);
      border-color: rgba(248,184,78,.28);
    }
    .topbar-pills [data-testid="runtime-issue-pill"][data-severity="error"] {
      color: #ffc4c0;
      background: rgba(255,93,82,.14);
      border-color: rgba(255,93,82,.30);
    }
    .model-picker-wrap { position: relative; display: inline-flex; }
    .model-panel {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      z-index: 4;
      width: min(380px, calc(100vw - 36px));
      display: grid;
      gap: 10px;
      padding: 14px;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 16px;
      background: var(--panel);
      box-shadow: 0 20px 80px rgba(0,0,0,.45);
    }
    .model-panel h2,
    .model-panel p { margin: 0; }
    .model-panel input {
      width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--line);
      color: var(--text);
      background: rgba(0,0,0,.24);
    }
    .model-results { display: grid; gap: 10px; max-height: 330px; overflow: auto; }
    .model-category { display: grid; gap: 6px; }
    .model-category h3 {
      margin: 0;
      color: var(--muted);
      font-size: 11px;
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    .model-option {
      width: 100%;
      display: grid;
      gap: 2px;
      padding: 10px;
      border-radius: 10px;
      color: var(--text);
      text-align: left;
      background: rgba(255,255,255,.04);
      border: 1px solid transparent;
    }
    .model-option small { color: var(--muted); }
    .model-option.selected {
      background: rgba(65,184,232,.13);
      border-color: rgba(65,184,232,.32);
    }
    .model-empty {
      padding: 12px;
      border-radius: 10px;
      color: var(--muted);
      background: rgba(0,0,0,.22);
    }
    .settings-panel,
    .search-panel {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background: rgba(0,0,0,.45);
      z-index: 5;
    }
    .settings-card,
    .search-card {
      width: min(520px, 100%);
      display: grid;
      gap: 14px;
      padding: 20px;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 18px;
      background: var(--panel);
      box-shadow: 0 20px 80px rgba(0,0,0,.45);
    }
    .search-card { width: min(620px, 100%); }
    .settings-card h2, .settings-card p { margin: 0; }
    .search-card h2, .search-card p { margin: 0; }
    .settings-card label { display: grid; gap: 6px; color: var(--muted); font-size: 13px; }
    .search-card label { display: grid; gap: 6px; color: var(--muted); font-size: 13px; }
    .search-card header { display: flex; justify-content: space-between; gap: 16px; align-items: start; }
    .search-results { display: grid; gap: 8px; max-height: 340px; overflow: auto; }
    .search-result {
      width: 100%;
      padding: 12px;
      display: grid;
      gap: 4px;
      text-align: left;
      color: var(--text);
      border: 1px solid rgba(255,255,255,.1);
      background: rgba(255,255,255,.06);
    }
    .search-result.selected { border-color: rgba(65,184,232,.75); background: rgba(65,184,232,.12); }
    .search-result small { color: var(--muted); }
    .command-group-title { margin: 6px 0 2px; color: var(--muted); font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: .08em; }
    .settings-actions { display: flex; gap: 10px; justify-content: flex-end; }
    .workspace-grid { min-height: 0; display: grid; grid-template-columns: 280px 1fr; gap: 18px; padding: 0 18px 18px; }
    .sidebar, .transcript {
      min-height: 0;
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 18px;
      background: rgba(18,29,35,.84);
    }
    .sidebar { padding: 14px; overflow: auto; }
    .sidebar h2 { margin: 0 0 12px; color: var(--muted); font-size: 13px; text-transform: uppercase; letter-spacing: .08em; }
    .sidebar h3 { margin: 10px 0 8px; color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .08em; }
    .sidebar-section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .sidebar-icon-button {
      width: 26px;
      height: 26px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.12);
      color: var(--blue);
      background: rgba(65,184,232,.12);
      font-weight: 700;
    }
    .sidebar-actions {
      display: grid;
      gap: 8px;
      margin-bottom: 14px;
    }
    .sidebar-action {
      width: 100%;
      padding: 11px 12px;
      text-align: left;
      color: var(--text);
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.1);
    }
    .sidebar-item,
    .project-item {
      width: 100%;
      margin: 0 0 8px;
      padding: 11px 12px;
      display: grid;
      gap: 3px;
      text-align: left;
      color: var(--text);
      background: transparent;
      border: 1px solid transparent;
      border-radius: 12px;
    }
    .sidebar-item {
      min-height: 60px;
      padding-right: 88px;
    }
    .sidebar-item.selected,
    .project-item.selected { background: rgba(255,255,255,.08); border-color: rgba(255,255,255,.14); }
    .sidebar-item small,
    .project-item small { color: var(--muted); }
    .sidebar-thread-row {
      position: relative;
      display: block;
      margin-bottom: 8px;
    }
    .sidebar-thread-actions {
      position: absolute;
      top: 8px;
      right: 8px;
      display: flex;
      gap: 4px;
      opacity: .22;
      transition: opacity .15s ease;
    }
    .sidebar-thread-row:hover .sidebar-thread-actions,
    .sidebar-thread-row:focus-within .sidebar-thread-actions {
      opacity: 1;
    }
    .sidebar-thread-actions button {
      min-width: 0;
      height: 24px;
      padding: 0 7px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.12);
      color: var(--blue);
      background: rgba(65,184,232,.12);
      font-size: 10px;
      font-weight: 700;
    }
    .transcript { display: grid; grid-template-rows: 1fr auto; overflow: hidden; }
    .timeline { padding: 22px; overflow: auto; display: flex; flex-direction: column; gap: 14px; }
    .terminal-pane,
    .browser-pane,
    .extensions-pane,
    .memories-pane {
      display: grid;
      gap: 10px;
      padding: 14px;
      border-top: 1px solid rgba(255,255,255,.1);
      background: rgba(18,29,35,.96);
    }
    .terminal-pane header,
    .browser-pane header,
    .extensions-pane header,
    .memories-pane header,
    .terminal-entry header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .terminal-pane code,
    .terminal-entry code,
    .terminal-entry pre {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }
    .terminal-pane code { color: var(--muted); font-size: 12px; }
    .terminal-history { display: grid; gap: 8px; max-height: 180px; overflow: auto; }
    .terminal-entry {
      display: grid;
      gap: 6px;
      padding: 10px;
      border-radius: 10px;
      background: rgba(0,0,0,.26);
      border: 1px solid rgba(255,255,255,.08);
    }
    .terminal-entry pre { margin: 0; }
    .terminal-status.ok { color: var(--green); }
    .terminal-status.failed { color: var(--red); }
    .terminal-form { display: grid; grid-template-columns: auto 1fr auto; gap: 8px; align-items: center; }
    .browser-form,
    .browser-comment-form { display: grid; grid-template-columns: 1fr auto; gap: 8px; align-items: center; }
    .browser-preview,
    .browser-comment {
      display: grid;
      gap: 5px;
      padding: 10px;
      border-radius: 10px;
      background: rgba(0,0,0,.26);
      border: 1px solid rgba(255,255,255,.08);
    }
    .browser-comments { display: grid; gap: 8px; max-height: 120px; overflow: auto; }
    .browser-preview code,
    .browser-comment small {
      color: var(--muted);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 12px;
    }
    .browser-snapshot {
      display: grid;
      gap: 5px;
    }
    .browser-snapshot [data-testid="browser-source"] {
      justify-self: start;
      color: var(--blue);
      background: rgba(69,181,224,.14);
      border: 1px solid rgba(69,181,224,.22);
      border-radius: 999px;
      padding: 3px 7px;
      font-size: 11px;
      font-weight: 700;
    }
    .browser-snapshot p { margin: 0; }
    .browser-snapshot ul {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin: 0;
      padding: 0;
      list-style: none;
    }
    .browser-snapshot li {
      color: var(--muted);
      background: rgba(255,255,255,.05);
      border-radius: 999px;
      padding: 4px 7px;
      font: 11px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }
    .extensions-pane header p,
    .memories-pane header p { margin: 3px 0 0; color: var(--muted); }
    .extensions-counts,
    .memories-counts { display: flex; flex-wrap: wrap; gap: 6px; justify-content: flex-end; }
    .extensions-counts span,
    .memories-counts span,
    .memories-add-button,
    .memory-delete-button,
    .extension-card [data-testid="extension-kind"],
    .extension-card [data-testid="extension-status"],
    .memory-card [data-testid="memory-scope"],
    .memory-card [data-testid="memory-size"] {
      padding: 4px 8px;
      border-radius: 999px;
      color: #b8ecff;
      background: rgba(65,184,232,.12);
      border: 1px solid rgba(65,184,232,.18);
      font-size: 11px;
      font-weight: 700;
    }
    .memories-add-button,
    .memory-delete-button {
      font: inherit;
      cursor: pointer;
    }
    .memory-delete-button {
      color: #ffb7b7;
      background: rgba(255,82,82,.1);
      border-color: rgba(255,82,82,.16);
      margin-left: auto;
    }
    .extension-card [data-testid="extension-status"] {
      color: var(--green);
      background: rgba(82,210,115,.12);
      border-color: rgba(82,210,115,.22);
    }
    .extension-card[data-status="Stopped"] [data-testid="extension-status"],
    .extension-card[data-status="Disabled"] [data-testid="extension-status"] {
      color: var(--muted);
      background: rgba(255,255,255,.05);
      border-color: rgba(255,255,255,.08);
    }
    .extension-card[data-status="Failed"] [data-testid="extension-status"],
    .extension-card[data-status="Missing command"] [data-testid="extension-status"] {
      color: #ffb7b7;
      background: rgba(255,82,82,.1);
      border-color: rgba(255,82,82,.16);
    }
    .extension-card[data-status="Probing"] [data-testid="extension-status"] {
      color: #b8ecff;
      background: rgba(65,184,232,.12);
      border-color: rgba(65,184,232,.22);
    }
    .extension-card [data-testid="extension-mcp-server"] {
      color: var(--green);
      font-size: 12px;
      font-weight: 700;
    }
    .extension-card [data-testid="extension-mcp-protocol"],
    .extension-card [data-testid="extension-mcp-tools-count"] {
      width: fit-content;
      padding: 3px 7px;
      border-radius: 999px;
      color: var(--muted);
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.08);
      font: 11px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }
    .extension-card [data-testid="extension-mcp-tools"] {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }
    .extension-card [data-testid="extension-mcp-tool"] {
      padding: 3px 7px;
      border-radius: 999px;
      color: #b8ecff;
      background: rgba(65,184,232,.1);
      border: 1px solid rgba(65,184,232,.16);
      font: 11px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }
    .extension-card button {
      justify-self: start;
      padding: 7px 11px;
      border: 1px solid rgba(65,184,232,.24);
      border-radius: 999px;
      background: rgba(65,184,232,.16);
      color: #b8ecff;
      font: inherit;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }
    .extensions-grid,
    .memories-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 10px;
    }
    .extension-card,
    .memory-card,
    .extensions-empty,
    .memories-empty {
      display: grid;
      gap: 7px;
      padding: 12px;
      border-radius: 12px;
      background: rgba(0,0,0,.26);
      border: 1px solid rgba(255,255,255,.08);
    }
    .extension-card header,
    .memory-card header { justify-content: flex-start; }
    .extension-card p,
    .memory-card p,
    .extensions-empty p,
    .memories-empty p { margin: 0; color: var(--muted); }
    .extension-card code,
    .extension-card [data-testid="extension-transport"],
    .memory-card code {
      color: var(--muted);
      font-size: 12px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .message, .tool-card, .review-pane, .context-banner, .runtime-issue {
      max-width: min(760px, 88%);
      padding: 13px 15px;
      border-radius: 16px;
      line-height: 1.42;
    }
    .message.user { align-self: flex-end; background: linear-gradient(135deg, #45bdec, #d16c5f); }
    .message.assistant { align-self: flex-start; background: rgba(255,255,255,.1); }
    .message { white-space: pre-wrap; }
    .tool-card {
      align-self: flex-start;
      width: min(760px, 92%);
      background: rgba(0,0,0,.22);
      border: 1px solid rgba(65,184,232,.25);
    }
    .tool-card.done { border-color: rgba(82,210,115,.34); }
    .tool-card.failed { border-color: rgba(255,93,82,.44); }
    .tool-card.review { border-color: rgba(248,184,78,.48); }
    .tool-card header { display: flex; justify-content: space-between; gap: 14px; }
    .tool-artifacts {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 4px;
    }
    .artifact-chip {
      max-width: 100%;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(65,184,232,.28);
      color: #b8ecff;
      background: rgba(65,184,232,.12);
      text-decoration: none;
      overflow-wrap: anywhere;
      font-size: 12px;
      font-weight: 650;
    }
    .artifact-chip::before { content: "•"; opacity: .7; }
    .artifact-chip strong,
    .artifact-chip small {
      display: block;
      max-width: 260px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .artifact-chip small {
      color: #9baeb5;
      font-size: 11px;
      font-weight: 600;
    }
    .tool-details {
      margin-top: 6px;
    }
    .tool-details summary {
      cursor: pointer;
      color: #8fe2ff;
      font-size: 12px;
      font-weight: 700;
      user-select: none;
    }
    .review-pane {
      align-self: flex-start;
      width: min(760px, 92%);
      background: rgba(65,184,232,.08);
      border: 1px solid rgba(65,184,232,.26);
    }
    .context-banner {
      align-self: flex-start;
      width: min(760px, 92%);
      display: grid;
      gap: 9px;
      background: rgba(248,184,78,.10);
      border: 1px solid rgba(248,184,78,.32);
    }
    .context-banner header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
    }
    .context-banner p { margin: 0; color: var(--muted); }
    .context-banner span {
      padding: 4px 8px;
      border-radius: 999px;
      color: #ffe2a3;
      background: rgba(248,184,78,.14);
      font-size: 12px;
      font-weight: 700;
    }
    .context-banner div { display: flex; gap: 8px; flex-wrap: wrap; }
    .context-banner button {
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid rgba(248,184,78,.28);
      background: rgba(248,184,78,.14);
      color: #ffe2a3;
      font-size: 13px;
    }
    .runtime-issue {
      align-self: flex-start;
      width: min(760px, 92%);
      display: grid;
      gap: 9px;
      background: rgba(248,184,78,.08);
      border: 1px solid rgba(248,184,78,.32);
    }
    .runtime-issue.error {
      background: rgba(255,93,82,.08);
      border-color: rgba(255,93,82,.38);
    }
    .runtime-issue header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
    }
    .runtime-issue p { margin: 0; color: var(--muted); }
    .runtime-issue span,
    .runtime-issue button {
      width: fit-content;
      padding: 4px 8px;
      border-radius: 999px;
      border: 1px solid rgba(248,184,78,.24);
      background: rgba(248,184,78,.14);
      color: var(--yellow);
      font-size: 12px;
      font-weight: 700;
    }
    .runtime-issue.error span,
    .runtime-issue.error button {
      border-color: rgba(255,93,82,.24);
      background: rgba(255,93,82,.14);
      color: var(--red);
    }
    .review-pane header {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 10px;
    }
    .review-pane ul { list-style: none; padding: 0; margin: 0; display: grid; gap: 8px; }
    .review-pane li {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px 16px;
      color: var(--text);
    }
    .review-pane small { color: var(--muted); }
    .review-actions { display: flex; align-items: center; gap: 8px; }
    .review-hunks {
      grid-column: 1 / -1;
      display: grid;
      gap: 6px;
      margin: 6px 0 0 20px;
    }
    .review-hunk {
      display: grid;
      gap: 10px;
      color: var(--muted);
    }
    .review-hunk-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .review-hunk-header code {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .review-lines {
      display: grid;
      gap: 0;
      margin: 0;
      padding: 0;
      overflow: hidden;
      border-radius: 10px;
      background: rgba(0,0,0,.22);
    }
    .review-line {
      display: grid;
      grid-template-columns: 40px 14px minmax(0, 1fr) auto;
      align-items: center;
      gap: 8px;
      padding: 5px 8px;
      color: var(--text);
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 12px;
    }
    .review-line[data-line-kind="insertion"] {
      background: rgba(52,199,89,.08);
    }
    .review-line[data-line-kind="deletion"] {
      background: rgba(255,69,58,.08);
    }
    .review-line-number {
      color: var(--muted);
      text-align: right;
      font-variant-numeric: tabular-nums;
    }
    .review-line-marker[data-line-kind="insertion"] { color: #7ee787; }
    .review-line-marker[data-line-kind="deletion"] { color: #ff8a80; }
    .review-line-content {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .review-line-comment-form {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .review-range-comment-form {
      display: grid;
      grid-template-columns: 68px 68px minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
      margin: 0;
    }
    .review-line-comment-form input {
      width: 150px;
      min-width: 0;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(0,0,0,.18);
      color: var(--text);

    function escapeHTML(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function addMessage(role, text) {
      const message = {
        id: `message-${state.nextTimelineIndex++}`,
        role,
        text
      };
      state.transcript.messages.push(message);
      state.transcript.timelineItems.push({
        id: `timeline-${state.nextTimelineIndex++}`,
        kind: 'message',
        message
      });
      return message;
    }

    function renameSelectedThread(title) {
      if (!state.sidebar.selectedThreadID) return;
      state.sidebar.items = state.sidebar.items.map(item => (
        item.id === state.sidebar.selectedThreadID ? { ...item, title } : item
      ));
      state.topBar.primaryTitle = title;
    }

    function memoryTitle(content) {
      const firstLine = String(content).split(/\n/)[0] || 'Memory';
      const cleaned = firstLine
        .replace(/^remember\s+(that\s+)?/i, '')
        .trim()
        .slice(0, 60);
      const words = cleaned || 'Memory';
      return words
        .split(/[^A-Za-z0-9]+/)
        .filter(Boolean)
        .slice(0, 8)
        .map(word => word.charAt(0).toUpperCase() + word.slice(1))
        .join(' ') || 'Memory';
    }

    function refreshMemorySummary() {
      const globalCount = state.memories.items.filter(item => item.scope === 'global').length;
      const projectCount = state.memories.items.filter(item => item.scope === 'project').length;
      state.memories.globalCount = globalCount;
      state.memories.projectCount = projectCount;
      state.memories.subtitle = `${countLabel(globalCount, 'global memory')} · ${countLabel(projectCount, 'project memory')}`;
      const total = globalCount + projectCount;
      state.topBar.memoryLabel = total === 1 ? '1 memory' : `${total} memories`;
      state.topBar.memorySources = state.memories.items.map(item => item.relativePath);
    }

    function saveMemory(content) {
      const trimmed = String(content).trim();
      if (!trimmed) {
        addMessage('assistant', 'Nothing to remember. Use `/remember a durable preference or fact`.');
        return null;
      }
      if (/\b(password|passwd|passphrase|api[_ -]?key|secret|token|credential)\s*[:=]/i.test(trimmed)
          || /\b(sk|pk|rk|ghp|github_pat|xox[baprs])[-_][A-Za-z0-9_=\-]{16,}/i.test(trimmed)
          || /-----BEGIN [A-Z ]*PRIVATE KEY-----/.test(trimmed)) {
        addMessage('assistant', 'Memory was not saved because it looks like it contains a credential, token, password, or private key.');
        return null;
      }
      const title = memoryTitle(trimmed);
      const id = `global:memories/manual-${Date.now()}-${state.memories.globalCount + 1}.md`;
      const item = {
        id,
        scope: 'global',
        scopeLabel: 'Global',
        title,
        preview: trimmed,
        relativePath: id.replace('global:', ''),
        byteCountLabel: `${new TextEncoder().encode(trimmed).length} bytes`,
        canDelete: true,
        deleteCommandID: `memory-delete:${id}`
      };
      state.memories.items = [item, ...state.memories.items];
      refreshMemorySummary();
      renameSelectedThread(`Memory: ${title}`);
      addMessage('assistant', `Saved memory: ${title}. It will be included as background context in future turns.`);
      return item;
    }

    function deleteMemory(id) {
      const index = state.memories.items.findIndex(item => item.id === id && item.scope === 'global');
      if (index < 0) {
        addMessage('assistant', 'Memory was not found. It may already have been removed.');
        return false;
      }
      const [item] = state.memories.items.splice(index, 1);
      refreshMemorySummary();
      renameSelectedThread(`Forgot memory: ${item.title}`);
      addMessage('assistant', `Forgot memory: ${item.title}. It will no longer be included as background context.`);
      return true;
    }

    function addToolCard(card) {
      const toolCard = {
        id: `tool-${state.nextTimelineIndex++}`,
        artifacts: artifactsFromOutput(card.outputJSON),
        ...card
      };
      state.transcript.toolCards.push(toolCard);
      state.transcript.timelineItems.push({
        id: `timeline-${state.nextTimelineIndex++}`,
        kind: 'toolCard',
        toolCard
      });
      return toolCard;
    }

    function artifactsFromOutput(outputJSON) {
      if (!outputJSON) return [];
      try {
        const decoded = JSON.parse(outputJSON);
        return Array.isArray(decoded.artifacts)
          ? decoded.artifacts
              .filter(value => String(value || '').trim())
              .map(value => artifactState(String(value)))
          : [];
      } catch {
        return [];
      }
    }

    function artifactState(value) {
      let kind = value.startsWith('http://') || value.startsWith('https://')
        ? 'url'
        : value.startsWith('/') || value.startsWith('file://')
          ? 'file'
          : 'path';
      let label = value;
      try {
        const url = value.startsWith('/') ? new URL(`file://${value}`) : new URL(value);
        if (url.protocol === 'http:' || url.protocol === 'https:') {
          label = url.pathname && url.pathname !== '/' ? `${url.hostname}${url.pathname}` : url.hostname;
        } else {
          const parts = url.pathname.split('/').filter(Boolean);
          label = parts.at(-1) || url.hostname || value;
        }
      } catch {
        const parts = value.split('/').filter(Boolean);
        label = parts.at(-1) || value;
      }
      return { value, label, kind };
    }

    function artifactDetail(artifact) {
      if (artifact.kind === 'url') return artifact.label;
      if (artifact.kind === 'file') {
        try {
          const url = artifact.value.startsWith('/') ? new URL(`file://${artifact.value}`) : new URL(artifact.value);
          const parts = url.pathname.split('/').filter(Boolean);
          parts.pop();
          return '/' + parts.join('/');
        } catch {
          const parts = artifact.value.split('/').filter(Boolean);
          parts.pop();
          return parts.length ? '/' + parts.join('/') : 'File artifact';
        }
      }
      return artifact.value;
    }

    function artifactHref(artifact) {
      if (artifact.kind === 'url') return artifact.value;
      if (artifact.kind === 'file' && artifact.value.startsWith('/')) return `file://${artifact.value}`;
      if (artifact.kind === 'file' && artifact.value.startsWith('file://')) return artifact.value;
      return null;
    }

    function countLabel(count, singular) {
      if (count === 1) return `1 ${singular}`;
      if (singular.endsWith('memory')) return `${count} ${singular.replace(/memory$/, 'memories')}`;
      return `${count} ${singular}s`;
    }

    const contextTokenBudget = 32000;
    const contextWarningThresholdPercent = 80;

    function updateDynamicCommands() {
      const hasMessages = Boolean(state.sidebar.selectedThreadID && state.transcript.messages.length);
      const hasUserMessages = state.transcript.messages.some(message => message.role === 'user' && String(message.text || '').trim());
      const hasActiveWork = state.composer.isSending || state.terminal.isRunning;
      state.commands = state.commands.map(command => (
        command.id === 'fork-from-last' ? { ...command, isEnabled: hasMessages } :
        command.id === 'retry-last-turn' ? { ...command, isEnabled: hasUserMessages && !state.composer.isSending } :
        command.id === 'stop-all' ? { ...command, isEnabled: hasActiveWork } :
        command
      ));
    }

    const commandCategoryOrder = ['Thread', 'Navigation', 'Workspace', 'Extensions', 'Git', 'Environment', 'Control', 'Computer Use'];

    function normalizeCommandText(value) {
      return String(value || '').trim().toLowerCase();
    }

    function compactCommandText(value) {
      return normalizeCommandText(value).replace(/[\s+]/g, '');
    }

    function commandCategoryRank(category) {
      const index = commandCategoryOrder.indexOf(category || 'Workspace');
      return index === -1 ? commandCategoryOrder.length : index;
    }

    function commandScore(command, query) {
      if (!query) return 1;
      const title = normalizeCommandText(command.title);
      const compactTitle = compactCommandText(command.title);
      const shortcut = compactCommandText(command.shortcut);
      const id = normalizeCommandText(command.id.replaceAll('-', ' '));
      const category = normalizeCommandText(command.category || 'Workspace');
      const keywords = (command.keywords || []).map(normalizeCommandText);
      const compactQuery = compactCommandText(query);

      if (title === query || compactTitle === compactQuery) return 1000;
      if (title.startsWith(query) || compactTitle.startsWith(compactQuery)) return 900;
      if (title.split(/\s+/).some(part => part.startsWith(query))) return 820;
      if (shortcut && shortcut.includes(compactQuery)) return 780;
      if (keywords.some(keyword => keyword === query || keyword.startsWith(query))) return 720;
      if (title.includes(query) || compactTitle.includes(compactQuery)) return 650;
      if (id.includes(query) || keywords.some(keyword => keyword.includes(query))) return 560;
      if (category.includes(query)) return 440;
      return null;
    }

    function commandPaletteResults() {
      const query = normalizeCommandText(state.commandPalette.query);
      return state.commands
        .map((command, index) => ({ command, index, score: commandScore(command, query) }))
        .filter(entry => entry.score !== null)
        .sort((lhs, rhs) => {
          if (lhs.score !== rhs.score) return rhs.score - lhs.score;
          const lhsCategory = commandCategoryRank(lhs.command.category);
          const rhsCategory = commandCategoryRank(rhs.command.category);
          if (lhsCategory !== rhsCategory) return lhsCategory - rhsCategory;
          return lhs.index - rhs.index;
        })
        .map(entry => entry.command);
    }

    function commandPaletteGroups() {
      const groupsByCategory = new Map();
      for (const command of commandPaletteResults()) {
        const category = command.category || 'Workspace';
        if (!groupsByCategory.has(category)) groupsByCategory.set(category, []);
        groupsByCategory.get(category).push(command);
      }
      return [...groupsByCategory.entries()]
        .sort(([lhs], [rhs]) => {
          const lhsRank = commandCategoryRank(lhs);
          const rhsRank = commandCategoryRank(rhs);
          if (lhsRank !== rhsRank) return lhsRank - rhsRank;
          return lhs.localeCompare(rhs);
        })
        .map(([category, commands]) => ({ category, commands }));
    }

    function ensureCommandPaletteSelection() {
      const enabled = commandPaletteResults().filter(command => command.isEnabled);
      if (enabled.some(command => command.id === state.commandPalette.selectedCommandID)) return;
      state.commandPalette.selectedCommandID = enabled[0]?.id || null;
    }

    function openCommandPalette() {
      state.commandPalette.isOpen = true;
      state.commandPalette.query = '';
      ensureCommandPaletteSelection();
      render();
    }

    function moveCommandPaletteSelection(delta) {
      const enabled = commandPaletteResults().filter(command => command.isEnabled);
      if (!enabled.length) {
        state.commandPalette.selectedCommandID = null;
        return;
      }
      const currentIndex = Math.max(0, enabled.findIndex(command => command.id === state.commandPalette.selectedCommandID));
      const nextIndex = (currentIndex + delta + enabled.length) % enabled.length;
      state.commandPalette.selectedCommandID = enabled[nextIndex].id;
    }

    function selectCommandPaletteSelection() {
      const enabled = commandPaletteResults().filter(command => command.isEnabled);
      const command = enabled.find(candidate => candidate.id === state.commandPalette.selectedCommandID) || enabled[0];
      if (command) runCommand(command.id);

    function handleCommandPaletteKeydown(event) {
      if (!state.commandPalette.isOpen) return false;
      if (event.key === 'Escape') {
        event.preventDefault();
        state.commandPalette.isOpen = false;
        render();
        return true;
      }
      if (event.key === 'ArrowDown') {
        event.preventDefault();
        moveCommandPaletteSelection(1);
        render();
        return true;
      }
      if (event.key === 'ArrowUp') {
        event.preventDefault();
        moveCommandPaletteSelection(-1);
        render();
        return true;
      }
      if (event.key === 'Enter') {
        event.preventDefault();
        selectCommandPaletteSelection();
        return true;
      }
      return false;
    }

    function estimatedContextTokens() {
      const messageChars = state.transcript.messages
        .reduce((total, message) => total + message.text.length + 24, 0);
      const cardChars = state.transcript.toolCards
        .reduce((total, card) => total + (card.subtitle || '').length + (card.inputJSON || '').length + (card.outputJSON || '').length, 0);
      return Math.max(1, Math.floor((messageChars + cardChars) / 4));
    }

    function contextBanner() {
      if (!state.transcript.messages.length) return null;
      const usedPercent = Math.min(100, Math.round((estimatedContextTokens() / contextTokenBudget) * 100));

      return {
        usedPercent,
        title: `${usedPercent >= 100 ? 'Context limit reached' : 'Approaching context limit'} (${usedPercent}% used)`,
        subtitle: 'Older turns may drop out soon. Start a new thread or fork from the latest useful context.'

    function filterModelCategories(query) {
      const terms = query.trim().toLowerCase().split(/\s+/).filter(Boolean);
      if (!terms.length) return state.topBar.modelCategories;
      return state.topBar.modelCategories
        .map(category => ({
          ...category,
          models: category.models.filter(model => {
            const haystack = [
              category.category,
              model.id,
              model.provider,
              model.displayName
            ].join(' ').toLowerCase();
            return terms.every(term => haystack.includes(term));
          })
        }))
        .filter(category => category.models.length > 0);
    }

    function selectModel(selectedID) {
      const allModels = state.topBar.modelCategories.flatMap(category => category.models);
      const selected = allModels.find(model => model.id === selectedID);
      if (!selected) return;
      state.topBar.selectedModelID = selected.id;
      state.topBar.modelLabel = selected.id;
      state.topBar.modelPickerOpen = false;
      state.topBar.modelSearch = '';
      state.topBar.modelCategories = state.topBar.modelCategories.map(category => ({
        ...category,
        models: category.models.map(model => ({ ...model, isSelected: model.id === selected.id }))
      }));
      render();
    }

    function ensureThread(title) {
      if (!state.sidebar.selectedThreadID) {
        const threadID = `thread-${state.nextThreadIndex++}`;
        state.sidebar.selectedThreadID = threadID;
        state.sidebar.items = [{
          id: threadID,
          title,
          subtitle: state.topBar.modelLabel,
          searchText: '',
          isSelected: true,
          isPinned: false
        }, ...state.sidebar.items.map(item => ({ ...item, isSelected: false }))];
      }
      state.topBar.primaryTitle = title;
      const selectedProject = state.projects.items.find(project => project.id === state.projects.selectedProjectID);
      state.topBar.subtitle = `${selectedProject?.name || 'No project'} - ${state.topBar.modeLabel} - ${state.topBar.modelLabel}`;
    }

    function newChat() {
      state.sidebar.selectedThreadID = null;
      state.sidebar.items = state.sidebar.items.map(item => ({ ...item, isSelected: false }));
      state.transcript.messages = [];
      state.transcript.toolCards = [];
      state.transcript.timelineItems = [];
      state.review = {
        title: 'Review changes',
        subtitle: 'Latest git diff',
        totalInsertions: 0,
        totalDeletions: 0,
        totalHunks: 0,
        files: []
      };
      state.composer.draft = '';
      state.composer.canSend = false;
      state.topBar.primaryTitle = 'QuillCode';
      const selectedProject = state.projects.items.find(project => project.id === state.projects.selectedProjectID);
      state.topBar.subtitle = `${selectedProject?.name || 'No project'} - Not started`;
      render();
    }

    function forkFromLast() {
      if (!state.sidebar.selectedThreadID || !state.transcript.messages.length) return;
      const source = state.sidebar.items.find(item => item.id === state.sidebar.selectedThreadID);
      const title = `Fork: ${source?.title || 'Chat'}`;
      const latestUserIndex = state.transcript.messages
        .map((message, index) => ({ message, index }))
        .filter(entry => entry.message.role === 'user')
        .at(-1)?.index ?? Math.max(0, state.transcript.messages.length - 4);
      const copiedMessages = state.transcript.messages.slice(latestUserIndex, latestUserIndex + 4);
      const threadID = `thread-${state.nextThreadIndex++}`;

      state.sidebar.selectedThreadID = threadID;
      state.sidebar.items = [{
        id: threadID,
        title,
        subtitle: state.topBar.modelLabel,
        searchText: copiedMessages.map(message => message.text).join('\n'),
        isSelected: true,
        isPinned: false
      }, ...state.sidebar.items.map(item => ({ ...item, isSelected: false }))];
      state.transcript.messages = copiedMessages;
      state.transcript.toolCards = [];
      state.transcript.timelineItems = copiedMessages.map(message => ({
        id: `timeline-${state.nextTimelineIndex++}`,
        kind: 'message',
        message
      }));
      state.review = {
        title: 'Review changes',
        subtitle: 'Latest git diff',
        totalInsertions: 0,
        totalDeletions: 0,
        totalHunks: 0,
        files: []
      };
      state.topBar.primaryTitle = title;

    function runCommand(commandID) {
      if (commandID === 'command-palette') {
        openCommandPalette();
        return;
      }
      if (commandID?.startsWith('memory-delete:')) {
        deleteMemory(commandID.slice('memory-delete:'.length));
        render();
        return;
      }
      state.commandPalette.isOpen = false;
      if (commandID === 'new-chat') {
        newChat();
        return;
      }
      if (commandID === 'fork-from-last') {
        forkFromLast();
        return;
      }
      if (commandID === 'retry-last-turn') {
        retryLastUserTurn();
        return;
      }
      if (commandID === 'search') {
        state.search.isOpen = true;
        state.search.query = '';
      }
      if (commandID === 'add-project') {
        addProject();
        return;
      }
      if (commandID === 'toggle-terminal') {
        state.terminal.isVisible = !state.terminal.isVisible;
      }
      if (commandID === 'toggle-browser') {
        state.browser.isVisible = !state.browser.isVisible;
      }
      if (commandID === 'toggle-memories') {
        state.memories.isVisible = !state.memories.isVisible;
      }
      if (commandID === 'memory-add') {
        state.composer.draft = '/remember ';
        state.composer.canSend = true;
      }
      if (commandID === 'toggle-extensions') {
        state.extensions.isVisible = !state.extensions.isVisible;
      }
      if (commandID?.startsWith('mcp-start:')) {
        setMCPStatus(commandID.slice('mcp-start:'.length), 'Ready');
        addMessage('assistant', 'Filesystem MCP is ready with 2 tools.');
        render();
        return;
      }
      if (commandID?.startsWith('mcp-stop:')) {
        setMCPStatus(commandID.slice('mcp-stop:'.length), 'Stopped');
        addMessage('assistant', 'Stopped Filesystem MCP.');
        render();
        return;
      }
      if (commandID === 'git-pr-create') {
        state.composer.draft = 'Create a pull request titled ';
      }
      if (commandID === 'git-worktree-list') {
        listWorktrees();
        return;
      }
      if (commandID === 'git-worktree-create') {
        state.worktreeDialog = {
          ...state.worktreeDialog,
          mode: 'create',
          createPath: '',
          createBranch: '',
          createBase: ''
        };
      }
      if (commandID === 'git-worktree-remove') {
        state.worktreeDialog = {
          ...state.worktreeDialog,
          mode: 'remove',
          removePath: '',
          removeForce: false
        };
      }
      if (commandID.startsWith('local-env:')) {
        runLocalEnvironmentAction(commandID);
        return;
      }
      if (commandID === 'stop-all') {
        state.composer.isSending = false;
        state.terminal.isRunning = false;
        state.extensions.items
          .filter(item => item.kind === 'mcp_server' && ['Ready', 'Running', 'Probing'].includes(item.statusLabel))
          .forEach(item => setMCPStatus(item.id, 'Stopped'));
        state.topBar.agentStatus = 'Stopped';
      }
      if (commandID === 'settings') {
        state.settings.isOpen = true;
        state.settings.replacementAPIKey = '';
      }
      render();
    }

    function setMCPStatus(id, status) {
      const item = state.extensions.items.find(item => item.id === id && item.kind === 'mcp_server');
      if (!item) return;
      item.statusLabel = status;
      if (status === 'Ready' || status === 'Running' || status === 'Probing') {
        item.serverLabel = 'Fixture MCP 1.0.0';
        item.protocolLabel = 'MCP 2024-11-05';
        item.toolCountLabel = '2 tools';
        item.toolNames = ['read_file', 'write_file'];
        item.probeError = null;
        item.startCommandID = null;
        item.stopCommandID = `mcp-stop:${id}`;
      } else {
        item.serverLabel = null;
        item.protocolLabel = null;
        item.toolCountLabel = null;
        item.toolNames = [];
        item.probeError = null;
        item.startCommandID = `mcp-start:${id}`;
        item.stopCommandID = null;
      }
      const startCommand = state.commands.find(command => command.id === `mcp-start:${id}`);
      const stopCommand = state.commands.find(command => command.id === `mcp-stop:${id}`);
      const isActive = status === 'Ready' || status === 'Running' || status === 'Probing';
      if (startCommand) startCommand.isEnabled = !isActive;
      if (stopCommand) stopCommand.isEnabled = isActive;
      const stopAll = state.commands.find(command => command.id === 'stop-all');
      if (stopAll) {
        stopAll.isEnabled = state.composer.isSending
          || state.terminal.isRunning
          || state.extensions.items.some(item => item.kind === 'mcp_server' && ['Ready', 'Running', 'Probing'].includes(item.statusLabel));
      }
    }

    function runTerminalCommand() {
      const command = state.terminal.draft.trim();
      if (!command) return;
      state.terminal.draft = '';
      state.terminal.isVisible = true;
      const selectedProject = state.projects.items.find(project => project.id === state.projects.selectedProjectID);
      const cwd = selectedProject?.path || state.terminal.cwdLabel;
      const output = terminalOutput(command, cwd);
      state.terminal.entries.push({
        command,
        stdout: output.stdout,
        stderr: output.stderr,
        exitCode: output.exitCode,
        ok: output.exitCode === 0
      });
      render();
    }

	    function terminalOutput(command, cwd) {
      if (command === 'pwd') {
        return { stdout: cwd + '\n', stderr: '', exitCode: 0 };
      }
      if (command === 'whoami') {
        return { stdout: 'mock-user\n', stderr: '', exitCode: 0 };
      }
      if (command.startsWith('printf ')) {
        return { stdout: command.replace(/^printf\\s+/, ''), stderr: '', exitCode: 0 };
      }
      if (command === 'false') {
        return { stdout: '', stderr: '', exitCode: 1 };
      }
      return { stdout: 'ran: ' + command + '\n', stderr: '', exitCode: 0 };
	    }

	    function normalizeBrowserURL(raw) {
	      const value = raw.trim();
	      if (!value) return null;
	      if (/^(https?|file):\/\//i.test(value)) return value;
	      if (/^(localhost|127\\.0\\.0\\.1|\\[::1\\])/i.test(value)) return `http://${value}`;
	      if (value.includes('.')) return `https://${value}`;
	      return null;
	    }

      function browserSnapshot(url) {
        const parsed = new URL(url);
        if (parsed.protocol === 'file:') {
          const fileName = decodeURIComponent(parsed.pathname.split('/').filter(Boolean).pop() || parsed.pathname);
          return {
            sourceLabel: /\\.html?$/i.test(fileName) ? 'Local HTML' : 'Local file',
            summary: /\\.html?$/i.test(fileName)
              ? 'HTML file is ready for browser review.'
              : 'File is ready to open in the browser preview.',
            details: [`File: ${fileName}`, `Path: ${decodeURIComponent(parsed.pathname)}`]
          };
        }
        const host = parsed.hostname || parsed.href;
        const isLocal = ['localhost', '127.0.0.1', '::1'].includes(host);
        return {
          sourceLabel: isLocal ? 'Local web app' : 'Web page',
          summary: isLocal
            ? 'Ready to inspect a local development page.'
            : 'Ready to open in the browser preview.',
          details: [
            `Host: ${host}`,
            `Scheme: ${parsed.protocol.replace(':', '').toUpperCase()}`,
            `Path: ${parsed.pathname || '/'}`
          ]
        };
      }

	    function openBrowserPreview() {
	      const url = normalizeBrowserURL(state.browser.addressDraft);
	      state.browser.isVisible = true;
	      if (!url) {
	        state.browser.statusLabel = 'Invalid address';
          state.browser.snapshot = null;
	        render();
	        return;
	      }
        const snapshot = browserSnapshot(url);
	      state.browser.currentURL = url;
	      state.browser.addressDraft = url;
	      state.browser.snapshot = snapshot;
	      state.browser.title = new URL(url).hostname || url;
	      state.browser.statusLabel = 'Preview ready';
	      render();
	    }

	    function addBrowserComment(text) {
	      const comment = text.trim();
	      if (!comment || !state.browser.currentURL) return;
	      state.browser.comments.push({
	        id: `browser-comment-${state.browser.comments.length + 1}`,
	        url: state.browser.currentURL,
	        text: comment
	      });
	      state.browser.statusLabel = 'Comment added';
	      render();
	    }

      const relativePath = commandID.replace(/^local-env:/, '');

      addToolCard({
        title: 'host.shell.run',

        inputJSON: JSON.stringify({ name: 'host.shell.run', argumentsJSON: JSON.stringify({ cmd: command }) }, null, 2),
        outputJSON: JSON.stringify({ ok: true, stdout: output, stderr: '', exitCode: 0 }, null, 2)
      });
      addMessage('assistant', `Local environment action completed: ${relativePath}.`);
      render();
    }

      }));

    function runSidebarThreadAction(action, threadID) {
      if (!threadID) return;
      if (action === 'pin' || action === 'unpin') {
        state.sidebar.items = sortSidebarItems(state.sidebar.items.map(item => (
          item.id === threadID ? { ...item, isPinned: !item.isPinned } : item
        )));
      }
      if (action === 'archive') {
        state.sidebar.items = state.sidebar.items.filter(item => item.id !== threadID);
        if (state.sidebar.selectedThreadID === threadID) {
          state.sidebar.selectedThreadID = state.sidebar.items[0]?.id || null;
          state.sidebar.items = state.sidebar.items.map((item, index) => ({ ...item, isSelected: index === 0 }));
          state.topBar.primaryTitle = state.sidebar.items[0]?.title || 'QuillCode';
          if (!state.sidebar.selectedThreadID) {
            state.transcript.messages = [];
            state.transcript.toolCards = [];
            state.transcript.timelineItems = [];
          }
        }
      }
      render();
    }

    function sortSidebarItems(items) {
      return [...items].sort((lhs, rhs) => Number(rhs.isPinned) - Number(lhs.isPinned));
    }

    function syncSelectedThreadSearchText() {
      if (!state.sidebar.selectedThreadID) return;
      const messageText = state.transcript.messages.map(message => message.text).join('\n');
      const toolText = state.transcript.toolCards
        .map(card => [card.inputJSON || '', card.outputJSON || ''].join('\n'))
        .join('\n');
      const searchText = `${messageText}\n${toolText}`.slice(0, 8000);
      state.sidebar.items = state.sidebar.items.map(item => (
        item.id === state.sidebar.selectedThreadID ? { ...item, searchText } : item
      ));
    }

    function mockReviewDiff() {
      const diff = [
        'diff --git a/Sources/App.swift b/Sources/App.swift',
        '--- a/Sources/App.swift',
        '+++ b/Sources/App.swift',
        '@@ -1 +1,2 @@',
        '+let title = "QuillCode"',
        ' import Foundation'
      ].join('\n');
      return {
        diff,
        review: {
          title: 'Review changes',
          subtitle: '1 file changed, +1 -0',
          totalInsertions: 1,
          totalDeletions: 0,
          totalHunks: 1,
          files: [{
            path: 'Sources/App.swift',
            changeLabel: '+1 · -0 · 1 hunk',
            hunks: [{
              header: '@@ -1 +1,2 @@',
              changeLabel: '+1 · -0',
              lines: [
                { lineNumber: 1, kind: 'insertion', marker: '+', content: 'let title = "QuillCode"', comments: [] },
                { lineNumber: 2, kind: 'context', marker: ' ', content: 'import Foundation', comments: [] }
              ]
            }],
            comments: []
          }]
        }
      };
    }

    function sendMessage(value) {
      const text = String(value).trim();
      if (!text) return;
      ensureThread(text.split(/\s+/).slice(0, 6).join(' '));
      state.composer.draft = '';
      state.composer.canSend = false;
      state.runtimeIssue = null;
      addMessage('user', text);
      if (text.toLowerCase().includes('trigger network failure')) {
        if (!state.mockRuntimeFailureConsumed) {
          state.mockRuntimeFailureConsumed = true;
          state.topBar.agentStatus = 'Failed';
          state.runtimeIssue = {
            severity: 'error',
            title: 'TrustedRouter network issue',
            message: 'QuillCode could not reach https://api.trustedrouter.test/v1. Check the network or API base URL, then retry.',
            actionLabel: 'Retry'
          };
        } else {
          state.topBar.agentStatus = 'Idle';
          addToolCard({
            title: 'host.shell.run',
            subtitle: 'Completed',
            status: 'done',
            inputJSON: JSON.stringify({ cmd: 'whoami' }, null, 2),
            outputJSON: JSON.stringify({ ok: true, stdout: 'mock-user\\n' }, null, 2)
          });
          addMessage('assistant', 'Retry completed after reconnecting to TrustedRouter.');
        }
      } else if (text.toLowerCase().startsWith('/mode ')) {
        const requestedMode = text.split(/\s+/)[1]?.toLowerCase();
        const modeMap = { auto: 'Auto', review: 'Review', 'read-only': 'Read-only', readonly: 'Read-only' };
        const nextMode = modeMap[requestedMode] || null;
        if (nextMode) {
          state.topBar.modeLabel = nextMode;
          addMessage('assistant', `Mode set to ${nextMode}.`);
          const selectedProject = state.projects.items.find(project => project.id === state.projects.selectedProjectID);
          state.topBar.subtitle = `${selectedProject?.name || 'No project'} - ${state.topBar.modeLabel} - ${state.topBar.modelLabel}`;
        } else {
          addMessage('assistant', 'Usage: /mode auto, /mode review, or /mode read-only');
        }
      } else if (/^\/(terminal|term|shell)\b/i.test(text)) {
        state.terminal.isVisible = !state.terminal.isVisible;
        addMessage('assistant', state.terminal.isVisible ? 'Terminal opened.' : 'Terminal hidden.');
      } else if (/^\/(browser|preview)\b/i.test(text)) {
        state.browser.isVisible = !state.browser.isVisible;
        addMessage('assistant', state.browser.isVisible ? 'Browser opened.' : 'Browser hidden.');
      } else if (/^\/remember\b/i.test(text)) {
        const memoryContent = text.replace(/^\/remember\b/i, '').trim();
        if (memoryContent) {
          saveMemory(memoryContent);
        } else {
          state.memories.isVisible = !state.memories.isVisible;
          addMessage('assistant', state.memories.isVisible ? 'Memories opened.' : 'Memories hidden.');
        }
      } else if (/^\/memor(y|ies)\b/i.test(text)) {
        state.memories.isVisible = !state.memories.isVisible;
        addMessage('assistant', state.memories.isVisible ? 'Memories opened.' : 'Memories hidden.');
      } else if (/^\/(worktrees?|wt)\b/i.test(text)) {
        listWorktrees();
        return;
      } else if (/^\/(pr|pull-?request)\b/i.test(text)) {
        state.composer.draft = 'Create a pull request titled ';
        addMessage('assistant', 'Pull request prompt prepared.');
      } else if (text.toLowerCase().startsWith('/help')) {
        addMessage('assistant', [
          'Slash commands:',
          '/new',
          '/status',
          '/terminal',
          '/browser',
          '/memories',
          '/remember text',
          '/worktrees',
          '/pr',
          '/mode auto|review|read-only',
          '/model provider/model'
        ].join('\n'));
      } else if (text.toLowerCase().includes('write a file') || text.toLowerCase().includes('make a file')) {
        const path = 'hello.txt';
        addToolCard({
          title: 'host.file.write',
          subtitle: 'Completed',
          status: 'done',
          inputJSON: JSON.stringify({ path, content: 'hello world\n' }, null, 2),
          outputJSON: JSON.stringify({ ok: true, stdout: `Wrote /mock/QuillCode/${path}\n`, artifacts: [`/mock/QuillCode/${path}`] }, null, 2)
        });
        addMessage('assistant', `Wrote \`${path}\`.`);
      } else if (text.toLowerCase().includes('apply patch') || text.toLowerCase().includes('edit file')) {
        const { diff, review } = mockReviewDiff();
        state.review = review;
        addToolCard({
          title: 'host.apply_patch',
          subtitle: 'Completed',
          status: 'done',
          inputJSON: JSON.stringify({
            patch: 'diff --git a/Sources/App.swift b/Sources/App.swift\\n...'
          }, null, 2),
          outputJSON: JSON.stringify({ ok: true, stdout: 'Patch applied.\\n' }, null, 2)
        });
        addToolCard({
          title: 'host.git.diff',
          subtitle: 'Completed',
          status: 'done',
          inputJSON: JSON.stringify({}, null, 2),
          outputJSON: JSON.stringify({ ok: true, stdout: diff }, null, 2)
        });
        addMessage('assistant', 'Patch applied. Review the resulting diff below.');
      } else if (text.toLowerCase().includes('git diff')) {
        const { diff, review } = mockReviewDiff();
        state.review = review;
        addToolCard({
          title: 'host.git.diff',
          subtitle: 'Completed',
          status: 'done',
          inputJSON: JSON.stringify({}, null, 2),
          outputJSON: JSON.stringify({ ok: true, stdout: diff }, null, 2)
        });
        addMessage('assistant', 'Output:\n' + diff);
      } else if (text.toLowerCase().includes('commit')) {
        const message = text.match(/message[: ]+(.+)$/i)?.[1]?.trim() || 'QuillCode changes';
        state.review = { ...state.review, files: [], subtitle: 'Latest git diff', totalInsertions: 0, totalDeletions: 0, totalHunks: 0 };
        addToolCard({
          title: 'host.git.commit',
          subtitle: 'Completed',
          status: 'done',
          inputJSON: JSON.stringify({ message }, null, 2),
          outputJSON: JSON.stringify({ ok: true, stdout: '[main abc1234] ' + message + '\\n' }, null, 2)
        });
        addMessage('assistant', 'Output:\n[main abc1234] ' + message);
      } else if (text.toLowerCase().includes('run') || text.toLowerCase().includes('whoami')) {
        const cmd = text.match(/`([^`]+)`/)?.[1] || text.replace(/^run\s+/i, '') || 'whoami';
        state.review = { ...state.review, files: [], subtitle: 'Latest git diff', totalInsertions: 0, totalDeletions: 0, totalHunks: 0 };
        addToolCard({
          title: 'host.shell.run',
          subtitle: 'Completed',
          status: 'done',
          inputJSON: JSON.stringify({ cmd }, null, 2),
          outputJSON: JSON.stringify({ ok: true, stdout: 'mock-user\\n' }, null, 2)
        });
        const answer = cmd.trim() === 'whoami'
          ? 'You are `mock-user` in this workspace.'
          : 'Output:\nmock-user';
        addMessage('assistant', answer);
      } else {
        state.review = { ...state.review, files: [], subtitle: 'Latest git diff', totalInsertions: 0, totalDeletions: 0, totalHunks: 0 };
        addMessage('assistant', 'I can inspect and edit this project.');
      }
      syncSelectedThreadSearchText();
      render();
    }

    function retryLastUserTurn() {
      const lastUserMessage = [...state.transcript.messages]
        .reverse()
        .find(message => message.role === 'user' && String(message.text || '').trim());
      if (!lastUserMessage) return;
      sendMessage(lastUserMessage.text);
    }

    function addReviewComment(path, text) {
      const trimmed = (text || '').trim();
      if (!path || !trimmed) return;
      const file = state.review.files.find(file => file.path === path);
      if (!file) return;
      file.comments = file.comments || [];
      file.comments.push({ id: crypto.randomUUID(), path, text: trimmed });
      render();
    }

    function addReviewLineComment(path, lineNumber, lineKind, text) {
      const trimmed = (text || '').trim();
      if (!path || !lineNumber || !trimmed) return;
      const file = state.review.files.find(file => file.path === path);
      if (!file) return;
      const line = (file.hunks || [])
        .flatMap(hunk => hunk.lines || [])
        .find(line => line.lineNumber === lineNumber && line.kind === lineKind);
      if (!line) return;
      line.comments = line.comments || [];
      line.comments.push({ id: crypto.randomUUID(), path, lineNumber, lineKind, text: trimmed });
      render();
    }

    function addReviewRangeComment(path, start, end, text) {
      const trimmed = (text || '').trim();
      if (!path || !start || !end || !trimmed) return;
      const file = state.review.files.find(file => file.path === path);
      if (!file) return;
      const lower = Math.min(start, end);
      const upper = Math.max(start, end);
      const lines = (file.hunks || []).flatMap(hunk => hunk.lines || []);
      const startLine = lines.find(line => line.lineNumber === lower);
      const hasFullRange = Array.from({ length: upper - lower + 1 }, (_, index) => lower + index)
        .every(lineNumber => lines.some(line => line.lineNumber === lineNumber));
      if (!startLine || !hasFullRange) return;
      startLine.comments = startLine.comments || [];
      startLine.comments.push({
        id: crypto.randomUUID(),
        path,
        lineNumber: lower,
        endLineNumber: upper,
        text: trimmed
      });
      render();
    }

    function runReviewAction(action, path) {
      if (!path) return;
      const toolMap = {
        restore: 'host.git.restore',
        stage_hunk: 'host.git.stage_hunk',
        restore_hunk: 'host.git.restore_hunk'
      };
      const toolName = toolMap[action] || 'host.git.stage';
      state.topBar.agentStatus = 'Running';
      addToolCard({
        title: toolName,
        subtitle: 'Completed',
        status: 'done',
        inputJSON: JSON.stringify({ path }, null, 2),
        outputJSON: JSON.stringify({ ok: true, stdout: '' }, null, 2)
      });
      addToolCard({
        title: 'host.git.diff',
        subtitle: 'Completed',
        status: 'done',
        inputJSON: JSON.stringify({}, null, 2),
        outputJSON: JSON.stringify({ ok: true, stdout: '' }, null, 2)
      });
      state.review = {
        title: 'Review changes',
        subtitle: 'Latest git diff',
        totalInsertions: 0,
        totalDeletions: 0,
        totalHunks: 0,
        files: []
      };
      state.topBar.agentStatus = 'Idle';
      render();
    }

    function shortcutMatches(event, shortcut) {
      if (!shortcut) return false;
      const parts = shortcut.split('+').map(part => part.trim().toLowerCase()).filter(Boolean);
      const key = parts.at(-1);
      const requiresCmd = parts.includes('cmd');
      const requiresCtrl = parts.includes('ctrl');
      const requiresShift = parts.includes('shift');
      const requiresOption = parts.includes('option');
      const eventKey = event.key === 'Escape' ? 'esc' : event.key.toLowerCase();
      return event.metaKey === requiresCmd
        && event.ctrlKey === requiresCtrl
        && event.shiftKey === requiresShift
        && event.altKey === requiresOption
        && eventKey === key;
    }

    document.addEventListener('keydown', event => {
      if (handleCommandPaletteKeydown(event)) return;
      updateDynamicCommands();
      const command = state.commands.find(candidate => (
        candidate.isEnabled && shortcutMatches(event, candidate.shortcut)
      ));
      if (!command) return;
      event.preventDefault();
      runCommand(command.id);
    });

    render();
  </script>
</body>
</html>
