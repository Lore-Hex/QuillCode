    function isSubagentRequest(text) {
      return /^\/(subagents?|parallel|agents)\b/i.test(text.trim())
        || text.toLowerCase().includes('subagent');
    }

    function defaultMockSubagentUpdate() {
      return {
        objective: 'Coordinate parallel review of the current task.',
        subagents: [
          {
            name: 'Explorer',
            role: 'Map the code and identify relevant files.',
            status: 'completed',
            summary: 'Found the Activity surface and tool routing seams.'
          },
          {
            name: 'Verifier',
            role: 'Run focused validation and report failures.',
            status: 'running',
            summary: 'Preparing smoke coverage.'
          }
        ]
      };
    }

    function parseMockSubagentSlash(text) {
      const match = text.trim().match(/^\/(?:subagents?|parallel|agents)\b\s*(.*)$/i);
      if (!match) return null;
      const segments = match[1]
        .split('|')
        .map(segment => segment.replace(/\s+/g, ' ').trim())
        .filter(Boolean);
      if (segments.length < 2) {
        return {
          error: 'Usage: /subagents objective | Name: worker role | Verifier: worker role.'
        };
      }
      const objective = segments[0].replace(/^x\d+\s+/i, '').trim() || segments[0];
      const subagents = segments.slice(1, 7).map((segment, index) => {
        const [rawName, ...roleParts] = segment.split(':');
        const role = (roleParts.join(':').trim() || segment).slice(0, 160);
        const namePart = (roleParts.length ? rawName : `Worker ${index + 1}`).trim();
        const dependencySplit = namePart.split(/\s+after\s+/i);
        const displayName = (dependencySplit[0] || `Worker ${index + 1}`).trim();
        const groupPath = displayName.includes('/')
          ? displayName.split('/').slice(0, -1).filter(Boolean)
          : [];
        const dependsOn = (dependencySplit[1] || '')
          .split(',')
          .map(value => value.trim())
          .filter(Boolean);
        return {
          name: displayName || `Worker ${index + 1}`,
          groupPath,
          role,
          dependsOn,
          status: 'completed',
          summary: `Completed ${role}.`
        };
      });
      return { objective, subagents };
    }

    function subagentStatusLabel(status) {
      if (status === 'completed') return 'Done';
      if (status === 'cancelled') return 'Cancelled';
      if (status === 'failed') return 'Failed';
      if (status === 'blocked') return 'Blocked';
      return 'Running';
    }

    function runMockSubagentAction(text) {
      const parsed = parseMockSubagentSlash(text);
      if (parsed?.error) {
        addMessage('assistant', parsed.error);
        render();
        return;
      }
      const update = parsed || defaultMockSubagentUpdate();
      state.activity.authoredSubagents = update.subagents.map((subagent, index) => ({
        id: `subagent-${index}-${subagent.name}`,
        title: subagent.groupPath?.length ? subagent.name.split('/').pop() : subagent.name,
        detail: `${subagent.role} - ${subagent.summary} - Goal: ${update.objective}`,
        kind: 'subagent',
        statusLabel: subagentStatusLabel(subagent.status)
      }));
      addToolCard({
        title: 'host.subagents.update',
        subtitle: 'Completed',
        status: 'done',
        inputJSON: JSON.stringify(update, null, 2),
        outputJSON: JSON.stringify({ ok: true, stdout: JSON.stringify(update, null, 2) }, null, 2)
      });
      addMessage('assistant', 'Updated subagent progress.');
    }

        subtitle: 'Completed',

        inputJSON: JSON.stringify({ turnId: turnID }, null, 2),
        outputJSON: JSON.stringify({ ok: true, stdout: "Reverted this turn's edits.\n" }, null, 2)

    function latestRevertableTurnID() {
      const message = [...state.transcript.messages]
        .reverse()
        .find(message => message.revert?.turnMessageID);
      return message?.revert?.turnMessageID || null;

      const turnID = latestRevertableTurnID();

      runMockTurnRevert(turnID);

    function readImageFile(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve({
          id: crypto.randomUUID(),
          name: file.name,
          mimeType: file.type,
          byteCount: file.size,
          dataURL: String(reader.result || '')
        });
        reader.onerror = () => reject(reader.error || new Error('Could not read image'));
        reader.readAsDataURL(file);
      });
    }

    async function addComposerImageFiles(fileList) {
      const allowed = new Set(['image/png', 'image/jpeg', 'image/gif', 'image/webp']);
      const remaining = Math.max(0, 4 - (state.composer.attachments || []).length);
      const files = Array.from(fileList || [])
        .filter(file => allowed.has(file.type) && file.size > 0 && file.size <= 10 * 1024 * 1024)
        .slice(0, remaining);
      const attachments = [];
      for (const file of files) attachments.push(await readImageFile(file));
      state.composer.attachments = [...(state.composer.attachments || []), ...attachments];
      state.composer.canSend = composerHasContent();
      render();
      focusComposerAtDraftEnd();
    }

    function removeComposerImage(id) {
      state.composer.attachments = (state.composer.attachments || [])

      state.composer.canSend = composerHasContent();
      render();

    function renderKeyboardShortcutsPanel() {
      const query = normalizeCommandText(state.shortcuts.query || '');
      const compactQuery = query.replace(/\s+|\+/g, '');
      const shortcutCommands = state.commands.filter(command => {
        if (!command.shortcut) return false;
        if (!query) return true;
        const fields = [
          command.title,
          command.id.replace(/-/g, ' '),
          command.category,
          command.shortcut,
          ...(command.keywords || [])
        ].map(value => normalizeCommandText(value || ''));
        const shortcutText = normalizeCommandText(command.shortcut)
          .replace('←', ' left arrowleft')
          .replace('→', ' right arrowright')
          .replace(/\s+|\+/g, '');
        return fields.some(field => field.includes(query))
          || (compactQuery && shortcutText.includes(compactQuery));
      });
      const groups = new Map();
      for (const command of shortcutCommands) {
        if (!groups.has(command.category)) groups.set(command.category, []);
        groups.get(command.category).push(command);
      }
      const categoryOrder = ['Thread', 'Navigation', 'Workspace', 'Memories', 'Extensions', 'Git', 'Environment', 'Control', 'Computer Use'];
      const sortedCategories = [...groups.keys()].sort((a, b) => {
        const rankA = categoryOrder.includes(a) ? categoryOrder.indexOf(a) : categoryOrder.length;
        const rankB = categoryOrder.includes(b) ? categoryOrder.indexOf(b) : categoryOrder.length;
        if (rankA !== rankB) return rankA - rankB;
        return a.localeCompare(b);
      });
      return `
        <div class="search-panel" data-testid="keyboard-shortcuts-panel">
          <section class="search-card" role="dialog" aria-label="Keyboard shortcuts">
            <header>
              <div>
                <h2>Keyboard shortcuts</h2>
                <p>Fast paths for the workspace actions available right now.</p>
              </div>
              <button class="hit-target-text" type="button" data-testid="keyboard-shortcuts-close">Close</button>
            </header>
            <div class="command-palette-input-row">
              <input class="hit-target-text-entry" data-testid="keyboard-shortcuts-input" aria-label="Search shortcuts" placeholder="Search shortcuts" value="${escapeHTML(state.shortcuts.query)}" autofocus>
            </div>
            <div class="search-results" data-testid="keyboard-shortcuts-list">
              ${sortedCategories.length ? sortedCategories.map(category => `
                <div class="command-group" data-testid="keyboard-shortcuts-group">
                  <div class="command-group-title">${escapeHTML(category)}</div>
                  ${groups.get(category).map(command => `
                    <article class="search-result shortcut-row" data-testid="keyboard-shortcut-row" data-command-id="${escapeHTML(command.id)}">
                      <span>${escapeHTML(command.title)}</span>
                      <kbd>${escapeHTML(command.shortcut)}</kbd>
                    </article>`).join('')}
                </div>`).join('') : '<p data-testid="keyboard-shortcuts-empty">No matching shortcuts</p>'}
            </div>
          </section>
        </div>`;
    }

    function focusKeyboardShortcutsInput() {
      setTimeout(() => document.querySelector('[data-testid="keyboard-shortcuts-input"]')?.focus(), 0);
    }

    function openKeyboardShortcutsPanel() {
      state.shortcuts.isOpen = true;
      state.shortcuts.query = '';
      render();
      focusKeyboardShortcutsInput();
    }

    function terminalStatus(entry) {
      return entry.status || (entry.ok ? 'done' : 'failed');
    }

    function terminalStatusLabel(entry) {
      const status = terminalStatus(entry);
      if (status === 'running') return 'Running';
      if (status === 'done') return 'Done';
      if (status === 'stopped') return 'Stopped';
      return 'Failed';
    }

    function terminalExitLabel(entry) {
      const status = terminalStatus(entry);
      if (status === 'running') return 'running';
      if (status === 'stopped') return 'stopped';
      return entry.exitCode == null ? 'exit unknown' : `exit ${entry.exitCode}`;
    }

    function terminalStatusClass(entry) {
      const status = terminalStatus(entry);
      if (status === 'done') return 'ok';
      if (status === 'running') return 'running';
      if (status === 'stopped') return 'stopped';
      return 'failed';
    }

    // Mirrors WorkspaceActivityChangesSurfaceBuilder: the git-diff review files as a glanceable
    // per-file roll-up, biggest churn first, bounded, with the same "+N · -M · K hunks" label.
    function reviewChangeItems(files) {
      const changeLabel = file => {
        const parts = [`+${file.insertions || 0}`, `-${file.deletions || 0}`];
        if ((file.hunks || 0) > 0) parts.push(countLabel(file.hunks, 'hunk'));
        if (file.isBinary) parts.push('binary');
        return parts.join(' · ');
      };
      return [...files]
        .sort((a, b) => {
          const churn = (b.insertions + b.deletions) - (a.insertions + a.deletions);
          return churn !== 0 ? churn : (a.path < b.path ? -1 : a.path > b.path ? 1 : 0);
        })
        .slice(0, 12)
        .map(file => ({
          id: `change:${file.path}`,
          title: file.path,
          detail: changeLabel(file),
          statusLabel: file.isBinary ? 'binary' : ''
        }));
    }

    function activitySummary() {
      const messages = state.transcript.messages || [];
      const cards = state.transcript.toolCards || [];
      const selectedThread = state.sidebar.items.find(item => item.id === state.sidebar.selectedThreadID);
      const latestUser = [...messages].reverse().find(message => message.role === 'user');
      const latestAssistant = [...messages].reverse().find(message => message.role === 'assistant');
      const artifacts = uniqueBy(
        cards.flatMap(card => card.artifacts || []),
        artifact => artifact.value || artifact.label || ''
      ).slice(-8);
      const tools = cards.slice(-8).map(card => ({
        id: card.id,
        title: card.title,
        detail: card.subtitle,
        statusLabel: card.status
      }));
      const steps = state.transcript.timelineItems.slice(-8).map(item => {
        if (item.kind === 'toolCard') {
          const card = item.toolCard;
          return {
            id: item.id,
            title: card.title,
            detail: card.subtitle,
            statusLabel: card.status
          };
        }
        return {
          id: item.id,
          title: item.message.role === 'user' ? 'User message' : 'Assistant message',
          detail: item.message.text,
          statusLabel: 'Logged'
        };
      });
      const sources = [
        {
          id: 'instruction-AGENTS.md',
          title: 'AGENTS.md',
          detail: 'AGENTS.md · Scope: whole project',
          statusLabel: 'rules',
          actions: [
            { title: 'Open', commandID: 'activity-source-open:AGENTS.md', kind: 'open' },
            { title: 'Edit', commandID: 'activity-source-edit:AGENTS.md', kind: 'edit' }
          ]
        },
        ...state.memories.items.slice(0, 4).map(memory => ({
          id: `memory-${memory.id}`,
          title: memory.title,
          detail: memory.relativePath,
          statusLabel: memory.scopeLabel
        }))
      ];
      const dismissedInstructionDiagnostics = new Set(state.activity.dismissedInstructionDiagnostics || []);
      const instructionDiagnostics = (state.activity.instructionDiagnostics || [])
        .filter(item => !dismissedInstructionDiagnostics.has(item.id))
        .map(item => ({
          ...item,
          actions: [
            ...instructionKeepReferenceActions(item),
            { title: 'Resolve', commandID: `activity-instruction-resolve:${item.id}`, kind: 'resolve' },
            { title: 'Dismiss', commandID: `activity-instruction-dismiss:${item.id}`, kind: 'dismiss' }
          ]
        }));
      const allSources = [...sources, ...instructionDiagnostics];
      const instructionConflicts = instructionDiagnostics.filter(item => item.statusLabel === 'conflict');
      const planItems = state.activity.authoredPlan || activityPlan({
        latestRequest: latestUser ? latestUser.text : 'No task selected',
        status: state.topBar.agentStatus,
        tools,
        sources: allSources,
        artifacts,
        finalAnswer: latestAssistant?.text || null
      });
      const fallbackHandoff = handoffSummary({
        threadTitle: selectedThread?.title || 'No task selected',
        latestRequest: latestUser ? latestUser.text : 'No task selected',
        status: state.topBar.agentStatus,
        tools: cards,
        sources: allSources,
        artifacts,
        finalAnswer: latestAssistant?.text || null
      });
      return {
        subtitle: `${countLabel(cards.length, 'tool')} · ${countLabel(allSources.length, 'source')} · ${countLabel(artifacts.length, 'artifact')}`,
        statusLabel: state.topBar.agentStatus,
        taskTitle: latestUser ? latestUser.text : 'No task selected',
        taskSubtitle: `${messages.length} ${messages.length === 1 ? 'message' : 'messages'} · ${state.transcript.timelineItems.length} timeline ${state.transcript.timelineItems.length === 1 ? 'item' : 'items'}`,
        steps,
        contextItems: state.activity.contextItems || [],
        tools,
        sources: allSources,
        instructionConflicts,
        artifacts,
        finalAnswer: latestAssistant?.text || null,
        sections: activitySections({
          steps,
          contextItems: state.activity.contextItems || [],
          tools,
          sources: allSources,
          instructionConflicts,
          artifacts,
          finalAnswer: latestAssistant?.text || null,
          planItems,
          changeItems: reviewChangeItems(state.review?.files || []),
          subagents: state.activity.authoredSubagents || [],
          handoffSummary: state.activity.authoredHandoff || fallbackHandoff
        })
      };
    }

    function activitySections(activity) {
      const collapsed = new Set(state.activity.collapsedSections || []);
      const section = (id, title, itemTestID, emptyTitle, values) => ({
        id,
        title,
        itemTestID,
        emptyTitle,
        isCollapsed: collapsed.has(id),
        commandID: `activity-toggle-section:${id}`,
        ...values
      });
      return [
        section('plan', 'Task Plan', 'activity-plan', 'No plan yet', {
          items: activity.planItems,
          countLabel: countLabel(activity.planItems.length, 'item')
        }),
        section('changes', 'Changes', 'activity-change', 'No file changes yet', {
          items: activity.changeItems || [],
          countLabel: countLabel((activity.changeItems || []).length, 'file')
        }),
        section('context', 'Context', 'activity-context', 'No context compaction yet', {
          items: activity.contextItems || [],
          countLabel: countLabel((activity.contextItems || []).length, 'item')
        }),
        section('recent', 'Recent', 'activity-step', 'No task events yet', {
          items: activity.steps,
          countLabel: countLabel(activity.steps.length, 'item')
        }),
        section('subagents', 'Subagents', 'activity-subagent', 'No subagents running', {
          items: activity.subagents,
          countLabel: countLabel(activity.subagents.length, 'item')
        }),
        section('handoff', 'Handoff Summary', 'activity-handoff', '', {
          bodyText: activity.handoffSummary,
          countLabel: activity.handoffSummary ? '1 summary' : '0 summaries'
        }),
        section('tools', 'Tools', 'activity-tool', 'No tools used yet', {
          items: activity.tools,
          countLabel: countLabel(activity.tools.length, 'item')
        }),
        section('instructionReview', 'Instruction Review', 'activity-instruction-conflict', 'No instruction conflicts', {
          items: activity.instructionConflicts || [],
          countLabel: countLabel((activity.instructionConflicts || []).length, 'issue')
        }),
        section('sources', 'Sources', 'activity-source', 'No context sources attached', {
          items: activity.sources,
          countLabel: countLabel(activity.sources.length, 'item')
        }),
        section('artifacts', 'Artifacts', 'activity-artifact', 'No artifacts produced yet', {
          artifacts: activity.artifacts,
          countLabel: countLabel(activity.artifacts.length, 'artifact')
        }),
        section('latestAnswer', 'Latest Answer', 'activity-final-answer', '', {
          bodyText: activity.finalAnswer,
          countLabel: activity.finalAnswer ? '1 answer' : '0 answers'
        })
      ].filter(section => {
        if (section.id === 'instructionReview') return (section.items || []).length > 0;
        if (section.id === 'context') return (section.items || []).length > 0;
        if (section.id === 'changes') return (section.items || []).length > 0;
        return (section.id !== 'latestAnswer' && section.id !== 'handoff') || section.bodyText;
      });
    }

    function activityPlan(activity) {
      const hasRequest = activity.latestRequest && activity.latestRequest !== 'No task selected';
      const hasFailedTool = activity.tools.some(tool => String(tool.statusLabel || '').toLowerCase() === 'failed');
      const hasDoneTool = activity.tools.some(tool => String(tool.statusLabel || '').toLowerCase() === 'done');
      const finalAnswer = activity.finalAnswer || '';
      const reviewStatus = hasFailedTool ? 'Review' : (finalAnswer || hasDoneTool ? 'Done' : 'Pending');
      const reviewDetail = hasFailedTool
        ? 'One or more tool calls failed and needs attention.'
        : (finalAnswer || hasDoneTool
          ? (activity.artifacts.length ? `Reviewed ${countLabel(activity.artifacts.length, 'artifact')}.` : 'Reviewed completed tool results.')
          : 'Waiting for tool output or a final answer.');
      return [
        {
          id: 'plan-request',
          title: 'Understand request',
          detail: hasRequest ? boundedLine(activity.latestRequest, 120) : 'Waiting for the first user request.',
          statusLabel: hasRequest ? 'Done' : 'Pending'
        },
        {
          id: 'plan-context',
          title: 'Load context',
          detail: activity.sources.length ? `${countLabel(activity.sources.length, 'source')} attached.` : 'No instruction or memory sources attached.',
          statusLabel: activity.sources.length ? 'Done' : 'Optional'
        },
        {
          id: 'plan-tools',
          title: 'Use tools',
          detail: toolPlanDetail(activity.tools),
          statusLabel: aggregateToolStatus(activity.tools)
        },
        {
          id: 'plan-review',
          title: 'Review results',
          detail: reviewDetail,
          statusLabel: reviewStatus
        },
        {
          id: 'plan-answer',
          title: 'Answer user',
          detail: finalAnswer ? boundedLine(finalAnswer, 140) : 'Waiting for the final assistant response.',
          statusLabel: finalAnswer ? 'Done' : (isActiveStatus(activity.status) ? 'Running' : 'Pending')
        }
      ];
    }

    function aggregateToolStatus(tools) {
      if (!tools.length) return 'Optional';
      const statuses = tools.map(tool => String(tool.statusLabel || '').toLowerCase());
      if (statuses.includes('failed')) return 'Failed';
      if (statuses.includes('running')) return 'Running';
      if (statuses.includes('queued') || statuses.includes('review')) return 'Queued';
      return 'Done';
    }

    function toolPlanDetail(tools) {
      if (!tools.length) return 'No tool use needed yet.';
      const names = tools.slice(-3).map(tool => tool.title).join(', ');
      return `${countLabel(tools.length, 'tool')}: ${names}`;
    }

    function isActiveStatus(status) {
      const normalized = String(status || '').toLowerCase();
      return normalized.includes('running')
        || normalized.includes('streaming')
        || normalized.includes('queued')
        || normalized.includes('terminal');
    }

    function handoffSummary(activity) {
      const toolNames = activity.tools.slice(-4).map(tool => tool.title);
      const artifactNames = activity.artifacts.slice(-4).map(artifact => artifact.label);
      const lines = [
        `Thread: ${boundedLine(activity.threadTitle, 80)}`,
        `Latest request: ${boundedLine(activity.latestRequest, 96)}`,
        `Status: ${activity.status}`,
        `Tools: ${countSummary(activity.tools.length, 'tool', toolNames)}`,
        `Sources: ${countLabel(activity.sources.length, 'source')}`,
        `Artifacts: ${countSummary(activity.artifacts.length, 'artifact', artifactNames)}`
      ];
      if (activity.finalAnswer) {
        lines.push(`Latest answer: ${boundedLine(activity.finalAnswer, 160)}`);
      }
      return lines.join('\n');
    }

    function countSummary(count, singular, details) {
      if (!count) return 'none';
      const label = countLabel(count, singular);
      return details.length ? `${label} (${details.join(', ')})` : label;
    }

    function boundedLine(value, limit) {
      const normalized = String(value || '')
        .split(/\\r?\\n/)
        .map(part => part.trim())
        .filter(Boolean)
        .join(' ');
      return normalized.length > limit ? `${normalized.slice(0, limit)}...` : normalized;
    }

    function uniqueBy(items, keyForItem) {
      const seen = new Set();
      return items.filter(item => {
        const key = keyForItem(item);
        if (!key || seen.has(key)) return false;
        seen.add(key);
        return true;
      });
    }

    function renderActivityPane() {
      const activity = activitySummary();
      return `
        <section class="activity-pane" data-testid="activity-pane" aria-label="Task activity">
          <header>
            <div>
              <strong data-testid="activity-title">Activity</strong>
              <p data-testid="activity-subtitle">${escapeHTML(activity.subtitle)}</p>
            </div>
            <span data-testid="activity-status">${escapeHTML(activity.statusLabel)}</span>
          </header>
          <article class="activity-task" data-testid="activity-task">
            <strong data-testid="activity-task-title">${escapeHTML(activity.taskTitle)}</strong>
            <p data-testid="activity-task-subtitle">${escapeHTML(activity.taskSubtitle)}</p>
          </article>
          ${activity.sections.map(renderActivitySection).join('')}
        </section>`;
    }

    function renderActivitySection(section) {
      let content = '';
      if (!section.isCollapsed) {
        if (section.bodyText) {
          content = `<p data-testid="${section.itemTestID}">${escapeHTML(section.bodyText)}</p>`;
        } else if (section.artifacts?.length) {
          content = section.artifacts.map(artifact => `
            <article class="activity-artifact" data-testid="${section.itemTestID}">
              <strong>${escapeHTML(artifact.label)}</strong>
              <p>${escapeHTML(artifact.detail)}</p>
            </article>`).join('');
        } else if (section.items?.length) {
          content = section.items.map(item => `
            <article class="activity-item" data-testid="${section.itemTestID}">
              <strong>${escapeHTML(item.title)}</strong>
              <span>${escapeHTML(item.statusLabel || '')}</span>
              <p>${escapeHTML(item.detail || '')}</p>
              ${renderActivityItemActions(item)}
            </article>`).join('');
        } else {
          content = `<p data-testid="${section.itemTestID}-empty">${escapeHTML(section.emptyTitle)}</p>`;
        }
      }
      return `
        <section class="activity-section" data-testid="${section.itemTestID}-section" data-collapsed="${section.isCollapsed ? 'true' : 'false'}">
          <button
            type="button"
            class="hit-target-row"
            data-testid="activity-section-toggle"
            data-command-id="${escapeHTML(section.commandID)}"
            data-section-title="${escapeHTML(section.title)}"
            data-hit-target-kind="row"
            data-hit-target-action="press"
            data-hit-target-source="explicit"
          >
            <span>${section.isCollapsed ? '&gt;' : 'v'} ${escapeHTML(section.title)}</span>
            <span>${escapeHTML(section.countLabel)}</span>
          </button>
          ${content}
        </section>`;
    }

    function renderActivityItemActions(item) {
      if (!Array.isArray(item.actions) || !item.actions.length) return '';
      const buttons = item.actions.map(action => `
        <button
          type="button"
          class="activity-source-action hit-target-form-action"
          data-testid="activity-source-action"
          data-command-id="${escapeHTML(action.commandID)}"
          data-action-kind="${escapeHTML(action.kind || '')}"
          data-hit-target-kind="form-action"

          data-hit-target-source="explicit"
        >${escapeHTML(action.title)}</button>`).join('');
      return `<div class="activity-item-actions">${buttons}</div>`;
    }

    function terminalCanSubmitDraft() {
      return state.terminal.isRunning
        ? Boolean(state.terminal.draft)
        : Boolean(state.terminal.draft.trim());
    }

    function terminalCommandPlaceholder() {
      return state.terminal.isRunning ? 'Send input' : 'Run command';
    }

    function terminalCommandActionTitle() {
      return state.terminal.isRunning ? 'Send' : 'Run';
    }

    function terminalAcceptsMouseInput(entry) {
      return Boolean(entry) && terminalStatus(entry) === 'running' && Boolean(entry.mouseReporting?.isEnabled);
    }

    function terminalMouseModeLabel(entry) {
      if (!terminalAcceptsMouseInput(entry)) return '';
      return `Mouse · ${String(entry.mouseReporting.encoding || 'x10').toUpperCase()}`;
    }

    function renderTerminalPane() {
      const entries = state.terminal.entries.length ? state.terminal.entries.map((entry, index) => `
        <article class="terminal-entry" data-testid="terminal-entry"${entry.executionContext ? ` data-execution-context="${escapeHTML(entry.executionContext.kind)}"` : ''}>

      return `
        <section class="terminal-pane" data-testid="terminal-pane">
          <header>
            <strong>Terminal</strong>
            <code data-testid="terminal-cwd">${escapeHTML(state.terminal.cwdLabel)}</code>
            <button class="hit-target-text" type="button" data-testid="terminal-clear" ${state.terminal.entries.length && !state.terminal.isRunning ? '' : 'disabled'}>Clear</button>
            ${state.terminal.isRunning && state.terminal.isSuspended ? '<button class="hit-target-text" type="button" data-testid="terminal-resume">Resume</button>' : ''}
            ${state.terminal.isRunning && !state.terminal.isSuspended ? '<button class="hit-target-text" type="button" data-testid="terminal-suspend">Suspend</button>' : ''}
            ${state.terminal.isRunning ? '<button class="hit-target-text" type="button" data-testid="terminal-stop">Stop</button>' : ''}
          </header>
          <div class="terminal-history" data-testid="terminal-history">${entries}</div>
          <form class="terminal-form" data-testid="terminal-form">
            <code>$</code>
            <input class="hit-target-text-entry" data-testid="terminal-input" aria-label="Terminal command" placeholder="${terminalCommandPlaceholder()}" value="${escapeHTML(state.terminal.draft)}">
            <button class="hit-target-text" type="submit" data-testid="terminal-run" ${terminalCanSubmitDraft() ? '' : 'disabled'}>${terminalCommandActionTitle()}</button>
          </form>
        </section>`;
	    }

      function renderTerminalOutput(runs, fallback, testID, defaultColor = '', entry = null, entryIndex = -1) {
        if (!fallback) return '';
        const source = Array.isArray(runs) && runs.length ? runs : [{ text: fallback, style: {} }];
        const contents = source.map(run => renderTerminalRun(run, defaultColor)).join('');
        const mouseAttributes = terminalAcceptsMouseInput(entry)
          ? ` data-terminal-mouse-input="true" data-terminal-mouse-encoding="${escapeHTML(entry.mouseReporting.encoding)}" data-terminal-entry-index="${entryIndex}" data-terminal-mouse-event-count="${entry.mouseEvents?.length || 0}" data-last-terminal-mouse-sequence="${escapeHTML(entry.lastMouseSequenceLabel || '')}"`
          : '';
        const acceptsKeyboard = Boolean(entry) && terminalStatus(entry) === 'running';
        const keyboardAttributes = acceptsKeyboard
          ? ` data-terminal-keyboard-input="true" tabindex="0" data-terminal-entry-index="${entryIndex}" data-terminal-keyboard-event-count="${entry.keyboardEvents?.length || 0}" data-last-terminal-keyboard-sequence="${escapeHTML(entry.lastKeyboardSequenceLabel || '')}"`
          : '';
        return `<pre data-testid="${testID}"${mouseAttributes}${keyboardAttributes}>${contents}</pre>`;
      }

      function renderTerminalRun(run, defaultColor) {
        const style = run?.style || {};
        const classes = ['terminal-ansi-run'];
        const declarations = [];
        const flags = [
          ['isBold', 'ansi-bold'],
          ['isFaint', 'ansi-faint'],
          ['isItalic', 'ansi-italic'],
          ['isUnderlined', 'ansi-underline'],
          ['isInverse', 'ansi-inverse'],
          ['isConcealed', 'ansi-concealed'],
          ['isStrikethrough', 'ansi-strikethrough']
        ];
        flags.forEach(([key, className]) => {
          if (style[key]) classes.push(className);
        });

        let foreground = safeTerminalColor(style.foreground) || defaultColor;
        let background = safeTerminalColor(style.background);
        if (style.isInverse) {
          const inverseBackground = foreground || '#ECECEC';
          foreground = background || '#171717';
          background = inverseBackground;
        }
        if (style.isConcealed) declarations.push('color:transparent');
        else if (foreground) declarations.push(`color:${foreground}`);
        if (background) declarations.push(`background-color:${background}`);
        const styleAttribute = declarations.length ? ` style="${declarations.join(';')}"` : '';
        return `<span class="${classes.join(' ')}"${styleAttribute}>${escapeHTML(run?.text || '')}</span>`;
      }

      function safeTerminalColor(value) {
        const color = String(value || '').toUpperCase();
        return /^#[0-9A-F]{6}$/.test(color) ? color : '';
      }

	    function renderBrowserPane() {
        const snapshot = state.browser.snapshot ? `

            ${state.browser.snapshot.textSnippet ? `<p data-testid="browser-snapshot-text">${escapeHTML(state.browser.snapshot.textSnippet)}</p>` : ''}

	      const preview = state.browser.currentURL ? `

          const tabs = state.browser.tabs.map(tab => {
            const active = tab.id === state.browser.selectedTabID;

            return `

	          <form class="browser-form" data-testid="browser-form">
            <div class="browser-nav-controls" aria-label="Browser navigation">

              <button class="browser-nav-button hit-target-icon" type="button" data-testid="browser-reload" aria-label="Reload" ${browserCanReload() ? '' : 'disabled'}>R</button>

            </div>
	            <input class="hit-target-text-entry" data-testid="browser-address" aria-label="Browser address" placeholder="localhost:3000 or https://example.com" value="${escapeHTML(state.browser.addressDraft)}">
	            <button class="browser-open-button hit-target-text" type="submit" data-testid="browser-open" ${state.browser.addressDraft.trim() ? '' : 'disabled'}>Open</button>
	          </form>
            ${state.browser.sessionURL ? `<p class="browser-session-status" data-testid="browser-session-status">Visible session ${state.browser.sessionOpenCount}: <code data-testid="browser-session-url">${escapeHTML(state.browser.sessionURL)}</code></p>` : ''}
	          ${preview}
	          <form class="browser-comment-form" data-testid="browser-comment-form">

	          <div class="browser-comments" data-testid="browser-comments">${comments}</div>
	        </section>`;
	    }

    function renderMCPMeta(item) {
      const labels = [
        item.protocolLabel ? `<span data-testid="extension-mcp-protocol">${escapeHTML(item.protocolLabel)}</span>` : '',
        item.toolCountLabel ? `<span data-testid="extension-mcp-tools-count">${escapeHTML(item.toolCountLabel)}</span>` : '',
        item.resourceCountLabel ? `<span data-testid="extension-mcp-resources-count">${escapeHTML(item.resourceCountLabel)}</span>` : '',
        item.promptCountLabel ? `<span data-testid="extension-mcp-prompts-count">${escapeHTML(item.promptCountLabel)}</span>` : ''
      ].filter(Boolean);
      return labels.length
        ? `<div class="extension-mcp-meta" data-testid="extension-mcp-meta">${labels.join(' · ')}</div>`
        : '';
    }

    function renderMCPTools(tools) {
      if (!tools?.length) return '';
      return `<div class="extension-mcp-group" data-testid="extension-mcp-tools">
        <span class="extension-mcp-group-label" data-testid="extension-mcp-group-label">Tools</span>
        <div class="extension-mcp-chip-row">${tools.map(tool => {
          const detail = [tool.schemaSummary, tool.description].filter(Boolean).join(' · ');
          return `<span data-testid="extension-mcp-tool">
            <strong data-testid="extension-mcp-tool-name">${escapeHTML(tool.name)}</strong>
            ${detail ? `<small data-testid="extension-mcp-tool-schema">${escapeHTML(detail)}</small>` : ''}
          </span>`;
        }).join('')}</div>
      </div>`;
    }

    function renderMCPGroup(title, names, groupTestID, itemTestID) {
      if (!names?.length) return '';
      return `<div class="extension-mcp-group" data-testid="${escapeHTML(groupTestID)}">
        <span class="extension-mcp-group-label" data-testid="extension-mcp-group-label">${escapeHTML(title)}</span>
        <div class="extension-mcp-chip-row">${names.map(name => `<span data-testid="${escapeHTML(itemTestID)}">${escapeHTML(name)}</span>`).join('')}</div>

    function renderMCPReferenceActions(title, actions, testID, titlePrefix) {
      if (!actions?.length) return '';

        <button type="button" class="extension-reference-action hit-target-capsule" data-testid="${escapeHTML(testID)}" data-command-id="${escapeHTML(action.commandID)}">

      return `<div class="extension-mcp-group" data-testid="${escapeHTML(testID)}-group">

    }

      const title = focusedKind === 'skill' ? 'Skills' : state.extensions.title;
      const subtitle = focusedKind === 'skill'
        ? [

            focusedAvailableCount ? countLabel(focusedAvailableCount, 'available skill') : ''

        : state.extensions.subtitle;
      const emptyTitle = focusedKind === 'skill' ? 'No skills found' : state.extensions.emptyTitle;

              <header>

              <strong data-testid="extension-name">${escapeHTML(item.name)}</strong>

              ${item.sourceURL ? `<code data-testid="extension-source">${escapeHTML(item.sourceURL)}</code>` : ''}
              <code data-testid="extension-path">${escapeHTML(item.relativePath)}</code>
              ${item.launchCommand ? `<code data-testid="extension-command">${escapeHTML(item.launchCommand)}</code>` : ''}
              ${item.installCommand ? `<code data-testid="extension-install-command">${escapeHTML(item.installCommand)}</code>` : ''}
              ${item.updateCommand ? `<code data-testid="extension-update-command">${escapeHTML(item.updateCommand)}</code>` : ''}
              ${item.transportLabel ? `<span data-testid="extension-transport">${escapeHTML(item.transportLabel)}</span>` : ''}

              ${renderMCPGroup('Prompts', item.promptNames, 'extension-mcp-prompts', 'extension-mcp-prompt')}

              ${item.installCommandID ? `<button type="button" class="extension-action-button hit-target-form-action" data-testid="extension-install" data-command-id="${escapeHTML(item.installCommandID)}">Install</button>` : ''}
              ${item.updateCommandID ? `<button type="button" class="extension-action-button hit-target-form-action" data-testid="extension-update" data-command-id="${escapeHTML(item.updateCommandID)}">Update</button>` : ''}
              ${item.stopCommandID ? `<button type="button" class="extension-action-button hit-target-form-action" data-testid="extension-stop" data-command-id="${escapeHTML(item.stopCommandID)}">Stop</button>` : ''}
              ${item.startCommandID ? `<button type="button" class="extension-action-button hit-target-form-action" data-testid="extension-start" data-command-id="${escapeHTML(item.startCommandID)}">Start</button>` : ''}

      return `
        <section class="extensions-pane" data-testid="extensions-pane" aria-label="Project extensions">
          <header>
            <div>
              <strong>${escapeHTML(title)}</strong>
              <p data-testid="extensions-subtitle">${escapeHTML(subtitle)}</p>

            <span class="extensions-counts">${counts}</span>

                ${item.deleteCommandID ? `<button class="memory-delete-button hit-target-form-action" type="button" data-testid="memory-delete" data-command-id="${escapeHTML(item.deleteCommandID)}">Forget</button>` : ''}
              </header>
              <strong data-testid="memory-title">${escapeHTML(item.title)}</strong>

          <strong>${escapeHTML(state.memories.emptyTitle)}</strong>

      return `
        <section class="memories-pane" data-testid="memories-pane" aria-label="QuillCode memories">
          <header>
            <div>
              <strong>${escapeHTML(state.memories.title)}</strong>
              <p data-testid="memories-subtitle">${escapeHTML(state.memories.subtitle)}</p>
            </div>
            <span class="memories-counts">${counts}</span>
            <button class="memories-add-button hit-target-text" type="button" data-testid="memories-add" data-command-id="memory-add">Add memory</button>
          </header>
          ${content}

    function renderAutomationsPane() {
      const workflows = state.automations.workflows || [];
      const renderActions = workflow => {
        const actions = [];
        if (workflow.runCommandID && workflow.runActionTitle) {
          actions.push(`<button type="button" class="hit-target-text" data-testid="automation-run" data-command-id="${escapeHTML(workflow.runCommandID)}">${escapeHTML(workflow.runActionTitle)}</button>`);
        }
        if (workflow.primaryCommandID && workflow.primaryActionTitle) {
          actions.push(`<button type="button" class="hit-target-text" data-testid="automation-primary-action" data-command-id="${escapeHTML(workflow.primaryCommandID)}">${escapeHTML(workflow.primaryActionTitle)}</button>`);
        }
        if (workflow.deleteCommandID) {
          actions.push(`<button type="button" class="hit-target-text" data-testid="automation-delete" data-command-id="${escapeHTML(workflow.deleteCommandID)}">Delete</button>`);
        }
        return actions.length ? `<div class="automation-actions">${actions.join('')}</div>` : '';
      };
      const scheduleButtons = (state.automations.scheduleThreadFollowUpCommands || []).map(command => `
        <button type="button" class="hit-target-text" data-testid="automation-schedule-follow-up" data-command-id="${escapeHTML(command.id)}" ${command.isEnabled ? '' : 'disabled'}>${escapeHTML(command.title)}</button>
      `).join('');
      const workspaceButton = state.automations.createWorkspaceScheduleCommand ? `
        <button type="button" class="hit-target-text" data-testid="automation-create-workspace-schedule" data-command-id="${escapeHTML(state.automations.createWorkspaceScheduleCommand.id)}" ${state.automations.createWorkspaceScheduleCommand.isEnabled ? '' : 'disabled'}>${escapeHTML(state.automations.createWorkspaceScheduleCommand.title)}</button>
      ` : '';
      const monitorButton = state.automations.createMonitorCommand ? `
        <button type="button" class="hit-target-text" data-testid="automation-create-monitor" data-command-id="${escapeHTML(state.automations.createMonitorCommand.id)}" ${state.automations.createMonitorCommand.isEnabled ? '' : 'disabled'}>${escapeHTML(state.automations.createMonitorCommand.title)}</button>
      ` : '';
      const workspaceScheduleButtons = (state.automations.scheduleWorkspaceScheduleCommands || []).map(command => `
        <button type="button" class="hit-target-text" data-testid="automation-schedule-workspace" data-command-id="${escapeHTML(command.id)}" ${command.isEnabled ? '' : 'disabled'}>${escapeHTML(command.title)}</button>
      `).join('');
      const content = workflows.length ? `
        <div class="automation-grid" data-testid="automation-grid">
          ${workflows.map(workflow => `
            <article class="automation-card" data-testid="automation-card">
              <div>
                <span data-testid="automation-schedule">${escapeHTML(workflow.scheduleLabel)}</span>
                <span data-testid="automation-status">${escapeHTML(workflow.statusLabel)}</span>
              </div>
              <strong>${escapeHTML(workflow.title)}</strong>
              <p>${escapeHTML(workflow.detail)}</p>

        <div class="automation-empty" data-testid="automations-empty">

            <div class="automation-create-actions">

              ${workspaceButton}
              ${monitorButton}
              ${scheduleButtons}
              ${workspaceScheduleButtons}
            </div>
            <span data-testid="automations-status">${escapeHTML(state.automations.statusLabel)}</span>
          </header>
          ${content}
        </section>`;

    function sidebarActionsFor(item) {
      if (item.isArchived) {
        return item.runStatusLabel
          ? [{ id: 'unarchive', title: 'Unarchive' }]
          : [{ id: 'unarchive', title: 'Unarchive' }, { id: 'delete', title: 'Delete' }];
      }
      const actions = [
        { id: 'rename', title: 'Rename' },
        { id: item.isPinned ? 'unpin' : 'pin', title: item.isPinned ? 'Unpin' : 'Pin' },
        { id: 'archive', title: 'Archive' }
      ];
      if (!item.runStatusLabel) {
        actions.splice(1, 0, { id: 'duplicate', title: 'Duplicate' });
        actions.push({ id: 'delete', title: 'Delete' });
      }
      return actions;
    }

    const sidebarFilterDefinitions = [
      { id: 'all', title: 'All', emptyTitle: 'No chats yet' },
      { id: 'pinned', title: 'Pinned', emptyTitle: 'No pinned chats' },
      { id: 'recent', title: 'Recent', emptyTitle: 'No recent chats' },
      { id: 'archived', title: 'Archived', emptyTitle: 'No archived chats' }
    ];

    function activeSidebarFilter() {
      return sidebarFilterDefinitions.some(filter => filter.id === state.sidebar.activeFilter)
        ? state.sidebar.activeFilter
        : 'all';
    }

    function validSidebarSavedSearches() {
      return (state.sidebar.savedSearches || [])
        .map(savedSearch => ({
          id: String(savedSearch.id || '').trim(),
          title: String(savedSearch.title || '').trim(),
          query: String(savedSearch.query || '').trim()
        }))
        .filter(savedSearch => savedSearch.id && savedSearch.title && savedSearch.query);
    }

    function activeSidebarSavedSearch() {
      const activeID = String(state.sidebar.activeSavedSearchID || '').trim();
      if (!activeID) return null;
      return validSidebarSavedSearches().find(savedSearch => savedSearch.id === activeID) || null;
    }

    function sidebarFilterIncludes(item, filterID = activeSidebarFilter()) {
      if (filterID === 'pinned') return Boolean(item.isPinned) && !item.isArchived;
      if (filterID === 'recent') return !item.isPinned && !item.isArchived;
      if (filterID === 'archived') return Boolean(item.isArchived);
      return true;
    }

    function sidebarItemMatchesQuery(item, query) {
      const normalizedQuery = String(query || '').trim().toLowerCase();
      if (!normalizedQuery) return true;
      const searchable = [
        item.title,
        item.subtitle,
        item.model,
        item.summary,
        item.searchText,
        item.isPinned ? 'pinned' : '',
        item.isArchived ? 'archived' : 'recent'
      ]
        .filter(Boolean)
        .join('\n')
        .toLowerCase();
      return normalizedQuery
        .split(/\s+/)
        .filter(Boolean)
        .every(term => searchable.includes(term));
    }

    function filteredSidebarItems(filterID) {
      if (filterID) {
        return state.sidebar.items.filter(item => sidebarFilterIncludes(item, filterID));
      }
      const savedSearch = activeSidebarSavedSearch();
      if (savedSearch) {
        return state.sidebar.items.filter(item => sidebarItemMatchesQuery(item, savedSearch.query));
      }
      return state.sidebar.items.filter(item => sidebarFilterIncludes(item, activeSidebarFilter()));
    }

    function sidebarFilterCount(filterID) {
      return filteredSidebarItems(filterID).length;
    }

    function sidebarSavedFilters() {
      const activeFilter = activeSidebarFilter();
      const hasActiveSavedSearch = Boolean(activeSidebarSavedSearch());
      return sidebarFilterDefinitions.map(filter => ({
        ...filter,
        commandID: `sidebar-filter:${filter.id}`,
        count: sidebarFilterCount(filter.id),
        isActive: !hasActiveSavedSearch && filter.id === activeFilter
      }));
    }

    function sidebarSavedSearches() {
      const activeID = String(state.sidebar.activeSavedSearchID || '').trim();
      const validSearches = validSidebarSavedSearches();
      return validSearches.map((savedSearch, index) => ({
        ...savedSearch,
        commandID: `sidebar-saved-search:${savedSearch.id}`,
        count: state.sidebar.items.filter(item => sidebarItemMatchesQuery(item, savedSearch.query)).length,
        isActive: savedSearch.id === activeID,
        canMoveUp: index > 0,
        canMoveDown: index < validSearches.length - 1
      }));
    }

    function setSidebarFilter(filterID) {
      if (!sidebarFilterDefinitions.some(filter => filter.id === filterID)) return false;
      if (state.sidebar.activeFilter !== filterID || state.sidebar.activeSavedSearchID) {
        state.sidebar.activeFilter = filterID;
        state.sidebar.activeSavedSearchID = null;
        clearSidebarSelection();
      }
      return true;
    }

    function setSidebarSavedSearch(savedSearchID) {
      const savedSearch = validSidebarSavedSearches().find(candidate => candidate.id === savedSearchID);
      if (!savedSearch) return false;
      if (state.sidebar.activeSavedSearchID !== savedSearch.id) {
        state.sidebar.activeSavedSearchID = savedSearch.id;
        clearSidebarSelection();
      }
      return true;
    }

    function openSidebarSavedSearchDialog() {
      state.sidebar.savedSearchDialog = {
        isOpen: true,
        title: '',
        query: ''
      };
    }

    function closeSidebarSavedSearchDialog() {
      state.sidebar.savedSearchDialog = {
        isOpen: false,
        title: '',
        query: ''
      };
    }

    function saveSidebarSavedSearch(title, query, id = null) {
      const normalizedQuery = String(query || '').trim();
      const normalizedTitle = String(title || '').trim() || normalizedQuery;
      const normalizedID = String(id || `saved-${Date.now()}`).trim();
      if (!normalizedID || !normalizedTitle || !normalizedQuery) return null;
      const existing = validSidebarSavedSearches().find(savedSearch => (
        savedSearch.title.toLowerCase() === normalizedTitle.toLowerCase()
          && savedSearch.query.toLowerCase() === normalizedQuery.toLowerCase()
      ));
      if (existing) {
        state.sidebar.activeSavedSearchID = existing.id;
        clearSidebarSelection();
        return existing.id;
      }
      state.sidebar.savedSearches = validSidebarSavedSearches()
        .filter(savedSearch => savedSearch.id !== normalizedID)
        .concat([{
          id: normalizedID,
          title: normalizedTitle,
          query: normalizedQuery
        }]);
      state.sidebar.activeSavedSearchID = normalizedID;
      clearSidebarSelection();
      return normalizedID;
    }

    function deleteSidebarSavedSearch(savedSearchID) {
      const normalizedID = String(savedSearchID || '').trim();
      const beforeCount = validSidebarSavedSearches().length;
      state.sidebar.savedSearches = validSidebarSavedSearches()
        .filter(savedSearch => savedSearch.id !== normalizedID);
      if (state.sidebar.activeSavedSearchID === normalizedID) {
        state.sidebar.activeSavedSearchID = null;
        state.sidebar.activeFilter = 'all';
        clearSidebarSelection();
      }
      return state.sidebar.savedSearches.length !== beforeCount;

    function moveSidebarSavedSearch(savedSearchID, direction) {
      const normalizedID = String(savedSearchID || '').trim();
      const searches = validSidebarSavedSearches();
      const index = searches.findIndex(savedSearch => savedSearch.id === normalizedID);
      if (index < 0) return false;
      const targetIndex = direction === 'up' ? index - 1 : index + 1;
      if (targetIndex < 0 || targetIndex >= searches.length) return false;
      const nextSearches = searches.slice();
      [nextSearches[index], nextSearches[targetIndex]] = [nextSearches[targetIndex], nextSearches[index]];
      state.sidebar.savedSearches = nextSearches;
      return true;
    }

      const latestUserIndex = visibleMessages
        .map((message, index) => ({ message, index }))
        .filter(entry => entry.message.role === 'user')
        .at(-1)?.index ?? Math.max(0, visibleMessages.length - 4);
      return visibleMessages.slice(latestUserIndex, latestUserIndex + 4);

    function contextSummaryLines({ sourceTitle, olderMessages, recentMessages, kind }) {
      const summaryLines = [
        kind === 'compact'
          ? `Context compacted from "${sourceTitle}".`
          : `Context forked from "${sourceTitle}" with a summary.`,
        `Kept ${recentMessages.length} latest message${recentMessages.length === 1 ? '' : 's'} and summarized ${olderMessages.length} earlier message${olderMessages.length === 1 ? '' : 's'}.`
      ];
      if (olderMessages.length) {
        summaryLines.push('Earlier context:');
        olderMessages.slice(-6).forEach(message => {
          summaryLines.push(`- ${message.role}: ${String(message.text || '').replace(/\s+/g, ' ').trim().slice(0, 180)}`);
        });
      } else {
        summaryLines.push('No earlier turns were dropped.');
      }
      summaryLines.push(kind === 'compact'
        ? 'Continue from the preserved latest turn below.'
        : 'Continue the fork from the preserved latest turn below.');
      return summaryLines;
    }

    function forkThread(strategy = 'latest') {
      if (!state.sidebar.selectedThreadID || !state.transcript.messages.length) return;
      const source = state.sidebar.items.find(item => item.id === state.sidebar.selectedThreadID);
      const sourceTitle = source?.title || 'Chat';
      const visibleMessages = visibleConversationMessages();
      const latestMessages = latestTurnMessages(visibleMessages);
      const latestIDs = new Set(latestMessages.map(message => message.id));
      const olderMessages = visibleMessages.filter(message => !latestIDs.has(message.id));
      if (strategy === 'summary') {
        runContextSummaryTransition('fork', () => {
          const summaryText = contextSummaryLines({
            sourceTitle,
            olderMessages,
            recentMessages: latestMessages,
            kind: 'fork'
          }).join('\n');
          insertDerivedThread({
            title: `Fork summary: ${sourceTitle}`,
            messages: [
              { id: `message-${state.nextTimelineIndex++}`, role: 'assistant', text: summaryText },
              ...latestMessages
            ],
            contextItems: [contextActivityItem({ kind: 'fork', sourceTitle, summaryText })]
          });
        });
        return;
      }
      if (strategy === 'full') {
        insertDerivedThread({
          title: `Fork full: ${sourceTitle}`,
          messages: visibleMessages
        });
        return;
      }
      insertDerivedThread({
        title: `Fork: ${sourceTitle}`,
        messages: latestMessages
      });
    }

    function branchStatusLabelFromHeader(headerLine) {
      let rest = String(headerLine || '').trim();
      if (!rest.startsWith('## ')) return null;
      rest = rest.slice(3).trim();
      if (rest.startsWith('HEAD (no branch)')) return '(detached)';
      let ahead = 0;
      let behind = 0;
      const bracket = rest.match(/\s*\[([^\]]*)\]$/);
      if (bracket) {
        rest = rest.slice(0, bracket.index).trim();
        for (const segment of bracket[1].split(',')) {
          const tokens = segment.trim().split(/\s+/);
          if (tokens.length === 2 && /^\d+$/.test(tokens[1])) {
            if (tokens[0] === 'ahead') ahead = parseInt(tokens[1], 10);
            else if (tokens[0] === 'behind') behind = parseInt(tokens[1], 10);
          }
        }
      }
      const branch = rest.split('...')[0];
      if (!branch) return null;
      let label = branch;
      if (ahead > 0) label += ` ↑${ahead}`;
      if (behind > 0) label += ` ↓${behind}`;
      return label;
    }

    // Mirrors GitChangedFiles.parse (Swift): changed paths from `git status --short`
    // porcelain lines, skipping the `## ` header, keeping post-arrow rename paths, unquoting.
    function parseChangedFilePaths(statusShortBranchOutput) {
      const paths = [];
      for (const line of String(statusShortBranchOutput || '').split('\n')) {
        if (!line || line.startsWith('## ') || line.length <= 3) continue;
        let payload = line.slice(3);
        // Only split rename/copy (status R/C) lines, so a path containing " -> " is kept.
        const status = line.slice(0, 2);
        if (status.includes('R') || status.includes('C')) {
          const arrow = payload.lastIndexOf(' -> ');
          if (arrow >= 0) payload = payload.slice(arrow + 4);
        }
        let path = payload.trim();
        if (path.startsWith('"')) path = path.slice(1);
        if (path.endsWith('"')) path = path.slice(0, -1);
        if (path) paths.push(path);
      }
      return paths;
    }

    function followUpDelayDescription(seconds) {
      if (seconds % 86400 === 0) {
        const days = seconds / 86400;
        return days === 1 ? 'In 1 day' : `In ${days} days`;
      }
      if (seconds % 3600 === 0) {
        const hours = seconds / 3600;
        return hours === 1 ? 'In 1 hour' : `In ${hours} hours`;
      }
      if (seconds % 60 === 0) {
        const minutes = seconds / 60;
        return minutes === 1 ? 'In 1 minute' : `In ${minutes} minutes`;
      }
      return `In ${seconds} seconds`;
    }

    function clockDescription(hour, minute) {
      const hour12 = hour % 12 === 0 ? 12 : hour % 12;
      const meridiem = hour < 12 ? 'AM' : 'PM';
      return `${hour12}:${String(minute).padStart(2, '0')} ${meridiem}`;
    }

    function parseFollowUpClock(value, defaultMeridiem = null) {
      let text = String(value).toLowerCase().replaceAll('.', '').replaceAll(' ', '');
      if (text === 'noon') return { hour: 12, minute: 0 };
      if (text === 'midnight') return { hour: 0, minute: 0 };
      let meridiem = null;
      if (text.endsWith('am')) {
        meridiem = 'am';
        text = text.slice(0, -2);
      } else if (text.endsWith('pm')) {
        meridiem = 'pm';
        text = text.slice(0, -2);
      } else {
        meridiem = defaultMeridiem;
      }
      const pieces = text.split(':');
      if (pieces.length < 1 || pieces.length > 2) return null;
      const rawHour = Number(pieces[0]);
      if (!Number.isInteger(rawHour) || rawHour < 0 || rawHour > 23) return null;
      const minute = pieces.length === 2 ? Number(pieces[1]) : 0;
      if (!Number.isInteger(minute) || minute < 0 || minute > 59) return null;
      if (pieces.length === 2 && !/^\d{2}$/.test(pieces[1])) return null;
      let hour = rawHour;
      if (meridiem === 'pm' && hour < 12) hour += 12;
      if (meridiem === 'am' && hour === 12) hour = 0;
      return hour < 24 ? { hour, minute } : null;
    }

    function followUpClockRemainder(value) {
      let text = String(value).trim();
      for (const prefix of ['at', 'around', 'about']) {
        if (text.startsWith(`${prefix} `)) {
          text = text.slice(prefix.length).trim();
        }
      }
      return text;
    }

    function followUpDayPartClock(value) {
      switch (String(value).trim()) {
        case 'morning':
          return { hour: 9, minute: 0 };
        case 'afternoon':
          return { hour: 13, minute: 0 };
        case 'evening':
          return { hour: 17, minute: 0 };
        case 'tonight':
        case 'night':
          return { hour: 19, minute: 0 };
        default:
          return null;
      }
    }

    function followUpWeekdayLabel(value) {
      const labels = {
        sunday: 'Sunday',
        sun: 'Sunday',
        monday: 'Monday',
        mon: 'Monday',
        tuesday: 'Tuesday',
        tue: 'Tuesday',
        tues: 'Tuesday',
        wednesday: 'Wednesday',
        wed: 'Wednesday',
        thursday: 'Thursday',
        thu: 'Thursday',
        thur: 'Thursday',
        thurs: 'Thursday',
        friday: 'Friday',
        fri: 'Friday',
        saturday: 'Saturday',
        sat: 'Saturday'
      };
      return labels[value] || null;
    }

    function recurrenceSchedule(value) {
      if (value === 'hourly' || value === 'every hour') return { label: 'Every hour', isRecurring: true };
      if (value === 'daily' || value === 'every day') return { label: 'Every day', isRecurring: true };
      if (value === 'weekly' || value === 'every week') return { label: 'Every week', isRecurring: true };
      if (!value.startsWith('every ')) return null;
      const tokens = value.slice('every '.length).split(/\s+/).filter(Boolean);
      const unitLabel = (unit, amount) => {
        if (/^(m|min|mins|minute|minutes)$/.test(unit)) return amount === 1 ? 'minute' : 'minutes';
        if (/^(h|hr|hrs|hour|hours)$/.test(unit)) return amount === 1 ? 'hour' : 'hours';
        if (/^(d|day|days)$/.test(unit)) return amount === 1 ? 'day' : 'days';
        if (/^(w|wk|wks|week|weeks)$/.test(unit)) return amount === 1 ? 'week' : 'weeks';
        return null;
      };
      if (tokens.length === 1) {
        const label = unitLabel(tokens[0], 1);
        return label ? { label: `Every ${label}`, isRecurring: true } : null;
      }
      const amount = Number(tokens[0]);
      if (!Number.isInteger(amount) || amount <= 0) return null;
      const label = unitLabel(tokens[1], amount);
      return label ? { label: `Every ${amount} ${label}`, isRecurring: true } : null;
    }

    function naturalFollowUpSchedule(value) {
      const normalized = String(value)
        .toLowerCase()
        .replaceAll('-', ' ')
        .replaceAll('_', ' ')
        .trim()
        .replace(/[.!?]+$/, '');
      const recurrence = recurrenceSchedule(normalized);
      if (recurrence) return recurrence;
      const relative = normalized.match(/^(?:in\s+)?(\d+)\s*(s|sec|secs|second|seconds|m|min|mins|minute|minutes|h|hr|hrs|hour|hours|d|day|days)\b/);
      if (relative) {
        const amount = Number(relative[1]);
        const unit = relative[2];
        const multiplier = unit.startsWith('s') ? 1
          : unit.startsWith('m') ? 60
            : unit.startsWith('h') ? 3600
              : 86400;
        return amount > 0 ? { label: followUpDelayDescription(amount * multiplier), isRecurring: false } : null;
      }
      if (normalized === 'tomorrow') {
        return { label: 'Tomorrow at 9:00 AM', isRecurring: false };
      }
      if (normalized.startsWith('tomorrow ')) {
        const remainder = normalized.slice('tomorrow'.length).trim();
        if (remainder === 'morning') return { label: 'Tomorrow at 9:00 AM', isRecurring: false };
        if (remainder === 'afternoon') return { label: 'Tomorrow at 1:00 PM', isRecurring: false };
        if (remainder === 'evening') return { label: 'Tomorrow at 5:00 PM', isRecurring: false };
        const clock = parseFollowUpClock(remainder.replace(/^at\s+/, '').replace(/^around\s+/, ''));
        return clock ? { label: `Tomorrow at ${clockDescription(clock.hour, clock.minute)}`, isRecurring: false } : null;
      }
      if (normalized === 'tonight') {
        return { label: 'Tonight at 7:00 PM', isRecurring: false };
      }
      if (normalized.startsWith('tonight ')) {
        const clock = parseFollowUpClock(followUpClockRemainder(normalized.slice('tonight'.length)), 'pm');
        return clock ? { label: `Tonight at ${clockDescription(clock.hour, clock.minute)}`, isRecurring: false } : null;
      }
      if (normalized.startsWith('today ')) {
        const remainder = normalized.slice('today'.length).trim();
        const clock = followUpDayPartClock(remainder) || parseFollowUpClock(followUpClockRemainder(remainder));
        return clock ? { label: `Today at ${clockDescription(clock.hour, clock.minute)}`, isRecurring: false } : null;
      }
      const weekdayMatch = normalized.match(/^(?:(next|this|on)\s+)?(sun(?:day)?|mon(?:day)?|tue(?:s|sday)?|wed(?:nesday)?|thu(?:r|rs|rsday|rday)?|fri(?:day)?|sat(?:urday)?)(?:\s+(.*))?$/);
      if (weekdayMatch) {
        const prefix = weekdayMatch[1] === 'next' ? 'Next ' : '';
        const weekday = followUpWeekdayLabel(weekdayMatch[2]);
        const remainder = weekdayMatch[3] || '';
        const clock = followUpDayPartClock(remainder)
          || parseFollowUpClock(followUpClockRemainder(remainder))
          || { hour: 9, minute: 0 };
        return weekday && clock
          ? { label: `${prefix}${weekday} at ${clockDescription(clock.hour, clock.minute)}`, isRecurring: false }
          : null;
      }
      const bareClockText = followUpClockRemainder(normalized);
      if (bareClockText !== normalized || /:/.test(normalized) || /^\d{1,2}\s*(am|pm)$/.test(normalized)) {
        const clock = parseFollowUpClock(bareClockText);
        if (clock) return { label: `Today at ${clockDescription(clock.hour, clock.minute)}`, isRecurring: false };
      }
      return null;
    }

    function canRouteHarnessCommand(commandID) {
      if (!commandID) return false;
      const id = String(commandID).trim();
      if (!id) return false;
      if (harnessStaticCommandIDs.has(id)) return true;
      if (id.startsWith(slashCommandPalettePrefix)) {
        return slashCommandPaletteCommands().some(command => command.id === id);
      }
      return harnessRoutableCommandPrefixes.some(prefix => id.startsWith(prefix));
    }

    function isVisibleCommandTarget(element) {
      if (!(element instanceof HTMLElement)) return false;
      if (element.matches(':disabled,[aria-disabled="true"]')) return false;
      const style = getComputedStyle(element);
      return style.display !== 'none'
        && style.visibility !== 'hidden'
        && Number(style.opacity || '1') > 0
        && element.getClientRects().length > 0;
    }

    function commandRoutingAuditReport() {
      updateDynamicCommands();
      const unroutableCommands = state.commands
        .filter(command => !canRouteHarnessCommand(command.id))
        .map(command => ({
          commandID: command.id,
          title: command.title,
          enabled: Boolean(command.isEnabled)
        }));
      const unroutableTargets = Array
        .from(document.querySelectorAll('[data-command-id]'))
        .filter(isVisibleCommandTarget)
        .map(element => ({
          commandID: element.getAttribute('data-command-id') || '',
          testid: element.getAttribute('data-testid') || '',
          text: (element.textContent || '').trim().replace(/\s+/g, ' ').slice(0, 80)
        }))
        .filter(target => !canRouteHarnessCommand(target.commandID));
      return {
        unroutableCommands,
        unroutableTargets
      };
    }
