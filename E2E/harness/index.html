    const slashCommandPalettePrefix = 'slash-command:';

    function slashCommandPaletteCommands() {
      return slashCommandDefinitions.map((definition, index) => ({
        id: `${slashCommandPalettePrefix}${index}`,
        title: definition.usage,
        shortcut: '',
        category: 'Slash Commands',
        keywords: [definition.usage.slice(1), definition.title, definition.detail, ...definition.aliases],
        isEnabled: true,
        insertText: definition.insertText
      }));
    }

    function normalizeSlashText(value) {
      return String(value).toLowerCase().replaceAll('-', ' ').replaceAll('_', ' ').trim();
    }

    function slashSuggestions(draft, limit = 6) {
      const text = String(draft).trimStart();
      if (!text.startsWith('/') || text.includes('\n')) return [];
      // Once the user has committed to `/model ` and is querying a model, the model sub-search owns
      // the popup (mirrors native); suppress the top-level slash list so the two never both render.
      if (isModelCommandActive(draft)) return [];
      const query = normalizeSlashText(text.slice(1));
      return slashCommandDefinitions
        .map((definition, index) => ({ definition, index, score: slashSuggestionScore(definition, query) }))
        .filter(entry => entry.score !== null)
        .sort((left, right) => right.score - left.score || left.index - right.index)
        .slice(0, limit)
        .map(entry => entry.definition);
    }

    function slashSuggestionScore(definition, query) {
      if (!query) return 100;
      const usage = normalizeSlashText(definition.usage.slice(1));
      if ((usage.split(/\s+/)[0] || '') === query) return 130;
      if (usage.startsWith(query)) return 120;
      if (definition.aliases.some(alias => normalizeSlashText(alias).startsWith(query))) return 110;
      if (usage.includes(query)) return 90;
      // Mirrors Swift: the low-weight free-text (title/detail/alias) fallback is a KEYWORD search
      // that only applies while typing the command word. Once the query has whitespace the user is
      // typing an ARGUMENT (`/skill foo`), so a stray hit inside the detail's own usage-example must
      // not keep the command live (that blocked Enter-submit of a fully-typed `/skill code-review`).
      if (query.includes(' ')) return null;
      const searchable = [definition.usage, definition.title, definition.detail, ...definition.aliases]
        .map(normalizeSlashText);
      return searchable.some(value => value.includes(query)) ? 70 : null;
    }

    // --- /model sub-search (mirrors Swift SlashModelCatalogSearch + ModelCommandPriceLabel) ------
    // Parity target for issue #879: the composer `/model ` popup browses the catalog with live
    // per-1M pricing. The trigger, filter, ranking, and price formatting must match the Swift core
    // so native and harness agree (enforced by the parity test).
    const modelCommandPrefixes = ['/model', '/models'];

    function modelCommandCurrency(value) {
      const number = Number(value);
      if (!Number.isFinite(number)) return '$0';
      const safe = Math.max(0, number);
      const trimmed = safe.toFixed(4).replace(/0+$/, '').replace(/\.$/, '');
      return `$${trimmed}`;
    }

    function modelCommandPriceLabel(capabilities) {
      const input = capabilities && capabilities.inputPricePerMillionTokens;
      const output = capabilities && capabilities.outputPricePerMillionTokens;
      const hasInput = input !== null && input !== undefined;
      const hasOutput = output !== null && output !== undefined;
      if (hasInput && hasOutput) return `${modelCommandCurrency(input)} in / ${modelCommandCurrency(output)} out per 1M`;
      if (hasInput) return `${modelCommandCurrency(input)} input per 1M`;
      if (hasOutput) return `${modelCommandCurrency(output)} output per 1M`;
      return '';
    }

    // The model query after `/model `, or null when the sub-search is inactive. Requires the
    // command word to be FOLLOWED by a space (so a bare `/model` stays a top-level command row and
    // `/modelfoo` is a different token), and no newline (a multi-line draft is prose, not a command).
    function modelCommandQuery(draft) {
      const leading = String(draft).replace(/^[ \t]+/, '');
      if (leading.includes('\n')) return null;
      const lowered = leading.toLowerCase();
      for (const prefix of modelCommandPrefixes) {
        const withSpace = prefix + ' ';
        if (lowered.startsWith(withSpace)) {
          return leading.slice(withSpace.length).trim();
        }
      }
      return null;
    }

    function isModelCommandActive(draft) {
      return modelCommandQuery(draft) !== null;
    }

    // Mirrors the TrustedRouter alias resolution the Swift core applies (TrustedRouterDefaults.
    // canonicalModelID). The mock catalog is already canonical, but resolving aliases here keeps
    // dedup + the emitted `/model <id>` insertText in parity with native even if a catalog entry
    // (or a favorites/recent duplicate) ever carries an alias form of an id.
    const modelIDAliases = {
      'fast': 'trustedrouter/fast',
      '/fast': 'trustedrouter/fast',
      'tr/fast': 'trustedrouter/fast',
      'trustedrouter/nike': 'trustedrouter/fast',
      'nike': 'trustedrouter/fast',
      '/nike': 'trustedrouter/fast',
      'tr/nike': 'trustedrouter/fast',
      'zeus': 'trustedrouter/zeus',
      '/zeus': 'trustedrouter/zeus',
      'tr/zeus': 'trustedrouter/zeus',
      'deep research': 'trustedrouter/zeus',
      'prometheus': 'trustedrouter/fusion',
      '/prometheus': 'trustedrouter/fusion',
      'tr/prometheus': 'trustedrouter/fusion',
      'trustedrouter/prometheus': 'trustedrouter/fusion',
      'tr/fusion': 'trustedrouter/fusion',
      'socrates': 'trustedrouter/socrates',
      '/socrates': 'trustedrouter/socrates',
      'tr/socrates': 'trustedrouter/socrates',
      'aristotle': 'trustedrouter/aristotle',
      '/aristotle': 'trustedrouter/aristotle',
      'tr/aristotle': 'trustedrouter/aristotle',
      'smart': 'trustedrouter/aristotle',
      'plato': 'trustedrouter/plato',
      '/plato': 'trustedrouter/plato',
      'tr/plato': 'trustedrouter/plato',
      'oss coding': 'trustedrouter/plato'
    };

    function canonicalModelID(id) {
      const trimmed = String(id || '').trim();
      return modelIDAliases[trimmed.toLowerCase()] || trimmed;
    }

    function normalizeModelField(value) {
      return String(value || '').toLowerCase().replaceAll('-', ' ').replaceAll('_', ' ').trim();
    }

    function modelCommandScore(option, query) {
      if (!query) return 50;
      const fields = [
        option.id,
        option.provider,
        option.displayName,
        option.detailTitle || option.displayName,
        option.category || '',
        modelMetadataSummary(option, option.category || ''),
        modelCapabilitySummary(option, option.category || '')
      ]
        .map(normalizeModelField);
      if (fields.some(field => field.startsWith(query))) return 120;
      const haystack = fields.join(' ');
      const terms = query.split(/\s+/).filter(Boolean);
      if (terms.every(term => haystack.includes(term))) return 90;
      return null;
    }

    function modelCommandSuggestions(draft, limit = 6) {
      const query = modelCommandQuery(draft);
      if (query === null) return [];
      const normalizedQuery = normalizeModelField(query);
      const seen = new Set();
      const options = [];
      for (const category of state.topBar.modelCategories) {
        for (const model of category.models) {
          const key = canonicalModelID(model.id);
          if (seen.has(key)) continue;
          seen.add(key);
          options.push({ ...model, category: model.category || category.category });
        }
      }
      return options
        .map((option, index) => ({ option, index, score: modelCommandScore(option, normalizedQuery) }))
        .filter(entry => entry.score !== null)
        .sort((left, right) => right.score - left.score || left.index - right.index)
        .slice(0, Math.max(0, limit))
        .map(entry => {
          const modelID = canonicalModelID(entry.option.id);
          return {
            modelID,
            title: entry.option.detailTitle || entry.option.displayName || modelID,
            detail: `${entry.option.provider} · ${entry.option.category}`,
            priceLabel: modelCommandPriceLabel(entry.option.capabilities),
            isCurrent: Boolean(entry.option.isSelected),
            insertText: `/model ${modelID}`
          };
        });
    }

    function modelCommandHasNoMatches(draft = state.composer.draft) {
      return modelCommandQuery(draft) !== null && modelCommandSuggestions(draft).length === 0;
    }

    function clampModelCommandActiveIndex(suggestions = modelCommandSuggestions(state.composer.draft)) {
      if (!suggestions.length) {
        state.composer.modelCommandActiveIndex = 0;
        return;
      }
      state.composer.modelCommandActiveIndex = Math.max(
        0,
        Math.min(state.composer.modelCommandActiveIndex || 0, suggestions.length - 1)
      );
    }

    function moveModelCommandSuggestion(delta) {
      const suggestions = modelCommandSuggestions(state.composer.draft);
      if (!suggestions.length) return false;
      const current = state.composer.modelCommandActiveIndex || 0;
      state.composer.modelCommandActiveIndex = (current + delta + suggestions.length) % suggestions.length;
      render();
      const input = document.getElementById('message');
      input?.focus();
      resizeComposerInput(input);
      return true;
    }

    function acceptModelCommandSuggestion() {
      const suggestions = modelCommandSuggestions(state.composer.draft);
      if (!suggestions.length) return false;
      clampModelCommandActiveIndex(suggestions);
      const suggestion = suggestions[state.composer.modelCommandActiveIndex];
      // Switch the model NOW through the same live writer the picker uses. Only consume the draft
      // when the switch actually landed, so a suggestion whose id somehow fails to resolve never
      // silently wipes the user's text (mirrors native, where onSetModel always hits a real writer).
      if (!selectModel(suggestion.modelID)) return false;
      state.composer.draft = '';
      state.composer.canSend = false;
      state.composer.modelCommandActiveIndex = 0;
      render();
      const input = document.getElementById('message');
      input?.focus();
      resizeComposerInput(input);
      return true;
    }

    function tokenizeSlashArguments(text) {
      const tokens = [];
      let current = '';
      let quote = null;
      let isEscaped = false;
      for (const character of String(text || '')) {
        if (isEscaped) {
          current += character;
          isEscaped = false;
          continue;
        }
        if (character === '\\') {
          isEscaped = true;
          continue;
        }
        if (quote) {
          if (character === quote) {
            quote = null;
          } else {
            current += character;
          }
          continue;
        }
        if (character === '"' || character === "'") {
          quote = character;
          continue;
        }
        if (/\s/.test(character)) {
          if (current) {
            tokens.push(current);
            current = '';
          }
          continue;
        }
        current += character;
      }
      if (isEscaped) current += '\\';
      if (quote) return { error: 'Unclosed quote in worktree command.', tokens: [] };
      if (current) tokens.push(current);
      return { tokens, error: null };
    }

    function parseWorktreeSlash(text) {
      const match = String(text || '').match(/^\/(worktrees?|wt)\b/i);
      if (!match) return { kind: 'invalid', message: 'Usage: /worktrees or /worktree create|open|remove|prune.' };
      const argument = text.slice(match[0].length).trim();
      const parsed = tokenizeSlashArguments(argument);
      if (parsed.error) return { kind: 'invalid', message: parsed.error };
      const tokens = parsed.tokens;
      const subcommand = (tokens.shift() || 'list').toLowerCase();
      if (['list', 'ls'].includes(subcommand)) {
        return tokens.length
          ? { kind: 'invalid', message: 'Usage: /worktree list.' }
          : { kind: 'list' };
      }
      if (['create', 'add', 'new'].includes(subcommand)) {
        return parseWorktreeCreateSlash(tokens);
      }
      if (['open', 'switch'].includes(subcommand)) {
        return parseSinglePathWorktreeSlash(tokens, 'open');
      }
      if (['remove', 'rm', 'delete'].includes(subcommand)) {
        return parseWorktreeRemoveSlash(tokens);
      }
      if (['prune', 'cleanup'].includes(subcommand)) {
        return parseWorktreePruneSlash(tokens);
      }
      return { kind: 'invalid', message: `Unknown worktree subcommand '${subcommand}'. Try /worktree create, /worktree open, /worktree remove, or /worktree prune.` };
    }

    function parseWorktreeCreateSlash(tokens) {
      const values = { path: '', branch: '', base: '' };
      for (let index = 0; index < tokens.length; index += 1) {
        const token = tokens[index];
        if (token === '--branch' || token === '-b') {
          const next = tokens[++index];
          if (!next || next.startsWith('-')) return { kind: 'invalid', message: `Missing branch after ${token}.` };
          values.branch = next;
          continue;
        }
        if (token === '--base' || token === '--from') {
          const next = tokens[++index];
          if (!next || next.startsWith('-')) return { kind: 'invalid', message: `Missing base ref after ${token}.` };
          values.base = next;
          continue;
        }
        if (token.startsWith('-')) return { kind: 'invalid', message: `Unknown worktree create option '${token}'.` };
        if (values.path) return { kind: 'invalid', message: 'Too many worktree create paths. Quote paths with spaces.' };
        values.path = token;
      }
      return values.path
        ? { kind: 'create', values }
        : { kind: 'invalid', message: 'Missing worktree path. Try /worktree create ../feature --branch feature/name.' };
    }

    function parseSinglePathWorktreeSlash(tokens, action) {
      let path = '';
      for (const token of tokens) {
        if (token.startsWith('-')) return { kind: 'invalid', message: `Unknown worktree ${action} option '${token}'.` };
        if (path) return { kind: 'invalid', message: `Too many worktree ${action} paths. Quote paths with spaces.` };
        path = token;
      }
      return path
        ? { kind: action, values: { path } }
        : { kind: 'invalid', message: `Missing worktree path. Try /worktree ${action} ../feature.` };
    }

    function parseWorktreeRemoveSlash(tokens) {
      const values = { path: '', force: false };
      for (const token of tokens) {
        if (token === '--force' || token === '-f') {
          values.force = true;
          continue;
        }
        if (token.startsWith('-')) return { kind: 'invalid', message: `Unknown worktree remove option '${token}'.` };
        if (values.path) return { kind: 'invalid', message: 'Too many worktree remove paths. Quote paths with spaces.' };
        values.path = token;
      }
      return values.path
        ? { kind: 'remove', values }
        : { kind: 'invalid', message: 'Missing worktree path. Try /worktree remove ../feature.' };
    }

    function parseWorktreePruneSlash(tokens) {
      const values = { dryRun: false, verbose: false };
      for (const token of tokens) {
        if (token === '--dry-run' || token === '-n') {
          values.dryRun = true;
          continue;
        }
        if (token === '--verbose' || token === '-v') {
          values.verbose = true;
          continue;
        }
        if (token.startsWith('-')) return { kind: 'invalid', message: `Unknown worktree prune option '${token}'.` };
        return { kind: 'invalid', message: 'Worktree prune does not take a path. Try /worktree prune --dry-run.' };
      }
      return { kind: 'prune', values };
    }

    function clampSlashActiveIndex(suggestions = slashSuggestions(state.composer.draft)) {
      if (!suggestions.length) {
        state.composer.slashActiveIndex = 0;
        return;
      }
      state.composer.slashActiveIndex = Math.max(
        0,
        Math.min(state.composer.slashActiveIndex || 0, suggestions.length - 1)
      );
    }

    function moveSlashSuggestion(delta) {
      const suggestions = slashSuggestions(state.composer.draft);
      if (!suggestions.length) return false;
      const current = state.composer.slashActiveIndex || 0;
      state.composer.slashActiveIndex = (current + delta + suggestions.length) % suggestions.length;
      render();
      const input = document.getElementById('message');
      input?.focus();
      resizeComposerInput(input);
      return true;
    }

    function acceptSlashSuggestion({ force = false } = {}) {
      const suggestions = slashSuggestions(state.composer.draft);
      if (!suggestions.length) return false;
      clampSlashActiveIndex(suggestions);
      const suggestion = suggestions[state.composer.slashActiveIndex];
      // Mirrors Swift: on Enter (non-force), never re-accept a completion the user has typed PAST —
      // if the draft already begins with the space-terminated insertText and carries an argument,
      // re-accepting would reset to the bare command and drop the argument, blocking submit.
      if (!force
        && suggestion.insertText.endsWith(' ')
        && state.composer.draft.startsWith(suggestion.insertText)
        && state.composer.draft.length > suggestion.insertText.length) {
        return false;
      }
      if (!force && state.composer.draft === suggestion.insertText && !suggestion.insertText.endsWith(' ')) {
        return false;
      }
      state.composer.draft = suggestion.insertText;
      state.composer.canSend = state.composer.draft.trim().length > 0;
      state.composer.slashActiveIndex = 0;
      render();
      const input = document.getElementById('message');
      input?.focus();
      input?.setSelectionRange(state.composer.draft.length, state.composer.draft.length);
      resizeComposerInput(input);
      return true;
    }

    function resizeComposerInput(input) {
      if (!input || input.tagName !== 'TEXTAREA') return;
      input.style.height = 'auto';
      const maxHeight = parseFloat(getComputedStyle(input).maxHeight) || 138;
      const nextHeight = Math.min(input.scrollHeight, maxHeight);
      input.style.height = `${nextHeight}px`;
      input.style.overflowY = input.scrollHeight > maxHeight ? 'auto' : 'hidden';
    }

    function workspaceMentionFiles() {
      const selected = state.projects.items.find(project => project.id === state.projects.selectedProjectID);
      if (!selected || selected.isRemote) return [];
      const prefix = '/mock/QuillCode/';
      const entryFor = (path, kind) => {
        const slash = path.lastIndexOf('/');
        return { path, name: slash >= 0 ? path.slice(slash + 1) : path, directory: slash >= 0 ? path.slice(0, slash) : '', kind };
      };
      const fileEntries = Object.keys(state.mockFiles)
        .filter(absolute => absolute.startsWith(prefix))
        .map(absolute => entryFor(absolute.slice(prefix.length), 'file'));
      // Synthesize one directory entry per unique ancestor of every file, mirroring the
      // Swift FS walk (which emits every enumerated directory) so the two never drift.
      const directories = new Map();
      for (const entry of fileEntries) {
        const parts = entry.path.split('/');
        for (let depth = 1; depth < parts.length; depth += 1) {
          const dirPath = parts.slice(0, depth).join('/');
          if (!directories.has(dirPath)) directories.set(dirPath, entryFor(dirPath, 'directory'));
        }
      }
      return [...fileEntries, ...directories.values()]
        .sort((left, right) => (left.path < right.path ? -1 : left.path > right.path ? 1 : 0));
    }

    function activeFileMention(draft) {
      const text = String(draft);
      if (!text) return null;
      let index = text.length;
      while (index > 0) {
        const character = text[index - 1];
        if (/\s/.test(character)) return null;
        if (character === '@') {
          if (index - 1 === 0 || /\s/.test(text[index - 2])) {
            return { prefix: text.slice(0, index - 1), query: text.slice(index) };
          }
          return null;
        }
        index -= 1;
      }
      return null;
    }

    function isMentionSubsequence(needle, haystack) {
      if (!needle) return true;
      let cursor = 0;
      for (const character of haystack) {
        if (character === needle[cursor]) {
          cursor += 1;
          if (cursor === needle.length) return true;
        }
      }
      return false;
    }

    // Mirrors FileMentionCatalog.changedFileBoost (Swift): a flat additive boost larger
    // than the max text score (200), so changed files outrank unchanged matches while text
    // scoring still orders files within each group.
    const CHANGED_FILE_MENTION_BOOST = 1000;

    function fileMentionScore(entry, query) {
      if (!query) {
        const depth = (entry.path.match(/\//g) || []).length;
        return 100 - Math.min(depth, 20);
      }
      const name = entry.name.toLowerCase();
      const path = entry.path.toLowerCase();
      if (name === query) return 200;
      if (name.startsWith(query)) return 170;
      if (path.startsWith(query)) return 150;
      if (name.includes(query)) return 120;
      if (path.includes(query)) return 90;
      if (isMentionSubsequence(query, name)) return 60;
      if (isMentionSubsequence(query, path)) return 40;
      return null;
    }

    function fileMentionSuggestions(draft, limit = 6) {
      if (slashSuggestions(draft).length) return [];
      const mention = activeFileMention(draft);
      if (!mention) return [];
      const query = mention.query.toLowerCase();
      const changed = changedMentionPaths();
      return workspaceMentionFiles()
        .map(entry => {
          const textScore = fileMentionScore(entry, query);
          if (textScore === null) return null;
          const isChanged = changed.has(entry.path);
          return { entry, score: textScore + (isChanged ? CHANGED_FILE_MENTION_BOOST : 0), isChanged };
        })
        .filter(item => item !== null)
        .sort((left, right) =>
          right.score - left.score
          || left.entry.path.length - right.entry.path.length
          || (left.entry.path < right.entry.path ? -1 : left.entry.path > right.entry.path ? 1 : 0))
        .slice(0, limit)
        .map(item => ({
          path: item.entry.path,
          name: item.entry.name,
          directory: item.entry.directory,
          // A directory mention ends with `/` then a space (mirrors FileMentionCatalog Swift).
          insertText: `${mention.prefix}@${item.entry.path}${item.entry.kind === 'directory' ? '/ ' : ' '}`,
          isChanged: item.isChanged,
          kind: item.entry.kind || 'file'
        }));
    }

    // Workspace-relative paths with uncommitted changes (mirrors model.changedFilePaths),
    // populated from a successful git status run in the mock.
    function changedMentionPaths() {
      return new Set(state.changedFilePaths || []);
    }

    function clampFileMentionActiveIndex(suggestions = fileMentionSuggestions(state.composer.draft)) {
      if (!suggestions.length) {
        state.composer.mentionActiveIndex = 0;
        return;
      }
      state.composer.mentionActiveIndex = Math.max(
        0,
        Math.min(state.composer.mentionActiveIndex || 0, suggestions.length - 1)
      );
    }

    function moveFileMentionSuggestion(delta) {
      const suggestions = fileMentionSuggestions(state.composer.draft);
      if (!suggestions.length) return false;
      const current = state.composer.mentionActiveIndex || 0;
      state.composer.mentionActiveIndex = (current + delta + suggestions.length) % suggestions.length;
      render();
      const input = document.getElementById('message');
      input?.focus();
      resizeComposerInput(input);
      return true;
    }

    function acceptFileMentionSuggestion({ force = false } = {}) {
      const suggestions = fileMentionSuggestions(state.composer.draft);
      if (!suggestions.length) return false;
      clampFileMentionActiveIndex(suggestions);
      const suggestion = suggestions[state.composer.mentionActiveIndex];
      if (!force && state.composer.draft === suggestion.insertText) return false;
      state.composer.draft = suggestion.insertText;
      state.composer.canSend = state.composer.draft.trim().length > 0;
      state.composer.mentionActiveIndex = 0;
      render();
      const input = document.getElementById('message');
      input?.focus();
      input?.setSelectionRange(state.composer.draft.length, state.composer.draft.length);
      resizeComposerInput(input);
      return true;
    }

    function composerSentHistory() {
      const entries = [];
      for (const message of state.transcript.messages) {
        if (message.role !== 'user') continue;
        const text = String(message.text || '').trim();
        if (!text) continue;
        if (entries[entries.length - 1] === text) continue;
        entries.push(text);
      }
      return entries.slice(-50);
    }

    function showingUneditedRecall(history) {
      const index = state.composer.historyRecallIndex;
      return index !== null && index >= 0 && index < history.length && state.composer.draft === history[index];
    }

    function applyComposerHistoryDraft(text) {
      state.composer.draft = text;
      state.composer.canSend = state.composer.draft.trim().length > 0;
      render();
      const input = document.getElementById('message');
      input?.focus();
      input?.setSelectionRange(state.composer.draft.length, state.composer.draft.length);
      resizeComposerInput(input);
    }

    function recallOlderHistory() {
      const history = composerSentHistory();
      if (!history.length) return false;
      if (state.composer.historyRecallIndex === null) {
        if (state.composer.draft.length) return false;
        state.composer.historySavedDraft = state.composer.draft;
        state.composer.historyRecallIndex = history.length - 1;
        applyComposerHistoryDraft(history[state.composer.historyRecallIndex]);
        return true;
      }
      if (!showingUneditedRecall(history)) return false;
      state.composer.historyRecallIndex = Math.max(0, state.composer.historyRecallIndex - 1);
      applyComposerHistoryDraft(history[state.composer.historyRecallIndex]);
      return true;
    }

    function recallNewerHistory() {
      const history = composerSentHistory();
      if (!showingUneditedRecall(history)) return false;
      if (state.composer.historyRecallIndex + 1 < history.length) {
        state.composer.historyRecallIndex += 1;
        applyComposerHistoryDraft(history[state.composer.historyRecallIndex]);
      } else {
        const restored = state.composer.historySavedDraft || '';
        state.composer.historyRecallIndex = null;
        state.composer.historySavedDraft = null;
        applyComposerHistoryDraft(restored);
      }
      return true;
    }

    function authModeLabel(authMode) {
      return authMode === 'developer-override' ? 'Developer override' : 'TrustedRouter login';
    }

    function providerLabel(modelID) {
      const raw = String(modelID || '').trim();
      if (!raw.includes('/')) return 'trustedrouter';
      const provider = raw.split('/')[0].trim().toLowerCase();
      return provider === 'tr' || provider === '' ? 'trustedrouter' : provider;
    }

    function redactedDiagnosticError(error) {
      return String(error)
        .replace(/sk-[A-Za-z0-9_-]{8,}/g, 'sk-...redacted')
        .replace(/Bearer\s+[A-Za-z0-9._-]{12,}/g, 'Bearer ...redacted')
        .trim()
        .slice(0, 260);
    }

    function isRateLimitError(error) {
      const normalized = String(error).toLowerCase();
      return normalized.includes('429')
        || normalized.includes('rate limit')
        || normalized.includes('ratelimit')
        || normalized.includes('quota exceeded')
        || normalized.includes('usage limit')
        || normalized.includes('too many requests');
    }

    function rateLimitDiagnostics(error) {
      if (!isRateLimitError(error)) return [];
      const diagnostics = [{ label: 'Provider status', value: 'Rate limited' }];
      const retryAfter = String(error).match(/\bretry[- ]after\b\s*[:=]?\s*([0-9]+)\s*(?:s|sec|secs|second|seconds)?/i);
      if (retryAfter) {
        diagnostics.push({ label: 'Retry after', value: `${retryAfter[1]}s` });
      }
      const remaining = String(error).match(/\bx[-_]?ratelimit[-_]?remaining\b\s*[:=]?\s*([0-9]+)/i);
      if (remaining) {
        diagnostics.push({ label: 'Rate limit remaining', value: remaining[1] });
      }
      return diagnostics;
    }

    function httpStatusCode(error) {
      const match = String(error).match(/\b(?:http(?:\s+status)?|status(?:\s*code)?|response|server)\s*[:=]?\s*((?:50[0-4])|(?:5\d\d))\b/i);
      return match ? match[1] : null;
    }

    function requestID(error) {
      const match = String(error).match(/\b(?:x[-_ ]?)?request[-_ ]?id\b\s*[:=]?\s*([A-Za-z0-9._:-]{4,})/i);
      return match ? match[1] : null;
    }

    function isProviderOutageError(error) {
      if (httpStatusCode(error)) return true;
      const normalized = String(error).toLowerCase();
      return normalized.includes('bad gateway')
        || normalized.includes('gateway timeout')
        || normalized.includes('service unavailable')
        || normalized.includes('provider unavailable')
        || normalized.includes('provider is unavailable')
        || normalized.includes('upstream')
        || normalized.includes('overloaded')
        || normalized.includes('temporarily unavailable');
    }

    function providerOutageDiagnostics(error) {
      if (!isProviderOutageError(error)) return [];
      const diagnostics = [{ label: 'Provider status', value: 'Unavailable' }];
      const status = httpStatusCode(error);
      if (status) diagnostics.push({ label: 'HTTP status', value: status });
      const id = requestID(error);
      if (id) diagnostics.push({ label: 'Request ID', value: id });
      return diagnostics;
    }

    function runtimeDiagnostics(lastError = null) {
      const diagnostics = [
        { label: 'API base URL', value: state.settings.apiBaseURL },
        { label: 'Authentication', value: authModeLabel(state.settings.authMode) },
        { label: 'Key state', value: state.settings.hasStoredAPIKey ? 'Configured' : 'Missing' },
        { label: 'Model', value: state.topBar.selectedModelID },
        { label: 'Provider', value: providerLabel(state.topBar.selectedModelID) },
        { label: 'Agent status', value: state.topBar.agentStatus }
      ];
      if (lastError) {
        diagnostics.push(...rateLimitDiagnostics(lastError));
        diagnostics.push(...providerOutageDiagnostics(lastError));
        diagnostics.push({ label: 'Last error', value: redactedDiagnosticError(lastError) });
      }
      return diagnostics;
    }

    function makeRuntimeIssue(issue, lastError = null) {
      return {
        ...issue,
        diagnostics: runtimeDiagnostics(lastError)
      };
    }

    function addMessage(role, text, attachments = []) {
      const message = {
        id: `message-${state.nextTimelineIndex++}`,
        role,
        text,
        attachments: clonedPlainObject(attachments, [])
      };
      state.transcript.messages.push(message);
      state.transcript.timelineItems.push({
        id: `timeline-${state.nextTimelineIndex++}`,
        kind: 'message',
        message
      });
      saveSelectedThreadSnapshot();
      return message;
    }

    // Simulate a background run finishing on a thread the user is NOT currently viewing: append
    // an assistant turn straight into that thread's stored snapshot, without touching its
    // "seen" watermark. On return, the "N new turns" pill surfaces the growth. Used by the E2E
    // harness (prompt keyword) to exercise the pill deterministically.
    function growThreadInBackground(threadID, text) {
      const target = state.sidebar.items.find(item => item.id === threadID);
      if (!target || threadID === state.sidebar.selectedThreadID) return;
      const snapshot = target.snapshot || { messages: [], toolCards: [], timelineItems: [], review: emptyReviewSurface() };
      const message = { id: `message-${state.nextTimelineIndex++}`, role: 'assistant', text, attachments: [] };
      const item = { id: `timeline-${state.nextTimelineIndex++}`, kind: 'message', message };
      const nextSnapshot = {
        ...snapshot,
        messages: [...(snapshot.messages || []), message],
        timelineItems: [...(snapshot.timelineItems || []), item]
      };
      state.sidebar.items = state.sidebar.items.map(candidate => (
        candidate.id === threadID ? { ...candidate, snapshot: nextSnapshot } : candidate
      ));
    }

    function renameSelectedThread(title) {
      if (!state.sidebar.selectedThreadID) return;
      state.sidebar.items = state.sidebar.items.map(item => (
        item.id === state.sidebar.selectedThreadID ? { ...item, title } : item
      ));
      state.topBar.primaryTitle = title;
    }

    function memoryTitle(content) {
      const firstLine = String(content).split(/\n/)[0] || 'Memory';
      const cleaned = firstLine
        .replace(/^remember\s+(that\s+)?/i, '')
        .trim()
        .slice(0, 60);
      const words = cleaned || 'Memory';
      return words
        .split(/[^A-Za-z0-9]+/)
        .filter(Boolean)
        .slice(0, 8)
        .map(word => word.charAt(0).toUpperCase() + word.slice(1))
        .join(' ') || 'Memory';
    }

    function refreshMemorySummary() {
      const globalCount = state.memories.items.filter(item => item.scope === 'global').length;
      const projectCount = state.memories.items.filter(item => item.scope === 'project').length;
      state.memories.globalCount = globalCount;
      state.memories.projectCount = projectCount;
      state.memories.conflicts = memoryConflicts();
      const conflictCount = state.memories.conflicts.length;
      const redactionCount = (state.memories.redactionReviews || []).length;
      const conflictSuffix = conflictCount ? ` · ${countLabel(conflictCount, 'conflict')}` : '';
      const total = globalCount + projectCount;
      const redactionSuffix = redactionCount ? ` · ${countLabel(redactionCount, 'blocked attempt')}` : '';
      state.memories.subtitle = total
        ? `${countLabel(globalCount, 'global memory')} · ${countLabel(projectCount, 'project memory')}${conflictSuffix}${redactionSuffix}`
        : `0 memories${redactionSuffix}`;
      state.topBar.memoryLabel = total === 1 ? '1 memory' : `${total} memories`;
      state.topBar.memorySources = state.memories.items.map(item => item.relativePath);
    }

    function memoryConflicts() {
      const globals = state.memories.items.filter(item => item.scope === 'global').flatMap(memoryConflictCandidates);
      const projects = state.memories.items.filter(item => item.scope === 'project').flatMap(memoryConflictCandidates);
      const seen = new Set();
      const conflicts = [];
      for (const global of globals) {
        for (const project of projects) {
          if (global.key !== project.key || global.polarity === project.polarity) continue;
          const id = `memory-conflict:${global.item.id}:${project.item.id}:${slug(global.key)}`;
          if (seen.has(id)) continue;
          seen.add(id);
          conflicts.push({
            id,
            title: `Memory conflict: ${global.display}`,
            summary: `Global and project memories disagree about ${global.display}. Review which note should guide this project.`,
            global: memoryConflictSide(global.item),
            project: memoryConflictSide(project.item)
          });
          if (conflicts.length === 6) return conflicts;
        }
      }
      return conflicts;
    }

    function memoryConflictCandidates(item) {
      return String(item.preview || '')
        .split(/[\n.!?;]+/)
        .map(value => value.trim().replace(/^[-*•]\s*/, ''))
        .filter(Boolean)
        .map(statement => memoryConflictCandidate(item, statement))
        .filter(Boolean);
    }

    function memoryConflictCandidate(item, statement) {
      const patterns = [
        ['should not use ', 'negative'], ['should not ', 'negative'],
        ['must not use ', 'negative'], ['must not ', 'negative'],
        ['do not use ', 'negative'], ['do not ', 'negative'],
        ["don't use ", 'negative'], ["don't ", 'negative'],
        ['never use ', 'negative'], ['never ', 'negative'],
        ['avoid using ', 'negative'], ['avoid ', 'negative'],
        ['always use ', 'affirmative'], ['should use ', 'affirmative'],
        ['must use ', 'affirmative'], ['prefer using ', 'affirmative'],
        ['prefer ', 'affirmative'], ['use ', 'affirmative'],
        ['keep using ', 'affirmative'], ['keep ', 'affirmative']
      ];
      const lower = statement.toLowerCase();
      const match = patterns.find(([prefix]) => lower.startsWith(prefix));
      if (!match) return null;
      const subject = statement.slice(match[0].length).toLowerCase().split(/[^a-z0-9]+/).filter(Boolean);
      if (!subject.length) return null;
      return {
        item,
        polarity: match[1],
        key: subject.join(' '),
        display: subject.join(' ')
      };
    }

    function memoryConflictSide(item) {
      return {
        id: item.id,
        scopeLabel: item.scopeLabel,
        title: item.title,
        relativePath: item.relativePath,
        editCommandID: item.editCommandID
      };
    }

    function slug(value) {
      return String(value).toLowerCase().split(/[^a-z0-9]+/).filter(Boolean).join('-');
    }

    function memoryLooksSensitive(content) {
      const value = String(content);
      return /\b(password|passwd|passphrase|api[_ -]?key|secret|token|credential)\s*[:=]/i.test(value)
          || /\b(sk|pk|rk|ghp|github_pat|xox[baprs])[-_][A-Za-z0-9_=\-]{16,}/i.test(value)
          || /-----BEGIN [A-Z ]*PRIVATE KEY-----/.test(value);
    }

    function redactedMemoryInput(action, userText) {
      if (action === 'update') {
        const firstLine = String(userText).trim().split(/\n/)[0] || '/remember-edit';
        return `${firstLine}\n<redacted memory content>`;
      }
      return String(userText).trim().startsWith('/')
        ? '/remember <redacted memory content>'
        : 'Memory request <redacted memory content>';
    }

    function initialThreadTitleForPrompt(text) {
      const trimmed = String(text).trim();
      if (/^\/remember-edit\b/i.test(trimmed) && memoryLooksSensitive(trimmed)) {
        return redactedMemoryInput('update', trimmed).split(/\s+/).slice(0, 6).join(' ');
      }
      if (/^\/remember\b/i.test(trimmed) && memoryLooksSensitive(trimmed)) {
        return redactedMemoryInput('save', trimmed).split(/\s+/).slice(0, 6).join(' ');
      }
      return trimmed.split(/\s+/).slice(0, 6).join(' ');
    }

    function redactLatestUserMemoryMessage(action) {
      const latest = [...state.transcript.messages].reverse().find(message => message.role === 'user');
      if (latest) latest.text = redactedMemoryInput(action, latest.text);
    }

    function addMemoryRedactionReview(action, userText) {
      redactLatestUserMemoryMessage(action);
      state.memories.redactionReviews = [
        {
          id: `memory-redaction-${Date.now()}-${state.memories.redactionReviews.length + 1}`,
          title: 'Memory redaction blocked',
          summary: 'The attempted memory looked like a credential, token, password, or private key.',
          redactedInput: redactedMemoryInput(action, userText),
          guidance: 'Store secrets in a password manager or secret store. Save only durable preferences or facts.',
          addCommandID: 'memory-add'
        },
        ...(state.memories.redactionReviews || [])
      ].slice(0, 4);
      refreshMemorySummary();
    }

    function saveMemory(content) {
      const trimmed = String(content).trim();
      if (!trimmed) {
        addMessage('assistant', 'Nothing to remember. Use `/remember a durable preference or fact`.');
        return null;
      }
      if (memoryLooksSensitive(trimmed)) {
        addMemoryRedactionReview('save', `/remember ${trimmed}`);
        addMessage('assistant', 'Memory was not saved because it looks like it contains a credential, token, password, or private key.');
        return null;
      }
      const title = memoryTitle(trimmed);
      const id = `global:memories/manual-${Date.now()}-${state.memories.globalCount + 1}.md`;
      const item = {
        id,
        scope: 'global',
        scopeLabel: 'Global',
        title,
        preview: trimmed,
        relativePath: id.replace('global:', ''),
        byteCountLabel: `${new TextEncoder().encode(trimmed).length} bytes`,
        canEdit: true,
        editCommandID: `memory-edit:${id}`,
        canDelete: true,
        deleteCommandID: `memory-delete:${id}`
      };
      state.memories.items = [item, ...state.memories.items];
      refreshMemorySummary();
      renameSelectedThread(`Memory: ${title}`);
      addMessage('assistant', `Saved memory: ${title}. It will be included as background context in future turns.`);
      return item;
    }

    function prepareEditMemory(id) {
      const item = state.memories.items.find(candidate => candidate.id === id && candidate.canEdit);
      if (!item) {
        addMessage('assistant', 'Memory was not found. It may already have been removed.');
        return false;
      }
      state.composer.draft = `/remember-edit ${item.id}\n${item.preview}`;
      state.composer.canSend = true;
      return true;
    }

    function updateMemory(id, content) {
      const trimmed = content.trim();
      const index = state.memories.items.findIndex(item => item.id === id && item.canEdit);
      if (index < 0) {
        addMessage('assistant', 'Memory was not found. It may already have been removed.');
        return false;
      }
      if (!trimmed) {
        addMessage('assistant', 'Memory cannot be empty.');
        return false;
      }
      if (memoryLooksSensitive(trimmed)) {
        addMemoryRedactionReview('update', `/remember-edit ${id}\n${trimmed}`);
        addMessage('assistant', 'Memory was not updated because it looks like it contains a credential, token, password, or private key.');
        return false;
      }
      const title = memoryTitle(trimmed);
      state.memories.items[index] = {
        ...state.memories.items[index],
        title,
        preview: trimmed,
        byteCountLabel: `${new TextEncoder().encode(trimmed).length} bytes`
      };
      refreshMemorySummary();
      renameSelectedThread(`Updated memory: ${title}`);
      addMessage('assistant', `Updated memory: ${title}. Future turns will use the revised memory.`);
      return true;
    }

    function deleteMemory(id) {
      const index = state.memories.items.findIndex(item => item.id === id && item.canDelete);
      if (index < 0) {
        addMessage('assistant', 'Memory was not found. It may already have been removed.');
        return false;
      }
      const [item] = state.memories.items.splice(index, 1);
      refreshMemorySummary();
      renameSelectedThread(`Forgot memory: ${item.title}`);
      addMessage('assistant', `Forgot memory: ${item.title}. It will no longer be included as background context.`);
      return true;
    }

    function addToolCard(card) {
      // Mirror native: any tool run other than git status rebuilds the file context and
      // invalidates the changed-file set, so a committed/clean file is never left badged.
      // The git status card sets state.changedFilePaths just before this call.
      if (card.title !== 'host.git.status') {
        state.changedFilePaths = [];
      }
      const toolCard = {
        id: `tool-${state.nextTimelineIndex++}`,
        artifacts: artifactsFromOutput(card.outputJSON),
        ...card,
        executionContext: card.executionContext || executionContextForTool(card.title),
        reviewState: card.reviewState || toolCardReviewState(card.status, card.actions, card.subtitle),
        density: card.density || toolCardDensity(card.status, card.isExpanded)
      };
      const stateLabel = toolCardStateLabel(toolCard.status);
      if (!toolCard.subtitle || toolCard.subtitle === stateLabel) {
        toolCard.subtitle = toolCardSubtitle(stateLabel, toolCard.title, toolCard.inputJSON);
      }
      state.transcript.toolCards.push(toolCard);
      state.transcript.timelineItems.push({
        id: `timeline-${state.nextTimelineIndex++}`,
        kind: 'toolCard',
        toolCard
      });
      saveSelectedThreadSnapshot();
      return toolCard;
    }

    function selectedProject() {
      return state.projects.items.find(project => project.id === state.projects.selectedProjectID) || null;
    }

    function executionContextForTool(toolName) {
      if (!isProjectExecutionTool(toolName)) return null;
      return executionContextForProject(selectedProject());
    }

    function executionContextForProject(project) {
      if (!project) return null;
      if (project.isRemote) {
        return {
          kind: 'ssh-remote',
          label: 'SSH Remote',
          detail: sshHostFromLabel(project.path) || project.name || 'ssh'
        };
      }
      return {
        kind: 'local',
        label: 'Local',
        detail: project.path || 'No project'
      };
    }

    function executionContextForCWD(cwd) {
      if (isSSHRemoteLabel(cwd)) {
        return {
          kind: 'ssh-remote',
          label: 'SSH Remote',
          detail: sshHostFromLabel(cwd) || 'ssh'
        };
      }
      return {
        kind: 'local',
        label: 'Local',
        detail: cwd || 'No project'
      };
    }

    function isProjectExecutionTool(toolName) {
      return [
        'host.shell.run',
        'host.file.read',
        'host.file.list',
        'host.file.search',
        'host.file.write',
        'host.apply_patch',
        'host.git.status',
        'host.git.diff',
        'host.git.branch.list',
        'host.git.branch.switch',
        'host.git.stage',
        'host.git.restore',
        'host.git.stage_hunk',
        'host.git.restore_hunk',
        'host.git.commit',
        'host.git.push',
        'host.git.pr.create',
        'host.git.pr.view',
        'host.git.pr.checks',
        'host.git.pr.diff',
        'host.git.worktree.list',
        'host.git.worktree.create',
        'host.git.worktree.remove',
        'host.git.worktree.prune'
      ].includes(toolName);
    }

    function sshHostFromLabel(label) {
      try {
        return new URL(label).host || '';
      } catch {
        const match = String(label || '').match(/^ssh:\/\/([^/]+)/);
        return match?.[1] || '';
      }
    }

    function executionContextTitle(context) {
      if (!context) return '';
      return context.kind === 'ssh-remote'
        ? `${context.label} · ${context.detail}`
        : context.label;
    }

    function renderExecutionContextChip(context, testID) {
      return context ? `
        <span class="execution-context-chip" data-testid="${escapeHTML(testID)}" data-execution-context-kind="${escapeHTML(context.kind)}">${escapeHTML(executionContextTitle(context))}</span>` : '';
    }

    function toolCardDensity(status, isExpanded = false) {
      if (isExpanded) return 'expanded';
      if (status === 'queued' || status === 'running') return 'peek';
      if (status === 'failed' || status === 'review') return 'expanded';
      return 'collapsed';
    }

    function toolCardStateLabel(status) {
      if (status === 'queued') return 'Queued';
      if (status === 'running') return 'Running';
      if (status === 'failed') return 'Failed';
      if (status === 'review') return 'Ready';
      return 'Completed';
    }

    function toolCardReviewState(status, actions = [], subtitle = '') {
      if (status !== 'review') return 'none';
      if (!actions.length && /blocked/i.test(String(subtitle || ''))) return 'needsReview';
      return 'ready';
    }

    function toolCardNeedsReview(card) {
      if (card.reviewState === 'needsReview') return true;
      return card.status === 'review'
        && !(card.actions || []).length
        && /blocked/i.test(String(card.subtitle || ''));
    }

    function toolCardStatusDisplayLabel(card) {
      if (card.status === 'review') return toolCardNeedsReview(card) ? 'Needs review' : 'Ready';
      const raw = String(card.status || '');
      return raw ? `${raw.charAt(0).toUpperCase()}${raw.slice(1)}` : '';
    }

    function toolCardStatusAccessibilityLabel(card) {
      if (card.status === 'review') return toolCardNeedsReview(card) ? 'needs review' : 'ready to run';
      return String(card.status || '');
    }

    function toolCardSubtitle(stateLabel, toolName, inputJSON) {
      const detail = toolCardDetail(toolName, inputJSON);
      return detail ? `${stateLabel} · ${detail}` : stateLabel;
    }

    function toolCardDetail(toolName, inputJSON) {
      if (!inputJSON) return '';
      let args = {};
      try {
        args = JSON.parse(inputJSON);
      } catch {
        return '';
      }
      const pathTools = new Set([
        'host.file.read',
        'host.file.list',
        'host.file.write',
        'host.git.stage',
        'host.git.restore',
        'host.git.stage_hunk',
        'host.git.restore_hunk',
        'host.git.pr.diff',
        'host.git.pr.review_comment',
        'host.git.worktree.remove'
      ]);
      if (toolName === 'host.shell.run') return toolCardSanitized(args.cmd);
      if (toolName === 'host.file.list') return toolCardSanitized(args.path) || '.';
      if (toolName === 'host.file.search') return toolCardSanitized(args.query);
      if (pathTools.has(toolName)) return toolCardSanitized(args.path);
      if (toolName === 'host.apply_patch') return 'patch';
      if (toolName === 'host.git.diff') return args.staged === true ? 'staged diff' : 'working tree';
      if (toolName === 'host.git.branch.list') return args.includeRemote === false ? 'local only' : 'local and remote';
      if (toolName === 'host.git.branch.switch') {
        const branch = toolCardSanitized(args.branch);
        if (args.create === true && branch && args.startPoint) return `${branch} from ${toolCardSanitized(args.startPoint)}`;
        if (args.create === true && branch) return `create ${branch}`;
        return branch || '';
      }
      if (toolName === 'host.git.commit') return toolCardSanitized(args.message);
      if (toolName === 'host.git.push') {
        const remote = toolCardSanitized(args.remote);
        const branch = toolCardSanitized(args.branch);
        if (remote && branch) return `${remote}/${branch}`;
        return remote || branch || '';
      }
      if (toolName === 'host.git.pr.create') return toolCardSanitized(args.title);
      if (toolName === 'host.git.pr.review_thread') return toolCardSanitized(args.action) || toolCardSanitized(args.threadId);
      if (toolName?.startsWith('host.git.pr.')) return toolCardSanitized(args.selector);
      if (toolName === 'host.git.worktree.create') return toolCardSanitized(args.branch) || toolCardSanitized(args.path);
      if (toolName === 'host.plan.update') return 'plan';
      if (toolName === 'host.handoff.update') return 'handoff';
      if (toolName === 'host.subagents.update') return 'subagents';
      if (toolName === 'host.browser.open') return toolCardSanitized(args.url);
      if (toolName === 'host.memory.remember') return toolCardSanitized(args.content);
      if (toolName === 'host.mcp.call') return toolCardSanitized(args.toolName);
      if (toolName === 'host.mcp.resource.read') {
        return toolCardSanitized(args.resourceName) || toolCardSanitized(args.name)
          || toolCardSanitized(args.resourceURI) || toolCardSanitized(args.uri);
      }
      if (toolName === 'host.mcp.prompt.get') {
        return toolCardSanitized(args.promptName) || toolCardSanitized(args.name);
      }
      if (toolName === 'host.computer.click' || toolName === 'host.computer.move') {
        return toolCardCoordinate(args.x, args.y);
      }
      if (toolName === 'host.computer.scroll') return toolCardCoordinate(args.dx, args.dy);
      if (toolName === 'host.computer.type') return toolCardSanitized(args.text);
      if (toolName === 'host.computer.key') return toolCardSanitized(args.key);
      return '';
    }

    function toolCardCoordinate(x, y) {
      const sx = toolCardSanitized(x === undefined || x === null ? '' : String(x));
      const sy = toolCardSanitized(y === undefined || y === null ? '' : String(y));
      if (sx && sy) return `${sx}, ${sy}`;
      return sx || sy || '';
    }

    function toolCardSanitized(value) {
      const collapsed = String(value || '').split(/\s+/).filter(Boolean).join(' ').trim();
      return collapsed.length > 72 ? `${collapsed.slice(0, 72)}...` : collapsed;
    }

    function updateToolCardLifecycle(card, status, subtitle) {
      card.status = status;
      card.subtitle = toolCardSubtitle(subtitle, card.title, card.inputJSON);
      card.reviewState = toolCardReviewState(status, card.actions || [], card.subtitle);
      card.density = toolCardDensity(status, card.isExpanded);
      card.isExpanded = card.density === 'expanded';
    }

    function runToolCardAction(kind, requestID, timelineID) {
      const item = state.transcript.timelineItems.find(item => item.id === timelineID);
      const card = item?.toolCard || state.transcript.toolCards.find(card => (
        (card.actions || []).some(action => action.requestID === requestID)
      ));
      if (!card) return;
      card.actions = [];
      card.status = 'done';
      card.reviewState = 'none';
      card.subtitle = toolCardSubtitle(kind === 'approve' ? 'Approved' : 'Skipped', card.title, card.inputJSON);
      card.outputJSON = JSON.stringify({
        requestID,
        verdict: kind === 'approve' ? 'approve' : 'deny',
        rationale: kind === 'approve' ? 'Approved from the tool card.' : 'Skipped from the tool card.'
      }, null, 2);
      card.density = toolCardDensity(card.status, false);
      card.isExpanded = false;

      if (kind === 'approve') {
        addToolCard({
          title: card.title,
          subtitle: 'Completed',
          status: 'done',
          inputJSON: card.inputJSON,
          outputJSON: mockApprovedToolOutput(card.title, card.inputJSON)
        });
        if (state.topBar.modeLabel === 'Plan') {
          // Approving a Plan-mode block runs the held tool and RESUMES the agent to drive the
          // plan forward — but the thread STAYS in Plan, so the next step it proposes is itself
          // gated for approval (mirrors WorkspaceModelReview.runToolCardActionResumingPlan +
          // resumeAgentAfterApproval). No flip to autonomous execution.
          addToolCard({
            title: 'host.shell.run',
            subtitle: 'Ready to run · touch step-two.txt',
            status: 'review',
            reviewState: 'ready',
            density: 'peek',
            inputJSON: JSON.stringify({ cmd: 'touch step-two.txt' }, null, 2),
            isExpanded: false,
            actions: [
              { id: 'tca-approve-next', title: 'Run', kind: 'approve', requestID: 'plan-approval-next', style: 'primary' }
            ]
          });
          addMessage('assistant', 'Approved — continuing the plan; the next step needs your approval.');
        } else {
          addMessage('assistant', 'Approved and ran the tool.');
        }
      } else {
        addMessage('assistant', `Skipped ${card.title}.`);
      }
      render();
    }

    function mockApprovedToolOutput(toolName, inputJSON) {
      const args = safeJSON(inputJSON);
      if (toolName === 'host.shell.run') {
        const cmd = String(args.cmd || '').trim();
        const stdout = cmd === 'whoami'
          ? 'mock-user\n'
          : `ran: ${cmd || 'command'}\n`;
        return JSON.stringify({ ok: true, stdout, stderr: '', exitCode: 0 }, null, 2);
      }
      if (toolName === 'host.file.write') {
        const path = String(args.path || 'file.txt');
        return JSON.stringify({ ok: true, stdout: `Wrote ${path}\n`, artifacts: [path] }, null, 2);
      }
      return JSON.stringify({ ok: true, stdout: 'Completed.\n' }, null, 2);
    }

    function safeJSON(text) {
      try {
        return JSON.parse(text || '{}') || {};
      } catch {
        return {};
      }
    }

    function artifactsFromOutput(outputJSON) {
      if (!outputJSON) return [];
      try {
        const decoded = JSON.parse(outputJSON);
        return Array.isArray(decoded.artifacts)
          ? decoded.artifacts
              .filter(value => String(value || '').trim())
              .map(value => artifactState(String(value)))
          : [];
      } catch {
        return [];
      }
    }

    function artifactState(value) {
      let kind = value.startsWith('http://') || value.startsWith('https://') || value.toLowerCase().startsWith('data:image/')
        ? 'url'
        : value.startsWith('/') || value.startsWith('file://')
          ? 'file'
          : 'path';
      let label = value;
      try {
        const url = value.startsWith('/') ? new URL(`file://${value}`) : new URL(value);
        if (url.protocol === 'data:') {
          label = 'Inline image';
        } else if (url.protocol === 'http:' || url.protocol === 'https:') {
          label = url.pathname && url.pathname !== '/' ? `${url.hostname}${url.pathname}` : url.hostname;
        } else {
          const parts = url.pathname.split('/').filter(Boolean);
          label = parts.at(-1) || url.hostname || value;
        }
      } catch {
        const parts = value.split('/').filter(Boolean);
        label = parts.at(-1) || value;
      }
      const isImagePreview = artifactIsImagePreview(value, kind);
      const artifact = {
        value,
        label,
        kind,
        isImagePreview,
        previewURL: isImagePreview ? artifactPreviewURL(value, kind) : null,
        textPreview: isImagePreview ? null : artifactTextPreview(value, kind)
      };
      const detail = artifactDetail(artifact);
      const documentPreview = artifactDocumentPreview(value, kind, detail);
      return {
        ...artifact,
        detail,
        imagePreview: artifactImagePreview(value, kind, detail),
        documentPreview,
        appshotPreview: artifactAppshotPreview(value, kind, documentPreview),
        pdfPreview: artifactPDFPreview(value, kind, documentPreview),
        officePreview: artifactOfficePreview(value, kind, documentPreview)
      };
    }

    function artifactDetail(artifact) {
      if (artifact.value.toLowerCase().startsWith('data:image/')) return 'Image artifact';
      if (artifact.kind === 'url') return artifact.label;
      if (artifact.kind === 'file') {
        try {
          const url = artifact.value.startsWith('/') ? new URL(`file://${artifact.value}`) : new URL(artifact.value);
          const parts = url.pathname.split('/').filter(Boolean);
          parts.pop();
          return '/' + parts.join('/');
        } catch {
          const parts = artifact.value.split('/').filter(Boolean);
          parts.pop();
          return parts.length ? '/' + parts.join('/') : 'File artifact';
        }
      }
      return artifact.value;
    }

    function artifactHref(artifact) {
      if (artifact.kind === 'url') return artifact.value;
      if (artifact.kind === 'file' && artifact.value.startsWith('/')) return `file://${artifact.value}`;
      if (artifact.kind === 'file' && artifact.value.startsWith('file://')) return artifact.value;
      return null;
    }

    function artifactIsImagePreview(value, kind) {
      if (value.toLowerCase().startsWith('data:image/')) return true;
      if (kind !== 'file' && kind !== 'url') return false;
      return ['png', 'jpg', 'jpeg', 'gif', 'webp', 'heic', 'tif', 'tiff', 'bmp'].includes(artifactPathExtension(value));
    }

    function artifactPreviewURL(value, kind) {
      if (!artifactIsImagePreview(value, kind)) return null;
      if (value.toLowerCase().startsWith('data:image/')) return value;
      if (kind === 'url') return value;
      if (kind === 'file' && value.startsWith('/')) return `file://${value}`;
      if (kind === 'file' && value.startsWith('file://')) return value;
      return null;
    }

    function artifactImagePreview(value, kind, detail) {
      if (!artifactIsImagePreview(value, kind)) return null;
      return {
        typeLabel: 'Image',
        extensionLabel: artifactImageExtension(value),
        detail
      };
    }

    function artifactImageExtension(value) {
      const lower = value.toLowerCase();
      if (lower.startsWith('data:image/')) {
        const subtype = lower.slice('data:image/'.length).split(/[;,]/)[0];
        return normalizedImageExtension(subtype || 'image');
      }
      const extension = artifactPathExtension(value);
      return extension ? normalizedImageExtension(extension) : 'IMAGE';
    }

    function normalizedImageExtension(value) {
      const base = String(value || 'image').toLowerCase().split('+')[0];
      if (base === 'jpeg') return 'JPG';
      if (base === 'x-icon') return 'ICO';
      return base.toUpperCase();
    }

    const documentPreviewKinds = new Map([
      ['appshot', { kind: 'appshot', typeLabel: 'Appshot', icon: 'APP' }],
      ['pdf', { kind: 'pdf', typeLabel: 'PDF', icon: 'PDF' }],
      ['doc', { kind: 'document', typeLabel: 'Document', icon: 'DOC' }],
      ['docx', { kind: 'document', typeLabel: 'Document', icon: 'DOC' }],
      ['odt', { kind: 'document', typeLabel: 'Document', icon: 'DOC' }],
      ['pages', { kind: 'document', typeLabel: 'Document', icon: 'DOC' }],
      ['rtf', { kind: 'document', typeLabel: 'Document', icon: 'DOC' }],
      ['numbers', { kind: 'spreadsheet', typeLabel: 'Spreadsheet', icon: 'XLS' }],
      ['ods', { kind: 'spreadsheet', typeLabel: 'Spreadsheet', icon: 'XLS' }],
      ['xls', { kind: 'spreadsheet', typeLabel: 'Spreadsheet', icon: 'XLS' }],
      ['xlsx', { kind: 'spreadsheet', typeLabel: 'Spreadsheet', icon: 'XLS' }],
      ['key', { kind: 'presentation', typeLabel: 'Presentation', icon: 'PPT' }],
      ['odp', { kind: 'presentation', typeLabel: 'Presentation', icon: 'PPT' }],
      ['ppt', { kind: 'presentation', typeLabel: 'Presentation', icon: 'PPT' }],
      ['pptx', { kind: 'presentation', typeLabel: 'Presentation', icon: 'PPT' }]
    ]);

    function artifactPathExtension(value) {
      try {
        const url = value.startsWith('/') ? new URL(`file://${value}`) : new URL(value);
        return (url.pathname.split('.').pop() || '').toLowerCase();
      } catch {
        return (value.split('.').pop() || '').toLowerCase();
      }
    }

    function artifactPreviewExtension(value) {
      let filename = '';
      try {
        const url = value.startsWith('/') ? new URL(`file://${value}`) : new URL(value);
        filename = decodeURIComponent((url.pathname.split('/').filter(Boolean).at(-1) || '')).toLowerCase();
      } catch {
        filename = (value.split('/').filter(Boolean).at(-1) || '').toLowerCase();
      }
      if (filename.endsWith('.appshot.json')) return 'appshot';
      return artifactPathExtension(value);
    }

    function artifactDocumentPreview(value, kind, detail) {
      if (artifactIsImagePreview(value, kind) || (kind !== 'file' && kind !== 'url')) return null;
      const extension = artifactPreviewExtension(value);
      const documentKind = documentPreviewKinds.get(extension);
      if (!documentKind) return null;
      return {
        kind: documentKind.kind,
        typeLabel: documentKind.typeLabel,
        extensionLabel: extension.toUpperCase(),
        detail,
        icon: documentKind.icon
      };
    }

    function artifactAppshotPreview(value, kind, documentPreview) {
      if (kind !== 'file' || documentPreview?.kind !== 'appshot') return null;
      const path = artifactFilePath(value);
      const content = path ? state.mockFiles[path] : null;
      if (typeof content !== 'string' || content.length > 128 * 1024) return null;
      let root;
      try {
        root = JSON.parse(content);
      } catch {
        return null;
      }
      if (!root || Array.isArray(root) || typeof root !== 'object') return null;
      const preview = {
        title: appshotString(root, ['title', 'name']),
        appLabel: appshotAppLabel(root),
        summary: appshotString(root, ['summary', 'description']),
        capturedAt: appshotString(root, ['capturedAt', 'createdAt', 'timestamp']),
        viewportLabel: appshotViewportLabel(root),
        windowCount: Array.isArray(root.windows) ? root.windows.length : null,
        screenshotURL: appshotScreenshotURL(root, path)
      };
      preview.metadataLines = [
        preview.appLabel ? `App: ${preview.appLabel}` : null,
        preview.viewportLabel ? `Viewport: ${preview.viewportLabel}` : null,
        Number.isInteger(preview.windowCount) ? `${preview.windowCount} window${preview.windowCount === 1 ? '' : 's'}` : null,
        preview.capturedAt ? `Captured: ${preview.capturedAt}` : null
      ].filter(Boolean);
      const hasDisplayContent = [
        preview.title,
        preview.appLabel,
        preview.summary,
        preview.capturedAt,
        preview.viewportLabel,
        preview.screenshotURL,
        Number.isInteger(preview.windowCount) ? String(preview.windowCount) : null
      ].some(Boolean);
      return hasDisplayContent ? preview : null;
    }

    function artifactPDFPreview(value, kind, documentPreview) {
      if (kind !== 'file' || documentPreview?.kind !== 'pdf') return null;
      const path = artifactFilePath(value);
      const content = path ? state.mockFiles[path] : null;
      if (typeof content !== 'string' || content.length > 512 * 1024) return null;
      const versionMatch = content.match(/%PDF-(\d+\.\d+)/);
      const titleMatch = content.match(/\/Title\s*\((.{1,240}?)\)/s);
      const pageTypeMatches = content.match(/\/Type\s*\/Page(?![A-Za-z])/g) || [];
      const countMatches = [...content.matchAll(/\/Count\s+(\d{1,6})/g)]
        .map(match => Number.parseInt(match[1], 10))
        .filter(count => Number.isFinite(count) && count > 0);
      const pageCount = pageTypeMatches.length || (countMatches.length ? Math.max(...countMatches) : null);
      const preview = {
        title: titleMatch ? unescapePDFLiteral(titleMatch[1]) : null,
        versionLabel: versionMatch ? `PDF ${versionMatch[1]}` : null,
        pageCount,
        byteSizeLabel: byteSizeLabel(content.length),
        isTruncated: false
      };
      preview.metadataLines = [
        preview.versionLabel ? `Version: ${preview.versionLabel}` : null,
        Number.isInteger(preview.pageCount) ? `${preview.pageCount} page${preview.pageCount === 1 ? '' : 's'}` : null,
        preview.byteSizeLabel ? `Size: ${preview.byteSizeLabel}` : null
      ].filter(Boolean);
      const hasDisplayContent = [
        preview.title,
        preview.versionLabel,
        Number.isInteger(preview.pageCount) ? String(preview.pageCount) : null,
        preview.byteSizeLabel
      ].some(Boolean);
      return hasDisplayContent ? preview : null;
    }

    function artifactOfficePreview(value, kind, documentPreview) {
      if (kind !== 'file' || !['document', 'spreadsheet', 'presentation'].includes(documentPreview?.kind)) {
        return null;
      }
      const extension = artifactPreviewExtension(value);
      if (!['docx', 'xlsx', 'pptx'].includes(extension)) return null;
      const path = artifactFilePath(value);
      const packageInfo = path ? state.mockOfficePackages[path] : null;
      const fileNames = Array.isArray(packageInfo?.fileNames) ? packageInfo.fileNames : null;
      if (!fileNames) return null;

      const worksheetCount = extension === 'xlsx'
        ? fileNames.filter(fileName =>
          fileName.startsWith('xl/worksheets/sheet')
          && fileName.endsWith('.xml')
          && !fileName.includes('/_rels/')
        ).length
        : null;
      const slideCount = extension === 'pptx'
        ? fileNames.filter(fileName =>
          fileName.startsWith('ppt/slides/slide')
          && fileName.endsWith('.xml')
          && !fileName.includes('/_rels/')
        ).length
        : null;
      const byteSize = Number.isFinite(packageInfo.sizeBytes)
        ? packageInfo.sizeBytes
        : (state.mockFiles[path] || '').length;
      const preview = {
        formatLabel: 'Office Open XML',
        entryCount: fileNames.length,
        worksheetCount: worksheetCount || null,
        slideCount: slideCount || null,
        byteSizeLabel: byteSizeLabel(byteSize)
      };
      preview.metadataLines = [
        `Format: ${preview.formatLabel}`,
        Number.isInteger(preview.entryCount)
          ? `${preview.entryCount} package ${preview.entryCount === 1 ? 'entry' : 'entries'}`
          : null,
        Number.isInteger(preview.worksheetCount)
          ? `${preview.worksheetCount} sheet${preview.worksheetCount === 1 ? '' : 's'}`
          : null,
        Number.isInteger(preview.slideCount)
          ? `${preview.slideCount} slide${preview.slideCount === 1 ? '' : 's'}`
          : null,
        preview.byteSizeLabel ? `Size: ${preview.byteSizeLabel}` : null
      ].filter(Boolean);
      return preview.metadataLines.length ? preview : null;
    }

    function unescapePDFLiteral(value) {
      return String(value || '')
        .replace(/\\\(/g, '(')
        .replace(/\\\)/g, ')')
        .replace(/\\n/g, ' ')
        .replace(/\\r/g, ' ')
        .replace(/\\t/g, ' ')
        .trim() || null;
    }

    function byteSizeLabel(byteCount) {
      if (!Number.isFinite(byteCount) || byteCount <= 0) return null;
      if (byteCount === 1) return '1 byte';
      if (byteCount < 1024) return `${byteCount} bytes`;
      const kilobytes = byteCount / 1024;
      if (kilobytes < 1024) return `${formatByteValue(kilobytes)} KB`;
      return `${formatByteValue(kilobytes / 1024)} MB`;
    }

    function formatByteValue(value) {
      const rounded = Math.round(value * 10) / 10;
      return Number.isInteger(rounded) ? String(rounded) : rounded.toFixed(1);
    }

    function appshotString(root, keys) {
      for (const key of keys) {
        const value = appshotStringValue(root[key], ['value', 'text', 'name']);
        if (value) return value;
      }
      return null;
    }

    function appshotAppLabel(root) {
      return appshotString(root, ['app', 'appName', 'application', 'bundleIdentifier'])
        || appshotStringValue(root.app, ['name', 'displayName', 'bundleIdentifier']);
    }

    function appshotStringValue(value, nestedKeys = []) {
      if (typeof value === 'string') {
        const trimmed = value.trim();
        return trimmed || null;
      }
      if (typeof value === 'number' && Number.isFinite(value)) return String(value);
      if (!value || Array.isArray(value) || typeof value !== 'object') return null;
      for (const key of nestedKeys) {
        const nested = appshotStringValue(value[key], []);
        if (nested) return nested;
      }
      return null;
    }

    function appshotViewportLabel(root) {
      const viewport = root.viewport && typeof root.viewport === 'object' && !Array.isArray(root.viewport)
        ? root.viewport
        : root;
      const width = appshotDimension(viewport.width);
      const height = appshotDimension(viewport.height);
      return width && height ? `${width} x ${height}` : null;
    }

    function appshotDimension(value) {
      const number = typeof value === 'string' ? Number(value.trim()) : value;
      return Number.isInteger(number) && number > 0 ? number : null;
    }

    function appshotScreenshotURL(root, appshotPath) {
      for (const key of ['screenshot', 'screenshotPath', 'image', 'imagePath', 'thumbnail', 'thumbnailPath', 'preview', 'previewImage']) {
        const value = appshotStringValue(root[key], ['path', 'url', 'file', 'imagePath']);
        const url = appshotImageURL(value, appshotPath);
        if (url) return url;
      }
      return null;
    }

    function appshotImageURL(value, appshotPath) {
      if (!value || value.includes('://') && !value.startsWith('file://')) return null;
      const appshotDirectory = appshotPath.split('/').slice(0, -1).join('/');
      let path;
      if (value.startsWith('file://')) {
        try {
          path = new URL(value).pathname;
        } catch {
          return null;
        }
      } else if (value.startsWith('/')) {
        path = value;
      } else {
        try {
          path = new URL(value, `file://${appshotDirectory}/`).pathname;
        } catch {
          return null;
        }
      }
      if (path !== appshotDirectory && !path.startsWith(`${appshotDirectory}/`)) return null;
      return artifactIsImagePreview(path, 'file') ? `file://${path}` : null;
    }

    const textPreviewExtensions = new Set([
      'c', 'cc', 'conf', 'cpp', 'css', 'csv', 'go', 'h', 'hpp', 'html',
      'java', 'js', 'json', 'jsx', 'kt', 'log', 'm', 'md', 'mm', 'py',
      'rb', 'rs', 'sh', 'sql', 'swift', 'toml', 'ts', 'tsx', 'txt',
      'xml', 'yaml', 'yml'
    ]);
    const textPreviewFilenames = new Set([
      '.env.example', '.gitignore', 'dockerfile', 'gemfile', 'license', 'makefile', 'podfile', 'readme'
    ]);

    function artifactFilePath(value) {
      if (value.startsWith('/')) return value;
      try {
        const url = new URL(value);
        return url.protocol === 'file:' ? decodeURIComponent(url.pathname) : null;
      } catch {
        return null;
      }
    }

    function artifactTextPreview(value, kind) {
      if (kind !== 'file') return null;
      const path = artifactFilePath(value);
      if (!path) return null;
      const name = path.split('/').filter(Boolean).at(-1)?.toLowerCase() || '';
      if (name.endsWith('.appshot') || name.endsWith('.appshot.json')) return null;
      const extension = name.includes('.') ? name.split('.').pop() : '';
      if (!textPreviewFilenames.has(name) && !textPreviewExtensions.has(extension)) return null;
      const text = state.mockFiles[path];
      if (typeof text !== 'string' || !text.trim() || text.includes('\u0000')) return null;
      const limit = 6 * 1024;
      let preview = text.slice(0, limit).replace(/\r\n/g, '\n').replace(/\r/g, '\n');
      let truncated = text.length > limit;
      const lines = preview.split('\n');
      if (lines.length > 80) {
        preview = lines.slice(0, 80).join('\n');
        truncated = true;
      }
      if (truncated) preview += `${preview.endsWith('\n') ? '' : '\n'}...`;
      return preview;
    }

    function countLabel(count, singular) {
      if (count === 1) return `1 ${singular}`;
      if (singular.endsWith('memory')) return `${count} ${singular.replace(/memory$/, 'memories')}`;
      return `${count} ${singular}s`;
