    const MAX_WORKSPACE_NAVIGATION_ENTRIES = 100;

    function currentWorkspaceLocation() {
      return {
        threadID: state.sidebar.selectedThreadID || null,
        projectID: state.projects.selectedProjectID || null
      };
    }

    function isEmptyWorkspaceLocation(location) {
      return !location?.threadID && !location?.projectID;
    }

    function sameWorkspaceLocation(lhs, rhs) {
      return (lhs?.threadID || null) === (rhs?.threadID || null)
        && (lhs?.projectID || null) === (rhs?.projectID || null);
    }

    function recordWorkspaceNavigation(previousLocation) {
      const nextLocation = currentWorkspaceLocation();
      if (sameWorkspaceLocation(previousLocation, nextLocation) || isEmptyWorkspaceLocation(nextLocation)) return;
      const history = state.navigationHistory;
      if (!Array.isArray(history.entries)) history.entries = [];
      if (!Number.isInteger(history.currentIndex)) history.currentIndex = -1;

      if (!history.entries.length) {
        if (!isEmptyWorkspaceLocation(previousLocation)) history.entries.push(previousLocation);
        history.entries.push(nextLocation);
        history.currentIndex = history.entries.length - 1;
        return;
      }

      if (!history.entries[history.currentIndex]
          || !sameWorkspaceLocation(history.entries[history.currentIndex], previousLocation)) {
        history.entries = isEmptyWorkspaceLocation(previousLocation) ? [] : [previousLocation];
        history.currentIndex = history.entries.length ? 0 : -1;
      } else if (history.currentIndex < history.entries.length - 1) {
        history.entries = history.entries.slice(0, history.currentIndex + 1);
      }

      history.entries.push(nextLocation);
      trimWorkspaceNavigationHistory();
      history.currentIndex = history.entries.length - 1;
    }

    function trimWorkspaceNavigationHistory() {
      const history = state.navigationHistory;
      const droppedEntryCount = history.entries.length - MAX_WORKSPACE_NAVIGATION_ENTRIES;
      if (droppedEntryCount <= 0) return;
      history.entries = history.entries.slice(droppedEntryCount);
      history.currentIndex = Math.max(-1, history.currentIndex - droppedEntryCount);
    }

    function pruneWorkspaceNavigation() {
      const validThreadIDs = new Set(state.sidebar.items.map(item => item.id));
      const validProjectIDs = new Set(state.projects.items.map(item => item.id));
      const history = state.navigationHistory;
      const current = history.entries?.[history.currentIndex] || null;
      history.entries = (history.entries || []).filter(location => {
        if (location.threadID) return validThreadIDs.has(location.threadID);
        if (location.projectID) return validProjectIDs.has(location.projectID);
        return false;
      });
      if (!history.entries.length) {
        history.currentIndex = -1;
        return;
      }
      const preservedIndex = current
        ? history.entries.findIndex(location => sameWorkspaceLocation(location, current))
        : -1;
      history.currentIndex = preservedIndex >= 0
        ? preservedIndex
        : Math.min(Math.max(history.currentIndex, 0), history.entries.length - 1);
    }

    function canNavigateWorkspaceBack() {
      return state.navigationHistory.currentIndex > 0
        && Boolean(state.navigationHistory.entries[state.navigationHistory.currentIndex]);
    }

    function canNavigateWorkspaceForward() {
      const history = state.navigationHistory;
      return Boolean(history.entries[history.currentIndex])
        && history.currentIndex < history.entries.length - 1;
    }

    function applyWorkspaceLocation(location) {
      if (location?.threadID && state.sidebar.items.some(item => item.id === location.threadID)) {
        selectThread(location.threadID, { recordsNavigation: false });
        return true;
      }
      if (location && location.threadID === null && location.projectID) {
        return applyWorkspaceProjectOnlyLocation(location.projectID);
      }
      if (location?.projectID && state.projects.items.some(item => item.id === location.projectID)) {
        selectProject(location.projectID, { recordsNavigation: false });
        return true;
      }
      pruneWorkspaceNavigation();
      return false;
    }

    function applyWorkspaceProjectOnlyLocation(projectID) {
      const project = state.projects.items.find(item => item.id === projectID);
      if (!project) {
        pruneWorkspaceNavigation();
        return false;
      }
      state.projects.selectedProjectID = projectID;
      state.projects.items = state.projects.items.map(item => ({
        ...item,
        isSelected: item.id === projectID

      state.sidebar.selectedThreadID = null;

      state.topBar.spendStatusLabel = null;
      state.topBar.spendStatusDetail = null;
      emptyTranscriptSurface();
      return true;
    }

    function navigateWorkspaceBack() {
      const history = state.navigationHistory;
      while (canNavigateWorkspaceBack()) {
        history.currentIndex -= 1;
        if (applyWorkspaceLocation(history.entries[history.currentIndex])) return true;
      }
      return false;
    }

    function navigateWorkspaceForward() {
      const history = state.navigationHistory;
      while (canNavigateWorkspaceForward()) {
        history.currentIndex += 1;
        if (applyWorkspaceLocation(history.entries[history.currentIndex])) return true;
      }
      return false;
    }

          ? `${activeCount} active · ${pausedCount} paused`
          : activeCount
            ? `${activeCount} active`
            : `${pausedCount} paused`;
        state.automations.workflows = configured;
      }
    }

    const commandCategoryOrder = ['Thread', 'Navigation', 'Workspace', 'Slash Commands', 'Automations', 'Memories', 'Extensions', 'Git', 'Environment', 'Control', 'Computer Use'];

    function normalizeCommandText(value) {
      return String(value || '').trim().toLowerCase();
    }

    function compactCommandText(value) {
      return normalizeCommandText(value).replace(/[\s+]/g, '');
    }

    function commandCategoryRank(category) {
      const index = commandCategoryOrder.indexOf(category || 'Workspace');
      return index === -1 ? commandCategoryOrder.length : index;
    }

    function commandScore(command, query) {
      if (!query) return 1;
      const title = normalizeCommandText(command.title);
      const compactTitle = compactCommandText(command.title);
      const shortcut = compactCommandText(command.shortcut);
      const id = normalizeCommandText(command.id.replaceAll('-', ' '));
      const category = normalizeCommandText(command.category || 'Workspace');
      const keywords = (command.keywords || []).map(normalizeCommandText);
      const compactQuery = compactCommandText(query);
      const queryTokens = query.split(/\s+/).filter(Boolean);
      const searchableText = [title, id, category, ...keywords].join(' ');

      if (title === query || compactTitle === compactQuery) return 1000;
      if (title.startsWith(query) || compactTitle.startsWith(compactQuery)) return 900;
      if (title.split(/\s+/).some(part => part.startsWith(query))) return 820;
      if (shortcut && shortcut.includes(compactQuery)) return 780;
      if (keywords.some(keyword => keyword === query || keyword.startsWith(query))) return 720;
      if (title.includes(query) || compactTitle.includes(compactQuery)) return 650;
      if (id.includes(query) || keywords.some(keyword => keyword.includes(query))) return 560;
      if (queryTokens.length > 1 && queryTokens.every(token => searchableText.includes(token))) return 540;
      if (category.includes(query)) return 440;
      return null;
    }

    function commandPaletteRequest() {
      const trimmed = String(state.commandPalette.query || '').trim();
      if (trimmed.startsWith('>')) {
        return { scope: 'actions', query: normalizeCommandText(trimmed.slice(1)) };
      }
      if (trimmed.startsWith('/')) {
        return { scope: 'slash', query: normalizeCommandText(trimmed.slice(1)) };
      }
      return { scope: 'mixed', query: normalizeCommandText(trimmed) };
    }

    function commandPaletteCommandPool(request) {
      if (request.scope === 'actions') return state.commands;
      if (request.scope === 'slash') return slashCommandPaletteCommands();
      if (!request.query) return state.commands;
      return [...state.commands, ...slashCommandPaletteCommands()];
    }

    function commandPaletteResults() {
      const request = commandPaletteRequest();
      return commandPaletteCommandPool(request)
        .map((command, index) => ({ command, index, score: commandScore(command, request.query) }))
        .filter(entry => entry.score !== null)
        .sort((lhs, rhs) => {
          if (lhs.score !== rhs.score) return rhs.score - lhs.score;
          const lhsCategory = commandCategoryRank(lhs.command.category);
          const rhsCategory = commandCategoryRank(rhs.command.category);
          if (lhsCategory !== rhsCategory) return lhsCategory - rhsCategory;
          return lhs.index - rhs.index;
        })
        .map(entry => entry.command);
    }

    function commandPaletteGroups() {
      const groupsByCategory = new Map();
      for (const command of commandPaletteResults()) {
        const category = command.category || 'Workspace';
        if (!groupsByCategory.has(category)) groupsByCategory.set(category, []);
        groupsByCategory.get(category).push(command);
      }
      return [...groupsByCategory.entries()]
        .sort(([lhs], [rhs]) => {
          const lhsRank = commandCategoryRank(lhs);
          const rhsRank = commandCategoryRank(rhs);
          if (lhsRank !== rhsRank) return lhsRank - rhsRank;
          return lhs.localeCompare(rhs);
        })
        .map(([category, commands]) => ({ category, commands }));
    }

    function ensureCommandPaletteSelection() {
      const enabled = commandPaletteResults().filter(command => command.isEnabled);
      if (enabled.some(command => command.id === state.commandPalette.selectedCommandID)) return;
      state.commandPalette.selectedCommandID = enabled[0]?.id || null;
    }

    function focusInputByTestID(testID) {
      const focus = () => {
        const input = document.querySelector(`[data-testid="${testID}"]`);
        if (!(input instanceof HTMLInputElement || input instanceof HTMLTextAreaElement)) return;
        input.focus();
        input.setSelectionRange(input.value.length, input.value.length);
      };
      requestAnimationFrame(focus);
    }

    function focusSearchInput() {
      const input = document.querySelector('[data-testid="search-input"]');
      if (input instanceof HTMLInputElement) {
        input.focus();
        input.setSelectionRange(input.value.length, input.value.length);
      }
      focusInputByTestID('search-input');
    }

    function openCommandPalette() {
      state.commandPalette.isOpen = true;
      state.commandPalette.query = '';
      ensureCommandPaletteSelection();
      render();
      focusInputByTestID('command-palette-input');
    }

    function openSearchPanel() {
      state.search.isOpen = true;
      state.search.query = '';
      ensureSearchHighlight(state.sidebar.selectedThreadID);
      render();
      focusInputByTestID('search-input');
    }

    function filteredSearchResults() {
      const query = state.search.query.trim().toLowerCase();
      return state.sidebar.items.filter(item => {
        if (!query) return true;
        return item.title.toLowerCase().includes(query)
          || item.subtitle.toLowerCase().includes(query)
          || (item.searchText || '').toLowerCase().includes(query)
          || (item.isPinned ? 'pinned' : '').includes(query)
          || (item.isArchived ? 'archived' : '').includes(query);
      });
    }

    function ensureSearchHighlight(preferredID) {
      const results = filteredSearchResults();
      if (preferredID && results.some(item => item.id === preferredID)) {
        state.search.highlightedThreadID = preferredID;
        return;
      }
      if (state.search.highlightedThreadID && results.some(item => item.id === state.search.highlightedThreadID)) return;
      state.search.highlightedThreadID = results[0]?.id || null;
    }

    function moveSearchHighlight(delta) {
      const results = filteredSearchResults();
      if (!results.length) {
        state.search.highlightedThreadID = null;
        return;
      }
      const currentIndex = Math.max(0, results.findIndex(item => item.id === state.search.highlightedThreadID));
      const nextIndex = (currentIndex + delta + results.length) % results.length;
      state.search.highlightedThreadID = results[nextIndex].id;
    }

    function selectSearchHighlight() {
      ensureSearchHighlight(state.search.highlightedThreadID);
      const threadID = state.search.highlightedThreadID;
      if (!threadID) return;
      selectThread(threadID);
      state.search.isOpen = false;
      state.search.highlightedThreadID = null;
      render();
    }

    function searchResultsHTML() {
      const results = filteredSearchResults();
      if (!results.length) {
        return '<p data-testid="search-empty">No matching chats</p>';
      }
      return results.map(item => `
        <button class="search-result hit-target-row ${item.id === state.search.highlightedThreadID ? 'selected' : ''}" type="button" data-hit-target-kind="row" data-hit-target-action="press" data-hit-target-source="explicit" data-testid="search-result" data-thread-id="${escapeHTML(item.id)}" data-highlighted="${item.id === state.search.highlightedThreadID ? 'true' : 'false'}">
          <span>${escapeHTML(item.title)}</span>
          <small>${escapeHTML(item.subtitle)}${item.isPinned ? ' · pinned' : ''}${item.isArchived ? ' · archived' : ''}</small>
        </button>`).join('');
    }

    function bindSearchResultHandlers(root = document) {
      root.querySelectorAll('[data-testid="search-result"]').forEach(button => {
        button.addEventListener('click', event => {
          selectThread(event.currentTarget.getAttribute('data-thread-id'));
          state.search.isOpen = false;
          state.search.highlightedThreadID = null;
          render();
        });
      });
    }

    function refreshSearchResults() {
      const resultsContainer = document.querySelector('[data-testid="search-results"]');
      if (!resultsContainer) return;
      resultsContainer.innerHTML = searchResultsHTML();
      bindSearchResultHandlers(resultsContainer);
    }

    function moveCommandPaletteSelection(delta) {
      const enabled = commandPaletteResults().filter(command => command.isEnabled);
      if (!enabled.length) {
        state.commandPalette.selectedCommandID = null;
        return;
      }
      const currentIndex = Math.max(0, enabled.findIndex(command => command.id === state.commandPalette.selectedCommandID));
      const nextIndex = (currentIndex + delta + enabled.length) % enabled.length;
      state.commandPalette.selectedCommandID = enabled[nextIndex].id;
    }

    function selectCommandPaletteSelection() {
      const enabled = commandPaletteResults().filter(command => command.isEnabled);
      const command = enabled.find(candidate => candidate.id === state.commandPalette.selectedCommandID) || enabled[0];
      if (command) runCommand(command.id);
    }

    function handleCommandPaletteKeydown(event) {
      if (!state.commandPalette.isOpen) return false;
      if (event.key === 'Escape') {
        event.preventDefault();
        state.commandPalette.isOpen = false;
        render();
        return true;
      }
      if (event.key === 'ArrowDown') {
        event.preventDefault();
        moveCommandPaletteSelection(1);
        render();
        return true;
      }
      if (event.key === 'ArrowUp') {
        event.preventDefault();
        moveCommandPaletteSelection(-1);
        render();
        return true;
      }
      if (event.key === 'Enter') {
        event.preventDefault();
        selectCommandPaletteSelection();
        return true;
      }
      return false;
    }

    function handleModalEscape(event) {
      if (event.key !== 'Escape') return false;
      if (state.settings.isOpen) {
        event.preventDefault();
        state.settings.isOpen = false;
        render();
        return true;
      }
      if (state.search.isOpen) {
        event.preventDefault();
        state.search.isOpen = false;
        state.search.highlightedThreadID = null;
        render();
        return true;
      }
      return false;
    }

    function estimatedContextTokens() {
      const messageChars = state.transcript.messages
        .reduce((total, message) => total + message.text.length + 24, 0);
      const cardChars = state.transcript.toolCards
        .reduce((total, card) => total + (card.subtitle || '').length + (card.inputJSON || '').length + (card.outputJSON || '').length, 0);
      return Math.max(1, Math.floor((messageChars + cardChars) / 4));
    }

    function contextBanner() {
      if (!state.transcript.messages.length) return null;
      const usedPercent = Math.min(100, Math.round((estimatedContextTokens() / contextTokenBudget) * 100));
      if (usedPercent < contextWarningThresholdPercent) return null;
      return {
        usedPercent,
        title: `${usedPercent >= 100 ? 'Context limit reached' : 'Approaching context limit'} (${usedPercent}% used)`,
        subtitle: 'Older turns may drop out soon. Compact the thread, start fresh, or fork with latest, summarized, or full visible context.',
        progress: state.contextSummaryProgress
      };
    }

    function renderContextBanner(banner) {
      if (!banner) return '';
      const contextDisabled = banner.progress ? ' disabled' : '';
      const compactTitle = banner.progress?.activeCommandID === 'compact-context' ? 'Compacting...' : 'Compact context';
      const progress = banner.progress ? `
          <div class="context-banner-progress" data-testid="context-banner-progress" data-active-command-id="${escapeHTML(banner.progress.activeCommandID)}">
            <span data-testid="context-banner-progress-status">${escapeHTML(banner.progress.statusLabel)}</span>
            <strong data-testid="context-banner-progress-title">${escapeHTML(banner.progress.title)}</strong>
            <p data-testid="context-banner-progress-detail">${escapeHTML(banner.progress.detail)}</p>
          </div>` : '';
      return `
        <section class="context-banner" data-testid="context-banner" aria-label="Context limit warning">
          <header>
            <strong data-testid="context-banner-title">${escapeHTML(banner.title)}</strong>
            <span data-testid="context-banner-percent">${escapeHTML(banner.usedPercent)}%</span>
          </header>
          <p data-testid="context-banner-subtitle">${escapeHTML(banner.subtitle)}</p>
          ${progress}
          <div>
            <button type="button" class="hit-target-text" data-testid="context-compact" data-command-id="compact-context"${contextDisabled}>${escapeHTML(compactTitle)}</button>
            <button type="button" class="hit-target-text" data-testid="context-new-thread" data-command-id="new-chat">New thread</button>
            <button type="button" class="hit-target-text" data-testid="context-fork-last" data-command-id="fork-from-last"${contextDisabled}>Fork from last</button>
            <button type="button" class="hit-target-text" data-testid="context-fork-summary" data-command-id="fork-with-summary"${contextDisabled}>Fork summary</button>
            <button type="button" class="hit-target-text" data-testid="context-fork-full" data-command-id="fork-full-context"${contextDisabled}>Fork full</button>
          </div>
        </section>`;
    }

    function renderRuntimeIssue(issue, options = {}) {
      if (!issue) return '';
      const severity = issue.severity || 'warning';
      const diagnostics = options.showDiagnostics && (issue.diagnostics || []).length ? `
        <dl class="runtime-diagnostics" data-testid="runtime-diagnostics">
          ${issue.diagnostics.map(diagnostic => `
            <div data-testid="runtime-diagnostic">
              <dt data-testid="runtime-diagnostic-label">${escapeHTML(diagnostic.label)}</dt>
              <dd data-testid="runtime-diagnostic-value">${escapeHTML(diagnostic.value)}</dd>
            </div>`).join('')}
        </dl>` : '';
      return `
        <section class="runtime-issue ${escapeHTML(severity)}" data-testid="runtime-issue" data-severity="${escapeHTML(severity)}" aria-label="Runtime issue">
          <header>
            <strong data-testid="runtime-issue-title">${escapeHTML(issue.title)}</strong>
            <span data-testid="runtime-issue-severity">${escapeHTML(severity)}</span>
          </header>
          <p data-testid="runtime-issue-message">${escapeHTML(issue.message)}</p>
          ${issue.actionLabel ? `<button type="button" class="hit-target-text" data-testid="runtime-issue-action">${escapeHTML(issue.actionLabel)}</button>` : ''}
          ${diagnostics}
        </section>`;
    }

    function captureTranscriptScroll() {
      const timeline = document.querySelector('[data-testid="timeline"]');
      const documentElement = document.documentElement;
      const maxWindowScrollY = Math.max(0, documentElement.scrollHeight - window.innerHeight);
      const windowDistanceFromBottom = maxWindowScrollY - window.scrollY;
      if (!timeline) {
        return {
          windowScrollY: window.scrollY,
          wasWindowPinnedToBottom: windowDistanceFromBottom <= 24
        };
      }
      const maxTimelineScrollTop = Math.max(0, timeline.scrollHeight - timeline.clientHeight);
      const timelineDistanceFromBottom = maxTimelineScrollTop - timeline.scrollTop;
      return {
        windowScrollY: window.scrollY,
        wasWindowPinnedToBottom: windowDistanceFromBottom <= 24,
        timelineScrollTop: timeline.scrollTop,
        wasTimelinePinnedToBottom: timelineDistanceFromBottom <= 24
      };
    }

    function restoreTranscriptScroll(snapshot) {
      if (!snapshot) return;
      const documentElement = document.documentElement;
      if (snapshot.wasWindowPinnedToBottom) {
        window.scrollTo(0, documentElement.scrollHeight);
      } else {
        const maxWindowScrollY = Math.max(0, documentElement.scrollHeight - window.innerHeight);
        window.scrollTo(0, Math.min(snapshot.windowScrollY || 0, maxWindowScrollY));
      }
      const timeline = document.querySelector('[data-testid="timeline"]');
      if (!timeline) return;
      if (snapshot.wasTimelinePinnedToBottom) {
        timeline.scrollTop = timeline.scrollHeight;
        return;
      }
      const maxScrollTop = Math.max(0, timeline.scrollHeight - timeline.clientHeight);
      timeline.scrollTop = Math.min(snapshot.timelineScrollTop || 0, maxScrollTop);
    }

    const pullRequestReviewActionLabels = {
      approve: 'Approve',
      comment: 'Comment',
      request_changes: 'Request changes'
    };

    function pullRequestReviewActionBodyPlaceholder(action) {
      if (action === 'comment') return 'Review comment';
      if (action === 'request_changes') return 'Explain the changes needed';
      return 'Optional approval note';
    }

    function pullRequestReviewActionSubmitTitle(action) {
      if (action === 'comment') return 'Submit comment';
      if (action === 'request_changes') return 'Request changes';
      return 'Submit approval';
    }

    function pullRequestReviewDraftCanSubmit(action, body) {
      const draft = state.review.reviewDraft;
      const hasRequiredBody = action === 'approve' || (body || '').trim().length > 0;
      return hasRequiredBody && !pullRequestReviewDraftHasInvalidSelectedInlineComments(draft);
    }

    function pullRequestReviewDraftSubtitle(action) {
      return `Submit ${pullRequestReviewActionLabels[action].toLowerCase()} review through GitHub CLI`;
    }

    function selectedPullRequestReviewDraftInlineComments(draft) {
      if (!draft || draft.includeInlineComments === false) return [];
      return (draft.inlineComments || []).filter(comment => comment.isIncluded !== false);
    }

    function pullRequestReviewDraftHasInvalidSelectedInlineComments(draft) {
      return selectedPullRequestReviewDraftInlineComments(draft)
        .some(comment => !(comment.body || '').trim());
    }

    function pullRequestReviewDraftSubtitleForDraft(draft) {
      if (!draft) return 'Latest git diff';
      const action = draft.action || 'approve';
      const inlineCommentCount = (draft.inlineComments || []).length;
      if (!inlineCommentCount) return pullRequestReviewDraftSubtitle(action);
      const selectedCount = selectedPullRequestReviewDraftInlineComments(draft).length;
      if (!selectedCount) {
        return `Submit ${pullRequestReviewActionLabels[action].toLowerCase()} review without inline notes`;
      }
      if (selectedCount === inlineCommentCount) {
        return `Submit ${pullRequestReviewActionLabels[action].toLowerCase()} review with ${selectedCount} inline note${selectedCount === 1 ? '' : 's'}`;
      }
      return `Submit ${pullRequestReviewActionLabels[action].toLowerCase()} review with ${selectedCount} of ${inlineCommentCount} inline notes`;
    }

    function pullRequestReviewDraftSubmitSummary(draft) {
      const action = draft?.action || 'approve';
      const target = (draft?.selector || '').trim() ? `PR ${(draft.selector || '').trim()}` : 'current pull request';
      const inlineCommentCount = (draft?.inlineComments || []).length;
      const selectedInlineCount = selectedPullRequestReviewDraftInlineComments(draft).length;
      const skippedInlineCount = Math.max(0, inlineCommentCount - selectedInlineCount);
      const invalidInlineCount = selectedPullRequestReviewDraftInlineComments(draft)
        .filter(comment => !(comment.body || '').trim()).length;
      const bodyIsReady = !!(draft?.body || '').trim();
      const bodyItem = bodyIsReady
        ? 'Body: ready'
        : (action === 'approve' ? 'Body: optional' : 'Body: required');
      const inlineItem = inlineCommentCount === 0
        ? 'Inline notes: none'
        : (draft?.includeInlineComments === false
          ? `Inline notes: skipped ${inlineCommentCount}`
          : `Inline notes: ${selectedInlineCount} selected${skippedInlineCount ? `, ${skippedInlineCount} skipped` : ''}${invalidInlineCount ? `, ${invalidInlineCount} missing text` : ''}`);
      const canSubmit = pullRequestReviewDraftCanSubmit(action, draft?.body || '');
      const items = [
        `Action: ${pullRequestReviewActionLabels[action]}`,
        `Target: ${target}`,
        bodyItem,
        inlineItem
      ];
      if (invalidInlineCount) {
        items.push(`${invalidInlineCount} selected inline note${invalidInlineCount === 1 ? '' : 's'} ${invalidInlineCount === 1 ? 'needs' : 'need'} text`);
      }
      return {
        status: canSubmit ? 'ready' : 'blocked',
        title: canSubmit ? 'Ready to submit' : 'Needs attention',
        detail: canSubmit
          ? `${pullRequestReviewActionLabels[action]} review for ${target}`
          : 'Resolve required fields before submitting',
        items
      };
    }

    function collectPullRequestReviewDraftInlineComments() {
      return state.review.files.flatMap(file => (file.hunks || [])
        .flatMap(hunk => (hunk.lines || [])
          .flatMap(line => (line.comments || []).map(comment => {
            const startLine = comment.endLineNumber && comment.endLineNumber !== comment.lineNumber
              ? Math.min(comment.lineNumber, comment.endLineNumber)
              : null;
            const lineNumber = comment.endLineNumber
              ? Math.max(comment.lineNumber, comment.endLineNumber)
              : comment.lineNumber;
            return {
              id: comment.id || crypto.randomUUID(),
              path: comment.path || file.path,
              line: lineNumber,
              startLine,
              side: comment.lineKind === 'deletion' || line.kind === 'deletion' ? 'LEFT' : 'RIGHT',
              body: comment.text || '',
              isIncluded: true
            };
          }))));
    }

    function renderPullRequestReviewDraft(draft) {
      if (!draft) return '';
      const action = draft.action || 'approve';
      const actions = ['approve', 'comment', 'request_changes'];
      const inlineComments = draft.inlineComments || [];
      const inlineCommentCount = inlineComments.length;
      const selectedInlineCommentCount = selectedPullRequestReviewDraftInlineComments(draft).length;
      const inlineCommentCountLabel = selectedInlineCommentCount === inlineCommentCount
        ? `${inlineCommentCount} inline review note${inlineCommentCount === 1 ? '' : 's'}`
        : `${selectedInlineCommentCount} of ${inlineCommentCount} inline review notes`;
      const submitSummary = pullRequestReviewDraftSubmitSummary(draft);
      const inlineCommentPreview = inlineCommentCount ? `
        <label class="pr-review-inline-comments hit-target-row">
          <input type="checkbox" class="hit-target-adjustable" data-testid="pr-review-draft-include-inline-comments" aria-label="Include inline review notes" ${draft.includeInlineComments === false ? '' : 'checked'}>
          <span>Include ${inlineCommentCountLabel}</span>
        </label>
        <ul class="pr-review-inline-comment-list" data-testid="pr-review-draft-inline-comments">
          ${inlineComments.map((comment, index) => {
            const location = comment.startLine && comment.startLine !== comment.line
              ? `${comment.path}:${comment.startLine}-${comment.line}`
              : `${comment.path}:${comment.line}`;
            const isIncluded = comment.isIncluded !== false;
            const disabled = draft.includeInlineComments === false ? 'disabled' : '';
            const moveUpDisabled = draft.includeInlineComments === false || index <= 0 ? 'disabled' : '';
            const moveDownDisabled = draft.includeInlineComments === false || index >= inlineComments.length - 1 ? 'disabled' : '';
            const hasWarning = draft.includeInlineComments !== false && isIncluded && !(comment.body || '').trim();
            return `
            <li data-testid="pr-review-draft-inline-comment">
              <label class="hit-target-row">
                <input type="checkbox" class="hit-target-adjustable" data-testid="pr-review-draft-inline-comment-toggle" data-comment-id="${escapeHTML(comment.id || '')}" aria-label="Include inline note at ${escapeHTML(location)}" ${isIncluded ? 'checked' : ''} ${disabled}>
                <span>${isIncluded ? 'Included' : 'Skipped'}</span>
              </label>
              <span class="pr-review-inline-comment-order">
                <button type="button" class="review-action-button hit-target-icon" data-testid="pr-review-draft-inline-comment-move-up" data-comment-id="${escapeHTML(comment.id || '')}" aria-label="Move inline note at ${escapeHTML(location)} up" ${moveUpDisabled}>^</button>
                <button type="button" class="review-action-button hit-target-icon" data-testid="pr-review-draft-inline-comment-move-down" data-comment-id="${escapeHTML(comment.id || '')}" aria-label="Move inline note at ${escapeHTML(location)} down" ${moveDownDisabled}>v</button>
              </span>
              <code>${escapeHTML(location)}</code>
              <textarea class="hit-target-text-entry" data-testid="pr-review-draft-inline-comment-body" data-comment-id="${escapeHTML(comment.id || '')}" aria-label="Inline note text at ${escapeHTML(location)}">${escapeHTML(comment.body || '')}</textarea>
              <small data-testid="pr-review-draft-inline-comment-warning" ${hasWarning ? '' : 'hidden'}>Add note text or skip this note.</small>
            </li>`;
          }).join('')}
        </ul>` : '';
      return `
        <form class="pr-review-draft" data-testid="pr-review-draft" aria-label="Submit pull request review">
          <label>
            Action
            <select class="hit-target-text-entry" data-testid="pr-review-draft-action" aria-label="Pull request review action">
              ${actions.map(candidate => `<option value="${escapeHTML(candidate)}" ${candidate === action ? 'selected' : ''}>${escapeHTML(pullRequestReviewActionLabels[candidate])}</option>`).join('')}
            </select>
          </label>
          <label>
            Pull request
            <input class="hit-target-text-entry" data-testid="pr-review-draft-selector" aria-label="Pull request selector" placeholder="PR number, URL, or branch" value="${escapeHTML(draft.selector || '')}">
          </label>
          <label>
            Body
            <textarea class="hit-target-text-entry" data-testid="pr-review-draft-body" aria-label="Pull request review body" placeholder="${escapeHTML(pullRequestReviewActionBodyPlaceholder(action))}">${escapeHTML(draft.body || '')}</textarea>
          </label>
          ${inlineCommentPreview}
          <section class="pr-review-draft-summary" data-testid="pr-review-draft-summary" data-status="${escapeHTML(submitSummary.status)}" aria-label="Pull request review submit summary">
            <strong data-testid="pr-review-draft-summary-title">${escapeHTML(submitSummary.title)}</strong>
            <p data-testid="pr-review-draft-summary-detail">${escapeHTML(submitSummary.detail)}</p>
            <ul>
              ${submitSummary.items.map(item => `<li data-testid="pr-review-draft-summary-item">${escapeHTML(item)}</li>`).join('')}
            </ul>

    function filterModelCategories(query) {
      const terms = query.trim().toLowerCase().split(/\s+/).filter(Boolean);
      if (!terms.length) return state.topBar.modelCategories;
      const includesFavoriteTerm = terms.includes('favorite') || terms.includes('favorites');
      const includesRecentTerm = terms.includes('recent');
      return state.topBar.modelCategories
        .filter(category => !includesFavoriteTerm || category.category === 'Favorites')
        .filter(category => !includesRecentTerm || category.category === 'Recent')
        .filter(category => category.category !== 'Favorites' || includesFavoriteTerm)
        .filter(category => category.category !== 'Recent' || includesRecentTerm)
        .map(category => ({
          ...category,
          models: category.models.filter(model => {
            const haystack = [
              category.category,
              model.id,
              model.provider,
              model.displayName,
              model.category || category.category,
              model.detailTitle || `${model.provider}/${model.displayName}`,
              modelCapabilitySummary(model, category.category),
              modelMetadataSummary(model, category.category),
              modelMetadataDetails(model, category.category).join(' '),
              modelMetadataRows(model, category.category).map(row => `${row.label}: ${row.value}`).join(' '),
              (model.badges || []).join(' ')
            ].join(' ').toLowerCase();
            return terms.every(term => haystack.includes(term));
          })
        }))
        .filter(category => category.models.length > 0);
    }

    function modelEmptyCopy(query) {
      const normalizedQuery = String(query || '').trim();
      const queryLabel = normalizedQuery ? `"${normalizedQuery}"` : 'that query';
      const source = state.topBar.modelCatalogSource || 'bundled';
      const footnote = state.topBar.modelCatalogStatusDetail || '';
      if (source === 'bundled') {
        return {
          title: 'No bundled model matches',
          detail: `The built-in catalog is intentionally small. Sign in or refresh TrustedRouter to search live provider models for ${queryLabel}.`,
          footnote
        };
      }
      if (source === 'fallbackAfterFailure') {
        return {
          title: 'No fallback model matches',
          detail: `The last TrustedRouter refresh failed, so QuillCode is searching the bundled fallback catalog for ${queryLabel}.`,
          footnote
        };
      }
      return {
        title: 'No TrustedRouter model matches',
        detail: 'Try a provider, category, model name, capability, or state.',
        footnote
      };
    }

    function filteredModels() {
      return filterModelCategories(state.topBar.modelSearch).flatMap(category => category.models);
    }

    function ensureHighlightedModel(preferredID) {
      const models = filteredModels();
      if (preferredID && models.some(model => model.id === preferredID)) {
        state.topBar.highlightedModelID = preferredID;
        return;
      }
      if (state.topBar.highlightedModelID && models.some(model => model.id === state.topBar.highlightedModelID)) {
        return;
      }
      state.topBar.highlightedModelID = models[0]?.id || null;
    }

    function moveHighlightedModel(delta) {
      const models = filteredModels();
      if (!models.length) {
        state.topBar.highlightedModelID = null;
        render();
        document.querySelector('[data-testid="model-search"]')?.focus();
        return;
      }
      const currentIndex = Math.max(0, models.findIndex(model => model.id === state.topBar.highlightedModelID));
      const nextIndex = (currentIndex + delta + models.length) % models.length;
      state.topBar.highlightedModelID = models[nextIndex].id;
      render();
      document.querySelector('[data-testid="model-search"]')?.focus();
    }

    function selectHighlightedModel() {
      ensureHighlightedModel(state.topBar.highlightedModelID);
      if (state.topBar.highlightedModelID) {
        selectModel(state.topBar.highlightedModelID);
      }
    }

    function selectModel(selectedID) {
      const allModels = state.topBar.modelCategories.flatMap(category => category.models);
      const selected = allModels.find(model => model.id === selectedID);
      if (!selected) return false;
      state.topBar.selectedModelID = selected.id;
      state.topBar.modelLabel = modelDisplayLabel(selected);
      state.topBar.modelPickerOpen = false;
      state.topBar.modelSearch = '';
      state.topBar.expandedModelID = null;
      state.topBar.highlightedModelID = null;
      state.topBar.modelCategories = state.topBar.modelCategories.map(category => ({
        ...category,
        models: category.models.map(model => {
          const selectedMatch = model.id === selected.id;
          const withoutCurrent = (model.badges || []).filter(badge => badge !== 'Current');
          return {
            ...model,
            isSelected: selectedMatch,
            badges: selectedMatch ? ['Current', ...withoutCurrent] : withoutCurrent
          };
        })
      }));
      render();
      return true;
    }

    function cycleMode() {
      const modes = ['Auto', 'Plan', 'Review', 'Read-only'];
      const currentIndex = modes.indexOf(state.topBar.modeLabel);
      setModeLabel(modes[(currentIndex + 1) % modes.length]);
      render();
    }

    function setModeLabel(nextMode) {
      state.topBar.modeLabel = nextMode;
      const selectedProject = state.projects.items.find(project => project.id === state.projects.selectedProjectID);
      state.topBar.subtitle = `${selectedProject?.name || 'No project'} - ${state.topBar.modeLabel} - ${state.topBar.modelLabel}`;
    }

    function modeTone(modeLabel) {
      const normalized = String(modeLabel || '').toLowerCase();
      if (normalized === 'review') return 'review';
      if (normalized === 'read-only') return 'read-only';
      if (normalized === 'plan') return 'plan';
      return 'auto';
    }

      if (model.id === 'trustedrouter/fast') return 'Nike 1.0';
      if (model.id === 'trustedrouter/zeus') return 'Zeus 1.0';
      if (model.id === 'trustedrouter/fusion') return 'Prometheus 1.0';
      if (model.id === 'trustedrouter/socrates') return 'Socrates 1.0';
      if (model.id === 'trustedrouter/aristotle') return 'Aristotle 1.0';
      if (model.id === 'trustedrouter/plato') return 'Plato 1.0';
      if (model.provider === 'trustedrouter') return model.id;
      return `${model.provider}/${model.displayName}`;
    }

        'zeus-1.0': 'trustedrouter/zeus',

        'tr/zeus': 'trustedrouter/zeus',

    function preferredDisplayModelID(modelID) {
      const canonical = canonicalModelID(modelID);
      if (canonical === 'trustedrouter/zeus') return '/zeus';
      if (canonical === 'trustedrouter/fusion') return '/prometheus';
      if (canonical === 'trustedrouter/socrates') return '/socrates';
      if (canonical === 'trustedrouter/aristotle') return '/aristotle';
      if (canonical === 'trustedrouter/plato') return '/plato';
      return canonical;
    }

    function statusModelLabel(modelID) {
      const canonical = canonicalModelID(modelID);
      if (canonical === 'trustedrouter/fast') return `Nike 1.0 (${preferredDisplayModelID(canonical)})`;
      if (canonical === 'trustedrouter/zeus') return `Zeus 1.0 (${preferredDisplayModelID(canonical)})`;
      if (canonical === 'trustedrouter/fusion') return `Prometheus 1.0 (${preferredDisplayModelID(canonical)})`;
      if (canonical === 'trustedrouter/socrates') return `Socrates 1.0 (${preferredDisplayModelID(canonical)})`;
      if (canonical === 'trustedrouter/aristotle') return `Aristotle 1.0 (${preferredDisplayModelID(canonical)})`;
      if (canonical === 'trustedrouter/plato') return `Plato 1.0 (${preferredDisplayModelID(canonical)})`;
      return canonical;
    }

    function workspaceStatusText() {
      const selectedProject = state.projects.items.find(project => project.id === state.projects.selectedProjectID);
      const selectedThread = state.sidebar.items.find(item => item.id === state.sidebar.selectedThreadID);
      return [
        `Project: ${selectedProject?.name || 'No project'}`,
        `Thread: ${selectedThread?.title || state.topBar.primaryTitle || 'New chat'}`,
        `Instructions: ${state.topBar.instructionLabel}`,
        `Memories: ${state.topBar.memoryLabel}`,
        `Goal: ${threadGoalStatusLabel(selectedThread?.goal)}`,
        `Mode: ${state.topBar.modeLabel}`,
        `Model: ${statusModelLabel(state.topBar.selectedModelID)}`,
        `Agent: ${state.topBar.agentStatus}`
      ].join('\n');
    }

    function threadGoalStatusLabel(goal) {
      if (!goal) return 'No durable goal';
      const status = goal.status === 'blocked'
        ? 'Blocked'
        : goal.status === 'completed' ? 'Completed' : 'Active';
      return `${status} - ${goal.objective}`;
    }

    function threadGoalSurface(goal) {
      if (!goal) return null;
      const label = goal.status === 'blocked'
        ? 'Goal blocked'
        : goal.status === 'completed' ? 'Goal complete' : 'Goal';
      const blocker = goal.blocker ? ` Blocker: ${goal.blocker}.` : '';
      return {
        label,
        tone: goal.status,
        detail: `Goal: ${goal.objective}. Status: ${goal.status}.${blocker}`
      };
    }

    function setSelectedThreadGoal(goal) {
      ensureThread(state.topBar.primaryTitle === 'QuillCode' ? 'Goal' : state.topBar.primaryTitle);
      state.sidebar.items = state.sidebar.items.map(item => (
        item.id === state.sidebar.selectedThreadID ? { ...item, goal } : item
      ));
      state.topBar.goal = threadGoalSurface(goal);
      touchSelectedThread();
    }

    function runGoalCommand(text) {
      const usage = 'Try /goal objective, /goal status, /goal complete, /goal block reason, /goal resume, or /goal clear.';
      const argument = text.replace(/^\/goal\b/i, '').trim();
      const selected = selectedThread();
      const current = selected?.goal || null;
      const [rawAction = '', ...rest] = argument.split(/\s+/);
      const action = rawAction.toLowerCase();
      const remainder = rest.join(' ').trim();

      if (!argument || ['status', 'show'].includes(action)) {
        addMessage('assistant', current
          ? `Goal: ${current.objective}\nStatus: ${current.status === 'blocked' ? 'Blocked' : current.status === 'completed' ? 'Completed' : 'Active'}${current.blocker ? `\nBlocker: ${current.blocker}` : ''}`
          : 'No durable goal is attached to this chat. Start one with `/goal objective`.');
        return;
      }
      if (['set', 'start', 'new'].includes(action) && !remainder) {
        addMessage('assistant', usage);
        return;
      }
      if (['block', 'blocked', 'pause'].includes(action) && !remainder) {
        addMessage('assistant', usage);
        return;
      }
      if (['complete', 'completed', 'done', 'finish', 'resume', 'continue', 'unblock', 'clear', 'remove', 'delete'].includes(action) && remainder) {
        addMessage('assistant', usage);
        return;
      }

      if (['complete', 'completed', 'done', 'finish'].includes(action)) {
        if (!current) {
          addMessage('assistant', 'No durable goal is attached to this chat. Start one with `/goal objective`.');
          return;
        }
        const goal = { ...current, status: 'completed', blocker: null };
        setSelectedThreadGoal(goal);
        addMessage('assistant', `Goal completed: ${goal.objective}`);
        return;
      }
      if (['block', 'blocked', 'pause'].includes(action)) {
        if (!current) {
          addMessage('assistant', 'No durable goal is attached to this chat. Start one with `/goal objective`.');
          return;
        }
        const goal = { ...current, status: 'blocked', blocker: remainder };
        setSelectedThreadGoal(goal);
        addMessage('assistant', `Goal blocked: ${goal.objective}\nBlocker: ${goal.blocker}`);
        return;
      }
      if (['resume', 'continue', 'unblock'].includes(action)) {
        if (!current) {
          addMessage('assistant', 'No durable goal is attached to this chat. Start one with `/goal objective`.');
          return;
        }
        const goal = { ...current, status: 'active', blocker: null };
        setSelectedThreadGoal(goal);
        addMessage('assistant', `Goal resumed: ${goal.objective}`);
        return;
      }
      if (['clear', 'remove', 'delete'].includes(action)) {
        if (!current) {
          addMessage('assistant', 'No durable goal is attached to this chat. Start one with `/goal objective`.');
          return;
        }
        setSelectedThreadGoal(null);
        addMessage('assistant', "Cleared this chat's durable goal.");
        return;
      }

      const objective = ['set', 'start', 'new'].includes(action) ? remainder : argument;
      const goal = { objective, status: 'active', blocker: null };
      setSelectedThreadGoal(goal);
      addMessage('assistant', `Goal started: ${goal.objective}`);
    }

    function modelBadgeClass(badge) {
      const normalized = String(badge || '').toLowerCase();
      if (normalized === 'current') return 'current';
      if (normalized === 'favorite') return 'favorite';
      return '';
    }

    function toggleModelFavorite(modelID) {
      const models = state.topBar.modelCategories.flatMap(category => category.models);
      const isFavorite = models.some(model => model.id === modelID && model.isFavorite);
      state.topBar.modelCategories = state.topBar.modelCategories
        .filter(category => category.category !== 'Favorites')
        .map(category => ({
          ...category,
          models: category.models.map(model => model.id === modelID
            ? setModelFavorite(model, !isFavorite)
            : model)
        }));
      syncFavoriteModels();
      render();
    }

    function syncFavoriteModels() {
      const favoriteModels = [];
      const seen = new Set();
      state.topBar.modelCategories
        .filter(category => category.category !== 'Favorites')
        .flatMap(category => category.models)
        .forEach(model => {
          if (!model.isFavorite || seen.has(model.id)) return;
          seen.add(model.id);
          favoriteModels.push(setModelFavorite(model, true));
        });
      if (favoriteModels.length) {
        state.topBar.modelCategories.unshift({
          category: 'Favorites',
          models: favoriteModels
        });
      }
    }

    function setModelFavorite(model, isFavorite) {
      const badges = isFavorite
        ? uniqueBadges(['Favorite', ...(model.badges || [])])
        : (model.badges || []).filter(badge => badge !== 'Favorite');
      return {
        ...model,
        isFavorite,
        badges
      };
    }

    function modelMetadataSummary(model, categoryName) {
      if (model.metadataSummary) return model.metadataSummary;
      if (model.id === 'trustedrouter/fast') return 'Fast everyday agent';
      if (model.id === 'trustedrouter/zeus') return 'Deep research agent';
      if (model.id === 'trustedrouter/fusion') return 'Freedom, OSS, deep research';
      if (model.id === 'trustedrouter/socrates') return 'Coding agent';
      if (model.id === 'trustedrouter/aristotle') return 'Smart general agent';
      if (model.id === 'trustedrouter/plato') return 'Freedom, OSS coding agent';
      const category = model.category || categoryName || 'Models';
      if (category === 'Safety') return 'Auto safety reviewer';
      return `${category} model`;
    }

    function modelCapabilitySummary(model, categoryName) {
      if (model.capabilitySummary) return model.capabilitySummary;
      if (model.id === 'trustedrouter/fast') return 'Nike 1.0 is the fast default for everyday coding, shell, and file-editing turns.';
      if (model.id === 'trustedrouter/zeus') return 'Zeus 1.0 is built for deep research turns that need broad synthesis.';
      if (model.id === 'trustedrouter/fusion') return 'Prometheus 1.0 is the freedom-oriented OSS deep research model.';
      if (model.id === 'trustedrouter/socrates') return 'Socrates 1.0 is the coding-agent model for implementation-heavy work.';
      if (model.id === 'trustedrouter/aristotle') return 'Aristotle 1.0 is the smart general model for harder reasoning turns.';
      if (model.id === 'trustedrouter/plato') return 'Plato 1.0 is the freedom-oriented OSS coding-agent model.';
      if ((model.badges || []).includes('Recommended')) return 'Recommended model profile available through TrustedRouter.';
      const category = model.category || categoryName || 'Models';
      if (category === 'Safety') return 'Lightweight reviewer model for Auto safety decisions.';
      return `${category} model available through TrustedRouter.`;
    }

    function modelMetadataRows(model, categoryName) {
      if (Array.isArray(model.metadataRows) && model.metadataRows.length) {
        return model.metadataRows;
      }
      const category = model.category || categoryName || 'Models';
      const badges = model.badges || [];
      const stateLabels = [
        model.isSelected || model.id === state.topBar.selectedModelID ? 'Current' : null,
        badges.includes('Default') ? 'Default' : null,
        badges.includes('Recommended') ? 'Recommended' : null,
        model.isFavorite || badges.includes('Favorite') ? 'Favorite' : null,
        badges.includes('Recent') ? 'Recent' : null
      ].filter(Boolean);
      return [
        { label: 'Provider', value: model.provider },
        { label: 'Model ID', value: model.id },
        { label: 'Category', value: category },
        { label: 'State', value: stateLabels.length ? uniqueStrings(stateLabels).join(', ') : 'Available' }
      ];
    }

    function modelMetadataDetails(model, categoryName) {
      if (Array.isArray(model.metadataDetails) && model.metadataDetails.length) {
        return model.metadataDetails;
      }
      const category = model.category || categoryName || 'Models';
      const details = [
        `Provider: ${model.provider}`,
        `Model ID: ${model.id}`,
        `Category: ${category}`
      ];
      if (model.isSelected || model.id === state.topBar.selectedModelID) {
        details.push('Current selection');
      }
      if (model.isFavorite) {
        details.push('Favorite');
      }
      (model.badges || []).forEach(badge => {
        if (badge === 'Default') details.push('Default model');
        else if (badge === 'Recommended') details.push('Recommended by QuillCode');
        else if (badge === 'Recent') details.push('Recently used');
        else if (badge !== 'Current' && badge !== 'Favorite') details.push(badge);
      });
      return uniqueStrings(details);
    }

    function uniqueStrings(values) {
      const seen = new Set();
      return values.filter(value => {
        if (seen.has(value)) return false;
        seen.add(value);
        return true;
      });
    }

    function uniqueBadges(badges) {
      const seen = new Set();
      return badges.filter(badge => {
        if (seen.has(badge)) return false;
        seen.add(badge);
        return true;
      });
    }

            : `<button class="hit-target-text" type="button" data-testid="computer-use-permission-open" data-command-id="${requirement.command.id}" ${requirement.command.isEnabled ? '' : 'disabled'}>Open</button>`}
        </div>`;
    }

    function renderComputerUseApprovalSettingsCard() {
      return `
        <section class="permission-card" data-testid="computer-use-approval-settings">
          <header>
            <div>
              <h3>Approved Apps</h3>

    function renderComputerUseForegroundApprovalRow() {
      const application = state.settings.computerUseForegroundApplication;
      const target = computerUseForegroundApprovalTarget();
      if (!application || !target) {
        return `<p class="permission-footnote" data-testid="computer-use-current-app">No foreground app detected yet. Focus an app, then refresh Computer Use status.</p>`;
      }
      const alreadyApproved = hasComputerUseForegroundApproval();
      return `
        <div class="permission-row" data-testid="computer-use-current-app">
          <div>
            <strong>${escapeHTML(application.name || application.bundleIdentifier || 'Unknown application')}</strong>

    function computerUseForegroundApprovalTarget() {
      const application = state.settings.computerUseForegroundApplication;
      if (!application) return null;
      if (application.bundleIdentifier) {
        return {
          key: application.bundleIdentifier,
          kind: 'bundle',
          label: `Will save bundle ID: ${application.bundleIdentifier}`
        };
      }
      if (application.name) {
        return {
          key: application.name,
          kind: 'name',
          label: `Will save app name: ${application.name}`
        };
      }
      return null;
    }

    function hasComputerUseForegroundApproval() {
      const target = computerUseForegroundApprovalTarget();
      if (!target) return false;
      const values = target.kind === 'bundle'
        ? state.settings.computerUseApprovedBundleIdentifiers
        : state.settings.computerUseApprovedAppNames;
      return values.some(value => value.toLocaleLowerCase() === target.key.toLocaleLowerCase());
    }

    function normalizedApprovalValues(text) {
      const seen = new Set();
      return text
        .replaceAll(',', '\n')
        .split('\n')
        .map(value => value.trim())
        .filter(value => {
          const key = value.toLocaleLowerCase();
          if (!value || seen.has(key)) return false;
          seen.add(key);
          return true;
        });
    }

    function hasComputerUseApprovals() {
      return state.settings.computerUseApprovedBundleIdentifiers.length
        + state.settings.computerUseApprovedAppNames.length > 0;
    }

    function computerUseApprovalStatusLabel() {
      const count = state.settings.computerUseApprovedBundleIdentifiers.length
        + state.settings.computerUseApprovedAppNames.length;
      return count === 0 ? 'Unrestricted' : `${count} approved`;
    }

    function computerUseApprovalSummary() {
      const bundleCount = state.settings.computerUseApprovedBundleIdentifiers.length;
      const appNameCount = state.settings.computerUseApprovedAppNames.length;
      if (bundleCount + appNameCount === 0) {
        return 'Computer Use may operate whichever app is in front. Add approvals to restrict control to named apps.';
      }
      const bundlePart = bundleCount === 1 ? '1 bundle ID' : `${bundleCount} bundle IDs`;
      const appPart = appNameCount === 1 ? '1 app name' : `${appNameCount} app names`;
      return `Computer Use is restricted to ${bundlePart} and ${appPart}.`;
    }

    function computerUseStatusLabel() {
      if (state.settings.computerUseStatusLabel) return state.settings.computerUseStatusLabel;
      const status = state.settings.computerUseStatus;
      if (status.available) return 'Ready';
      if (!status.screenRecordingGranted && !status.accessibilityGranted) return 'Setup needed';
      if (!status.screenRecordingGranted) return 'Screen Recording needed';
      return 'Accessibility needed';
    }

    function computerUseSetupSummary() {
      if (state.settings.computerUseSetupSummary) return state.settings.computerUseSetupSummary;
      return state.settings.computerUseStatus.available
        ? 'Ready for screenshots, clicks, typing, scrolling, and keyboard shortcuts.'
        : 'Computer Use needs macOS privacy permissions before QuillCode can inspect or control the desktop.';
    }

    function computerUseNextAction() {
      if (state.settings.computerUseNextAction) return state.settings.computerUseNextAction;
      const status = state.settings.computerUseStatus;
      if (status.available) return 'Computer Use is enabled. Ask QuillCode to inspect the screen or operate an app.';
      if (!status.screenRecordingGranted && !status.accessibilityGranted) return 'Open Screen Recording first, enable QuillCode, then open Accessibility.';
      if (!status.screenRecordingGranted) return 'Open Screen Recording, enable QuillCode, then refresh status.';
      return 'Open Accessibility, enable QuillCode, then refresh status.';
    }

    function computerUseRequirements() {
      if (Array.isArray(state.settings.computerUseRequirements) && state.settings.computerUseRequirements.length) {
        return state.settings.computerUseRequirements;
      }
      const status = state.settings.computerUseStatus;
      return [
        {
          id: 'screen-recording',
          title: 'Screen Recording',
          detail: 'Required for screenshots and visual inspection.',
          statusLabel: status.screenRecordingGranted ? 'Granted' : 'Required',
          isGranted: status.screenRecordingGranted,
          command: state.settings.computerUseScreenRecordingCommand
        },
        {
          id: 'accessibility',
          title: 'Accessibility',
          detail: 'Required for clicks, typing, scrolling, cursor moves, and keyboard shortcuts.',
          statusLabel: status.accessibilityGranted ? 'Granted' : 'Required',
          isGranted: status.accessibilityGranted,
          command: state.settings.computerUseAccessibilityCommand
        }
      ];
    }

    function renderSearchPanel() {
      return `
        <div class="search-panel" data-testid="search-panel">
          <section class="search-card" role="dialog" aria-label="Search chats">
            <header>

    // Morning-triage return digest card (issue #877). Mirrors WorkspaceHTMLRenderer.attentionDigestHTML.
    function renderAttentionDigest() {
      const digest = attentionDigest();
      if (!digest) return '';
      const badge = digest.badgeLabel
        ? `<span data-testid="attention-digest-verdict" data-verdict="${escapeHTML(digest.verdict || '')}">${escapeHTML(digest.badgeLabel)}</span>`
        : '';
      const summary = digest.verdictSummary
        ? `<p data-testid="attention-digest-summary">${escapeHTML(digest.verdictSummary)}</p>`
        : '';
      const seam = digest.unseenSeamLabel

        : '';

        ? `<ul data-testid="attention-digest-reasons">${digest.reasons.map(reason => `<li>${escapeHTML(reason)}</li>`).join('')}</ul>`
        : '';
      return `
        <div class="attention-digest-backdrop" data-testid="attention-digest" data-thread-id="${escapeHTML(digest.threadID)}">

              <strong data-testid="attention-digest-title">${escapeHTML(digest.title)}</strong>

            </div>
            ${summary}
            ${seam}
            <div data-testid="attention-digest-outcome">${escapeHTML(digest.outcome)}</div>
            ${reasons}
            <div class="attention-digest-actions">
              <button type="button" class="hit-target-text" data-testid="attention-digest-acknowledge" data-command-id="attention-acknowledge">Acknowledge</button>
              <button type="button" class="hit-target-text" data-testid="attention-digest-dismiss" data-command-id="attention-dismiss">Dismiss</button>
            </div>

    }

    function renderSidebarSavedSearchDialog() {
      const dialog = state.sidebar.savedSearchDialog || {};
      if (!dialog.isOpen) return '';
      const query = String(dialog.query || '');
      const title = String(dialog.title || '');
      return `
        <div class="search-panel" data-testid="sidebar-saved-search-panel">
          <form class="search-card" data-testid="sidebar-saved-search-form" role="dialog" aria-label="Save sidebar search">
            <header>
              <div>
                <h2>Save Sidebar Search</h2>
                <p>Create a reusable sidebar filter for chats matching this query.</p>
              </div>

            </header>
            <label>
              <span>Query</span>
              <input
                class="hit-target-text-entry"
                data-testid="sidebar-saved-search-query"
                aria-label="Sidebar saved search query"

              <span>Name</span>

                class="hit-target-text-entry"

            <footer class="dialog-actions">

            </footer>

    function transcriptFindMatches() {
      const query = state.find.query.trim().toLowerCase();
      if (!query) return [];
      return transcriptTimelineItems().filter(item =>
        transcriptTimelineSearchText(item).toLowerCase().includes(query)
      ).map(item => ({
        id: item.id,
        label: item.kind === 'message' ? item.message?.role || 'Message' : item.toolCard?.title || 'Tool'
      }));
    }

    function transcriptTimelineItems() {
      if (state.transcript.timelineItems.length) return state.transcript.timelineItems;
      return [
        ...state.transcript.messages.map(message => ({ id: message.id || `message-${message.text}`, kind: 'message', message })),
        ...state.transcript.toolCards.map(card => ({ id: card.id, kind: 'toolCard', toolCard: card }))
      ];
    }

    // "Last diff" classifier for transcriptNavigationAnchors(). A "diff" turn is one whose tool
    // rewrote tracked file CONTENT in the working tree (doc: "most recent file write/patch") — NOT
    // any non-read side effect. This set MUST stay identical to Swift
    // WorkspaceTurnRevertPlanner.workingTreeDiffToolNames; WorkspaceTurnRevertDiffToolParityTests
    // enumerates every tool id and fails CI if the two sides diverge (so this cross-language mirror
    // cannot silently rot). Deliberately EXCLUDES repo/remote ops that leave working-tree bytes
    // unchanged: most host.git.pr.* (PR metadata), host.git.push (already-committed history),
    // host.git.commit / stage / stage_hunk (record/stage existing content), host.git.worktree.*
    // (not a content diff), host.shell.run (opaque). host.git.pr.checkout is the exception — it
    // switches the working tree to the PR head branch and rewrites differing files on disk. We
    // never infer a diff from file/path artifacts (reads emit those too).
    const DIFF_PRODUCING_TOOL_NAMES = new Set([
      'host.apply_patch',
      'host.git.revert_turn',   // dynamic tool (no static definition); reverse-applies a patch
      'host.file.write',
      'host.git.restore',
      'host.git.restore_hunk',
      'host.git.pr.checkout'    // switches branch → rewrites files on disk
    ]);
    function isDiffProducingToolName(rawTitle) {
      const name = String(rawTitle || '').trim();
      // Fully-qualified match only (tool card titles are the raw host.* ids); also accept a
      // de-prefixed display title by re-qualifying it.
      const qualified = name.startsWith('host.') ? name : `host.${name}`;
      return DIFF_PRODUCING_TOOL_NAMES.has(qualified);
    }
    function isDiffCard(card) {
      return isDiffProducingToolName(card.title);
    }
    function transcriptNavigationAnchors() {
      let lastError = null;
      let lastDiff = null;
      for (const item of transcriptTimelineItems()) {
        if (item.kind !== 'toolCard' || !item.toolCard) continue;
        if (item.toolCard.status === 'failed') lastError = item.id;
        if (isDiffCard(item.toolCard)) lastDiff = item.id;
      }
      return { lastErrorAnchorID: lastError, lastDiffAnchorID: lastDiff };
    }

    // Mirrors Swift TranscriptNewTurnsResolver.resolve: how many items follow the per-thread
    // last-seen watermark, and the first unseen id. null when nothing is new (never viewed,
    // caught up, or a stale marker no longer in the timeline — never a negative count).
    function transcriptNewTurnsPill() {
      const lastSeenID = threadLastSeenItemID();
      if (!lastSeenID) return null;
      const items = transcriptTimelineItems();
      const seenIndex = items.findIndex(item => item.id === lastSeenID);
      if (seenIndex < 0) return null;
      const unseen = items.slice(seenIndex + 1);
      if (!unseen.length) return null;
      return {
        count: unseen.length,
        firstUnseenItemID: unseen[0].id,
        label: unseen.length === 1 ? '1 new turn' : `${unseen.length} new turns`
      };
    }
    function threadLastSeenItemID() {
      const threadID = state.sidebar.selectedThreadID;
      if (!threadID) return null;
      return state.transcriptLastSeen[threadID] || null;
    }
    function markTranscriptSeen() {
      const threadID = state.sidebar.selectedThreadID;
      if (!threadID) return;
      const items = transcriptTimelineItems();
      if (!items.length) return;
      state.transcriptLastSeen[threadID] = items[items.length - 1].id;
    }

    // ---- Morning-triage inbox (issue #877) ----
    // These mirror QuillCodeCore's AttentionModel / TriageVerdict / ThreadTriageRecord EXACTLY. A sidebar
    // thread item carries: integrityVerdict ('red'|'unverified'|'verified'|null — the persisted Run
    // Integrity stamp), triageState ('pending'|'acknowledged'|'dismissed', default pending), and
    // unseenCount (>= 0). Keep this in lockstep with MorningTriage.swift; the parity gate test scans both.
    const triageSeverity = { red: 2, unverified: 1, verified: 0 };
    const triageBadgeLabel = { red: 'RED', unverified: 'UNVERIFIED', verified: 'VERIFIED' };
    function verdictNeedsAttention(verdict) {
      return verdict === 'red' || verdict === 'unverified';
    }
    // Build the ranked attention rows from the sidebar items (mirrors AttentionModel.build + rank):
    // include a thread iff it has an attention-worthy verdict AND its triage state is pending; sort by
    // severity desc, then updatedAt desc, then threadID asc (total, deterministic).
    // Unseen-turn count derived from the persisted watermark (mirrors ThreadReturnWatermarkRecord.
    // unseenCount): turns after the last-seen turn, never negative.
    function attentionUnseenCount(item) {
      const turns = Math.max(0, item.attentionMessageTurns || 0);
      const lastSeen = item.attentionLastSeenTurn;
      if (turns === 0 || lastSeen === null || lastSeen === undefined) return 0;
      return Math.max(0, turns - 1 - lastSeen);
    }
    // Advance a thread's return watermark to its tail — mirrors persistOutgoingReturnWatermark, run when
    // the user LEAVES a thread (an actual open/read), never on cursor preview.
    function attentionMarkThreadSeen(threadID) {
      const item = state.sidebar.items.find(entry => entry.id === threadID);
      if (!item || !item.attentionMessageTurns) return;
      item.attentionLastSeenTurn = item.attentionMessageTurns - 1;
    }
    function attentionRows() {
      return state.sidebar.items
        .filter(item => verdictNeedsAttention(item.integrityVerdict) && (item.triageState || 'pending') === 'pending')
        .map(item => {
          const unseen = attentionUnseenCount(item);
          return {
            threadID: item.id,
            title: item.title,
            verdict: item.integrityVerdict,
            badgeLabel: triageBadgeLabel[item.integrityVerdict],
            summary: item.verdictSummary || '',
            unseenCount: unseen,
            unseenLabel: unseen > 0 ? `${unseen} new` : null,
            updatedAt: item.updatedAt || ''
          };
        })
        .sort((lhs, rhs) => {
          if (triageSeverity[lhs.verdict] !== triageSeverity[rhs.verdict]) {
            return triageSeverity[rhs.verdict] - triageSeverity[lhs.verdict];
          }
          if (lhs.updatedAt !== rhs.updatedAt) {
            return lhs.updatedAt < rhs.updatedAt ? 1 : -1;
          }
          return lhs.threadID < rhs.threadID ? -1 : (lhs.threadID > rhs.threadID ? 1 : 0);
        });
    }
    // The cursor thread id: the open digest thread if any, else the dedicated PREVIEW cursor
    // (attentionCursorID), clamped to an actual attention row (falling back to the first row). It is NOT
    // the workspace's selected thread — mirrors native, so moving the cursor never advances a watermark.
    function attentionSelectedThreadID() {
      const rows = attentionRows();
      if (!rows.length) return null;
      const preferred = state.attentionDigestThreadID || state.attentionCursorID;
      return rows.some(row => row.threadID === preferred) ? preferred : rows[0].threadID;
    }
    function attentionSelectRelative(delta) {
      const rows = attentionRows();
      if (!rows.length) return;
      const current = attentionSelectedThreadID();
      const index = Math.max(0, rows.findIndex(row => row.threadID === current));
      const clamped = Math.min(rows.length - 1, Math.max(0, index + delta));
      // Move the PREVIEW cursor only — do NOT selectThread (which would advance the outgoing thread's
      // watermark and zero its unseen badge). Opening (Enter/click) is the only path that reads a thread.
      state.attentionCursorID = rows[clamped].threadID;
      render();
    }
    function attentionMoveDown() { attentionSelectRelative(1); }
    function attentionMoveUp() { attentionSelectRelative(-1); }
    function attentionOpenSelected() {
      const threadID = attentionSelectedThreadID();
      if (!threadID) return;
      openAttentionDigest(threadID);
    }
    function openAttentionDigest(threadID) {
      if (!state.sidebar.items.some(item => item.id === threadID)) return;
      // A genuine open: park the preview cursor here and select the thread. selectThread persists the
      // OUTGOING thread's watermark (the one being left), never this incoming one — so the opened thread
      // keeps its unseen badge until the user later leaves it.
      state.attentionCursorID = threadID;
      selectThread(threadID);
      state.attentionDigestThreadID = threadID;
      render();
    }
    function closeAttentionDigest() {
      state.attentionDigestThreadID = null;
      render();
    }
    function attentionTriageSelected(triageState) {
      const rows = attentionRows();
      const threadID = attentionSelectedThreadID();
      if (!threadID || !rows.length) return;
      const item = state.sidebar.items.find(entry => entry.id === threadID);
      if (item) item.triageState = triageState;
      if (state.attentionDigestThreadID === threadID) state.attentionDigestThreadID = null;
      // Advance the PREVIEW cursor to whatever slid into place (or the first remaining row) — cursor only,
      // no selectThread, so the passed-over threads keep their unseen badges.
      const remaining = attentionRows();
      state.attentionCursorID = remaining.length ? remaining[0].threadID : null;
      render();
    }
    function attentionAcknowledgeSelected() { attentionTriageSelected('acknowledged'); }
    function attentionDismissSelected() { attentionTriageSelected('dismissed'); }
    // The return digest for the open thread (mirrors TriageDigest.build): verdict + reasons + outcome +
    // unseen seam. Reasons are seeded per-thread in the harness; native re-scans the transcript.
    function attentionDigest() {
      const threadID = state.attentionDigestThreadID;
      if (!threadID) return null;
      const item = state.sidebar.items.find(entry => entry.id === threadID);
      if (!item) return null;
      const verdict = verdictNeedsAttention(item.integrityVerdict) || item.integrityVerdict === 'verified'
        ? item.integrityVerdict : null;
      const unseen = attentionUnseenCount(item);
      const seamLabel = unseen === 0 ? null : (unseen === 1 ? '1 unseen turn' : `${unseen} unseen turns`);
      return {
        threadID,
        title: item.title,
        verdict,
        badgeLabel: verdict ? triageBadgeLabel[verdict] : null,
        verdictSummary: item.verdictSummary || '',
        reasons: item.digestReasons || [],
        outcome: item.digestOutcome || 'No final answer recorded.',
        unseenCount: unseen,
        unseenSeamLabel: seamLabel
      };
    }

    // Scroll a timeline item (by its data-timeline-id) into view and briefly mark it as the jump
    // target so the affordance's effect is observable in tests and to the eye.
    function scrollTimelineItemIntoView(timelineID) {
      const element = document.querySelector(`[data-timeline-id="${cssAttrEscape(timelineID)}"]`);
      if (!element) return;
      element.scrollIntoView({ block: 'center', behavior: 'auto' });
      document.querySelectorAll('[data-jump-target="true"]').forEach(node => node.removeAttribute('data-jump-target'));
      element.setAttribute('data-jump-target', 'true');
    }
    function cssAttrEscape(value) {
      return String(value).replace(/["\\]/g, '\\$&');
    }

    function copyTranscriptItem(timelineID) {
      const item = transcriptTimelineItems().find(entry => entry.id === timelineID);
      const text = item ? transcriptCopyText(item) : '';
      if (!text.trim()) return;
      navigator.clipboard?.writeText(text).catch(() => {});
      state.copiedTranscriptItemID = timelineID;
      render();
      setTimeout(() => {
        if (state.copiedTranscriptItemID === timelineID) {
          state.copiedTranscriptItemID = null;
          render();
        }
      }, 1500);
    }

    function transcriptCopyText(item) {
      if (item.kind === 'message') {
        return item.message?.text || '';
      }
      const card = item.toolCard || {};
      // Mirrors TranscriptItemTextFormatter (Swift): trim before the truthiness check so a
      // whitespace-only output/input is skipped, and trim each title/subtitle field.
      const nonBlank = value => (value && value.trim()) ? value : null;
      return nonBlank(card.outputJSON)
        || nonBlank(card.inputJSON)
        || [card.title, card.subtitle].map(value => (value || '').trim()).filter(Boolean).join('\n');
    }

    // Mirrors TranscriptMarkdownExporter (Swift): walk the timeline in order, `## Role`
    // + body per user/assistant message, `### title` + fenced block per tool run; reuse
    // transcriptCopyText for tool-card text so export matches the per-item copy.
    function transcriptConversationRoleHeading(role) {
      return { user: 'User', assistant: 'Assistant' }[role] || null;
    }

    // A backtick fence one longer than the longest backtick run in the body, so a tool
    // output containing ``` can never close the block early (matches Swift codeFence).
    function conversationCodeFence(body) {
      let longestRun = 0;
      let currentRun = 0;
      for (const character of String(body)) {
        if (character === '`') {
          currentRun += 1;
          if (currentRun > longestRun) longestRun = currentRun;
        } else {
          currentRun = 0;
        }
      }
      return '`'.repeat(Math.max(3, longestRun + 1));
    }

    function transcriptMarkdown() {
      const blocks = [];
      for (const item of transcriptTimelineItems()) {
        if (item.kind === 'message') {
          const heading = transcriptConversationRoleHeading(item.message?.role);
          if (!heading) continue;
          const body = (item.message?.text || '').trim();
          if (!body) continue;
          blocks.push(`## ${heading}\n\n${body}`);
        } else if (item.kind === 'toolCard') {
          const title = item.toolCard?.title || '';
          const text = transcriptCopyText(item);
          const fence = conversationCodeFence(text);
          blocks.push(`### ${title}\n\n${fence}\n${text}\n${fence}`);
        }
      }
      return blocks.join('\n\n');
    }

    function copyConversation() {
      const markdown = transcriptMarkdown();
      if (!markdown.trim()) return;
      navigator.clipboard?.writeText(markdown).catch(() => {});
      // Exposed for the Playwright parity test to assert byte-identical Markdown.
      window.__lastConversationMarkdown = markdown;
      state.copiedTranscriptItemID = 'conversation';
      render();
      setTimeout(() => {
        if (state.copiedTranscriptItemID === 'conversation') {
          state.copiedTranscriptItemID = null;
          render();
        }
      }, 1500);
    }

    function conversationExportFileName() {
      const allowed = /[A-Za-z0-9 ._-]/;
      const stem = Array.from(state.topBar.primaryTitle || '')
        .map(character => allowed.test(character) ? character : '-')
        .join('')
        .replace(/\s+/g, ' ')
        .replace(/-{2,}/g, '-')
        .replace(/^[ ._-]+|[ ._-]+$/g, '') || 'Conversation';
      return stem.endsWith('.md') ? stem : `${stem}.md`;
    }

    function exportConversationMarkdown() {
      const markdown = transcriptMarkdown();
      if (!markdown.trim()) return;
      window.__lastConversationMarkdownExport = {
        fileName: conversationExportFileName(),
        markdown
      };
      state.copiedTranscriptItemID = 'conversation-export';
      render();
      setTimeout(() => {
        if (state.copiedTranscriptItemID === 'conversation-export') {

    // Mirrors TurnRevertCopy.scope (Swift) byte-for-byte so all three surfaces make the
    // same truthful claim about what the revert does and does not undo.
    function revertScopeCopy(hasNonApplyPatchEdits) {
      let text = "Reverses the file edits this turn applied, including files it created. It does not undo your own earlier edits, shell commands the turn ran, or git commits.";
      if (hasNonApplyPatchEdits) {
        text += " This turn also changed files outside apply_patch, which can't be reverted automatically.";
