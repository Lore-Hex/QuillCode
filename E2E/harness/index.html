<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>QuillCode Harness</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #071014;
      --panel: #121d23;
      --panel-2: #192930;
      --line: #2a414a;
      --text: #eef7fa;
      --muted: #9fb0b8;
      --blue: #41b8e8;
      --green: #52d273;
      --red: #ff5d52;
      --yellow: #f8b84e;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top left, rgba(65,184,232,.14), transparent 35%), var(--bg);
      color: var(--text);
    }
    .quillcode-workspace { min-height: 100vh; display: grid; grid-template-rows: auto 1fr; }
    .topbar {
      margin: 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      padding: 16px 18px;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 18px;
      background: color-mix(in srgb, var(--panel-2) 86%, transparent);
      box-shadow: 0 18px 60px rgba(0,0,0,.28);
    }
    .topbar strong { font-size: 20px; }
    .topbar p { margin: 3px 0 0; color: var(--muted); }
    .topbar-pills { display: flex; flex-wrap: wrap; justify-content: flex-end; gap: 8px; }
    .topbar-pills span,
    .topbar-pills select,
    .topbar-pills button {
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(65,184,232,.14);
      color: #b6eaff;
      border: 1px solid rgba(65,184,232,.22);
      font-size: 13px;
    }
    .topbar-pills select { max-width: 230px; }
    .topbar-pills button { font-weight: 600; }
    .settings-panel,
    .search-panel {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background: rgba(0,0,0,.45);
      z-index: 5;
    }
    .settings-card,
    .search-card {
      width: min(520px, 100%);
      display: grid;
      gap: 14px;
      padding: 20px;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 18px;
      background: var(--panel);
      box-shadow: 0 20px 80px rgba(0,0,0,.45);
    }
    .search-card { width: min(620px, 100%); }
    .settings-card h2, .settings-card p { margin: 0; }
    .search-card h2, .search-card p { margin: 0; }
    .settings-card label { display: grid; gap: 6px; color: var(--muted); font-size: 13px; }
    .search-card label { display: grid; gap: 6px; color: var(--muted); font-size: 13px; }
    .search-card header { display: flex; justify-content: space-between; gap: 16px; align-items: start; }
    .search-results { display: grid; gap: 8px; max-height: 340px; overflow: auto; }
    .search-result {
      width: 100%;
      padding: 12px;
      display: grid;
      gap: 4px;
      text-align: left;
      color: var(--text);
      border: 1px solid rgba(255,255,255,.1);
      background: rgba(255,255,255,.06);
    }
    .search-result.selected { border-color: rgba(65,184,232,.75); background: rgba(65,184,232,.12); }
    .search-result small { color: var(--muted); }
    .command-group-title { margin: 6px 0 2px; color: var(--muted); font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: .08em; }
    .settings-actions { display: flex; gap: 10px; justify-content: flex-end; }
    .workspace-grid { min-height: 0; display: grid; grid-template-columns: 280px 1fr; gap: 18px; padding: 0 18px 18px; }
    .sidebar, .transcript {
      min-height: 0;
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 18px;
      background: rgba(18,29,35,.84);
    }
    .sidebar { padding: 14px; overflow: auto; }
    .sidebar h2 { margin: 0 0 12px; color: var(--muted); font-size: 13px; text-transform: uppercase; letter-spacing: .08em; }
    .sidebar h3 { margin: 10px 0 8px; color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .08em; }
    .sidebar-section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .sidebar-icon-button {
      width: 26px;
      height: 26px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.12);
      color: var(--blue);
      background: rgba(65,184,232,.12);
      font-weight: 700;
    }
    .sidebar-actions {
      display: grid;
      gap: 8px;
      margin-bottom: 14px;
    }
    .sidebar-action {
      width: 100%;
      padding: 11px 12px;
      text-align: left;
      color: var(--text);
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.1);
    }
    .sidebar-item,
    .project-item {
      width: 100%;
      margin: 0 0 8px;
      padding: 11px 12px;
      display: grid;
      gap: 3px;
      text-align: left;
      color: var(--text);
      background: transparent;
      border: 1px solid transparent;
      border-radius: 12px;
    }
    .sidebar-item.selected,
    .project-item.selected { background: rgba(255,255,255,.08); border-color: rgba(255,255,255,.14); }
    .sidebar-item small,
    .project-item small { color: var(--muted); }
    .sidebar-thread-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 6px;
      align-items: start;
    }
    .sidebar-thread-actions {
      display: flex;
      gap: 4px;
    }
    .sidebar-thread-actions button {
      min-width: 30px;
      height: 30px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.12);
      color: var(--blue);
      background: rgba(65,184,232,.12);
      font-size: 12px;
      font-weight: 700;
    }
    .transcript { display: grid; grid-template-rows: 1fr auto; overflow: hidden; }
    .timeline { padding: 22px; overflow: auto; display: flex; flex-direction: column; gap: 14px; }
    .terminal-pane,
    .browser-pane {
      display: grid;
      gap: 10px;
      padding: 14px;
      border-top: 1px solid rgba(255,255,255,.1);
      background: rgba(18,29,35,.96);
    }
    .terminal-pane header,
    .browser-pane header,
    .terminal-entry header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .terminal-pane code,
    .terminal-entry code,
    .terminal-entry pre {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }
    .terminal-pane code { color: var(--muted); font-size: 12px; }
    .terminal-history { display: grid; gap: 8px; max-height: 180px; overflow: auto; }
    .terminal-entry {
      display: grid;
      gap: 6px;
      padding: 10px;
      border-radius: 10px;
      background: rgba(0,0,0,.26);
      border: 1px solid rgba(255,255,255,.08);
    }
    .terminal-entry pre { margin: 0; }
    .terminal-status.ok { color: var(--green); }
    .terminal-status.failed { color: var(--red); }
    .terminal-form { display: grid; grid-template-columns: auto 1fr auto; gap: 8px; align-items: center; }
    .browser-form,
    .browser-comment-form { display: grid; grid-template-columns: 1fr auto; gap: 8px; align-items: center; }
    .browser-preview,
    .browser-comment {
      display: grid;
      gap: 5px;
      padding: 10px;
      border-radius: 10px;
      background: rgba(0,0,0,.26);
      border: 1px solid rgba(255,255,255,.08);
    }
    .browser-comments { display: grid; gap: 8px; max-height: 120px; overflow: auto; }
    .browser-preview code,
    .browser-comment small {
      color: var(--muted);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 12px;
    }
    .message, .tool-card, .review-pane, .context-banner {
      max-width: min(760px, 88%);
      padding: 13px 15px;
      border-radius: 16px;
      line-height: 1.42;
    }
    .message.user { align-self: flex-end; background: linear-gradient(135deg, #45bdec, #d16c5f); }
    .message.assistant { align-self: flex-start; background: rgba(255,255,255,.1); }
    .tool-card {
      align-self: flex-start;
      width: min(760px, 92%);
      background: rgba(0,0,0,.22);
      border: 1px solid rgba(65,184,232,.25);
    }
    .tool-card.done { border-color: rgba(82,210,115,.34); }
    .tool-card.failed { border-color: rgba(255,93,82,.44); }
    .tool-card.review { border-color: rgba(248,184,78,.48); }
    .tool-card header { display: flex; justify-content: space-between; gap: 14px; }
    .review-pane {
      align-self: flex-start;
      width: min(760px, 92%);
      background: rgba(65,184,232,.08);
      border: 1px solid rgba(65,184,232,.26);
    }
    .context-banner {
      align-self: flex-start;
      width: min(760px, 92%);
      display: grid;
      gap: 9px;
      background: rgba(248,184,78,.10);
      border: 1px solid rgba(248,184,78,.32);
    }
    .context-banner header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
    }
    .context-banner p { margin: 0; color: var(--muted); }
    .context-banner span {
      padding: 4px 8px;
      border-radius: 999px;
      color: #ffe2a3;
      background: rgba(248,184,78,.14);
      font-size: 12px;
      font-weight: 700;
    }
    .context-banner div { display: flex; gap: 8px; flex-wrap: wrap; }
    .context-banner button {
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid rgba(248,184,78,.28);
      background: rgba(248,184,78,.14);
      color: #ffe2a3;
      font-size: 13px;
    }
    .review-pane header {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 10px;
    }
    .review-pane ul { list-style: none; padding: 0; margin: 0; display: grid; gap: 8px; }
    .review-pane li {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px 16px;
      color: var(--text);
    }
    .review-pane small { color: var(--muted); }
    .review-actions { display: flex; align-items: center; gap: 8px; }
    .review-hunks {
      grid-column: 1 / -1;
      display: grid;
      gap: 6px;
      margin: 6px 0 0 20px;
    }
    .review-hunk {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
    }
    .review-hunk code {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .review-actions button {
      padding: 5px 9px;
      border-radius: 999px;
      background: rgba(65,184,232,.12);
      color: #b6eaff;
      border: 1px solid rgba(65,184,232,.25);
      font-size: 12px;
    }
    .review-actions button[data-action="restore"] {
      background: rgba(248,184,78,.12);
      color: #ffe2a3;
      border-color: rgba(248,184,78,.28);
    }
    .review-comments {
      grid-column: 1 / -1;
      display: grid;
      gap: 6px;
      margin-left: 20px;
    }
    .review-comment {
      margin: 0;
      padding: 7px 9px;
      border-left: 2px solid rgba(65,184,232,.55);
      color: var(--text);
      background: rgba(0,0,0,.18);
      border-radius: 8px;
      font-size: 13px;
    }
    .review-comment-form {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      margin: 4px 0 0 20px;
    }
    .review-comment-form input {
      min-width: 0;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.18);
      color: var(--text);
      padding: 7px 10px;
    }
    .review-comment-form button {
      border-radius: 999px;
      border: 1px solid rgba(65,184,232,.28);
      background: rgba(65,184,232,.14);
      color: #b6eaff;
      padding: 7px 10px;
    }
    pre { overflow: auto; white-space: pre-wrap; background: rgba(0,0,0,.38); border-radius: 10px; padding: 10px; color: #dff8ff; }
    .empty { margin: auto; max-width: 560px; color: var(--muted); text-align: center; }
    .composer {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      padding: 14px;
      border-top: 1px solid rgba(255,255,255,.1);
      background: rgba(25,41,48,.78);
    }
    .composer label { position: absolute; width: 1px; height: 1px; clip: rect(0 0 0 0); overflow: hidden; }
    input {
      min-width: 0;
      padding: 13px 15px;
      border-radius: 13px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.18);
      color: white;
      font: inherit;
    }
    button {
      padding: 0 18px;
      border: 0;
      border-radius: 13px;
      background: var(--blue);
      color: #041018;
      font-weight: 700;
      font: inherit;
    }
    button:disabled { opacity: .45; }
    @media (max-width: 760px) {
      .workspace-grid { grid-template-columns: 1fr; }
      .sidebar { display: none; }
      .topbar { align-items: flex-start; flex-direction: column; }
      .message, .tool-card { max-width: 100%; width: 100%; }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    const state = {
      topBar: {
        primaryTitle: 'QuillCode',
        subtitle: 'QuillCode - Not started',
        instructionLabel: '1 instruction file loaded',
        instructionSources: ['AGENTS.md'],
        modelLabel: 'trustedrouter/fusion',
        selectedModelID: 'trustedrouter/fusion',
        modelCategories: [
          {
            category: 'Recommended',
            models: [
              { id: 'trustedrouter/fusion', provider: 'trustedrouter', displayName: 'Fusion', isSelected: true }
            ]
          },
          {
            category: 'Safety',
            models: [
              { id: 'z-ai/glm-5.2', provider: 'z-ai', displayName: 'GLM 5.2', isSelected: false },
              { id: 'moonshotai/kimi-k2.6', provider: 'moonshotai', displayName: 'Kimi K2.6', isSelected: false }
            ]
          }
        ],
        modeLabel: 'Auto',
        agentStatus: 'Idle',
        computerUseLabel: 'Computer Use setup needed'
      },
      projects: {
        title: 'Projects',
        selectedProjectID: 'project-main',
        items: [
          {
            id: 'project-main',
            name: 'QuillCode',
            path: '/mock/QuillCode',
            isSelected: true
          }
        ]
      },
      sidebar: {
        title: 'Chats',
        selectedThreadID: null,
        items: []
      },
      transcript: {
        messages: [],
        toolCards: [],
        emptyTitle: 'Ask QuillCode to inspect, edit, or run this project.',
        emptySubtitle: 'Use Auto for normal coding work, Review for manual gates, or Read-only for exploration.'
      },
      review: {
        title: 'Review changes',
        subtitle: 'Latest git diff',
        files: [],
        totalInsertions: 0,
        totalDeletions: 0,
        totalHunks: 0
      },
      composer: {
        draft: '',
        placeholder: 'Message QuillCode',
        isSending: false,
        canSend: false
      },
      settings: {
        isOpen: false,
        apiBaseURL: 'https://api.quillrouter.com/v1',
        authMode: 'oauth',
        developerOverrideEnabled: false,
        hasStoredAPIKey: false,
        signInURL: 'http://localhost:3000/callback',
        apiKeyStatusLabel: 'Not signed in',
        loginStatusLabel: 'TrustedRouter login required',
        replacementAPIKey: ''
      },
      lastOpenedURL: null,
      search: {
        isOpen: false,
        query: ''
      },
      commandPalette: {
        isOpen: false,
        query: '',
        selectedCommandID: null
      },
      worktreeDialog: {
        mode: null,
        createPath: '',
        createBranch: '',
        createBase: '',
        removePath: '',
        removeForce: false
      },
      commands: [
        { id: 'new-chat', title: 'New chat', shortcut: 'Cmd+N', category: 'Thread', keywords: ['thread', 'conversation'], isEnabled: true },
        { id: 'fork-from-last', title: 'Fork from last', shortcut: '', category: 'Thread', keywords: ['thread', 'context', 'continue'], isEnabled: false },
        { id: 'search', title: 'Search', shortcut: 'Cmd+K', category: 'Navigation', keywords: ['find', 'threads', 'chat'], isEnabled: true },
        { id: 'add-project', title: 'Open project', shortcut: 'Cmd+O', category: 'Workspace', keywords: ['folder', 'workspace', 'repo'], isEnabled: true },
        { id: 'toggle-terminal', title: 'Terminal', shortcut: 'Ctrl+`', category: 'Workspace', keywords: ['shell', 'command', 'pty'], isEnabled: true },
        { id: 'toggle-browser', title: 'Browser', shortcut: 'Cmd+Shift+B', category: 'Workspace', keywords: ['preview', 'web', 'localhost'], isEnabled: true },
        { id: 'command-palette', title: 'Command palette', shortcut: 'Cmd+Shift+P', category: 'Navigation', keywords: ['commands', 'actions'], isEnabled: true },
        { id: 'git-pr-create', title: 'Create pull request', shortcut: '', category: 'Git', keywords: ['github', 'pr', 'review'], isEnabled: true },
        { id: 'git-worktree-list', title: 'List worktrees', shortcut: '', category: 'Git', keywords: ['branch', 'git', 'workspace'], isEnabled: true },
        { id: 'git-worktree-create', title: 'Create worktree', shortcut: '', category: 'Git', keywords: ['branch', 'git', 'workspace'], isEnabled: true },
        { id: 'git-worktree-remove', title: 'Remove worktree', shortcut: '', category: 'Git', keywords: ['branch', 'git', 'workspace', 'delete'], isEnabled: true },
        { id: 'local-env:.quillcode/actions/bootstrap.sh', title: 'Run Bootstrap', shortcut: '', category: 'Environment', keywords: ['local environment', 'script', 'bootstrap'], isEnabled: true },
        { id: 'stop-all', title: 'Stop all', shortcut: 'Esc', category: 'Control', keywords: ['cancel', 'abort', 'halt'], isEnabled: false },
        { id: 'settings', title: 'Settings', shortcut: 'Cmd+,', category: 'Navigation', keywords: ['preferences', 'trustedrouter', 'auth'], isEnabled: true },
        { id: 'computer-use-setup', title: 'Computer Use setup', shortcut: '', category: 'Computer Use', keywords: ['screen', 'accessibility', 'permissions'], isEnabled: true }
      ],
      terminal: {
        isVisible: false,
        draft: '',
        isRunning: false,
        cwdLabel: '/mock/QuillCode',
        entries: []
      },
      browser: {
        isVisible: false,
        addressDraft: '',
        currentURL: null,
        title: 'Browser preview',
        statusLabel: 'Ready',
        comments: []
      },
      nextProjectIndex: 2,
      nextThreadIndex: 1
    };

    function escapeHTML(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    const contextTokenBudget = 32000;
    const contextWarningThresholdPercent = 80;

    function updateDynamicCommands() {
      const hasMessages = Boolean(state.sidebar.selectedThreadID && state.transcript.messages.length);
      const hasActiveWork = state.composer.isSending || state.terminal.isRunning;
      state.commands = state.commands.map(command => (
        command.id === 'fork-from-last' ? { ...command, isEnabled: hasMessages } :
        command.id === 'stop-all' ? { ...command, isEnabled: hasActiveWork } :
        command
      ));
    }

    const commandCategoryOrder = ['Thread', 'Navigation', 'Workspace', 'Git', 'Environment', 'Control', 'Computer Use'];

    function normalizeCommandText(value) {
      return String(value || '').trim().toLowerCase();
    }

    function compactCommandText(value) {
      return normalizeCommandText(value).replace(/[\s+]/g, '');
    }

    function commandCategoryRank(category) {
      const index = commandCategoryOrder.indexOf(category || 'Workspace');
      return index === -1 ? commandCategoryOrder.length : index;
    }

    function commandScore(command, query) {
      if (!query) return 1;
      const title = normalizeCommandText(command.title);
      const compactTitle = compactCommandText(command.title);
      const shortcut = compactCommandText(command.shortcut);
      const id = normalizeCommandText(command.id.replaceAll('-', ' '));
      const category = normalizeCommandText(command.category || 'Workspace');
      const keywords = (command.keywords || []).map(normalizeCommandText);
      const compactQuery = compactCommandText(query);

      if (title === query || compactTitle === compactQuery) return 1000;
      if (title.startsWith(query) || compactTitle.startsWith(compactQuery)) return 900;
      if (title.split(/\s+/).some(part => part.startsWith(query))) return 820;
      if (shortcut && shortcut.includes(compactQuery)) return 780;
      if (keywords.some(keyword => keyword === query || keyword.startsWith(query))) return 720;
      if (title.includes(query) || compactTitle.includes(compactQuery)) return 650;
      if (id.includes(query) || keywords.some(keyword => keyword.includes(query))) return 560;
      if (category.includes(query)) return 440;
      return null;
    }

    function commandPaletteResults() {
      const query = normalizeCommandText(state.commandPalette.query);
      return state.commands
        .map((command, index) => ({ command, index, score: commandScore(command, query) }))
        .filter(entry => entry.score !== null)
        .sort((lhs, rhs) => {
          if (lhs.score !== rhs.score) return rhs.score - lhs.score;
          const lhsCategory = commandCategoryRank(lhs.command.category);
          const rhsCategory = commandCategoryRank(rhs.command.category);
          if (lhsCategory !== rhsCategory) return lhsCategory - rhsCategory;
          return lhs.index - rhs.index;
        })
        .map(entry => entry.command);
    }

    function commandPaletteGroups() {
      const groupsByCategory = new Map();
      for (const command of commandPaletteResults()) {
        const category = command.category || 'Workspace';
        if (!groupsByCategory.has(category)) groupsByCategory.set(category, []);
        groupsByCategory.get(category).push(command);
      }
      return [...groupsByCategory.entries()]
        .sort(([lhs], [rhs]) => {
          const lhsRank = commandCategoryRank(lhs);
          const rhsRank = commandCategoryRank(rhs);
          if (lhsRank !== rhsRank) return lhsRank - rhsRank;
          return lhs.localeCompare(rhs);
        })
        .map(([category, commands]) => ({ category, commands }));
    }

    function ensureCommandPaletteSelection() {
      const enabled = commandPaletteResults().filter(command => command.isEnabled);
      if (enabled.some(command => command.id === state.commandPalette.selectedCommandID)) return;
      state.commandPalette.selectedCommandID = enabled[0]?.id || null;
    }

    function openCommandPalette() {
      state.commandPalette.isOpen = true;
      state.commandPalette.query = '';
      ensureCommandPaletteSelection();
      render();
    }

    function moveCommandPaletteSelection(delta) {
      const enabled = commandPaletteResults().filter(command => command.isEnabled);
      if (!enabled.length) {
        state.commandPalette.selectedCommandID = null;
        return;
      }
      const currentIndex = Math.max(0, enabled.findIndex(command => command.id === state.commandPalette.selectedCommandID));
      const nextIndex = (currentIndex + delta + enabled.length) % enabled.length;
      state.commandPalette.selectedCommandID = enabled[nextIndex].id;
    }

    function selectCommandPaletteSelection() {
      const enabled = commandPaletteResults().filter(command => command.isEnabled);
      const command = enabled.find(candidate => candidate.id === state.commandPalette.selectedCommandID) || enabled[0];
      if (command) runCommand(command.id);
    }

    function handleCommandPaletteKeydown(event) {
      if (!state.commandPalette.isOpen) return false;
      if (event.key === 'Escape') {
        event.preventDefault();
        state.commandPalette.isOpen = false;
        render();
        return true;
      }
      if (event.key === 'ArrowDown') {
        event.preventDefault();
        moveCommandPaletteSelection(1);
        render();
        return true;
      }
      if (event.key === 'ArrowUp') {
        event.preventDefault();
        moveCommandPaletteSelection(-1);
        render();
        return true;
      }
      if (event.key === 'Enter') {
        event.preventDefault();
        selectCommandPaletteSelection();
        return true;
      }
      return false;
    }

    function estimatedContextTokens() {
      const messageChars = state.transcript.messages
        .reduce((total, message) => total + message.text.length + 24, 0);
      const cardChars = state.transcript.toolCards
        .reduce((total, card) => total + (card.subtitle || '').length + (card.inputJSON || '').length + (card.outputJSON || '').length, 0);
      return Math.max(1, Math.floor((messageChars + cardChars) / 4));
    }

    function contextBanner() {
      if (!state.transcript.messages.length) return null;
      const usedPercent = Math.min(100, Math.round((estimatedContextTokens() / contextTokenBudget) * 100));
      if (usedPercent < contextWarningThresholdPercent) return null;
      return {
        usedPercent,
        title: `${usedPercent >= 100 ? 'Context limit reached' : 'Approaching context limit'} (${usedPercent}% used)`,
        subtitle: 'Older turns may drop out soon. Start a new thread or fork from the latest useful context.'
      };
    }

          <div>
            <button type="button" data-testid="context-new-thread" data-command-id="new-chat">New thread</button>
            <button type="button" data-testid="context-fork-last" data-command-id="fork-from-last">Fork from last</button>
          </div>
        </section>`;
    }

	      document.querySelector('[data-testid="terminal-button"]').addEventListener('click', () => {

    function renderSearchPanel() {

        if (!query) return true;
        return item.title.toLowerCase().includes(query)
          || item.subtitle.toLowerCase().includes(query)
          || (item.searchText || '').toLowerCase().includes(query)
          || (item.isPinned ? 'pinned' : '').includes(query);
      });
      return `
        <div class="search-panel" data-testid="search-panel">
          <section class="search-card" role="dialog" aria-label="Search chats">

              <div>
                <h2>Search chats</h2>

              <button type="button" data-testid="search-close">Close</button>
            </header>
            <input data-testid="search-input" aria-label="Search chats" placeholder="Search chats" value="${escapeHTML(state.search.query)}" autofocus>

                <button class="search-result" type="button" data-testid="search-result" data-thread-id="${escapeHTML(item.id)}">

                </button>`).join('') : '<p data-testid="search-empty">No matching chats</p>'}
            </div>
          </section>
        </div>`;
    }

    function renderCommandPalette() {
      ensureCommandPaletteSelection();
      const groups = commandPaletteGroups();
      const hasResults = groups.some(group => group.commands.length);
      return `
        <div class="search-panel" data-testid="command-palette-panel">
          <section class="search-card" role="dialog" aria-label="Command palette">

              <div>
                <h2>Command palette</h2>

              <button type="button" data-testid="command-palette-close">Close</button>

              ${hasResults ? groups.map(group => `
                <div class="command-group" data-testid="command-palette-group">
                  <div class="command-group-title">${escapeHTML(group.category)}</div>
                  ${group.commands.map(command => `
                    <button class="search-result ${command.id === state.commandPalette.selectedCommandID ? 'selected' : ''}" type="button" data-testid="command-palette-result" data-command-id="${escapeHTML(command.id)}" data-selected="${command.id === state.commandPalette.selectedCommandID ? 'true' : 'false'}" ${command.isEnabled ? '' : 'disabled'}>
                      <span>${escapeHTML(command.title)}</span>
                      <small>${escapeHTML([command.shortcut, ...(command.keywords || []).slice(0, 3)].filter(Boolean).join(' · '))}</small>
                    </button>`).join('')}
                </div>`).join('') : '<p data-testid="command-palette-empty">No matching commands</p>'}

	    function renderTerminalPane() {

      return `
        <section class="terminal-pane" data-testid="terminal-pane">
          <header>
            <strong>Terminal</strong>

    function ensureThread(title) {
      if (!state.sidebar.selectedThreadID) {
        const threadID = `thread-${state.nextThreadIndex++}`;
        state.sidebar.selectedThreadID = threadID;
        state.sidebar.items = [{
          id: threadID,
          title,
          subtitle: state.topBar.modelLabel,
          searchText: '',
          isSelected: true,
          isPinned: false
        }, ...state.sidebar.items.map(item => ({ ...item, isSelected: false }))];
      }
      state.topBar.primaryTitle = title;
      const selectedProject = state.projects.items.find(project => project.id === state.projects.selectedProjectID);
      state.topBar.subtitle = `${selectedProject?.name || 'No project'} - ${state.topBar.modeLabel} - ${state.topBar.modelLabel}`;
    }

    function newChat() {
      state.sidebar.selectedThreadID = null;
      state.sidebar.items = state.sidebar.items.map(item => ({ ...item, isSelected: false }));
      state.transcript.messages = [];
      state.transcript.toolCards = [];
      state.review = {
        title: 'Review changes',
        subtitle: 'Latest git diff',
        totalInsertions: 0,
        totalDeletions: 0,
        totalHunks: 0,
        files: []
      };
      state.composer.draft = '';
      state.composer.canSend = false;
      state.topBar.primaryTitle = 'QuillCode';
      const selectedProject = state.projects.items.find(project => project.id === state.projects.selectedProjectID);
      state.topBar.subtitle = `${selectedProject?.name || 'No project'} - Not started`;
      render();
    }

    function forkFromLast() {
      if (!state.sidebar.selectedThreadID || !state.transcript.messages.length) return;
      const source = state.sidebar.items.find(item => item.id === state.sidebar.selectedThreadID);
      const title = `Fork: ${source?.title || 'Chat'}`;
      const latestUserIndex = state.transcript.messages
        .map((message, index) => ({ message, index }))
        .filter(entry => entry.message.role === 'user')
        .at(-1)?.index ?? Math.max(0, state.transcript.messages.length - 4);
      const copiedMessages = state.transcript.messages.slice(latestUserIndex, latestUserIndex + 4);
      const threadID = `thread-${state.nextThreadIndex++}`;

      state.sidebar.selectedThreadID = threadID;
      state.sidebar.items = [{
        id: threadID,
        title,
        subtitle: state.topBar.modelLabel,
        searchText: copiedMessages.map(message => message.text).join('\n'),
        isSelected: true,
        isPinned: false
      }, ...state.sidebar.items.map(item => ({ ...item, isSelected: false }))];
      state.transcript.messages = copiedMessages;
      state.transcript.toolCards = [];
      state.review = {
        title: 'Review changes',
        subtitle: 'Latest git diff',
        totalInsertions: 0,
        totalDeletions: 0,
        totalHunks: 0,
        files: []
      };
      state.topBar.primaryTitle = title;
      const selectedProject = state.projects.items.find(project => project.id === state.projects.selectedProjectID);
      state.topBar.subtitle = `${selectedProject?.name || 'No project'} - ${state.topBar.modeLabel} - ${state.topBar.modelLabel}`;
      render();
    }

    function addProject() {
      const index = state.nextProjectIndex++;
      const project = {
        id: `project-${index}`,
        name: `Example Project ${index}`,
        path: `/mock/example-${index}`,
        isSelected: true
      };
      state.projects.selectedProjectID = project.id;
      state.projects.items = [
        project,
        ...state.projects.items.map(item => ({ ...item, isSelected: false }))
      ];
      state.terminal.cwdLabel = project.path;
      state.topBar.subtitle = `${project.name} - ${state.topBar.modeLabel} - ${state.topBar.modelLabel}`;
      render();
    }

    function runCommand(commandID) {
      if (commandID === 'command-palette') {
        openCommandPalette();
        return;
      }
      state.commandPalette.isOpen = false;
      if (commandID === 'new-chat') {
        newChat();
        return;
      }
      if (commandID === 'fork-from-last') {
        forkFromLast();
        return;
      }
      if (commandID === 'search') {
        state.search.isOpen = true;
        state.search.query = '';
      }
      if (commandID === 'add-project') {
        addProject();
        return;
      }
      if (commandID === 'toggle-terminal') {
        state.terminal.isVisible = !state.terminal.isVisible;
      }
      if (commandID === 'toggle-browser') {
        state.browser.isVisible = !state.browser.isVisible;
      }
      if (commandID === 'git-pr-create') {
        state.composer.draft = 'Create a pull request titled ';
      }
      if (commandID === 'git-worktree-list') {
        listWorktrees();
        return;
      }
      if (commandID === 'git-worktree-create') {
        state.worktreeDialog = {
          ...state.worktreeDialog,
          mode: 'create',
          createPath: '',
          createBranch: '',
          createBase: ''
        };
      }
      if (commandID === 'git-worktree-remove') {
        state.worktreeDialog = {
          ...state.worktreeDialog,
          mode: 'remove',
          removePath: '',
          removeForce: false
        };
      }
      if (commandID.startsWith('local-env:')) {
        runLocalEnvironmentAction(commandID);
        return;
      }
      if (commandID === 'stop-all') {
        state.composer.isSending = false;
        state.terminal.isRunning = false;
        state.topBar.agentStatus = 'Stopped';
      }
      if (commandID === 'settings') {
        state.settings.isOpen = true;
        state.settings.replacementAPIKey = '';
      }
      render();
    }

    function runTerminalCommand() {
      const command = state.terminal.draft.trim();
      if (!command) return;
      state.terminal.draft = '';
      state.terminal.isVisible = true;
      const selectedProject = state.projects.items.find(project => project.id === state.projects.selectedProjectID);
      const cwd = selectedProject?.path || state.terminal.cwdLabel;
      const output = terminalOutput(command, cwd);
      state.terminal.entries.push({
        command,
        stdout: output.stdout,
        stderr: output.stderr,
        exitCode: output.exitCode,
        ok: output.exitCode === 0
      });
      render();
    }

	    function terminalOutput(command, cwd) {
      if (command === 'pwd') {
        return { stdout: cwd + '\n', stderr: '', exitCode: 0 };
      }
      if (command === 'whoami') {
        return { stdout: 'mock-user\n', stderr: '', exitCode: 0 };
      }
      if (command.startsWith('printf ')) {
        return { stdout: command.replace(/^printf\\s+/, ''), stderr: '', exitCode: 0 };
      }
      if (command === 'false') {
        return { stdout: '', stderr: '', exitCode: 1 };
      }
      return { stdout: 'ran: ' + command + '\n', stderr: '', exitCode: 0 };
	    }

	    function normalizeBrowserURL(raw) {
	      const value = raw.trim();
	      if (!value) return null;
	      if (/^(https?|file):\/\//i.test(value)) return value;
	      if (/^(localhost|127\\.0\\.0\\.1|\\[::1\\])/i.test(value)) return `http://${value}`;
	      if (value.includes('.')) return `https://${value}`;
	      return null;
	    }

	    function openBrowserPreview() {
	      const url = normalizeBrowserURL(state.browser.addressDraft);
	      state.browser.isVisible = true;
	      if (!url) {
	        state.browser.statusLabel = 'Invalid address';
	        render();
	        return;
	      }
	      state.browser.currentURL = url;
	      state.browser.addressDraft = url;
	      state.browser.title = new URL(url).hostname || url;
	      state.browser.statusLabel = 'Preview ready';
	      render();
	    }

	    function addBrowserComment(text) {
	      const comment = text.trim();
	      if (!comment || !state.browser.currentURL) return;
	      state.browser.comments.push({
	        id: `browser-comment-${state.browser.comments.length + 1}`,
	        url: state.browser.currentURL,
	        text: comment
	      });
	      state.browser.statusLabel = 'Comment added';
	      render();
	    }

	    function runLocalEnvironmentAction(commandID) {
      const relativePath = commandID.replace(/^local-env:/, '');
      const command = `sh '${relativePath.replaceAll("'", "'\\\\''")}'`;
      const output = `Local environment action completed: ${relativePath}\\n`;
      state.transcript.toolCards.push({
        title: 'host.shell.run',
        subtitle: 'Completed',
        status: 'done',
        inputJSON: JSON.stringify({ name: 'host.shell.run', argumentsJSON: JSON.stringify({ cmd: command }) }, null, 2),
        outputJSON: JSON.stringify({ ok: true, stdout: output, stderr: '', exitCode: 0 }, null, 2)
      });
      state.transcript.messages.push({ role: 'assistant', text: `Local environment action completed: ${relativePath}.` });
      render();
    }

    function renderWorktreeDialog() {
      if (state.worktreeDialog.mode === 'create') {
        return `
          <div class="search-panel" data-testid="worktree-create-panel">
            <form class="search-card" data-testid="worktree-create-form" role="dialog" aria-label="Create worktree">
              <header>

              </label>

              <button type="button" data-testid="worktree-dialog-close">Close</button>
            </header>
            <label>
              Worktree folder
              <input name="path" aria-label="Worktree folder" placeholder="quillcode-feature" value="${escapeHTML(state.worktreeDialog.removePath)}" autofocus>
            </label>
            <label>
              <span>
                <input type="checkbox" name="force" aria-label="Force removal" ${state.worktreeDialog.removeForce ? 'checked' : ''}>
                Force removal
              </span>
            </label>
            <div class="settings-actions">
              <button type="button" data-testid="worktree-dialog-cancel">Cancel</button>
              <button type="submit" data-testid="worktree-remove-submit" ${state.worktreeDialog.removePath.trim() ? '' : 'disabled'}>Remove</button>
            </div>

    function listWorktrees() {
      ensureThread('List worktrees');
      const stdout = [
        'worktree /mock/QuillCode',
        'HEAD abc1234',
        'branch refs/heads/main',
        '',
        'worktree /mock/QuillCode-feature',
        'HEAD def5678',
        'branch refs/heads/feature/quillcode'
      ].join('\\n') + '\\n';
      state.transcript.toolCards.push({
        title: 'host.git.worktree.list',
        subtitle: 'Completed',
        status: 'done',
        inputJSON: JSON.stringify({}, null, 2),
        outputJSON: JSON.stringify({ ok: true, stdout }, null, 2)
      });
      state.transcript.messages.push({ role: 'assistant', text: 'Output:\\n' + stdout });
      syncSelectedThreadSearchText();
      render();
    }

    function createWorktree(values) {
      ensureThread('Create worktree');
      const args = { path: values.path };
      if (values.branch) args.branch = values.branch;
      if (values.base) args.base = values.base;
      state.transcript.toolCards.push({
        title: 'host.git.worktree.create',
        subtitle: 'Completed',
        status: 'done',
        inputJSON: JSON.stringify(args, null, 2),
        outputJSON: JSON.stringify({ ok: true, stdout: `Preparing worktree (new branch '${values.branch || 'git-default'}')\\n`, artifacts: [`/mock/${values.path}`] }, null, 2)
      });
      state.transcript.messages.push({ role: 'assistant', text: `Created worktree ${values.path}.` });
      state.worktreeDialog.mode = null;
      syncSelectedThreadSearchText();
      render();
    }

    function removeWorktree(values) {
      ensureThread('Remove worktree');
      state.transcript.toolCards.push({
        title: 'host.git.worktree.remove',
        subtitle: 'Completed',
        status: 'done',
        inputJSON: JSON.stringify({ path: values.path, force: values.force }, null, 2),
        outputJSON: JSON.stringify({ ok: true, stdout: '' }, null, 2)
      });
      state.transcript.messages.push({ role: 'assistant', text: `Removed worktree ${values.path}.` });
      state.worktreeDialog.mode = null;
      syncSelectedThreadSearchText();
      render();
    }

    function selectThread(threadID) {
      const selected = state.sidebar.items.find(item => item.id === threadID);
      if (!selected) return;
      state.sidebar.selectedThreadID = threadID;
      state.sidebar.items = state.sidebar.items.map(item => ({
        ...item,
        isSelected: item.id === threadID
      }));
      state.topBar.primaryTitle = selected.title;
      const selectedProject = state.projects.items.find(project => project.id === state.projects.selectedProjectID);
      state.topBar.subtitle = `${selectedProject?.name || 'No project'} - ${state.topBar.modeLabel} - ${state.topBar.modelLabel}`;
      render();
    }

    function runSidebarThreadAction(action, threadID) {
      if (!threadID) return;
      if (action === 'pin' || action === 'unpin') {
        state.sidebar.items = sortSidebarItems(state.sidebar.items.map(item => (
          item.id === threadID ? { ...item, isPinned: !item.isPinned } : item
        )));
      }
      if (action === 'archive') {
        state.sidebar.items = state.sidebar.items.filter(item => item.id !== threadID);
        if (state.sidebar.selectedThreadID === threadID) {
          state.sidebar.selectedThreadID = state.sidebar.items[0]?.id || null;
          state.sidebar.items = state.sidebar.items.map((item, index) => ({ ...item, isSelected: index === 0 }));
          state.topBar.primaryTitle = state.sidebar.items[0]?.title || 'QuillCode';
          if (!state.sidebar.selectedThreadID) {
            state.transcript.messages = [];
            state.transcript.toolCards = [];
          }
        }
      }
      render();
    }

    function sortSidebarItems(items) {
      return [...items].sort((lhs, rhs) => Number(rhs.isPinned) - Number(lhs.isPinned));
    }

    function syncSelectedThreadSearchText() {
      if (!state.sidebar.selectedThreadID) return;
      const messageText = state.transcript.messages.map(message => message.text).join('\n');
      const toolText = state.transcript.toolCards
        .map(card => [card.inputJSON || '', card.outputJSON || ''].join('\n'))
        .join('\n');
      const searchText = `${messageText}\n${toolText}`.slice(0, 8000);
      state.sidebar.items = state.sidebar.items.map(item => (
        item.id === state.sidebar.selectedThreadID ? { ...item, searchText } : item
      ));
    }

    function sendMessage(value) {
      const text = String(value).trim();
      if (!text) return;
      ensureThread(text.split(/\s+/).slice(0, 6).join(' '));
      state.composer.draft = '';
      state.composer.canSend = false;
      state.transcript.messages.push({ role: 'user', text });
      if (text.toLowerCase().startsWith('/mode ')) {
        const requestedMode = text.split(/\s+/)[1]?.toLowerCase();
        const modeMap = { auto: 'Auto', review: 'Review', 'read-only': 'Read-only', readonly: 'Read-only' };
        const nextMode = modeMap[requestedMode] || null;
        if (nextMode) {
          state.topBar.modeLabel = nextMode;
          state.transcript.messages.push({ role: 'assistant', text: `Mode set to ${nextMode}.` });
          const selectedProject = state.projects.items.find(project => project.id === state.projects.selectedProjectID);
          state.topBar.subtitle = `${selectedProject?.name || 'No project'} - ${state.topBar.modeLabel} - ${state.topBar.modelLabel}`;
        } else {
          state.transcript.messages.push({ role: 'assistant', text: 'Usage: /mode auto, /mode review, or /mode read-only' });
        }
      } else if (text.toLowerCase().startsWith('/help')) {
        state.transcript.messages.push({
          role: 'assistant',
          text: 'Slash commands:\\n/new\\n/status\\n/mode auto|review|read-only\\n/model provider/model'
        });
      } else if (text.toLowerCase().includes('git diff')) {
        const diff = [
          'diff --git a/Sources/App.swift b/Sources/App.swift',
          '--- a/Sources/App.swift',
          '+++ b/Sources/App.swift',
          '@@ -1 +1,2 @@',
          '+let title = "QuillCode"',
          ' import Foundation'
        ].join('\\n');
        state.review = {
          title: 'Review changes',
          subtitle: '1 file changed, +1 -0',
          totalInsertions: 1,
          totalDeletions: 0,
          totalHunks: 1,
          files: [{
            path: 'Sources/App.swift',
            changeLabel: '+1 · -0 · 1 hunk',
            hunks: [{ header: '@@ -1 +1,2 @@', changeLabel: '+1 · -0' }],
            comments: []
          }]
        };
        state.transcript.toolCards.push({
          title: 'host.git.diff',
          subtitle: 'Completed',
          status: 'done',
          inputJSON: JSON.stringify({}, null, 2),
          outputJSON: JSON.stringify({ ok: true, stdout: diff }, null, 2)
        });
        state.transcript.messages.push({ role: 'assistant', text: 'Output:\\n' + diff });
      } else if (text.toLowerCase().includes('commit')) {
        const message = text.match(/message[: ]+(.+)$/i)?.[1]?.trim() || 'QuillCode changes';
        state.review = { ...state.review, files: [], subtitle: 'Latest git diff', totalInsertions: 0, totalDeletions: 0, totalHunks: 0 };
        state.transcript.toolCards.push({
          title: 'host.git.commit',
          subtitle: 'Completed',
          status: 'done',
          inputJSON: JSON.stringify({ message }, null, 2),
          outputJSON: JSON.stringify({ ok: true, stdout: '[main abc1234] ' + message + '\\n' }, null, 2)
        });
        state.transcript.messages.push({ role: 'assistant', text: 'Output:\\n[main abc1234] ' + message });
      } else if (text.toLowerCase().includes('run') || text.toLowerCase().includes('whoami')) {
        const cmd = text.match(/`([^`]+)`/)?.[1] || text.replace(/^run\s+/i, '') || 'whoami';
        state.review = { ...state.review, files: [], subtitle: 'Latest git diff', totalInsertions: 0, totalDeletions: 0, totalHunks: 0 };
        state.transcript.toolCards.push({
          title: 'host.shell.run',
          subtitle: 'Completed',
          status: 'done',
          inputJSON: JSON.stringify({ cmd }, null, 2),
          outputJSON: JSON.stringify({ ok: true, stdout: 'mock-user\\n' }, null, 2)
        });
        const answer = cmd.trim() === 'whoami'
          ? 'You are `mock-user` in this workspace.'
          : 'Output:\\nmock-user';
        state.transcript.messages.push({ role: 'assistant', text: answer });
      } else {
        state.review = { ...state.review, files: [], subtitle: 'Latest git diff', totalInsertions: 0, totalDeletions: 0, totalHunks: 0 };
        state.transcript.messages.push({ role: 'assistant', text: 'I can inspect and edit this project.' });
      }
      syncSelectedThreadSearchText();
      render();
    }

    function addReviewComment(path, text) {
      const trimmed = (text || '').trim();
      if (!path || !trimmed) return;
      const file = state.review.files.find(file => file.path === path);
      if (!file) return;
      file.comments = file.comments || [];
      file.comments.push({ id: crypto.randomUUID(), path, text: trimmed });
      render();
    }

    function runReviewAction(action, path) {
      if (!path) return;
      const toolMap = {
        restore: 'host.git.restore',
        stage_hunk: 'host.git.stage_hunk',
        restore_hunk: 'host.git.restore_hunk'
      };
      const toolName = toolMap[action] || 'host.git.stage';
      state.topBar.agentStatus = 'Running';
      state.transcript.toolCards.push({
        title: toolName,
        subtitle: 'Completed',
        status: 'done',
        inputJSON: JSON.stringify({ path }, null, 2),
        outputJSON: JSON.stringify({ ok: true, stdout: '' }, null, 2)
      });
      state.transcript.toolCards.push({
        title: 'host.git.diff',
        subtitle: 'Completed',
        status: 'done',
        inputJSON: JSON.stringify({}, null, 2),
        outputJSON: JSON.stringify({ ok: true, stdout: '' }, null, 2)
      });
      state.review = {
        title: 'Review changes',
        subtitle: 'Latest git diff',
        totalInsertions: 0,
        totalDeletions: 0,
        totalHunks: 0,
        files: []
      };
      state.topBar.agentStatus = 'Idle';
      render();
    }

    function shortcutMatches(event, shortcut) {
      if (!shortcut) return false;
      const parts = shortcut.split('+').map(part => part.trim().toLowerCase()).filter(Boolean);
      const key = parts.at(-1);
      const requiresCmd = parts.includes('cmd');
      const requiresCtrl = parts.includes('ctrl');
      const requiresShift = parts.includes('shift');
      const requiresOption = parts.includes('option');
      const eventKey = event.key === 'Escape' ? 'esc' : event.key.toLowerCase();
      return event.metaKey === requiresCmd
        && event.ctrlKey === requiresCtrl
        && event.shiftKey === requiresShift
        && event.altKey === requiresOption
        && eventKey === key;
    }

    document.addEventListener('keydown', event => {
      if (handleCommandPaletteKeydown(event)) return;
      updateDynamicCommands();
      const command = state.commands.find(candidate => (
        candidate.isEnabled && shortcutMatches(event, candidate.shortcut)
      ));
      if (!command) return;
      event.preventDefault();
      runCommand(command.id);
    });

    render();
  </script>
</body>
</html>
