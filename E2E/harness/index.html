<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>QuillCode Harness</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #071014;
      --panel: #121d23;
      --panel-2: #192930;
      --line: #2a414a;
      --text: #eef7fa;
      --muted: #9fb0b8;
      --blue: #41b8e8;
      --green: #52d273;
      --red: #ff5d52;
      --yellow: #f8b84e;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top left, rgba(65,184,232,.14), transparent 35%), var(--bg);
      color: var(--text);
    }
    .quillcode-workspace { min-height: 100vh; display: grid; grid-template-rows: auto 1fr; }
    .topbar {
      margin: 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      padding: 16px 18px;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 18px;
      background: color-mix(in srgb, var(--panel-2) 86%, transparent);
      box-shadow: 0 18px 60px rgba(0,0,0,.28);
    }
    .topbar strong { font-size: 20px; }
    .topbar p { margin: 3px 0 0; color: var(--muted); }
    .topbar-pills { display: flex; flex-wrap: wrap; justify-content: flex-end; gap: 8px; }
    .topbar-pills span,
    .topbar-pills select,
    .topbar-pills button {
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(65,184,232,.14);
      color: #b6eaff;
      border: 1px solid rgba(65,184,232,.22);
      font-size: 13px;
    }
    .topbar-pills select { max-width: 230px; }
    .topbar-pills button { font-weight: 600; }
    .settings-panel {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background: rgba(0,0,0,.45);
      z-index: 5;
    }
    .settings-card {
      width: min(520px, 100%);
      display: grid;
      gap: 14px;
      padding: 20px;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 18px;
      background: var(--panel);
      box-shadow: 0 20px 80px rgba(0,0,0,.45);
    }
    .settings-card h2, .settings-card p { margin: 0; }
    .settings-card label { display: grid; gap: 6px; color: var(--muted); font-size: 13px; }
    .settings-actions { display: flex; gap: 10px; justify-content: flex-end; }
    .workspace-grid { min-height: 0; display: grid; grid-template-columns: 280px 1fr; gap: 18px; padding: 0 18px 18px; }
    .sidebar, .transcript {
      min-height: 0;
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 18px;
      background: rgba(18,29,35,.84);
    }
    .sidebar { padding: 14px; overflow: auto; }
    .sidebar h2 { margin: 0 0 12px; color: var(--muted); font-size: 13px; text-transform: uppercase; letter-spacing: .08em; }
    .sidebar-item,
    .project-item {
      width: 100%;
      margin: 0 0 8px;
      padding: 11px 12px;
      display: grid;
      gap: 3px;
      text-align: left;
      color: var(--text);
      background: transparent;
      border: 1px solid transparent;
      border-radius: 12px;
    }
    .sidebar-item.selected,
    .project-item.selected { background: rgba(255,255,255,.08); border-color: rgba(255,255,255,.14); }
    .sidebar-item small,
    .project-item small { color: var(--muted); }
    .transcript { display: grid; grid-template-rows: 1fr auto; overflow: hidden; }
    .timeline { padding: 22px; overflow: auto; display: flex; flex-direction: column; gap: 14px; }
    .message, .tool-card, .review-pane {
      max-width: min(760px, 88%);
      padding: 13px 15px;
      border-radius: 16px;
      line-height: 1.42;
    }
    .message.user { align-self: flex-end; background: linear-gradient(135deg, #45bdec, #d16c5f); }
    .message.assistant { align-self: flex-start; background: rgba(255,255,255,.1); }
    .tool-card {
      align-self: flex-start;
      width: min(760px, 92%);
      background: rgba(0,0,0,.22);
      border: 1px solid rgba(65,184,232,.25);
    }
    .tool-card.done { border-color: rgba(82,210,115,.34); }
    .tool-card.failed { border-color: rgba(255,93,82,.44); }
    .tool-card.review { border-color: rgba(248,184,78,.48); }
    .tool-card header { display: flex; justify-content: space-between; gap: 14px; }
    .review-pane {
      align-self: flex-start;
      width: min(760px, 92%);
      background: rgba(65,184,232,.08);
      border: 1px solid rgba(65,184,232,.26);
    }
    .review-pane header {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 10px;
    }
    .review-pane ul { list-style: none; padding: 0; margin: 0; display: grid; gap: 8px; }
    .review-pane li { display: flex; justify-content: space-between; gap: 16px; color: var(--text); }
    .review-pane small { color: var(--muted); }
    .review-actions { display: flex; align-items: center; gap: 8px; }
    .review-actions button {
      padding: 5px 9px;
      border-radius: 999px;
      background: rgba(65,184,232,.12);
      color: #b6eaff;
      border: 1px solid rgba(65,184,232,.25);
      font-size: 12px;
    }
    .review-actions button[data-action="restore"] {
      background: rgba(248,184,78,.12);
      color: #ffe2a3;
      border-color: rgba(248,184,78,.28);
    }
    pre { overflow: auto; white-space: pre-wrap; background: rgba(0,0,0,.38); border-radius: 10px; padding: 10px; color: #dff8ff; }
    .empty { margin: auto; max-width: 560px; color: var(--muted); text-align: center; }
    .composer {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      padding: 14px;
      border-top: 1px solid rgba(255,255,255,.1);
      background: rgba(25,41,48,.78);
    }
    .composer label { position: absolute; width: 1px; height: 1px; clip: rect(0 0 0 0); overflow: hidden; }
    input {
      min-width: 0;
      padding: 13px 15px;
      border-radius: 13px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.18);
      color: white;
      font: inherit;
    }
    button {
      padding: 0 18px;
      border: 0;
      border-radius: 13px;
      background: var(--blue);
      color: #041018;
      font-weight: 700;
      font: inherit;
    }
    button:disabled { opacity: .45; }
    @media (max-width: 760px) {
      .workspace-grid { grid-template-columns: 1fr; }
      .sidebar { display: none; }
      .topbar { align-items: flex-start; flex-direction: column; }
      .message, .tool-card { max-width: 100%; width: 100%; }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    const state = {
      topBar: {
        primaryTitle: 'QuillCode',
        subtitle: 'No project - Not started',
        modelLabel: 'trustedrouter/fusion',
        selectedModelID: 'trustedrouter/fusion',
        modelCategories: [
          {
            category: 'Recommended',
            models: [
              { id: 'trustedrouter/fusion', provider: 'trustedrouter', displayName: 'Fusion', isSelected: true }
            ]
          },
          {
            category: 'Safety',
            models: [
              { id: 'z-ai/glm-5.2', provider: 'z-ai', displayName: 'GLM 5.2', isSelected: false },
              { id: 'moonshotai/kimi-k2.6', provider: 'moonshotai', displayName: 'Kimi K2.6', isSelected: false }
            ]
          }
        ],
        modeLabel: 'Auto',
        agentStatus: 'Idle',
        computerUseLabel: 'Computer Use setup needed'
      },
      projects: {
        title: 'Projects',
        selectedProjectID: 'project-main',
        items: [
          {
            id: 'project-main',
            name: 'QuillCode',
            path: '/mock/QuillCode',
            isSelected: true
          }
        ]
      },
      sidebar: {
        title: 'Chats',
        selectedThreadID: null,
        items: []
      },
      transcript: {
        messages: [],
        toolCards: [],
        emptyTitle: 'Ask QuillCode to inspect, edit, or run this project.',
        emptySubtitle: 'Use Auto for normal coding work, Review for manual gates, or Read-only for exploration.'
      },
      review: {
        title: 'Review changes',
        subtitle: 'Latest git diff',
        files: [],
        totalInsertions: 0,
        totalDeletions: 0,
        totalHunks: 0
      },
      composer: {
        draft: '',
        placeholder: 'Message QuillCode',
        isSending: false,
        canSend: false
      },
      settings: {
        isOpen: false,
        apiBaseURL: 'https://api.quillrouter.com/v1',
        developerOverrideEnabled: false,
        hasStoredAPIKey: false,
        apiKeyStatusLabel: 'No API key saved',
        loginStatusLabel: 'TrustedRouter login required',
        replacementAPIKey: ''
      }
    };

    function escapeHTML(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function render() {
      const review = state.review.files.length ? `
        <section class="review-pane" data-testid="review-pane" aria-label="Git review summary">
          <header>
            <strong>${escapeHTML(state.review.title)}</strong>
            <span data-testid="review-summary">${escapeHTML(state.review.subtitle)}</span>
          </header>
          <ul>
            ${state.review.files.map(file => `
              <li data-testid="review-file">
                <span data-testid="review-file-path">${escapeHTML(file.path)}</span>
                <span class="review-actions">
                  <small>${escapeHTML(file.changeLabel)}</small>
                  <button type="button" data-testid="review-action" data-action="stage" data-path="${escapeHTML(file.path)}">Stage</button>
                  <button type="button" data-testid="review-action" data-action="restore" data-path="${escapeHTML(file.path)}">Restore</button>
                </span>
              </li>`).join('')}
          </ul>
        </section>` : '';
      const messages = state.transcript.messages.map(message => `
        <article class="message ${escapeHTML(message.role)}" data-testid="message" aria-label="${escapeHTML(message.role + ': ' + message.text)}">
          ${escapeHTML(message.text)}
        </article>`).join('');
      const cards = state.transcript.toolCards.map(card => `
        <article class="tool-card ${escapeHTML(card.status)}" data-testid="tool-card" data-status="${escapeHTML(card.status)}">
          <header>
            <strong data-testid="tool-card-title">${escapeHTML(card.title)}</strong>
            <span data-testid="tool-card-status">${escapeHTML(card.status)}</span>
          </header>
          <p>${escapeHTML(card.subtitle)}</p>
          ${card.inputJSON ? `<pre data-testid="tool-card-input">${escapeHTML(card.inputJSON)}</pre>` : ''}
          ${card.outputJSON ? `<pre data-testid="tool-card-output">${escapeHTML(card.outputJSON)}</pre>` : ''}
        </article>`).join('');
      const timeline = review || messages || cards ? review + messages + cards : `
        <section class="empty" data-testid="transcript-empty">
          <h1>${escapeHTML(state.transcript.emptyTitle)}</h1>
          <p>${escapeHTML(state.transcript.emptySubtitle)}</p>
        </section>`;
      const projectsContent = state.projects.items.length
        ? state.projects.items.map(item => `
          <button class="project-item ${item.isSelected ? 'selected' : ''}" data-testid="project-item" data-project-id="${escapeHTML(item.id)}" aria-current="${item.isSelected ? 'true' : 'false'}">
            <span>${escapeHTML(item.name)}</span>
            <small>${escapeHTML(item.path)}</small>
          </button>`).join('')
        : '<p data-testid="project-empty">No projects yet</p>';
      const sidebarContent = state.sidebar.items.length
        ? state.sidebar.items.map(item => `
          <button class="sidebar-item ${item.isSelected ? 'selected' : ''}" data-testid="sidebar-item" aria-current="${item.isSelected ? 'true' : 'false'}">
            <span>${escapeHTML(item.title)}</span>
            <small>${escapeHTML(item.subtitle)}${item.isPinned ? ' · pinned' : ''}</small>
          </button>`).join('')
        : '<p data-testid="sidebar-empty">No chats yet</p>';
      const modelOptions = state.topBar.modelCategories.map(category => `
        <optgroup label="${escapeHTML(category.category)}" data-testid="model-category">
          ${category.models.map(model => `
            <option value="${escapeHTML(model.id)}" ${model.id === state.topBar.selectedModelID ? 'selected' : ''}>
              ${escapeHTML(model.provider + '/' + model.displayName)}
            </option>`).join('')}
        </optgroup>`).join('');

      document.getElementById('app').innerHTML = `
        <section class="quillcode-workspace" data-testid="workspace">
          <header class="topbar" data-testid="top-bar" aria-label="QuillCode top bar">
            <div>
              <strong data-testid="top-bar-title">${escapeHTML(state.topBar.primaryTitle)}</strong>
              <p data-testid="top-bar-subtitle">${escapeHTML(state.topBar.subtitle)}</p>
            </div>
            <div class="topbar-pills">
              <select aria-label="Model" data-testid="model-picker">${modelOptions}</select>
              <span data-testid="model-pill">${escapeHTML(state.topBar.modelLabel)}</span>
              <span data-testid="mode-pill">${escapeHTML(state.topBar.modeLabel)}</span>
              <span data-testid="agent-status">${escapeHTML(state.topBar.agentStatus)}</span>
              <span data-testid="computer-use-status">${escapeHTML(state.topBar.computerUseLabel)}</span>
              <button type="button" data-testid="settings-button">Settings</button>
            </div>
          </header>
          <div class="workspace-grid">
            <aside class="sidebar" data-testid="sidebar" aria-label="Projects and chats">
              <h2>${escapeHTML(state.projects.title)}</h2>
              ${projectsContent}
              <h2>${escapeHTML(state.sidebar.title)}</h2>
              ${sidebarContent}
            </aside>
            <main class="transcript" data-testid="transcript">
              <div class="timeline">${timeline}</div>
              <form class="composer" data-testid="composer">
                <label for="message">Message</label>
                <input id="message" aria-label="Message" placeholder="${escapeHTML(state.composer.placeholder)}" value="${escapeHTML(state.composer.draft)}" ${state.composer.isSending ? 'disabled' : ''}>
                <button type="submit" data-testid="send-button" ${state.composer.canSend ? '' : 'disabled'}>Send</button>
              </form>
            </main>
          </div>
          ${state.settings.isOpen ? renderSettingsPanel() : ''}
        </section>`;

      const form = document.querySelector('[data-testid="composer"]');
      const input = document.getElementById('message');
      input.addEventListener('input', event => {
        state.composer.draft = event.target.value;
        state.composer.canSend = state.composer.draft.trim().length > 0;
        document.querySelector('[data-testid="send-button"]').disabled = !state.composer.canSend;
      });
      form.addEventListener('submit', event => {
        event.preventDefault();
        sendMessage(input.value);
      });
      document.querySelector('[data-testid="model-picker"]').addEventListener('change', event => {
        const selectedID = event.target.value;
        const allModels = state.topBar.modelCategories.flatMap(category => category.models);
        const selected = allModels.find(model => model.id === selectedID);
        if (!selected) return;
        state.topBar.selectedModelID = selected.id;
        state.topBar.modelLabel = selected.id;
        state.topBar.modelCategories = state.topBar.modelCategories.map(category => ({
          ...category,
          models: category.models.map(model => ({ ...model, isSelected: model.id === selected.id }))
        }));
        render();
      });
      document.querySelectorAll('[data-testid="project-item"]').forEach(button => {
        button.addEventListener('click', event => {
          const id = event.currentTarget.getAttribute('data-project-id');
          state.projects.selectedProjectID = id;
          state.projects.items = state.projects.items.map(project => ({
            ...project,
            isSelected: project.id === id
          }));
          const project = state.projects.items.find(project => project.id === id);
          state.topBar.subtitle = `${project?.name || 'No project'} - ${state.topBar.modeLabel} - ${state.topBar.modelLabel}`;
          render();
        });
      });
      document.querySelector('[data-testid="settings-button"]').addEventListener('click', () => {
        state.settings.isOpen = true;
        state.settings.replacementAPIKey = '';
        render();
      });
      document.querySelectorAll('[data-testid="review-action"]').forEach(button => {
        button.addEventListener('click', event => {
          const action = event.currentTarget.getAttribute('data-action');
          const path = event.currentTarget.getAttribute('data-path');
          runReviewAction(action, path);
        });
      });
      document.querySelector('[data-testid="settings-cancel"]')?.addEventListener('click', () => {
        state.settings.isOpen = false;
        render();
      });
      document.querySelector('[data-testid="settings-form"]')?.addEventListener('submit', event => {
        event.preventDefault();
        const form = event.currentTarget;
        state.settings.apiBaseURL = form.elements.namedItem('apiBaseURL').value.trim();
        state.settings.developerOverrideEnabled = form.elements.namedItem('developerOverrideEnabled').checked;
        const replacementAPIKey = form.elements.namedItem('replacementAPIKey').value.trim();
        if (replacementAPIKey) {
          state.settings.hasStoredAPIKey = true;
          state.settings.apiKeyStatusLabel = 'API key configured';
          state.settings.loginStatusLabel = 'TrustedRouter developer override ready';
          state.topBar.agentStatus = 'TrustedRouter ready';
        }
        state.settings.isOpen = false;
        render();
      });
    }

    function renderSettingsPanel() {
      return `
        <div class="settings-panel" data-testid="settings-panel">
          <form class="settings-card" data-testid="settings-form">
            <h2>Settings</h2>
            <p data-testid="settings-login-status">${escapeHTML(state.settings.loginStatusLabel)}</p>
            <p data-testid="settings-key-status">${escapeHTML(state.settings.apiKeyStatusLabel)}</p>
            <label>
              TrustedRouter API base URL
              <input name="apiBaseURL" aria-label="TrustedRouter API base URL" value="${escapeHTML(state.settings.apiBaseURL)}">
            </label>
            <label>
              <span>
                <input type="checkbox" name="developerOverrideEnabled" aria-label="Enable developer override" ${state.settings.developerOverrideEnabled ? 'checked' : ''}>
                Enable developer override
              </span>
            </label>
            <label>
              Replace API key
              <input name="replacementAPIKey" aria-label="Replace API key" type="password" value="${escapeHTML(state.settings.replacementAPIKey)}">
            </label>
            <div class="settings-actions">
              <button type="button" data-testid="settings-cancel">Cancel</button>
              <button type="submit" data-testid="settings-save">Save</button>
            </div>
          </form>
        </div>`;
    }

    function ensureThread(title) {
      if (!state.sidebar.selectedThreadID) {
        state.sidebar.selectedThreadID = 'thread-main';
        state.sidebar.items = [{
          id: 'thread-main',
          title,
          subtitle: state.topBar.modelLabel,
          isSelected: true,
          isPinned: false
        }];
      }
      state.topBar.primaryTitle = title;
      const selectedProject = state.projects.items.find(project => project.id === state.projects.selectedProjectID);
      state.topBar.subtitle = `${selectedProject?.name || 'No project'} - ${state.topBar.modeLabel} - ${state.topBar.modelLabel}`;
    }

    function sendMessage(value) {
      const text = String(value).trim();
      if (!text) return;
      ensureThread(text.split(/\s+/).slice(0, 6).join(' '));
      state.composer.draft = '';
      state.composer.canSend = false;
      state.transcript.messages.push({ role: 'user', text });
      if (text.toLowerCase().startsWith('/mode ')) {
        const requestedMode = text.split(/\s+/)[1]?.toLowerCase();
        const modeMap = { auto: 'Auto', review: 'Review', 'read-only': 'Read-only', readonly: 'Read-only' };
        const nextMode = modeMap[requestedMode] || null;
        if (nextMode) {
          state.topBar.modeLabel = nextMode;
          state.transcript.messages.push({ role: 'assistant', text: `Mode set to ${nextMode}.` });
          const selectedProject = state.projects.items.find(project => project.id === state.projects.selectedProjectID);
          state.topBar.subtitle = `${selectedProject?.name || 'No project'} - ${state.topBar.modeLabel} - ${state.topBar.modelLabel}`;
        } else {
          state.transcript.messages.push({ role: 'assistant', text: 'Usage: /mode auto, /mode review, or /mode read-only' });
        }
      } else if (text.toLowerCase().startsWith('/help')) {
        state.transcript.messages.push({
          role: 'assistant',
          text: 'Slash commands:\\n/new\\n/status\\n/mode auto|review|read-only\\n/model provider/model'
        });
      } else if (text.toLowerCase().includes('git diff')) {
        const diff = [
          'diff --git a/Sources/App.swift b/Sources/App.swift',
          '--- a/Sources/App.swift',
          '+++ b/Sources/App.swift',
          '@@ -1 +1,2 @@',
          '+let title = "QuillCode"',
          ' import Foundation'
        ].join('\\n');
        state.review = {
          title: 'Review changes',
          subtitle: '1 file changed, +1 -0',
          totalInsertions: 1,
          totalDeletions: 0,
          totalHunks: 1,
          files: [{ path: 'Sources/App.swift', changeLabel: '+1 · -0 · 1 hunk' }]
        };
        state.transcript.toolCards.push({
          title: 'host.git.diff',
          subtitle: 'Completed',
          status: 'done',
          inputJSON: JSON.stringify({}, null, 2),
          outputJSON: JSON.stringify({ ok: true, stdout: diff }, null, 2)
        });
        state.transcript.messages.push({ role: 'assistant', text: 'Output:\\n' + diff });
      } else if (text.toLowerCase().includes('run') || text.toLowerCase().includes('whoami')) {
        const cmd = text.match(/`([^`]+)`/)?.[1] || text.replace(/^run\s+/i, '') || 'whoami';
        state.review = { ...state.review, files: [], subtitle: 'Latest git diff', totalInsertions: 0, totalDeletions: 0, totalHunks: 0 };
        state.transcript.toolCards.push({
          title: 'host.shell.run',
          subtitle: 'Completed',
          status: 'done',
          inputJSON: JSON.stringify({ cmd }, null, 2),
          outputJSON: JSON.stringify({ ok: true, stdout: 'mock-user\\n' }, null, 2)
        });
        state.transcript.messages.push({ role: 'assistant', text: 'Output:\\nmock-user' });
      } else {
        state.review = { ...state.review, files: [], subtitle: 'Latest git diff', totalInsertions: 0, totalDeletions: 0, totalHunks: 0 };
        state.transcript.messages.push({ role: 'assistant', text: 'I can inspect and edit this project.' });
      }
      render();
    }

    function runReviewAction(action, path) {
      if (!path) return;
      const toolName = action === 'restore' ? 'host.git.restore' : 'host.git.stage';
      state.topBar.agentStatus = 'Running';
      state.transcript.toolCards.push({
        title: toolName,
        subtitle: 'Completed',
        status: 'done',
        inputJSON: JSON.stringify({ path }, null, 2),
        outputJSON: JSON.stringify({ ok: true, stdout: '' }, null, 2)
      });
      state.transcript.toolCards.push({
        title: 'host.git.diff',
        subtitle: 'Completed',
        status: 'done',
        inputJSON: JSON.stringify({}, null, 2),
        outputJSON: JSON.stringify({ ok: true, stdout: '' }, null, 2)
      });
      state.review = {
        title: 'Review changes',
        subtitle: 'Latest git diff',
        totalInsertions: 0,
        totalDeletions: 0,
        totalHunks: 0,
        files: []
      };
      state.topBar.agentStatus = 'Idle';
      render();
    }

    render();
  </script>
</body>
</html>
