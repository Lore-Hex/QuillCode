        'HEAD abc1234',
        `branch refs/heads/${worktree.branch}`
      ].join('\n')).join('\n\n') + '\n';
      addToolCard({
        title: 'host.git.worktree.list',
        subtitle: 'Completed',
        status: 'done',
        inputJSON: JSON.stringify({}, null, 2),
        outputJSON: JSON.stringify({ ok: true, stdout }, null, 2)
      });
      addMessage('assistant', 'Output:\n' + stdout);
      syncSelectedThreadSearchText();
      render();
    }

    function createWorktree(values) {
      ensureThread('Create worktree');
      const args = { path: values.path };
      if (values.branch) args.branch = values.branch;
      if (values.base) args.base = values.base;
      const path = mockWorktreePath(values.path);
      if (!state.worktrees.some(worktree => worktree.path === path)) {
        state.worktrees.push({ path, branch: values.branch || values.path });
      }
      addToolCard({
        title: 'host.git.worktree.create',
        subtitle: 'Completed',
        status: 'done',
        inputJSON: JSON.stringify(args, null, 2),
        outputJSON: JSON.stringify({ ok: true, stdout: `Preparing worktree (new branch '${values.branch || 'git-default'}')\\n`, artifacts: [path] }, null, 2)
      });
      state.worktreeDialog.mode = null;
      syncSelectedThreadSearchText();
      openCreatedWorktree(values);
      render();
    }

    function createBranchHere(branch) {
      const thread = state.sidebar.items.find(item => item.id === state.sidebar.selectedThreadID);
      if (!branch || thread?.worktree?.location !== 'worktree' || !thread.worktree.isResolvable || thread.worktree.branch) return;
      thread.worktree.branch = branch;
      thread.worktree.branchLeaf = branch.split('/').filter(Boolean).at(-1) || branch;
      state.topBar.worktreeStatusLabel = `Worktree · ${branch}`;
      state.topBar.worktreeStatusDetail = `This worktree owns branch ${branch}.`;
      addToolCard({
        title: 'host.git.worktree.create_branch',
        subtitle: 'Completed',
        status: 'done',
        inputJSON: JSON.stringify({ branch }, null, 2),
        outputJSON: JSON.stringify({ ok: true, stdout: `Switched to a new branch '${branch}'\n`, artifacts: [branch] }, null, 2)
      });
      addMessage('assistant', `Created branch ${branch} in this worktree.`);
      state.worktreeDialog.mode = null;
      updateDynamicCommands();
      render();
    }

    function openWorktree(values) {
      ensureThread('Open worktree');
      const path = mockWorktreePath(values.path);
      addToolCard({
        title: 'host.git.worktree.open',
        subtitle: 'Completed',
        status: 'done',
        inputJSON: JSON.stringify({ path: values.path }, null, 2),
        outputJSON: JSON.stringify({ ok: true, stdout: `Opened registered worktree ${values.path}\\n`, artifacts: [path] }, null, 2)
      });
      state.worktreeDialog.mode = null;
      syncSelectedThreadSearchText();
      openCreatedWorktree({ path: values.path, branch: '' });
      render();
    }

    function openCreatedWorktree(values) {
      const previousLocation = currentWorkspaceLocation();
      const path = mockWorktreePath(values.path);
      const name = mockWorktreeName(path);
      const existing = state.projects.items.find(project => project.path === path);
      const project = existing || {
        id: `project-${state.nextProjectIndex++}`,
        name,
        path,
        connectionKindLabel: 'Local',
        isRemote: false,
        isSelected: true
      };
      state.projects.selectedProjectID = project.id;
      state.projects.items = [
        { ...project, isSelected: true },
        ...state.projects.items
          .filter(item => item.id !== project.id)
          .map(item => ({ ...item, isSelected: false }))
      ];

      const title = `Worktree: ${values.branch || project.name}`;
      const threadID = `thread-${state.nextThreadIndex++}`;
      state.sidebar.selectedThreadID = threadID;
      state.sidebar.items = [{
        id: threadID,
        title,
        subtitle: state.topBar.modelLabel,
        searchText: '',
        updatedAt: new Date().toISOString(),
        isSelected: true,
        isPinned: false,
        isArchived: false
      }, ...state.sidebar.items.map(item => ({ ...item, isSelected: false }))];
      state.transcript.messages = [];
      state.transcript.toolCards = [];
      state.transcript.timelineItems = [];
      state.review = {
        title: 'Review changes',
        subtitle: 'Latest git diff',
        totalInsertions: 0,
        totalDeletions: 0,
        totalHunks: 0,
        files: [],
        pullRequestThreads: []
      };
      state.terminal.cwdLabel = path;
      state.terminal.environment = {};
      state.topBar.primaryTitle = title;
      state.topBar.subtitle = `${project.name} - ${state.topBar.modeLabel} - ${state.topBar.modelLabel}`;
      addMessage('assistant', `Opened worktree ${project.name} at ${path}.`);
      syncSelectedThreadSearchText();
      recordWorkspaceNavigation(previousLocation);
    }

    function availableWorktreeChoices() {
      const selected = selectedProject();
      return state.worktrees
        .filter(worktree => worktree.path !== selected?.path)
        .map(worktree => ({
          path: worktree.path,
          title: mockWorktreeName(worktree.path),
          detail: worktree.branch || 'Registered worktree'
        }));
    }

    function mockWorktreePath(path) {
      if (!path) return '/mock';
      if (path.startsWith('/')) return path;
      return `/mock/${path}`;
    }

    function mockWorktreeName(path) {
      return path.split('/').filter(Boolean).pop() || path;
    }

    function removeWorktree(values) {
      ensureThread('Remove worktree');
      const path = mockWorktreePath(values.path);
      state.worktrees = state.worktrees.filter(worktree => worktree.path !== path);
      addToolCard({
        title: 'host.git.worktree.remove',
        subtitle: 'Completed',
        status: 'done',
        inputJSON: JSON.stringify({ path: values.path, force: values.force }, null, 2),
        outputJSON: JSON.stringify({ ok: true, stdout: '' }, null, 2)
      });
      addMessage('assistant', `Removed worktree ${mockWorktreeName(path)}.`);
      state.worktreeDialog.mode = null;
      syncSelectedThreadSearchText();
      render();
    }

    function pruneWorktrees(values = {}) {
      ensureThread('Prune worktrees');
      const dryRun = values.dryRun === true;
      const verbose = values.verbose === true;
      const stdout = dryRun
        ? `${staleWorktreeRecords().join('\n')}\n`
        : 'Pruned stale worktree administrative records.\n';
      if (!dryRun) {
        state.worktreePruneRecords = [];
        state.worktreeDialog.mode = null;
      }
      addToolCard({
        title: 'host.git.worktree.prune',
        subtitle: dryRun ? 'Completed · dry run' : 'Completed',
        status: 'done',
        inputJSON: JSON.stringify({ dryRun, verbose }, null, 2),
        outputJSON: JSON.stringify({ ok: true, stdout }, null, 2)
      });
      addMessage('assistant', dryRun
        ? 'No stale worktree records found.'
        : 'Pruned stale worktree records. Git did not report any entries.');
      syncSelectedThreadSearchText();
      render();
    }

    function normalizedSidebarSelectionIDs() {
      const validIDs = new Set(filteredSidebarItems().map(item => item.id));
      state.sidebar.selectedThreadIDs = state.sidebar.selectedThreadIDs.filter(id => validIDs.has(id));
      return state.sidebar.selectedThreadIDs;
    }

    function sidebarSelectionLabel() {
      const count = normalizedSidebarSelectionIDs().length;
      if (count === 0) return 'No chats selected';
      if (count === 1) return '1 chat selected';
      return `${count} chats selected`;
    }

    function startSidebarSelection(threadID = null) {
      state.sidebar.isSelectionMode = true;
      if (threadID && !state.sidebar.selectedThreadIDs.includes(threadID)) {
        state.sidebar.selectedThreadIDs = [...state.sidebar.selectedThreadIDs, threadID];
      }
      normalizedSidebarSelectionIDs();
    }

    function clearSidebarSelection() {
      state.sidebar.isSelectionMode = false;
      state.sidebar.selectedThreadIDs = [];
    }

    function toggleSidebarThreadSelection(threadID) {
      if (!filteredSidebarItems().some(item => item.id === threadID)) return;
      state.sidebar.isSelectionMode = true;
      state.sidebar.selectedThreadIDs = state.sidebar.selectedThreadIDs.includes(threadID)
        ? state.sidebar.selectedThreadIDs.filter(id => id !== threadID)
        : [...state.sidebar.selectedThreadIDs, threadID];
    }

    function selectAllSidebarThreads() {
      state.sidebar.isSelectionMode = true;
      state.sidebar.selectedThreadIDs = filteredSidebarItems().map(item => item.id);
    }

    function selectedSidebarThreads() {
      const ids = new Set(normalizedSidebarSelectionIDs());
      return filteredSidebarItems().filter(item => ids.has(item.id));
    }

    function performSidebarBulkAction(action) {
      if (action === 'select') {
        startSidebarSelection();
        render();
        return;
      }
      if (action === 'selectAll') {
        selectAllSidebarThreads();
        render();
        return;
      }
      if (action === 'clearSelection') {
        clearSidebarSelection();
        render();
        return;
      }

      const selected = selectedSidebarThreads();
      const ids = new Set(selected.map(item => item.id));
      if (!ids.size) return;
      const previousLocation = currentWorkspaceLocation();
      const selectedWasRemoved = ids.has(state.sidebar.selectedThreadID);

      if (action === 'pin' || action === 'unpin') {
        state.sidebar.items = sortSidebarItems(state.sidebar.items.map(item => (
          ids.has(item.id) && !item.isArchived ? { ...item, isPinned: action === 'pin' } : item
        )));
      }
      if (action === 'archive') {
        state.sidebar.items = sortSidebarItems(state.sidebar.items.map(item => {
          if (!ids.has(item.id)) return item;
          const shouldSaveWorktree = item.worktree?.location === 'worktree'
            && !item.worktree.branch
            && item.worktree.isResolvable
            && !item.isPinned
            && !item.runStatusLabel;
          const worktree = shouldSaveWorktree
            ? { ...item.worktree, isResolvable: false, hasRestorableSnapshot: true }
            : item.worktree;
          return { ...item, worktree, isPinned: false, isArchived: true, isSelected: false };
        }));
      }
      if (action === 'unarchive') {
        state.sidebar.items = sortSidebarItems(state.sidebar.items.map(item => (
          ids.has(item.id) ? { ...item, isArchived: false } : item
        )));
        const first = selected[0];
        if (first) state.sidebar.selectedThreadID = first.id;
      }
      if (action === 'delete') {
        state.sidebar.items = state.sidebar.items.filter(item => !ids.has(item.id));
      }

      if ((action === 'archive' || action === 'delete') && selectedWasRemoved) {
        const next = state.sidebar.items.find(item => !item.isArchived);
        state.sidebar.selectedThreadID = next?.id || null;
      }
      state.sidebar.items = state.sidebar.items.map(item => ({
        ...item,
        isSelected: item.id === state.sidebar.selectedThreadID
      }));
      const next = state.sidebar.items.find(item => item.id === state.sidebar.selectedThreadID);
      state.topBar.primaryTitle = next?.title || 'QuillCode';
      if (!state.sidebar.selectedThreadID) {
        state.transcript.messages = [];
        state.transcript.toolCards = [];
        state.transcript.timelineItems = [];
      }
      if (['archive', 'unarchive', 'delete'].includes(action)) {
        recordWorkspaceNavigation(previousLocation);
      }
      if (action === 'delete') pruneWorkspaceNavigation();
      clearSidebarSelection();
      render();
    }

    function stashComposerDraft(outgoingID) {
      if (!state.threadDrafts) state.threadDrafts = {};
      if (!state.threadAttachments) state.threadAttachments = {};
      if (!outgoingID) return;
      if (String(state.composer.draft).trim().length) {
        state.threadDrafts[outgoingID] = state.composer.draft;
      } else {
        delete state.threadDrafts[outgoingID];
      }
      if ((state.composer.attachments || []).length) {
        state.threadAttachments[outgoingID] = clonedPlainObject(state.composer.attachments, []);
      } else {
        delete state.threadAttachments[outgoingID];
      }
    }

    function clonedPlainObject(value, fallback) {
      if (value === undefined || value === null) return fallback;
      try {
        return JSON.parse(JSON.stringify(value));
      } catch {
        return fallback;
      }
    }

    function emptyReviewSurface() {
      return {
        title: 'Review changes',
        subtitle: 'Latest git diff',
        totalInsertions: 0,
        totalDeletions: 0,
        totalHunks: 0,
        files: [],
        pullRequestThreads: []
      };
    }

    function emptyTranscriptSurface() {
      state.transcript.messages = [];
      state.transcript.toolCards = [];
      state.transcript.timelineItems = [];
      state.review = emptyReviewSurface();
    }

    function clearSelectedThreadTranscript() {
      const threadID = state.sidebar.selectedThreadID;
      if (!threadID) return;
      emptyTranscriptSurface();
      state.composer.draft = '';
      state.composer.attachments = [];
      state.composer.canSend = false;
      if (state.threadDrafts) delete state.threadDrafts[threadID];
      if (state.threadAttachments) delete state.threadAttachments[threadID];
      saveSelectedThreadSnapshot(threadID);
      syncSelectedThreadSearchText();
      updateDynamicCommands();
      render();
    }

    function selectedThreadSnapshot() {
      return {
        messages: clonedPlainObject(state.transcript.messages, []),
        toolCards: clonedPlainObject(state.transcript.toolCards, []),
        timelineItems: clonedPlainObject(state.transcript.timelineItems, []),
        review: clonedPlainObject(state.review, emptyReviewSurface())
      };
    }

    function saveSelectedThreadSnapshot(threadID = state.sidebar.selectedThreadID) {
      if (!threadID) return;
      const snapshot = selectedThreadSnapshot();
      state.sidebar.items = state.sidebar.items.map(item => (
        item.id === threadID ? { ...item, snapshot } : item
      ));
    }

    function restoreSelectedThreadSnapshot(threadID) {
      const selected = state.sidebar.items.find(item => item.id === threadID);
      state.topBar.goal = threadGoalSurface(selected?.goal || null);
      if (!selected?.snapshot) {
        emptyTranscriptSurface();
        return;
      }
      state.transcript.messages = clonedPlainObject(selected.snapshot.messages, []);
      state.transcript.toolCards = clonedPlainObject(selected.snapshot.toolCards, []);
      state.transcript.timelineItems = clonedPlainObject(selected.snapshot.timelineItems, []);
      state.review = clonedPlainObject(selected.snapshot.review, emptyReviewSurface());
    }

    function restoreComposerDraft(incomingID) {
      if (!state.threadDrafts) state.threadDrafts = {};
      if (!state.threadAttachments) state.threadAttachments = {};
      state.composer.draft = (incomingID && state.threadDrafts[incomingID]) || '';
      state.composer.attachments = clonedPlainObject(
        (incomingID && state.threadAttachments[incomingID]) || [],
        []
      );
      if (incomingID) delete state.threadDrafts[incomingID];
      if (incomingID) delete state.threadAttachments[incomingID];
      state.composer.canSend = composerHasContent();
      state.composer.historyRecallIndex = null;
      state.composer.historySavedDraft = null;
    }

    function selectThread(threadID, options = {}) {
      const selected = state.sidebar.items.find(item => item.id === threadID);
      if (!selected) return;
      const previousLocation = currentWorkspaceLocation();
      const outgoing = state.sidebar.selectedThreadID;
      if (outgoing !== threadID) {
        // Leaving a thread means the user has seen it up to its current end — advance that
        // thread's "N new turns" watermark before we swap the transcript out.
        markTranscriptSeen();
        // Mirror native persistOutgoingReturnWatermark: advance the OUTGOING thread's morning-triage
        // return watermark too, so a thread genuinely read (opened) loses its unseen badge. This runs
        // only on a real thread switch — never on Attention cursor preview (which no longer selectThreads).
        if (outgoing) attentionMarkThreadSeen(outgoing);
        saveSelectedThreadSnapshot(outgoing);
        stashComposerDraft(outgoing);
        restoreComposerDraft(threadID);
        restoreSelectedThreadSnapshot(threadID);
      }
      state.sidebar.selectedThreadID = threadID;
      state.sidebar.items = state.sidebar.items.map(item => ({
        ...item,
        isSelected: item.id === threadID
      }));
      state.topBar.primaryTitle = selected.title;
      const selectedProject = state.projects.items.find(project => project.id === state.projects.selectedProjectID);
      state.topBar.subtitle = `${selectedProject?.name || 'No project'} - ${state.topBar.modeLabel} - ${state.topBar.modelLabel}`;
      if (options.recordsNavigation !== false) recordWorkspaceNavigation(previousLocation);
      render();
    }

    function runSidebarThreadAction(action, threadID) {
      if (!threadID) return;
      const thread = state.sidebar.items.find(item => item.id === threadID);
      if (!thread) return;
      if (thread.runStatusLabel && ['duplicate', 'delete'].includes(action)) return;
      const previousLocation = currentWorkspaceLocation();
      if (action === 'rename') {
        const nextTitle = window.prompt('Rename chat', thread.title);
        if (nextTitle && nextTitle.trim()) {
          state.sidebar.items = state.sidebar.items.map(item => (
            item.id === threadID ? { ...item, title: nextTitle.trim() } : item
          ));
          if (state.sidebar.selectedThreadID === threadID) {
            state.topBar.primaryTitle = nextTitle.trim();
          }
        }
      }
      if (action === 'duplicate') {
        const newThreadID = `thread-${state.nextThreadIndex++}`;
        stashComposerDraft(state.sidebar.selectedThreadID);
        restoreComposerDraft(newThreadID);
        state.sidebar.selectedThreadID = newThreadID;
        state.sidebar.items = sortSidebarItems([
          {
            ...thread,
            id: newThreadID,
            title: `Copy: ${thread.title}`,
            updatedAt: new Date().toISOString(),
            isPinned: false,
            isArchived: false,
            isSelected: true
          },
          ...state.sidebar.items.map(item => ({ ...item, isSelected: false }))
        ]);
        state.topBar.primaryTitle = `Copy: ${thread.title}`;
      }
      if (action === 'pin' || action === 'unpin') {
        state.sidebar.items = sortSidebarItems(state.sidebar.items.map(item => (
          item.id === threadID ? { ...item, isPinned: !item.isPinned } : item
        )));
      }
      if (action === 'archive') {
        const shouldSaveWorktree = thread.worktree?.location === 'worktree'
          && !thread.worktree.branch
          && thread.worktree.isResolvable
          && !thread.isPinned
          && !thread.runStatusLabel;
        if (shouldSaveWorktree) {
          thread.worktree.isResolvable = false;
          thread.worktree.hasRestorableSnapshot = true;
        }
        state.sidebar.items = sortSidebarItems(state.sidebar.items.map(item => (
          item.id === threadID ? { ...item, isArchived: true, isPinned: false, isSelected: false } : item
        )));
        if (state.sidebar.selectedThreadID === threadID) {
          stashComposerDraft(threadID);
          const next = state.sidebar.items.find(item => !item.isArchived);
          state.sidebar.selectedThreadID = next?.id || null;
          restoreComposerDraft(state.sidebar.selectedThreadID);
          state.sidebar.items = state.sidebar.items.map(item => ({ ...item, isSelected: item.id === state.sidebar.selectedThreadID }));
          state.topBar.primaryTitle = next?.title || 'QuillCode';
          if (!state.sidebar.selectedThreadID) {
            state.transcript.messages = [];
            state.transcript.toolCards = [];
            state.transcript.timelineItems = [];
          }
        }
      }
      if (action === 'unarchive') {
        stashComposerDraft(state.sidebar.selectedThreadID);
        restoreComposerDraft(threadID);
        state.sidebar.selectedThreadID = threadID;
        state.sidebar.items = sortSidebarItems(state.sidebar.items.map(item => (
          item.id === threadID
            ? { ...item, isArchived: false, isSelected: true }
            : { ...item, isSelected: false }
        )));
        state.topBar.primaryTitle = thread.title;
        if (thread.worktree?.hasRestorableSnapshot && !thread.worktree.isResolvable) {
          state.topBar.worktreeStatusLabel = 'Worktree saved';
          state.topBar.worktreeStatusDetail = 'This managed worktree was removed after archive and is ready to restore.';
          state.topBar.worktreeStatusIsWarning = false;
        }
      }
      if (action === 'delete') {
        state.sidebar.items = state.sidebar.items.filter(item => item.id !== threadID);
        if (state.sidebar.selectedThreadID === threadID) {
          const next = state.sidebar.items.find(item => !item.isArchived);
          state.sidebar.selectedThreadID = next?.id || null;
          restoreComposerDraft(state.sidebar.selectedThreadID);
          state.sidebar.items = state.sidebar.items.map(item => ({ ...item, isSelected: item.id === state.sidebar.selectedThreadID }));
          state.topBar.primaryTitle = next?.title || 'QuillCode';
          if (!state.sidebar.selectedThreadID) {
            state.transcript.messages = [];
            state.transcript.toolCards = [];
            state.transcript.timelineItems = [];
          }
        }
        if (state.threadDrafts) delete state.threadDrafts[threadID];
      }
      if (['duplicate', 'archive', 'unarchive', 'delete'].includes(action)) {
        recordWorkspaceNavigation(previousLocation);
      }
      if (action === 'delete') pruneWorkspaceNavigation();
      render();
    }

    function sortSidebarItems(items) {
      return [...items].sort((lhs, rhs) => {
        if (Boolean(lhs.isArchived) !== Boolean(rhs.isArchived)) return Number(lhs.isArchived) - Number(rhs.isArchived);
        if (Boolean(lhs.isPinned) !== Boolean(rhs.isPinned)) return Number(rhs.isPinned) - Number(lhs.isPinned);
        const lhsUpdatedAt = new Date(lhs.updatedAt || 0).getTime();
        const rhsUpdatedAt = new Date(rhs.updatedAt || 0).getTime();
        return (Number.isNaN(rhsUpdatedAt) ? 0 : rhsUpdatedAt) - (Number.isNaN(lhsUpdatedAt) ? 0 : lhsUpdatedAt);
      });
    }

    function setSidebarItemUpdatedAt(title, updatedAt) {
      state.sidebar.items = sortSidebarItems(state.sidebar.items.map(item => (
        item.title === title ? { ...item, updatedAt } : item
      )));
      render();
    }

    function addSidebarSavedSearch(title, query, id = null) {
      const savedID = saveSidebarSavedSearch(title, query, id);
      if (!savedID) return null;
      updateDynamicCommands();
      render();
      return savedID;
    }

    function syncSelectedThreadSearchText() {
      if (!state.sidebar.selectedThreadID) return;
      const messageText = state.transcript.messages.map(message => message.text).join('\n');
      const toolText = state.transcript.toolCards
        .map(card => [card.inputJSON || '', card.outputJSON || ''].join('\n'))
        .join('\n');
      const searchText = `${messageText}\n${toolText}`.slice(0, 8000);
      state.sidebar.items = state.sidebar.items.map(item => (
        item.id === state.sidebar.selectedThreadID ? { ...item, searchText } : item
      ));
    }

    function sendMessage(value) {
      const text = String(value).trim();
      const attachments = clonedPlainObject(state.composer.attachments || [], []);
      if (!text && !attachments.length) return;
      if (!attachments.length && runInstantStopSlashCommand(text)) return;
      // Never lock the composer: a submit DURING a live run enqueues as a follow-up chip
      // (drained at the next turn boundary by finishMockAgentTurn) instead of starting a turn.
      if (state.composer.isSending) {
        state.composer.followUpQueue.push({ id: crypto.randomUUID(), text, attachments });
        state.composer.draft = '';
        state.composer.attachments = [];
        state.composer.canSend = false;
        render();
        return;
      }
      if (!attachments.length && openBrowserSessionFromSlash(text)) return;
      if (!attachments.length && runInstantViewSlashCommand(text)) return;
      startMockAgentTurn(text, attachments);
    }

    function runInstantStopSlashCommand(text) {
      if (!/^\/(stop|cancel|abort)\b/i.test(text)) return false;
      runInstantSlashCommand(text, 'stop-all');
      return true;
    }

    function runInstantViewSlashCommand(text) {
      const projectCommandID = instantProjectSlashCommandID(text);
      if (projectCommandID) {
        runInstantSlashCommand(text, projectCommandID);
        return true;
      }

      const commandID = /^\/(focus|composer|input)\b/i.test(text)
        ? 'focus-composer'
        : /^\/(retry|rerun|again)\b/i.test(text)
          ? 'retry-last-turn'
          : /^\/(disconnect|disconnect-all)\b/i.test(text)
            ? 'disconnect-all'
            : /^\/(computer-use|computer\s+use)\b/i.test(text)
              ? 'computer-use-setup'
              : /^\/(back|previous|prev)\b/i.test(text)
                ? 'workspace-back'
                : /^\/history\s+(back|previous|prev)\b/i.test(text)
                  ? 'workspace-back'
                  : /^\/(forward|next)\b/i.test(text)
                  ? 'workspace-forward'
                    : /^\/history\s+(forward|next)\b/i.test(text)
                      ? 'workspace-forward'
                      : /^\/(sidebar|toggle-sidebar)\b/i.test(text)
                        ? 'toggle-sidebar'
                        : /^\/(copy|copy-conversation)\b/i.test(text)
                          ? 'copy-conversation'
                          : /^\/(export|export-markdown|export-conversation-markdown)\b/i.test(text)
                            ? 'export-conversation-markdown'
                            : null;
      if (!commandID) return false;
      runInstantSlashCommand(text, commandID);
      return true;
    }

    function instantProjectSlashCommandID(text) {
      const match = String(text || '').trim().match(/^\/project\s+(\S+)/i);
      if (!match) return null;
      const subcommand = match[1].toLowerCase();
      if (['open', 'add'].includes(subcommand)) return 'add-project';
      if (['new', 'new-chat', 'chat'].includes(subcommand)) return 'project-new-chat';
      if (['refresh', 'reload', 'context'].includes(subcommand)) return 'project-refresh-context';
      if (['init', 'initialize', 'agents', 'agents.md'].includes(subcommand)) return 'project-init';
      if (['top', 'move-top', 'move-to-top'].includes(subcommand)) return 'project-move-to-top';
      if (['up', 'move-up'].includes(subcommand)) return 'project-move-up';
      if (['down', 'move-down'].includes(subcommand)) return 'project-move-down';
      if (['bottom', 'move-bottom', 'move-to-bottom'].includes(subcommand)) return 'project-move-to-bottom';
      if (['list', 'ls', 'show'].includes(subcommand)) return 'project-list';
      if (['remove', 'forget', 'delete'].includes(subcommand)) return 'project-remove';
      return null;
    }

    function runInstantSlashCommand(text, commandID) {
      ensureThread(initialThreadTitleForPrompt(text));
      if (state.threadDrafts) delete state.threadDrafts[state.sidebar.selectedThreadID];
      state.composer.draft = '';
      state.composer.canSend = false;
      state.composer.slashActiveIndex = 0;
      state.composer.historyRecallIndex = null;
      state.composer.historySavedDraft = null;
      state.runtimeIssue = null;
      state.composer.isSending = false;
      state.topBar.agentStatus = 'Idle';
      addMessage('user', text);
      touchSelectedThread();
      runCommand(commandID);
      syncSelectedThreadSearchText();
    }

    function startMockAgentTurn(text, attachments = []) {
      ensureThread(initialThreadTitleForPrompt(text || attachments[0]?.name || 'Image'));
      if (state.threadDrafts) delete state.threadDrafts[state.sidebar.selectedThreadID];
      if (state.threadAttachments) delete state.threadAttachments[state.sidebar.selectedThreadID];
      state.composer.draft = '';
      state.composer.attachments = [];
      state.composer.canSend = false;
      state.composer.slashActiveIndex = 0;
      state.composer.historyRecallIndex = null;
      state.composer.historySavedDraft = null;
      state.runtimeIssue = null;
      addMessage('user', text, attachments);
      touchSelectedThread();
      state.composer.isSending = true;
      state.topBar.agentStatus = 'Running';
      render();
      window.setTimeout(() => completeMockAgentTurn(text), 0);
    }

    function deleteFollowUp(id) {
      state.composer.followUpQueue = state.composer.followUpQueue.filter(item => item.id !== id);
      render();
    }

    function finishMockAgentTurn() {
      state.composer.isSending = false;
      state.composer.canSend = composerHasContent();
      const halted = ['Failed', 'Stopped'].includes(state.topBar.agentStatus);
      if (!halted) {
        state.topBar.agentStatus = 'Idle';
        // Mirrors native: model usage is attached at turn end, then surfaced as a prominent
        // per-thread token budget meter. A fresh thread stays empty until its first turn.
        state.topBar.usageStatusLabel = mockTokenUsageLabel();
        state.topBar.tokenBudget = mockTokenBudget();
      }
      syncSelectedThreadSearchText();
      // Drain the next queued follow-up as the next turn — but only after a turn that finished
      // normally. A Stop/Failure halts the wave and leaves the remaining queue intact, mirroring
      // the native drain loop (which only continues after a completed outcome).
      if (!halted && state.composer.followUpQueue.length) {
        const next = state.composer.followUpQueue.shift();
        startMockAgentTurn(next.text, next.attachments || []);
        return;
      }
      render();
    }

    // Compact token count matching WorkspaceTokenUsageLabelBuilder.abbreviate (Swift):
    // exact below 1k, one-decimal k below 1m, one-decimal m above; the unit is chosen on
    // the ROUNDED value so 999999 reads "1m" (not "1000k").
    function abbreviateTokens(count) {
      const value = Math.max(0, count);
      if (value < 1000) return String(value);
      const trim = scaled => (scaled === Math.round(scaled) ? String(Math.round(scaled)) : scaled.toFixed(1));
      if (value < 1000000) {
        const thousands = Math.round((value / 1000) * 10) / 10;
        if (thousands < 1000) return trim(thousands) + 'k';
        // Rounding crossed into millions; fall through to the m unit.
      }
      return trim(Math.round((value / 1000000) * 10) / 10) + 'm';
    }

    function mockTokenCounts() {
      let prompt = 0;
      let completion = 0;
      for (const item of transcriptTimelineItems()) {
        if (item.kind === 'message') {
          const length = (item.message?.text || '').length;
          if (item.message?.role === 'assistant') completion += Math.ceil(length / 4);
          else prompt += Math.ceil(length / 4);
        } else if (item.kind === 'toolCard') {
          prompt += Math.ceil((transcriptCopyText(item) || '').length / 4);
        }
      }
      return { prompt, completion, total: prompt + completion };
    }

    // A mock per-thread token-usage label estimated from the transcript (chars/4), formatted
    // exactly like WorkspaceTokenUsageLabelBuilder.label (Swift): "<ctx> ctx · ↑<in> ↓<out>".
    function mockTokenUsageLabel() {
      const counts = mockTokenCounts();
      if (counts.total === 0) return null;
      return `${abbreviateTokens(counts.total)} ctx · ↑${abbreviateTokens(counts.prompt)} ↓${abbreviateTokens(counts.completion)}`;
    }

    function decimalTokens(count) {
      return String(Math.max(0, count)).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
    }

    function selectedModelContextWindowTokens() {
      const selectedModel = state.topBar.modelCategories
        .flatMap(category => category.models || [])
        .find(model => model.id === state.topBar.selectedModelID);
      const tokens = selectedModel?.capabilities?.contextWindowTokens;
      return Number.isFinite(tokens) && tokens > 0 ? tokens : 32000;
    }

    function mockTokenBudget() {
      const counts = mockTokenCounts();
      if (counts.total === 0) return null;
      const limit = selectedModelContextWindowTokens();
      const remaining = Math.max(0, limit - counts.total);
      const usedPercent = Math.max(0, Math.round((counts.total / limit) * 100));
      return {
        usedTokens: counts.total,
        limitTokens: limit,
        remainingTokens: remaining,
        usedPercent,
        progressPercent: Math.max(0, Math.min(100, usedPercent)),
        primaryLabel: `${abbreviateTokens(counts.total)} / ${abbreviateTokens(limit)} tokens`,
        secondaryLabel: `${abbreviateTokens(remaining)} left · ${usedPercent}% · estimated`,
        detailLabel: `Estimated token budget: ${decimalTokens(counts.total)} used of ${decimalTokens(limit)} · ${decimalTokens(remaining)} left · ${usedPercent}% used`,
        sourceLabel: 'Estimated',
        quotaLimits: []
      };
    }

    function completeMockAgentTurn(text) {
      let shouldFinishMockAgentTurn = true;
      try {
      const selectedProject = state.projects.items.find(project => project.id === state.projects.selectedProjectID);
      const isRemoteProject = Boolean(selectedProject?.isRemote);
      const browserTarget = browserOpenTargetFromPrompt(text);
      const fileWriteRequest = fileWriteRequestFromPrompt(text);
      const fileReadPath = fileReadPathFromPrompt(text);
      const fileSearchRequest = fileSearchRequestFromPrompt(text);
      if (text.toLowerCase().includes('grow other thread')) {
        // Grow the first thread that is NOT currently selected, in the background, so returning
        // to it shows the "N new turns" pill. Deterministic hook for the E2E harness.
        const other = state.sidebar.items.find(item => item.id !== state.sidebar.selectedThreadID);
        if (other) growThreadInBackground(other.id, 'Background result while you were away.');
        addMessage('assistant', 'Queued a background turn on another chat.');
      } else if (isOnlyNegatedActionRequest(text)) {
        addMessage('assistant', "Okay, I won't take that action.");
      } else if (text.toLowerCase().includes('stuck task') || text.toLowerCase().includes('slow task')) {
        const card = addToolCard({
          title: 'host.shell.run',
          subtitle: 'Running',
          status: 'running',
          inputJSON: JSON.stringify({ cmd: 'sleep 10 && whoami' }, null, 2),
          outputJSON: null
        });
        const runID = crypto.randomUUID();
        const delay = text.toLowerCase().includes('stuck task') ? 60000 : 2000;
        const timer = window.setTimeout(() => {
          if (!activeMockRun || activeMockRun.id !== runID) return;
          updateToolCardLifecycle(card, 'done', 'Completed');
          card.outputJSON = JSON.stringify({ ok: true, stdout: 'mock-user\\n', stderr: '', exitCode: 0 }, null, 2);
          card.artifacts = artifactsFromOutput(card.outputJSON);
          activeMockRun = null;
          addMessage('assistant', 'Long-running task completed.');
          // Route through the shared finisher so a queued follow-up drains as the next turn
          // (it clears isSending, sets Idle/usage, and pops the next follow-up if any).
          finishMockAgentTurn();
        }, delay);
        activeMockRun = { id: runID, timer };
        shouldFinishMockAgentTurn = false;
      } else if (text.toLowerCase().includes('trigger rate limit')) {
        state.topBar.agentStatus = 'Failed';
        const lastError = 'TrustedRouter request failed with HTTP 429: Rate limit exceeded. Retry-After: 120. x-ratelimit-remaining: 0';
        state.runtimeIssue = makeRuntimeIssue({
          severity: 'warning',
          title: 'TrustedRouter rate limit reached',
          message: 'TrustedRouter or the selected provider is rate limiting this request. Wait for reset, retry later, or switch models.',
          actionLabel: 'Switch model'
        }, lastError);

          actionLabel: 'Switch model'

          state.topBar.agentStatus = 'Failed';
          const lastError = 'TrustedRouter request timed out while connecting to https://api.trustedrouter.test/v1 with Bearer sk-tr-v1-secretDiagnosticToken';
          state.runtimeIssue = makeRuntimeIssue({

    function retryLastUserTurn() {
      const lastUserMessage = [...state.transcript.messages]
        .reverse()
        .find(message => (
          message.role === 'user'
            && String(message.text || '').trim()
            && !/^\/(retry|rerun|again|stop|cancel|abort)\b/i.test(String(message.text || '').trim())
        ));
      if (!lastUserMessage) return;
      sendMessage(lastUserMessage.text);
    }

    function addReviewComment(path, text) {
      const trimmed = (text || '').trim();
      if (!path || !trimmed) return;
      const file = state.review.files.find(file => file.path === path);
      if (!file) return;
      file.comments = file.comments || [];
      file.comments.push({ id: crypto.randomUUID(), path, text: trimmed });
      render();
    }

    function addReviewLineComment(path, lineNumber, lineKind, text) {
      const trimmed = (text || '').trim();
      if (!path || !lineNumber || !trimmed) return;
      const file = state.review.files.find(file => file.path === path);
      if (!file) return;
      const line = (file.hunks || [])
        .flatMap(hunk => hunk.lines || [])
        .find(line => line.lineNumber === lineNumber && line.kind === lineKind);
      if (!line) return;
      line.comments = line.comments || [];
      line.comments.push({ id: crypto.randomUUID(), path, lineNumber, lineKind, text: trimmed });
      render();
    }

    function addReviewRangeComment(path, start, end, text) {
      const trimmed = (text || '').trim();
      if (!path || !start || !end || !trimmed) return;
      const file = state.review.files.find(file => file.path === path);
      if (!file) return;
      const lower = Math.min(start, end);
      const upper = Math.max(start, end);
      const lines = (file.hunks || []).flatMap(hunk => hunk.lines || []);
      const startLine = lines.find(line => line.lineNumber === lower);
      const hasFullRange = Array.from({ length: upper - lower + 1 }, (_, index) => lower + index)
        .every(lineNumber => lines.some(line => line.lineNumber === lineNumber));
      if (!startLine || !hasFullRange) return;
      startLine.comments = startLine.comments || [];
      startLine.comments.push({
        id: crypto.randomUUID(),
        path,
        lineNumber: lower,
        endLineNumber: upper,
        text: trimmed
      });
      render();
    }

    function runReviewAction(action, path) {
      if (!path) return;
      if (action === 'open') {
        // Opening a changed file is a non-mutating read: emit a host.file.read tool
        // card and leave the review pane intact (no diff refresh, no clear).
        const selectedProject = state.projects.items.find(project => project.id === state.projects.selectedProjectID);
        runMockFileReadAction(path, selectedProject, selectedProject?.isRemote === true, { suppressAssistantMessage: true });
        render();
        return;
      }
      const toolMap = {
        restore: 'host.git.restore',
        stage_hunk: 'host.git.stage_hunk',
        restore_hunk: 'host.git.restore_hunk'
      };
      const toolName = toolMap[action] || 'host.git.stage';
      state.topBar.agentStatus = 'Running';
      addToolCard({
        title: toolName,
        subtitle: 'Completed',
        status: 'done',
        inputJSON: JSON.stringify({ path }, null, 2),
        outputJSON: JSON.stringify({ ok: true, stdout: '' }, null, 2)
      });
      addToolCard({
        title: 'host.git.diff',
        subtitle: 'Completed',
        status: 'done',
        inputJSON: JSON.stringify({}, null, 2),
        outputJSON: JSON.stringify({ ok: true, stdout: '' }, null, 2)
      });
      state.review = {
        title: 'Review changes',
        subtitle: 'Latest git diff',
        totalInsertions: 0,
        totalDeletions: 0,
        totalHunks: 0,
        files: [],
        pullRequestThreads: []
      };
      state.topBar.agentStatus = 'Idle';
      render();
    }

    function runPullRequestReviewThreadAction(action, threadID) {
      if (!threadID) return;
      const shouldResolve = action !== 'unresolve';
      state.topBar.agentStatus = 'Running';
      addToolCard({
        title: 'host.git.pr.review_thread',
        subtitle: 'Completed',
        status: 'done',
        inputJSON: JSON.stringify({ threadId: threadID, action: shouldResolve ? 'resolve' : 'unresolve' }, null, 2),
        outputJSON: JSON.stringify({ ok: true, stdout: '', stderr: '', exitCode: 0 }, null, 2)
      });

      const currentPayload = mockPullRequestReviewThreadsPayload(shouldResolve);
      const refreshed = reviewThreadSurfaceFromPayload(currentPayload);
      state.review = {
        ...state.review,
        title: refreshed.title,
        subtitle: refreshed.subtitle,
        pullRequestThreads: refreshed.pullRequestThreads
      };
      addToolCard({
        title: 'host.git.pr.review_threads',
        subtitle: 'Completed',
        status: 'done',
        inputJSON: JSON.stringify({ selector: '123' }, null, 2),
        outputJSON: JSON.stringify({ ok: true, stdout: JSON.stringify(currentPayload, null, 2), stderr: '', exitCode: 0 }, null, 2)
      });
      addMessage('assistant', `${shouldResolve ? 'Resolved' : 'Reopened'} review thread ${threadID}.`);
      state.topBar.agentStatus = 'Idle';
      render();
    }

    function runPullRequestReviewThreadReply(request) {
      const body = String(request?.body || '').trim();
      if (!request?.threadID || !Number.isFinite(request.commentID) || !body) return;
      state.topBar.agentStatus = 'Running';
      const input = {
        commentId: request.commentID,
        body
      };
      if (request.selector) input.selector = request.selector;
      addToolCard({
        title: 'host.git.pr.review_reply',
        subtitle: 'Completed',
        status: 'done',
        inputJSON: JSON.stringify(input, null, 2),
        outputJSON: JSON.stringify({ ok: true, stdout: '', stderr: '', exitCode: 0 }, null, 2)
      });

      const currentPayload = mockPullRequestReviewThreadsPayload(false);
      const refreshed = reviewThreadSurfaceFromPayload(currentPayload);
      state.review = {
        ...state.review,
        title: refreshed.title,
        subtitle: refreshed.subtitle,
        pullRequestThreads: refreshed.pullRequestThreads,
        activeReplyThreadID: null
      };
      addToolCard({
        title: 'host.git.pr.review_threads',
        subtitle: 'Completed',
        status: 'done',
        inputJSON: JSON.stringify({ selector: request.selector || '123' }, null, 2),
        outputJSON: JSON.stringify({ ok: true, stdout: JSON.stringify(currentPayload, null, 2), stderr: '', exitCode: 0 }, null, 2)
      });
      addMessage('assistant', `Replied to review comment ${request.commentID}.`);
      state.topBar.agentStatus = 'Idle';
      render();
    }

    function shortcutMatches(event, shortcut) {
      if (!shortcut) return false;
      const parts = shortcut.split('+').map(part => part.trim().toLowerCase()).filter(Boolean);
      const key = normalizedShortcutKey(parts.at(-1));
      const requiresCmd = parts.includes('cmd');
      const requiresCtrl = parts.includes('ctrl');
      const requiresShift = parts.includes('shift');
      const requiresOption = parts.includes('option');
      const eventKey = normalizedShortcutKey(event.key === 'Escape' ? 'esc' : event.key);
      return event.metaKey === requiresCmd
        && event.ctrlKey === requiresCtrl
        && event.shiftKey === requiresShift
        && event.altKey === requiresOption
        && eventKey === key;
    }

    function normalizedShortcutKey(key) {
      switch (String(key || '').trim().toLowerCase()) {
      case '←':
      case 'left':
      case 'arrowleft':
        return 'arrowleft';
      case '→':
      case 'right':
      case 'arrowright':
        return 'arrowright';
      default:
        return String(key || '').trim().toLowerCase();
      }
    }

    document.addEventListener('keydown', event => {
      if (handleCommandPaletteKeydown(event)) return;
      if (handleModalEscape(event)) return;
      if (handleAttentionTriageKeydown(event)) return;
      updateDynamicCommands();
      const command = state.commands.find(candidate => (
        candidate.isEnabled && shortcutMatches(event, candidate.shortcut)
      ));
      if (!command) return;
      // Tab is the universal focus-traversal key. Only let a Tab-bound shortcut (cycle-mode)
      // fire when focus is on the composer or not in an editable field — otherwise leave
      // Shift+Tab to move focus backward through search boxes, the terminal, dialogs, etc.,
      // instead of silently changing the agent's approval mode out from under the user.
      if (event.key === 'Tab' && !focusAllowsTabShortcut()) return;
      event.preventDefault();
      runCommand(command.id);
    });

    // Morning-triage keyboard triage (issue #877): j/k/Enter/a/d act on the Attention section. They are
    // bare single-letter keys, so they must NOT fire while typing in ANY editable field — including the
    // composer (BLOCKER-3 fix: the composer is emphatically NOT a shortcut-allowed context here, unlike
    // Tab-cycling; letting these fire in the composer would eat the user's keystroke via preventDefault
    // and silently triage/open runs). Native scopes its `.onKeyPress` to the Attention section view, so
    // it likewise never fires from the composer; this guard is that section-scoping's behavioral mirror.
    // They require no modifiers and only apply when the Attention section actually has rows.
    function attentionTriageContextIsActive() {
      // The section must actually exist with rows to act on.
      if (!attentionRows().length) return false;
      // MINOR parity: native scopes these keys to the Attention section view via .onKeyPress, so they
      // fire only when that section is the active context. Mirror that here rather than firing for ANY
      // non-editable focus:
      const active = document.activeElement;
      // Never while focus is in an editable field (composer, search box, terminal entry, etc.).
      if (active) {
        if (active.isContentEditable) return false;
        const tag = active.tagName;
        if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return false;
      }
      // The Attention section is scoped to the sidebar; when the digest is open its own key handlers
      // (and the backdrop) own the interaction, so cursor/triage keys should not fire from underneath it.
      if (state.attentionDigestThreadID) return false;
      // Focus must be the section's context: the body/no-focus (nothing else claims the keys) or an
      // element inside the sidebar (where the Attention section lives) — not an unrelated focused control.
      if (!active || active === document.body) return true;
      const sidebar = document.querySelector('[data-testid="sidebar"]');
      return !!(sidebar && sidebar.contains(active));
    }
    function handleAttentionTriageKeydown(event) {
      if (event.metaKey || event.ctrlKey || event.altKey || event.shiftKey) return false;
      if (!attentionTriageContextIsActive()) return false;
      const key = String(event.key || '').toLowerCase();
      const routes = {
        j: 'attention-next',
        k: 'attention-previous',
        a: 'attention-acknowledge',
        d: 'attention-dismiss',
        enter: 'attention-open'
      };
      const commandID = routes[key];
      if (!commandID) return false;
      event.preventDefault();
      runCommand(commandID);
      return true;
    }

    // The composer is the one editable field where Tab shortcuts are intended (Shift+Tab cycles
    // mode, plain Tab accepts a suggestion). Everywhere else, Tab/Shift+Tab is focus traversal.
    function focusAllowsTabShortcut() {
      const active = document.activeElement;
      if (!active) return true;
      if (active.getAttribute && active.getAttribute('aria-label') === 'Message') return true;
      const editable = active.isContentEditable
        || active.tagName === 'INPUT'
        || active.tagName === 'TEXTAREA';
      return !editable;
    }

    function instructionKeepReferenceActions(item) {
      if (item.statusLabel !== 'conflict' || !Array.isArray(item.sourceReferences) || item.sourceReferences.length !== 2) {
        return [];
      }
      return item.sourceReferences.map((reference, index) => ({
        title: `Keep ${reference.role || `${reference.path}:${reference.lineNumber}`}`,
        commandID: `activity-instruction-apply:${index}:${item.id}`,
        kind: 'apply'
      }));
    }

    window.__quillCodeCommandRoutingAudit = commandRoutingAuditReport;
    // Test hook (issue #877): seed the sidebar with threads carrying morning-triage verdict stamps so
    // Playwright can drive the Attention section deterministically. Each spec: { id, title, verdict,
    // summary, unseenCount, reasons, outcome, updatedAt? }.
    //
    // The unseen count is WATERMARK-DERIVED (not a fixed field): a thread gets a message-turn count and a
    // `attentionLastSeenTurn` watermark, and unseen = turns after the watermark. This is what lets
    // Playwright catch the "cursoring zeroes passed-over badges" class of bug — if navigation wrongly
    // advanced a thread's watermark, its derived unseen count would drop, and the test would see it.
    window.__quillCodeTestSeedAttentionThreads = function(specs) {
      state.sidebar.selectedThreadID = null;
      state.attentionDigestThreadID = null;
      state.attentionCursorID = null;
      state.sidebar.items = (specs || []).map((spec, index) => {
        const unseen = Math.max(0, spec.unseenCount || 0);
        // Give the thread enough turns to carry `unseen` unseen turns after the watermark. The watermark
        // index sits `unseen` turns before the tail; unseen === attentionMessageTurns - 1 - lastSeenTurn.
        const attentionMessageTurns = unseen + 1;
        return {
          id: spec.id,
          title: spec.title,
          subtitle: state.topBar.modelLabel,
          searchText: '',
          updatedAt: spec.updatedAt || new Date(Date.now() - index * 1000).toISOString(),
          isSelected: false,
          isPinned: false,
          isArchived: false,
          integrityVerdict: spec.verdict || null,
          verdictSummary: spec.summary || '',
          attentionMessageTurns,
          attentionLastSeenTurn: attentionMessageTurns - 1 - unseen,
          triageState: spec.triageState || 'pending',
          digestReasons: spec.reasons || [],
          digestOutcome: spec.outcome || 'No final answer recorded.'
        };
      });
      render();
    };
    window.__quillCodeTestSetThreadRunStatus = function(threadID, status) {
      state.sidebar.items = state.sidebar.items.map(item => (
        item.id === threadID ? { ...item, runStatusLabel: status || null } : item
      ));
      render();
    };
    window.__quillCodeTestCreateMonitorAutomation = createMonitorAutomation;
    window.__quillCodeTestAddInstructionConflict = function() {
      state.activity.instructionDiagnostics = [{
        id: 'instruction-semantic-conflict-tests-agents-md-sources-feature-agents-md',
        title: 'Conflicting instruction intent',
        detail: 'Tests: AGENTS.md says require; Sources/Feature/AGENTS.md says avoid',
        kind: 'instruction-diagnostic',
        statusLabel: 'conflict',
        sourceReferences: [
          {
            path: 'AGENTS.md',
            lineNumber: 1,
            role: 'requires tests',
            excerpt: 'Always run tests.'
          },
          {
            path: 'Sources/Feature/AGENTS.md',
            lineNumber: 1,
            role: 'avoids tests',
            excerpt: 'Do not run tests.'
          }
        ]
      }];
      state.activity.dismissedInstructionDiagnostics = [];
      state.activity.isVisible = true;
      render();
    };

    render();
  </script>
</body>
</html>
