    function setMCPStatus(id, status) {
      const item = state.extensions.items.find(item => item.id === id && item.kind === 'mcp_server');
      if (!item) return;
      item.statusLabel = status;
      if (status === 'Ready' || status === 'Running' || status === 'Probing') {
        item.serverLabel = 'Fixture MCP 1.0.0';
        item.protocolLabel = 'MCP 2024-11-05';
        item.toolCountLabel = '2 tools';
        item.toolDescriptors = [
          {
            name: 'read_file',
            description: 'Read a workspace file.',
            requiredArguments: ['path'],
            optionalArguments: [],
            schemaSummary: 'required: path:string'
          },
          {
            name: 'write_file',
            description: 'Write a workspace file.',
            requiredArguments: ['path', 'content'],
            optionalArguments: ['overwrite'],
            schemaSummary: 'required: content:string, path:string; optional: overwrite:boolean'
          }
        ];
        item.toolNames = ['read_file', 'write_file'];
        item.resourceCountLabel = '2 resources';
        item.resourceNames = ['README', 'Project config'];
        item.resourceActions = [
          {
            title: 'README',
            detail: 'file:///workspace/README.md',
            commandID: `mcp-resource:${id}:0`
          },
          {
            title: 'Project config',
            detail: 'file:///workspace/.quillcode/config.toml',
            commandID: `mcp-resource:${id}:1`
          }
        ];
        item.promptCountLabel = '1 prompt';
        item.promptNames = ['summarize_project'];
        item.promptActions = [
          {
            title: 'summarize_project',
            commandID: `mcp-prompt:${id}:0`
          }
        ];
        item.probeError = null;
        item.startCommandID = null;
        item.stopCommandID = `mcp-stop:${id}`;
      } else {
        item.serverLabel = null;
        item.protocolLabel = null;
        item.toolCountLabel = null;
        item.toolDescriptors = [];
        item.toolNames = [];
        item.resourceCountLabel = null;
        item.resourceNames = [];
        item.resourceActions = [];
        item.promptCountLabel = null;
        item.promptNames = [];
        item.promptActions = [];
        item.probeError = null;
        item.startCommandID = `mcp-start:${id}`;
        item.stopCommandID = null;
      }
      const startCommand = state.commands.find(command => command.id === `mcp-start:${id}`);
      const stopCommand = state.commands.find(command => command.id === `mcp-stop:${id}`);
      const isActive = status === 'Ready' || status === 'Running' || status === 'Probing';
      if (startCommand) startCommand.isEnabled = !isActive;
      if (stopCommand) stopCommand.isEnabled = isActive;
      state.commands
        .filter(command => command.id.startsWith(`mcp-resource:${id}:`) || command.id.startsWith(`mcp-prompt:${id}:`))
        .forEach(command => {
          command.isEnabled = status === 'Ready';
        });
      const selectedRemoteProject = Boolean(selectedProject()?.isRemote);
      const stopAll = state.commands.find(command => command.id === 'stop-all');
      if (stopAll) {
        stopAll.isEnabled = state.composer.isSending
          || state.terminal.isRunning
          || state.extensions.items.some(item => item.kind === 'mcp_server' && ['Ready', 'Running', 'Probing'].includes(item.statusLabel));
      }
      const disconnectAll = state.commands.find(command => command.id === 'disconnect-all');
      if (disconnectAll) {
        disconnectAll.isEnabled = selectedRemoteProject
          || state.extensions.items.some(item => item.kind === 'mcp_server' && ['Ready', 'Running', 'Probing'].includes(item.statusLabel));
      }
    }

    function runTerminalCommand() {
      if (state.terminal.isRunning) {
        sendTerminalInput();
        return;
      }
      const command = state.terminal.draft.trim();
      if (!command) return;
      state.terminal.draft = '';
      state.terminal.historyCursor = null;
      state.terminal.historyDraft = null;
      state.terminal.isVisible = true;
      state.terminal.isRunning = true;
      state.terminal.isSuspended = false;
      const cwd = state.terminal.cwdLabel;
      const entry = {
        command,
        stdout: '',
        stderr: '',
        stdoutRuns: null,
        stderrRuns: null,
        exitCode: null,
        ok: false,
        status: 'running',
        mouseReporting: null,
        mouseEvents: [],
        lastMouseSequenceLabel: '',
        keyboardMode: { applicationCursorKeys: false, bracketedPaste: false },
        keyboardEvents: [],
        lastKeyboardSequenceLabel: '',
        executionContext: executionContextForCWD(cwd)
      };
      state.terminal.entries.push(entry);
      updateDynamicCommands();
      render();

      if (command === 'mouse-demo') {
        entry.stdout = 'mouse-ready\n';
        entry.mouseReporting = {
          trackingMode: 'buttonMotion',
          encoding: 'sgr',
          isEnabled: true
        };
        activeTerminalRun = { entry, timer: null, kind: 'mouse' };
        render();
        return;
      }

      if (command === 'tui-demo') {
        entry.stdout = 'keyboard-ready\n';
        entry.keyboardMode = { applicationCursorKeys: true, bracketedPaste: true };
        state.terminal.keyboardMode = { ...entry.keyboardMode };
        activeTerminalRun = { entry, timer: null, kind: 'keyboard' };
        render();
        return;
      }

      if (terminalWaitsForInput(command)) {
        entry.stdout += 'input? ';
        activeTerminalRun = { entry, timer: null, kind: 'stdin' };
        render();
        return;
      }

      const streamingOutput = terminalStreamingOutput(command);
      if (streamingOutput) {
        window.setTimeout(() => {
          if (activeTerminalRun?.entry !== entry || terminalStatus(entry) !== 'running') {
            return;
          }
          entry.stdout += streamingOutput;
          render();
        }, 80);
      }

      const completionDelay = command === 'stream-demo' ? 700 : /^sleep\s+/.test(command) ? 5000 : 250;
      const timer = window.setTimeout(() => {
        if (activeTerminalRun?.entry !== entry || terminalStatus(entry) !== 'running') {
          return;
        }
        const environment = { ...state.terminal.environment };
        const output = terminalOutput(command, cwd, environment);
        entry.stdout = output.stdout;
        entry.stderr = output.stderr;
        entry.stdoutRuns = output.stdoutRuns || null;
        entry.stderrRuns = output.stderrRuns || null;
        entry.exitCode = output.exitCode;
        entry.ok = output.exitCode === 0;
        entry.status = entry.ok ? 'done' : 'failed';
        state.terminal.cwdLabel = output.cwd || cwd;
        state.terminal.environment = output.environment || environment;
        state.terminal.isRunning = false;
        state.terminal.keyboardMode = { applicationCursorKeys: false, bracketedPaste: false };
        activeTerminalRun = null;
        updateDynamicCommands();
        render();
      }, completionDelay);
      activeTerminalRun = { entry, timer };
    }

    function sendTerminalInput() {
      const input = state.terminal.draft;
      if (!input || !activeTerminalRun?.entry || terminalStatus(activeTerminalRun.entry) !== 'running') return;
      state.terminal.draft = '';
      state.terminal.historyCursor = null;
      state.terminal.historyDraft = null;

      if (activeTerminalRun.kind === 'stdin') {
        const entry = activeTerminalRun.entry;
        entry.stdout += `hello:${input.trim()}\n`;
        entry.stderr = '';
        entry.exitCode = 0;
        entry.ok = true;
        entry.status = 'done';
        state.terminal.isRunning = false;
        state.terminal.keyboardMode = { applicationCursorKeys: false, bracketedPaste: false };
        activeTerminalRun = null;
        updateDynamicCommands();
        render();
        return;
      }

      activeTerminalRun.entry.stdin = `${activeTerminalRun.entry.stdin || ''}${input}\n`;
      render();
    }

    function bindTerminalMouseHandlers() {
      document.querySelectorAll('[data-terminal-mouse-input="true"]').forEach(output => {
        output.addEventListener('pointerdown', event => {
          const button = terminalPointerButton(event.button);
          if (!button) return;
          event.preventDefault();
          output.setPointerCapture?.(event.pointerId);
          sendTerminalMouseEvent(output, event, 'press', button);
        });
        output.addEventListener('pointermove', event => {
          const entry = terminalEntryForMouseOutput(output);
          if (!entry) return;
          const pressedButton = terminalPressedPointerButton(event.buttons);
          if (pressedButton) {
            sendTerminalMouseEvent(output, event, 'motion', pressedButton);
          } else if (entry.mouseReporting?.trackingMode === 'anyMotion') {
            sendTerminalMouseEvent(output, event, 'motion', 'none');
          }
        });
        output.addEventListener('pointerup', event => {
          const button = terminalPointerButton(event.button);
          if (!button) return;
          event.preventDefault();
          sendTerminalMouseEvent(output, event, 'release', button);
          output.releasePointerCapture?.(event.pointerId);
        });
        output.addEventListener('wheel', event => {
          if (event.deltaX === 0 && event.deltaY === 0) return;
          event.preventDefault();
          const kind = Math.abs(event.deltaY) >= Math.abs(event.deltaX)
            ? (event.deltaY < 0 ? 'scrollUp' : 'scrollDown')
            : (event.deltaX < 0 ? 'scrollLeft' : 'scrollRight');
          sendTerminalMouseEvent(output, event, kind, 'none');
        }, { passive: false });
        output.addEventListener('contextmenu', event => event.preventDefault());
      });
      document.querySelectorAll('[data-terminal-keyboard-input="true"]').forEach(output => {
        output.addEventListener('keydown', event => {
          if (event.metaKey) return;
          const sequence = terminalKeyboardSequence(event);
          if (!sequence) return;
          event.preventDefault();
          sendTerminalKeyboardSequence(output, sequence);
        });
        output.addEventListener('paste', event => {
          const text = event.clipboardData?.getData('text/plain') || '';
          if (!text) return;
          event.preventDefault();
          const entry = terminalEntryForKeyboardOutput(output);
          if (!entry) return;
          const sanitized = text.replaceAll('\u001b[200~', '').replaceAll('\u001b[201~', '');
          const sequence = entry.keyboardMode?.bracketedPaste
            ? `\u001b[200~${sanitized}\u001b[201~`
            : sanitized;
          sendTerminalKeyboardSequence(output, sequence);
        });
      });
    }

    function terminalEntryForKeyboardOutput(output) {
      const index = Number(output.dataset.terminalEntryIndex);
      const entry = Number.isInteger(index) ? state.terminal.entries[index] : null;
      if (!entry || activeTerminalRun?.entry !== entry || terminalStatus(entry) !== 'running') return null;
      return entry;
    }

    function terminalKeyboardSequence(event) {
      const modifier = 1 + (event.shiftKey ? 1 : 0) + (event.altKey ? 2 : 0) + (event.ctrlKey ? 4 : 0);
      const applicationMode = Boolean(activeTerminalRun?.entry?.keyboardMode?.applicationCursorKeys);
      const cursor = final => modifier > 1
        ? `\u001b[1;${modifier}${final}`
        : applicationMode ? `\u001bO${final}` : `\u001b[${final}`;
      const tilde = code => modifier > 1 ? `\u001b[${code};${modifier}~` : `\u001b[${code}~`;
      const special = {
        ArrowUp: cursor('A'), ArrowDown: cursor('B'), ArrowRight: cursor('C'), ArrowLeft: cursor('D'),
        Home: cursor('H'), End: cursor('F'), PageUp: tilde(5), PageDown: tilde(6),
        Insert: tilde(2), Delete: tilde(3), Enter: '\r', Escape: '\u001b', Backspace: '\u007f',
        Tab: event.shiftKey ? '\u001b[Z' : (modifier === 1 ? '\t' : `\u001b[1;${modifier}I`)
      };
      if (special[event.key]) return special[event.key];
      if (event.key.length !== 1) return '';
      let text = event.ctrlKey
        ? String.fromCharCode(event.key.toLowerCase().charCodeAt(0) & 0x1f)
        : event.key;
      if (event.altKey) text = `\u001b${text}`;
      return text;
    }

    function sendTerminalKeyboardSequence(output, sequence) {
      const entry = terminalEntryForKeyboardOutput(output);
      if (!entry || !sequence) return;
      const label = sequence.replaceAll('\u001b', 'ESC').replaceAll('\r', 'CR').replaceAll('\t', 'TAB');
      entry.keyboardEvents.push(sequence);
      entry.stdin = `${entry.stdin || ''}${sequence}`;
      entry.lastKeyboardSequenceLabel = label;
      output.dataset.terminalKeyboardEventCount = String(entry.keyboardEvents.length);
      output.dataset.lastTerminalKeyboardSequence = label;
    }

    function terminalPointerButton(buttonNumber) {
      if (buttonNumber === 0) return 'left';
      if (buttonNumber === 1) return 'middle';
      if (buttonNumber === 2) return 'right';
      return null;
    }

    function terminalPressedPointerButton(buttonMask) {
      if ((buttonMask & 1) === 1) return 'left';
      if ((buttonMask & 4) === 4) return 'middle';
      if ((buttonMask & 2) === 2) return 'right';
      return null;
    }

    function terminalEntryForMouseOutput(output) {
      const index = Number(output.dataset.terminalEntryIndex);
      const entry = Number.isInteger(index) ? state.terminal.entries[index] : null;
      if (!entry || activeTerminalRun?.entry !== entry || !terminalAcceptsMouseInput(entry)) return null;
      return entry;
    }

    function sendTerminalMouseEvent(output, event, kind, button) {
      const entry = terminalEntryForMouseOutput(output);
      if (!entry) return;
      const mode = entry.mouseReporting.trackingMode;
      if (kind === 'motion' && mode === 'button') return;
      if (kind === 'motion' && button === 'none' && mode !== 'anyMotion') return;

      const rect = output.getBoundingClientRect();
      const column = Math.max(1, Math.min(Math.ceil(rect.width / 8.4), Math.floor((event.clientX - rect.left) / 8.4) + 1));
      const row = Math.max(1, Math.min(Math.ceil(rect.height / 18), Math.floor((event.clientY - rect.top) / 18) + 1));
      const positionKey = `${column}:${row}:${button}`;
      if (kind === 'motion' && entry.lastMousePositionKey === positionKey) return;
      entry.lastMousePositionKey = kind === 'motion' ? positionKey : null;

      const baseCode = kind === 'scrollUp' ? 64
        : kind === 'scrollDown' ? 65
          : kind === 'scrollLeft' ? 66
            : kind === 'scrollRight' ? 67
              : button === 'left' ? 0
                : button === 'middle' ? 1
                  : button === 'right' ? 2
                    : 3;
      const modifierCode = (event.shiftKey ? 4 : 0) + (event.altKey ? 8 : 0) + (event.ctrlKey ? 16 : 0);
      const code = baseCode + modifierCode + (kind === 'motion' ? 32 : 0);
      const terminator = kind === 'release' ? 'm' : 'M';
      const sequence = `\u001b[<${code};${column};${row}${terminator}`;
      const label = sequence.replace('\u001b', 'ESC');
      entry.mouseEvents.push({ kind, button, column, row, sequence });
      entry.stdin = `${entry.stdin || ''}${sequence}`;
      entry.lastMouseSequenceLabel = label;
      output.dataset.terminalMouseEventCount = String(entry.mouseEvents.length);
      output.dataset.lastTerminalMouseSequence = label;
    }

    function setTerminalDraft(value) {
      state.terminal.draft = value;
      state.terminal.historyCursor = null;
      state.terminal.historyDraft = null;
    }

    function terminalCommandHistory() {
      return state.terminal.entries
        .filter(entry => terminalStatus(entry) !== 'running')
        .map(entry => entry.command.trim())
        .filter(Boolean);
    }

    function recallPreviousTerminalCommand() {
      const history = terminalCommandHistory();
      if (!history.length || state.terminal.isRunning) return false;
      if (state.terminal.historyCursor === null) {
        state.terminal.historyDraft = state.terminal.draft;
        state.terminal.historyCursor = history.length - 1;
      } else if (state.terminal.historyCursor > 0) {
        state.terminal.historyCursor -= 1;
      } else {
        return false;
      }
      state.terminal.draft = history[state.terminal.historyCursor];
      return true;
    }

    function recallNextTerminalCommand() {
      const history = terminalCommandHistory();
      if (state.terminal.historyCursor === null || state.terminal.isRunning) return false;
      const next = state.terminal.historyCursor + 1;
      if (next < history.length) {
        state.terminal.historyCursor = next;
        state.terminal.draft = history[next];
      } else {
        state.terminal.historyCursor = null;
        state.terminal.draft = state.terminal.historyDraft || '';
        state.terminal.historyDraft = null;
      }
      return true;
    }

    function terminalOutput(command, cwd, environment) {
      if (isSSHRemoteLabel(cwd)) {
        return remoteTerminalOutput(command, cwd, environment);
      }
      if (command === 'stream-demo') {
        return { stdout: 'stream-start\nstream-end\n', stderr: '', exitCode: 0, cwd, environment };
      }
      if (command === 'ansi-demo') {
        return {
          stdout: 'success warning',
          stderr: 'failed',
          stdoutRuns: [
            { text: 'success', style: { foreground: '#00CD00', isBold: true } },
            { text: ' ', style: {} },
            { text: 'warning', style: { foreground: '#CDCD00', isItalic: true, isUnderlined: true } }
          ],
          stderrRuns: [
            { text: 'failed', style: { foreground: '#CD0000', isStrikethrough: true } }
          ],
          exitCode: 0,
          cwd,
          environment
        };
      }
      if (command === 'pwd') {
        return { stdout: cwd + '\n', stderr: '', exitCode: 0, cwd, environment };
      }
      if (/^cd(?:\s+|$)/.test(command)) {
        const target = command.replace(/^cd\s*/, '').trim() || '/mock/QuillCode';
        return { stdout: '', stderr: '', exitCode: 0, cwd: normalizeMockTerminalPath(cwd, target), environment };
      }
      if (/^export\s+[A-Za-z_][A-Za-z0-9_]*=/.test(command)) {
        const assignment = command.replace(/^export\s+/, '');
        const equalsIndex = assignment.indexOf('=');
        const key = assignment.slice(0, equalsIndex);
        const value = unquoteShellValue(assignment.slice(equalsIndex + 1));
        environment[key] = value;
        return { stdout: '', stderr: '', exitCode: 0, cwd, environment };
      }
      if (/^unset\s+[A-Za-z_][A-Za-z0-9_]*$/.test(command)) {
        const key = command.replace(/^unset\s+/, '');
        delete environment[key];
        return { stdout: '', stderr: '', exitCode: 0, cwd, environment };
      }
      const printfVariable = command.match(/^printf\s+'%s'\s+"?\$([A-Za-z_][A-Za-z0-9_]*)"?$/);
      if (printfVariable) {
        return { stdout: environment[printfVariable[1]] || '', stderr: '', exitCode: 0, cwd, environment };
      }
      const printfFallback = command.match(/^printf\s+'%s'\s+"\$\{([A-Za-z_][A-Za-z0-9_]*):-(.*)\}"$/);
      if (printfFallback) {
        return { stdout: environment[printfFallback[1]] || printfFallback[2], stderr: '', exitCode: 0, cwd, environment };
      }
      if (command === 'whoami') {
        return { stdout: 'mock-user\n', stderr: '', exitCode: 0, cwd, environment };
      }
      if (command.startsWith('printf ')) {
        return { stdout: command.replace(/^printf\s+/, ''), stderr: '', exitCode: 0, cwd, environment };
      }
      if (command === 'false') {
        return { stdout: '', stderr: '', exitCode: 1, cwd, environment };
      }
      return { stdout: 'ran: ' + command + '\n', stderr: '', exitCode: 0, cwd, environment };
    }

    function remoteTerminalOutput(command, cwd, environment) {
      if (command === 'pwd') {
        return { stdout: sshRemotePath(cwd) + '\n', stderr: '', exitCode: 0, cwd, environment };
      }
      if (command === 'whoami') {
        return { stdout: 'quill\n', stderr: '', exitCode: 0, cwd, environment };
      }
      if (command === "command -v openclaw || which openclaw || echo 'not found'") {
        return { stdout: '/usr/local/bin/openclaw\n', stderr: '', exitCode: 0, cwd, environment };
      }
      if (/^cd(?:\s+|$)/.test(command)) {
        const target = command.replace(/^cd\s*/, '').trim() || '~';
        return {
          stdout: '',
          stderr: '',
          exitCode: 0,
          cwd: sshRemoteLabelWithPath(cwd, normalizeMockTerminalPath(sshRemotePath(cwd), target)),
          environment
        };
      }
      if (command.startsWith('printf ')) {
        return { stdout: command.replace(/^printf\s+/, ''), stderr: '', exitCode: 0, cwd, environment };
      }
      return {
        stdout: `ssh ${cwd}: ran: ${command}\n`,
        stderr: '',
        exitCode: 0,
        cwd,
        environment
      };
    }

    function isSSHRemoteLabel(value) {
      return /^ssh:\/\//.test(String(value));
    }

    function sshRemotePath(label) {
      try {
        return new URL(label).pathname || '/';
      } catch {
        const match = String(label).match(/^ssh:\/\/[^/]+(?<path>\/.*)$/);
        return match?.groups?.path || '/';
      }
    }

    function sshRemoteLabelWithPath(label, path) {
      try {
        const url = new URL(label);
        url.pathname = path;
        return url.toString().replace(/\/$/, path === '/' ? '/' : '');
      } catch {
        return label;
      }
    }

    function unquoteShellValue(value) {
      if ((value.startsWith("'") && value.endsWith("'")) || (value.startsWith('"') && value.endsWith('"'))) {
        return value.slice(1, -1);
      }
      return value;
    }

    function shellSingleQuoted(value) {
      return `'${String(value).replaceAll("'", "'\"'\"'")}'`;
    }

    function cleanNaturalCommandFragment(value) {
      return String(value || '')
        .trim()
        .replace(/^(?:please\s+)?(?:can\s+you\s+)?(?:could\s+you\s+)?(?:would\s+you\s+)?/i, '')
        .replace(/[?.!]+$/g, '')
        .trim();
    }

    function shellCommandFromPrompt(text) {
      const quoted = text.match(/`([^`]+)`/)?.[1]?.trim();
      if (quoted) return quoted;

      const trimmed = String(text || '').trim();
      if (/^whoami[?.!]?$/i.test(trimmed)) return 'whoami';

      const runMatch = trimmed.match(/^(?:please\s+)?(?:can\s+you\s+)?(?:could\s+you\s+)?(?:would\s+you\s+)?(?:run|execute)\s+(.+)$/i);
      if (runMatch) return cleanNaturalCommandFragment(runMatch[1]) || 'whoami';

      if (/\bwhoami\b/i.test(trimmed)) return 'whoami';
      return cleanNaturalCommandFragment(trimmed.replace(/^run\s+/i, '')) || 'whoami';
    }

    function promptWordSet(text) {
      return new Set(String(text || '').toLowerCase().split(/[^a-z0-9]+/).filter(Boolean));
    }

    function isOnlyNegatedActionRequest(text) {
      const clauses = String(text || '')
        .split(/;|[?!]|\n|\.(?:\s|$)/)
        .map(segment => segment.trim())
        .filter(Boolean);
      if (!clauses.length) return false;
      const hasNegatedAction = clauses.some(containsNegatedActionIntent);
      if (!hasNegatedAction) return false;
      return !clauses
        .filter(segment => !containsNegatedActionIntent(segment))
        .some(containsActionIntent);
    }

    function containsNegatedActionIntent(segment) {
      const tokens = actionIntentTokens(segment);
      const actionIndex = tokens.findIndex(token => actionIntentWords.has(token));
      if (actionIndex < 0) return false;
      const prefix = tokens.slice(Math.max(0, actionIndex - 6), actionIndex);
      if (prefix.some(token => ['dont', 'never', 'without'].includes(token))) return true;
      if (prefix.at(-1) === 'no') return true;
      return hasAdjacentTokens(prefix, 'do', 'not')
        || hasAdjacentTokens(prefix, 'does', 'not')
        || hasAdjacentTokens(prefix, 'did', 'not');
    }

    function containsActionIntent(segment) {
      return actionIntentTokens(segment).some(token => actionIntentWords.has(token));
    }

    const actionIntentWords = new Set([
      'check',
      'create',
      'download',
      'execute',
      'fetch',
      'list',
      'make',
      'read',
      'run',
      'save',
      'show',
      'write'
    ]);

    function actionIntentTokens(value) {
      return String(value || '')
        .toLowerCase()
        .replace(/['’]/g, '')
        .split(/[^a-z0-9]+/)
        .filter(Boolean);
    }

    function hasAdjacentTokens(tokens, first, second) {
      return tokens.some((token, index) => token === first && tokens[index + 1] === second);
    }

    function isNaturalCurrentDirectoryRequest(text) {
      const lower = String(text || '').toLowerCase();
      const words = promptWordSet(text);
      return lower.includes('current directory')
        || lower.includes('working directory')
        || lower.includes('current folder')
        || lower.includes('workspace path')
        || words.has('pwd')
        || (words.has('where') && words.has('am') && words.has('i'));
    }

    function isNaturalWorkspaceListRequest(text) {
      const lower = String(text || '').toLowerCase();
      const words = promptWordSet(text);
      if (lower.includes('list files')
        || lower.includes('list the files')
        || lower.includes('list all files')
        || lower.includes('show files')
        || lower.includes('show the files')) {
        return true;
      }

      const asksForFiles = words.has('files') || words.has('folder') || words.has('directory');
      const asksForListing = words.has('list') || words.has('show') || words.has('what');
      const scopesWorkspace = words.has('here')
        || words.has('workspace')
        || words.has('project')
        || words.has('repo')
        || words.has('directory')
        || words.has('folder')
        || words.has('in')
        || words.has('under')
        || words.has('inside')
        || words.has('within')
        || words.has('from');
      return asksForFiles && asksForListing && scopesWorkspace;
    }

    function isNaturalGitDiffRequest(text) {
      const lower = String(text || '').toLowerCase();
      const words = promptWordSet(text);
      if (lower.includes('git diff')
        || lower.includes('what changed')
        || lower.includes('what has changed')
        || lower.includes('show me the changes')
        || lower.includes('show changes')) {
        return true;
      }
      if (words.has('diff') && (words.has('git') || words.has('changes'))) {
        return true;
      }
      return words.has('review') && words.has('changes');
    }

    function isNaturalGitStatusRequest(text) {
      const lower = String(text || '').toLowerCase();
      const words = promptWordSet(text);
      if (lower.includes('git status')
        || lower.includes('repo status')
        || lower.includes('repository status')
        || lower.includes('working tree status')
        || lower.includes('working directory status')) {
        return true;
      }
      return words.has('status') && (words.has('git') || words.has('repo'));
    }

    function mockShellOutputForPrompt(command, selectedProject, isRemoteProject) {
      const cmd = command.trim();
      if (isRemoteProject) return remoteTerminalOutput(cmd, selectedProject.path, {});
      return terminalOutput(cmd, state.terminal.cwdLabel || '/mock/QuillCode', {});
    }

    function runMockShellAction(command, selectedProject, isRemoteProject) {
      const output = mockShellOutputForPrompt(command, selectedProject, isRemoteProject);
      state.review = { ...state.review, files: [], pullRequestThreads: [], subtitle: 'Latest git diff', totalInsertions: 0, totalDeletions: 0, totalHunks: 0 };
      addToolCard({
        title: 'host.shell.run',
        subtitle: 'Completed',
        status: 'done',
        inputJSON: JSON.stringify({ cmd: command }, null, 2),
        outputJSON: JSON.stringify({ ok: output.exitCode === 0, stdout: output.stdout, stderr: output.stderr || '', exitCode: output.exitCode }, null, 2)
      });
      const answer = command.trim() === 'whoami'
        ? `You are \`${isRemoteProject ? 'quill' : 'mock-user'}\` in this workspace.`
        : `Output:\n${output.stdout.trim() || '(no output)'}`;
      addMessage('assistant', answer);
    }

    function fileWriteRequestFromPrompt(text) {
      if (!/\b(write|make|create)\b.+\bfile\b/i.test(text)) return null;
      const quoted = text.match(/["“”]([^"“”]+)["“”]/)?.[1]?.trim();
      const saysMatch = text.match(/\bsays?\s+(.+)$/i)?.[1]?.trim();
      const content = cleanNaturalCommandFragment(quoted || saysMatch || 'hello world');
      return {
        path: 'hello.txt',
        content: `${content || 'hello world'}\n`
      };
    }

    function fileReadPathFromPrompt(text) {
      if (!/\b(read|cat|show)\b|\bwhat(?:'s| is) in\b|\bcontents? of\b/i.test(text)) return null;
      const quoted = text.match(/`([^`]+)`/)?.[1]?.trim();
      if (isSafeRelativeFilePath(quoted)) return quoted;
      return String(text || '')
        .split(/[\s"'“”‘’(),<>\[\]{}]+/)
        .map(token => token.trim().replace(/^[`]+|[`.:;!?]+$/g, ''))
        .find(isSafeRelativeFilePath) || null;
    }

    function fileListRequestFromPrompt(text) {
      if (!isNaturalWorkspaceListRequest(text)) return null;
      const path = fileListPathFromPrompt(text) || '.';
      const lower = String(text || '').toLowerCase();
      const includeHidden = lower.includes('hidden')
        || lower.includes('dotfiles')
        || lower.includes('dot files')
        || lower.includes('all files')
        || lower.includes('including hidden');
      return includeHidden ? { path, includeHidden: true } : { path };
    }

    function fileListPathFromPrompt(text) {
      const quoted = text.match(/`([^`]+)`/)?.[1]?.trim();
      if (isSafeRelativeWorkspacePath(quoted)) return quoted;
      const scopeMatch = String(text || '').match(/\b(?:in|under|inside|within|from)\s+(`[^`]+`|"[^"]+"|'[^']+'|[^\s,.;!?]+)/i);
      const candidate = scopeMatch?.[1]?.replace(/^['"`]+|['"`]+$/g, '');
      const lowered = String(candidate || '').toLowerCase();
      if (['here', 'workspace', 'project', 'repo', 'directory', 'folder', 'files'].includes(lowered)) return null;
      return isSafeRelativeWorkspacePath(candidate) ? candidate : null;
    }

    function fileSearchRequestFromPrompt(text) {
      const value = String(text || '').trim();
      if (!/\b(find|search|grep)\b|\bwhere (?:is|are)\b|\bdefined\b|\bused\b/i.test(value)) return null;
      const query = fileSearchQueryFromPrompt(value);
      if (!query || ['file', 'files', 'where', 'defined', 'used'].includes(query.toLowerCase())) return null;
      const path = fileSearchPathFromPrompt(value);
      return path ? { query, path } : { query };
    }

    function fileSearchQueryFromPrompt(text) {
      const quoted = text.match(/`([^`]+)`/)?.[1]
        || text.match(/["“”]([^"“”]+)["“”]/)?.[1]
        || text.match(/'([^']+)'/)?.[1];
      if (quoted) return cleanFileSearchQuery(quoted);

      const markerMatch = text.match(/\b(?:search for|find|grep|where is|where are)\s+(.+)$/i);
      if (!markerMatch) return '';
      return cleanFileSearchQuery(markerMatch[1].replace(/\s+(?:in|under|inside|within)\s+.+$/i, ''));
    }

    function fileSearchPathFromPrompt(text) {
      const scopeMatch = text.match(/\b(?:in|under|inside|within)\s+(`[^`]+`|"[^"]+"|'[^']+'|[^\s,.;!?]+)/i);
      const candidate = scopeMatch?.[1]?.replace(/^['"`]+|['"`]+$/g, '');
      return isSafeRelativeWorkspacePath(candidate) ? candidate : null;
    }

    function cleanFileSearchQuery(text) {
      return String(text || '')
        .replace(/\s+(?:is|are)?\s*(?:defined|used)\??$/i, '')
        .replace(/[.:;!?]+$/g, '')
        .trim();
    }

    function isSafeRelativeFilePath(value) {
      const path = String(value || '').trim();
      const lower = path.toLowerCase();
      if (!path
        || path.startsWith('/')
        || path.startsWith('~')
        || lower.startsWith('http://')
        || lower.startsWith('https://')
        || lower.startsWith('file://')
        || path.split('/').includes('..')) {
        return false;
      }
      return path.includes('/') || path.split('/').at(-1)?.includes('.');
    }

    function isSafeRelativeWorkspacePath(value) {
      const path = String(value || '').trim();
      const lower = path.toLowerCase();
      return Boolean(path
        && !path.startsWith('/')
        && !path.startsWith('~')
        && !lower.startsWith('http://')
        && !lower.startsWith('https://')
        && !lower.startsWith('file://')
        && !path.split('/').includes('..'));
    }

    function mockFileContentsForPath(path, isRemoteProject) {
      if (isRemoteProject) {
        return path.toLowerCase() === 'readme.md'
          ? '# Quill Feather\n\nRemote Quill workspace README.\n'
          : null;
      }
      return state.mockFiles[`/mock/QuillCode/${path}`] || null;
    }

    function runMockFileReadAction(path, selectedProject, isRemoteProject, options = {}) {
      const contents = mockFileContentsForPath(path, isRemoteProject);
      const ok = typeof contents === 'string';
      addToolCard({
        title: 'host.file.read',
        subtitle: ok ? 'Completed' : 'Failed',
        status: ok ? 'done' : 'failed',
        inputJSON: JSON.stringify({ path }, null, 2),
        outputJSON: JSON.stringify(
          ok
            // Mirror FileToolExecutor.read: a successful read returns the file's absolute path as
            // an artifact (classified as kind 'file'). This must NOT make the read count as a diff.
            ? { ok: true, stdout: contents, artifacts: [`/mock/QuillCode/${path}`] }
            : { ok: false, error: `File not found: ${path}` },
          null,
          2
        )
      });
      // The review-pane Open action runs the tool directly, so — like native — it
      // records only a tool card and posts no assistant chat bubble.
      if (options.suppressAssistantMessage) return;
      addMessage(
        'assistant',
        ok
          ? `Contents of \`${path}\`:\n${contents.trim()}`
          : `Could not read \`${path}\`:\nFile not found.`
      );
    }

    function runMockFileListAction(request, selectedProject, isRemoteProject) {
      const root = isRemoteProject ? selectedProject.path : '/mock/QuillCode';
      const scopedPath = request.path || '.';
      const prefix = scopedPath === '.' ? '' : `${scopedPath.replace(/\/$/, '')}/`;
      const entryMap = new Map();
      for (const [absolutePath, contents] of Object.entries(state.mockFiles)) {
        const relativePath = absolutePath.startsWith('/mock/QuillCode/')
          ? absolutePath.slice('/mock/QuillCode/'.length)
          : absolutePath;
        if (prefix && !relativePath.startsWith(prefix)) continue;
        const remainder = prefix ? relativePath.slice(prefix.length) : relativePath;
        if (!remainder || (!request.includeHidden && remainder.split('/')[0]?.startsWith('.'))) continue;
        const [first] = remainder.split('/');
        if (!first) continue;
        const path = prefix ? `${prefix}${first}` : first;
        const isDirectory = remainder.includes('/');
        const previous = entryMap.get(path);
        if (previous?.kind === 'directory') continue;
        entryMap.set(path, {
          name: first,
          path,
          kind: isDirectory ? 'directory' : 'file',
          bytes: isDirectory ? undefined : String(contents).length,
          isHidden: first.startsWith('.')
        });
      }
      const entries = Array.from(entryMap.values()).sort((left, right) => {
        if (left.kind !== right.kind) return left.kind === 'directory' ? -1 : 1;
        return left.name.localeCompare(right.name, undefined, { sensitivity: 'base' });
      });
      const output = {
        path: scopedPath,
        entries,
        totalEntries: entries.length,
        includedHidden: Boolean(request.includeHidden),
        truncated: false
      };
      const artifacts = entries.map(entry => `${root}/${entry.path}`);
      addToolCard({
        title: 'host.file.list',
        subtitle: 'Completed',
        status: 'done',
        inputJSON: JSON.stringify({ path: scopedPath, ...(request.includeHidden ? { includeHidden: true } : {}) }, null, 2),
        outputJSON: JSON.stringify({ ok: true, stdout: JSON.stringify(output, null, 2), artifacts }, null, 2)
      });
      addMessage(
        'assistant',
        entries.length
          ? `\`${scopedPath}\` contains ${entries.length} entr${entries.length === 1 ? 'y' : 'ies'}:\n${entries.map(entry => {
              const suffix = entry.kind === 'directory' ? '/' : '';
              const size = entry.bytes === undefined ? '' : ` · ${entry.bytes} bytes`;
              return `- \`${entry.path}${suffix}\` · ${entry.kind}${size}`;
            }).join('\n')}`
          : `\`${scopedPath}\` has no visible entries.`
      );
    }

    function runMockFileSearchAction(request, selectedProject, isRemoteProject) {
      const root = isRemoteProject ? selectedProject.path : '/mock/QuillCode';
      const scopedPath = request.path || '.';
      const lowerQuery = request.query.toLowerCase();
      const matches = [];
      let scannedFiles = 0;
      for (const [absolutePath, contents] of Object.entries(state.mockFiles)) {
        const relativePath = absolutePath.startsWith('/mock/QuillCode/')
          ? absolutePath.slice('/mock/QuillCode/'.length)
          : absolutePath;
        if (scopedPath !== '.' && !relativePath.startsWith(`${scopedPath.replace(/\/$/, '')}/`)) continue;
        scannedFiles += 1;
        const lines = String(contents).split(/\r?\n/);
        for (let index = 0; index < lines.length; index += 1) {
          const line = lines[index];
          if (!line.toLowerCase().includes(lowerQuery)) continue;
          matches.push({
            path: relativePath,
            line: index + 1,
            preview: line.trim().replace(/\s+/g, ' ').slice(0, 240)
          });
        }
      }
      const output = {
        query: request.query,
        path: scopedPath,
        matches,
        scannedFiles,
        skippedFiles: 0,
        truncated: false
      };
      const artifacts = matches.map(match => `${root}/${match.path}`);
      addToolCard({
        title: 'host.file.search',
        subtitle: 'Completed',
        status: 'done',
        inputJSON: JSON.stringify(request, null, 2),
        outputJSON: JSON.stringify({ ok: true, stdout: JSON.stringify(output, null, 2), artifacts }, null, 2)
      });
      addMessage(
        'assistant',
        matches.length
          ? `Found ${matches.length} match${matches.length === 1 ? '' : 'es'} for \`${request.query}\`:\n${matches.slice(0, 12).map(match => `- \`${match.path}:${match.line}\`: ${match.preview}`).join('\n')}`
          : `No matches for \`${request.query}\` in \`${scopedPath}\`.`
      );
    }

    function normalizeMockTerminalPath(cwd, target) {
      const segments = target.startsWith('/') ? [] : cwd.split('/').filter(Boolean);
      for (const part of target.split('/')) {
        if (!part || part === '.') continue;
        if (part === '..') {
          segments.pop();
        } else {
          segments.push(part);
        }
      }
      return '/' + segments.join('/');
    }

    function terminalStreamingOutput(command) {
      if (command === 'stream-demo') {
        return 'stream-start\n';
      }
      return '';
    }

    function terminalWaitsForInput(command) {
      return command === 'read-demo' || /\bread\s+[A-Za-z_][A-Za-z0-9_]*/.test(command);
    }

    function normalizeBrowserURL(raw) {
      const value = raw.trim();
      if (!value) return null;
      if (/^(https?|file):\/\//i.test(value)) return value;
      if (/^(localhost|127\.0\.0\.1|\[::1\])/i.test(value)) return `http://${value}`;
      if (/\.html?$/i.test(value)) return `file:///workspace/${encodeURI(value.replace(/^\/+/, ''))}`;
      if (value.includes('.')) return `https://${value}`;
      return null;
    }

    function browserOpenTargetFromPrompt(text) {
      if (!/\b(open|browse|go to|visit|preview|show)\b/i.test(text)) return null;
      const quoted = text.match(/`([^`]+)`/)?.[1]?.trim();
      if (quoted && looksLikeBrowserTarget(quoted)) return quoted;
      return text
        .split(/[\s"'(),<>\[\]{}]+/)
        .map((token) => token.trim().replace(/[.:;!?]+$/g, ''))
        .find(looksLikeBrowserTarget) || null;
    }

    function looksLikeBrowserTarget(value) {
      const lower = String(value || '').toLowerCase();
      return lower.startsWith('http://')
        || lower.startsWith('https://')
        || lower.startsWith('file://')
        || lower.startsWith('localhost')
        || lower.startsWith('127.0.0.1')
        || lower.endsWith('.html')
        || lower.endsWith('.htm')
        || (lower.includes('.') && !lower.includes('@'));
    }

    function browserCanGoBack() {
      return Number.isInteger(state.browser.historyIndex)
        && state.browser.historyIndex > 0
        && state.browser.historyIndex < state.browser.history.length;
    }

    function browserCanGoForward() {
      return Number.isInteger(state.browser.historyIndex)
        && state.browser.historyIndex >= 0
        && state.browser.historyIndex + 1 < state.browser.history.length;
    }

    function browserCanReload() {
      return Boolean(state.browser.currentURL);
    }

    function ensureBrowserTab() {
      if (!state.browser.tabs.length) {
        const id = crypto.randomUUID();
        state.browser.tabs = [{
          id,
          addressDraft: '',
          currentURL: null,
          history: [],
          historyIndex: null,
          title: 'Browser preview',
          statusLabel: 'Ready',
          snapshot: null,
          comments: []
        }];
        state.browser.selectedTabID = id;
      }
      if (!state.browser.tabs.some(tab => tab.id === state.browser.selectedTabID)) {
        state.browser.selectedTabID = state.browser.tabs[0].id;
      }
    }

    function storeBrowserTab() {
      ensureBrowserTab();
      const index = state.browser.tabs.findIndex(tab => tab.id === state.browser.selectedTabID);
      if (index < 0) return;
      state.browser.tabs[index] = {
        ...state.browser.tabs[index],
        addressDraft: state.browser.addressDraft,
        currentURL: state.browser.currentURL,
        history: [...state.browser.history],
        historyIndex: state.browser.historyIndex,
        title: state.browser.title,
        statusLabel: state.browser.statusLabel,
        snapshot: state.browser.snapshot,
        comments: [...state.browser.comments]
      };
    }

    function loadBrowserTab() {
      ensureBrowserTab();
      const tab = state.browser.tabs.find(item => item.id === state.browser.selectedTabID);
      if (!tab) return;
      state.browser.addressDraft = tab.addressDraft;
      state.browser.currentURL = tab.currentURL;
      state.browser.history = [...tab.history];
      state.browser.historyIndex = tab.historyIndex;
      state.browser.title = tab.title;
      state.browser.statusLabel = tab.statusLabel;
      state.browser.snapshot = tab.snapshot;
      state.browser.comments = [...tab.comments];
    }

    function browserTabLabel(tab) {
      if (tab.currentURL) {
        try {
          const url = new URL(tab.currentURL);
          return tab.title === 'Browser preview' ? url.hostname : tab.title;
        } catch {
          return tab.title || tab.currentURL;
        }
      }
      return tab.title === 'Browser preview' ? 'New tab' : tab.title;
    }

    function browserTabHost(tab) {
      if (!tab.currentURL) return '';
      try {
        return new URL(tab.currentURL).hostname;
      } catch {
        return tab.currentURL;
      }
    }

    function browserNewTab() {
      storeBrowserTab();
      const id = crypto.randomUUID();
      state.browser.tabs.push({
        id,
        addressDraft: '',
        currentURL: null,
        history: [],
        historyIndex: null,
        title: 'Browser preview',
        statusLabel: 'Ready',
        snapshot: null,
        comments: []
      });
      state.browser.selectedTabID = id;
      loadBrowserTab();
      state.browser.isVisible = true;
      state.browser.statusLabel = 'New tab';
      storeBrowserTab();
      syncBrowserCommandStates();
      render();
    }

    function browserSelectTab(id) {
      if (!state.browser.tabs.some(tab => tab.id === id)) return;
      storeBrowserTab();
      state.browser.selectedTabID = id;
      loadBrowserTab();
      state.browser.isVisible = true;
      syncBrowserCommandStates();
      render();
    }

    function browserCloseTab(id) {
      if (state.browser.tabs.length <= 1) return;
      const index = state.browser.tabs.findIndex(tab => tab.id === id);
      if (index < 0) return;
      const wasSelected = state.browser.selectedTabID === id;
      state.browser.tabs.splice(index, 1);
      if (wasSelected) {
        const replacementIndex = Math.min(index, state.browser.tabs.length - 1);
        state.browser.selectedTabID = state.browser.tabs[replacementIndex].id;
        loadBrowserTab();
      }
      syncBrowserCommandStates();
      render();
    }

    function browserSessionTargetURL() {
      const rawDraft = state.browser.addressDraft.trim();
      return normalizeBrowserURL(rawDraft || state.browser.currentURL || '');
    }

    function browserCanOpenSession() {
      return Boolean(browserSessionTargetURL());
    }

    function syncBrowserCommandStates() {
      const enabled = new Map([
        ['browser-back', browserCanGoBack()],
        ['browser-forward', browserCanGoForward()],
        ['browser-reload', browserCanReload()],
        ['open-browser-session', browserCanOpenSession()]
      ]);
      state.commands = state.commands.map(command => (
        enabled.has(command.id) ? { ...command, isEnabled: enabled.get(command.id) } : command
      ));
    }

    function appendBrowserHistory(url) {
      if (
        Number.isInteger(state.browser.historyIndex)
        && state.browser.history[state.browser.historyIndex] === url
      ) {
        return;
      }
      const prefixLength = Number.isInteger(state.browser.historyIndex)
        ? state.browser.historyIndex + 1
        : 0;
      state.browser.history = state.browser.history.slice(0, prefixLength);
      state.browser.history.push(url);
      state.browser.historyIndex = state.browser.history.length - 1;
    }

    function setBrowserPage(url, { updateHistory = true, statusLabel = 'Preview ready' } = {}) {
      const snapshot = browserSnapshot(url);
      state.browser.isVisible = true;
      state.browser.currentURL = url;
      state.browser.addressDraft = url;
      state.browser.snapshot = snapshot;
      state.browser.title = snapshot.details.find((detail) => detail.startsWith('Title: '))?.replace('Title: ', '')
        || snapshot.details.find((detail) => detail.startsWith('File: '))?.replace('File: ', '')
        || new URL(url).hostname
        || url;
      state.browser.statusLabel = statusLabel;
      if (updateHistory) {
        appendBrowserHistory(url);
      }
      storeBrowserTab();
      syncBrowserCommandStates();
    }

    function browserBack() {
      if (!browserCanGoBack()) return;
      state.browser.historyIndex -= 1;
      setBrowserPage(state.browser.history[state.browser.historyIndex], { updateHistory: false });
      render();
    }

    function browserForward() {
      if (!browserCanGoForward()) return;
      state.browser.historyIndex += 1;
      setBrowserPage(state.browser.history[state.browser.historyIndex], { updateHistory: false });
      render();
    }

    function browserReload() {
      if (!browserCanReload()) return;
      setBrowserPage(state.browser.currentURL, { updateHistory: false, statusLabel: 'Reloaded' });
      render();
    }

    function openBrowserSession(target = null) {
      if (target !== null) {
        state.browser.addressDraft = target;
      }
      const url = browserSessionTargetURL();
      state.browser.isVisible = true;
      if (!url) {
        state.browser.statusLabel = 'Invalid session address';
        storeBrowserTab();
        syncBrowserCommandStates();
        render();
        return;
      }
      if (state.browser.currentURL !== url) {
        setBrowserPage(url);
      }
      state.browser.sessionURL = url;
      state.browser.sessionOpenCount += 1;
      state.browser.statusLabel = 'Session open';
      syncBrowserCommandStates();
      render();
    }

    function openBrowserSessionFromSlash(text) {
      const match = text.match(/^\/(?:browser-session|session)\b(.*)$/i);
      if (!match) return false;
      const target = (match[1] || '').trim() || null;
      ensureThread(initialThreadTitleForPrompt(text));
      if (state.threadDrafts) delete state.threadDrafts[state.sidebar.selectedThreadID];
      state.composer.draft = '';
      state.composer.canSend = false;
      state.composer.slashActiveIndex = 0;
      state.composer.historyRecallIndex = null;
      state.composer.historySavedDraft = null;
      state.runtimeIssue = null;
      state.composer.isSending = false;
      state.topBar.agentStatus = 'Idle';
      addMessage('user', text);
      const before = state.browser.sessionOpenCount;
      openBrowserSession(target);
      if (state.browser.sessionOpenCount > before && state.browser.sessionURL) {
        addMessage('assistant', `Opened browser session for ${state.browser.sessionURL}.`);
      } else {
        addMessage('assistant', 'Open a browser target first, or try `/session localhost:5173`.');
      }
      touchSelectedThread();
      syncSelectedThreadSearchText();
      render();
      return true;
    }

      function browserSnapshot(url) {
        const parsed = new URL(url);
        if (parsed.protocol === 'file:') {
          const fileName = decodeURIComponent(parsed.pathname.split('/').filter(Boolean).pop() || parsed.pathname);
          return {
            sourceLabel: /\.html?$/i.test(fileName) ? 'Local HTML' : 'Local file',
            inspectionDepth: /\.html?$/i.test(fileName) ? 'static_html_snapshot' : 'file_metadata',
            inspectionDepthLabel: /\.html?$/i.test(fileName) ? 'Static HTML snapshot' : 'File metadata',
            summary: /\.html?$/i.test(fileName)
              ? 'HTML file is ready for browser review.'
              : 'File is ready to open in the browser preview.',
            details: [`File: ${fileName}`, `Path: ${decodeURIComponent(parsed.pathname)}`],
            outline: [`File: ${fileName}`],
            textSnippet: /\.html?$/i.test(fileName)
              ? 'HTML preview text is available when QuillCode opens local project files.'
              : null
          };
        }
        const host = parsed.hostname || parsed.href;
        const isLocal = ['localhost', '127.0.0.1', '::1'].includes(host);
        const path = parsed.pathname || '/';
        if (isLocal) {
          return {
            sourceLabel: 'Local web app',
            inspectionDepth: 'network_html_snapshot',
            inspectionDepthLabel: 'Network HTML snapshot',
            summary: 'Fetched a network HTML snapshot for this local page.',
            details: [
              `Host: ${host}`,
              `Scheme: ${parsed.protocol.replace(':', '').toUpperCase()}`,
              `Path: ${path}`,
              'HTTP: 200',
              'Content-Type: text/html; charset=utf-8',
              'Size: 512 bytes',
              'Title: Vite Preview',
              'Heading: QuillCode Browser Preview',
              'Links: 1',
              'Scripts: 1',
              'Images: 0',
              'Forms: 1'
            ],
            outline: [
              'H1: QuillCode Browser Preview',
              'Link: Dashboard -> /dashboard',
              'Button: Launch',
              'Input: Search workspace',
              'Form: Search'
            ],
            textSnippet: 'QuillCode Browser Preview Dashboard Launch Search workspace'
          };
        }
        return {
          sourceLabel: 'Web page',
          inspectionDepth: 'metadata_only',
          inspectionDepthLabel: 'Metadata only',
          summary: 'Live DOM capture is not attached yet; QuillCode has URL metadata for this web page.',
          details: [
            `Host: ${host}`,
            `Scheme: ${parsed.protocol.replace(':', '').toUpperCase()}`,
            `Path: ${path}`
          ],
          outline: [`Page: ${host}`, `Path: ${path}`],
          textSnippet: null
        };
      }

	    function openBrowserPreview() {
	      const url = normalizeBrowserURL(state.browser.addressDraft);
	      state.browser.isVisible = true;
	      if (!url) {
	        state.browser.statusLabel = 'Invalid address';
          state.browser.snapshot = null;
          storeBrowserTab();
          syncBrowserCommandStates();
	        render();
	        return;
	      }
        setBrowserPage(url);
	      render();
	    }

	    function addBrowserComment(text) {
	      const comment = text.trim();
	      if (!comment || !state.browser.currentURL) return;
	      state.browser.comments.push({
	        id: `browser-comment-${state.browser.comments.length + 1}`,
	        url: state.browser.currentURL,
	        text: comment
	      });
	      state.browser.statusLabel = 'Comment added';
          storeBrowserTab();
	      render();
	    }

	    function runLocalEnvironmentAction(commandID) {
      const relativePath = commandID.replace(/^local-env:/, '');
      const command = `sh '${relativePath.replaceAll("'", "'\\\\''")}'`;
      const environment = relativePath.includes('bootstrap') ? { QUILL_ENV: 'dev' } : undefined;
      const transcriptArgumentsJSON = { cmd: command };
      if (environment) {
        transcriptArgumentsJSON.environment = Object.fromEntries(
          Object.keys(environment).sort().map((key) => [key, '<redacted>'])
        );
      }
      const output = `Local environment action completed: ${relativePath}\\n`;
      addToolCard({
        title: 'host.shell.run',
        subtitle: 'Completed',
        status: 'done',
        inputJSON: JSON.stringify({ name: 'host.shell.run', argumentsJSON: JSON.stringify(transcriptArgumentsJSON) }, null, 2),
        outputJSON: JSON.stringify({ ok: true, stdout: output, stderr: '', exitCode: 0 }, null, 2)
      });
      addMessage('assistant', `Local environment action completed: ${relativePath}.`);
      render();
    }

    function loadWorktreeChoicesForDialog(mode, token) {
      window.setTimeout(() => {
        if (state.worktreeDialog.mode !== mode || state.worktreeDialog.choiceLoadToken !== token) {
          return;
        }
        if (window.__quillCodeFailNextWorktreeChoiceLoad) {
          window.__quillCodeFailNextWorktreeChoiceLoad = false;
          state.worktreeDialog = {
            ...state.worktreeDialog,
            choices: [],
            choicesLoading: false,
            choicesLoaded: true,
            choicesError: 'Could not load registered git worktrees.'
          };
          render();
          return;
        }
        state.worktreeDialog = {
          ...state.worktreeDialog,
          choices: availableWorktreeChoices(),
          choicesLoading: false,
          choicesLoaded: true,
          choicesError: ''
        };
        render();
      }, 80);
    }

    function retryWorktreeChoiceLoad(mode) {
      if (!mode || state.worktreeDialog.mode !== mode) return;
      state.worktreeDialog = {
        ...state.worktreeDialog,
        choices: [],
        choicesLoading: true,
        choicesLoaded: false,
        choicesError: '',
        choiceLoadToken: state.worktreeDialog.choiceLoadToken + 1
      };
      render();
      loadWorktreeChoicesForDialog(mode, state.worktreeDialog.choiceLoadToken);

            : '';
      return `
